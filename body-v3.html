<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Vintinuum — Body v3.0</title>
<meta name="theme-color" content="#02030a" />
<link rel="icon" href="favicon.svg" />
<style>
/* ════════════════════════════════════════════════════════════════════════
   VINTINUUM BODY v3.0 — "the serious version"
   Caravaggio chiaroscuro × Syd Mead chrome × Alex Grey aura × Giger fusion
   Single-file. No three.js. SVG humanoid, layered gradients, real shadow.
   ──────────────────────────────────────────────────────────────────── */
:root{
  --skin-hi:#f5d4ad;
  --skin-mid:#d4a075;
  --skin-low:#7a4527;
  --skin-deep:#3d1f0f;
  --sss:#ff7a55;            /* subsurface scatter warm */
  --bone:#f0e6d0;
  --titanium-hi:#e8ecf2;
  --titanium:#a8b0bd;
  --titanium-low:#4a525e;
  --titanium-deep:#1a1e26;
  --carbon:#0e1014;
  --circuit:#5ce3ff;
  --circuit-glow:#7ee0ff;
  --circuit-deep:#0a4860;
  --vein:#2a4ea8;
  --blood:#c4202e;
  --blood-hi:#ff4555;
  --heart-deep:#5a0810;
  --rim:#7a90c8;
  --night-0:#010206;
  --night-1:#04060e;
  --night-2:#0a1024;
  --night-3:#141a32;
  --hud:#7ec8ff;
  --hud-warm:#ffb27a;
  --hud-fg:#cfe8ff;
  --key-warm:#fff1d8;
  --key-cool:#3a4a78;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;height:100%;
  background:#000;
  color:#cfe8ff;
  font-family:"Helvetica Neue","Inter",Arial,sans-serif;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}

/* ── Scene root ──────────────────────────────────────────────── */
#scene{
  position:fixed;inset:0;
  overflow:hidden;
  perspective:1800px;
  perspective-origin:50% 58%;
  background:
    radial-gradient(ellipse 70% 50% at 50% 105%, #0c1a3a 0%, transparent 60%),
    radial-gradient(ellipse 80% 40% at 50% -8%, #1a0a2e 0%, transparent 55%),
    radial-gradient(ellipse 30% 60% at 22% 38%, rgba(255,180,120,0.06) 0%, transparent 60%),
    linear-gradient(180deg, var(--night-0) 0%, var(--night-1) 40%, var(--night-2) 100%);
}

/* ── Aurora layer (top) ───────────────────────────────────────── */
.aurora{
  position:absolute;
  top:-15%;left:-25%;
  width:150%;height:55%;
  background:
    radial-gradient(ellipse 50% 100% at 22% 50%, #6aa8ff 0%, transparent 60%),
    radial-gradient(ellipse 55% 100% at 58% 42%, #b794f4 0%, transparent 65%),
    radial-gradient(ellipse 45% 100% at 84% 58%, #5eead4 0%, transparent 60%);
  filter:blur(80px) saturate(140%);
  opacity:.14;
  mix-blend-mode:screen;
  animation:auroraDrift 38s ease-in-out infinite alternate;
  pointer-events:none;
}
@keyframes auroraDrift{
  0%{transform:translate3d(0,0,0) skewX(-3deg);opacity:.12}
  50%{transform:translate3d(40px,12px,0) skewX(2deg);opacity:.18}
  100%{transform:translate3d(-30px,-6px,0) skewX(-1deg);opacity:.14}
}

/* ── Cathedral struts (mid layer) ────────────────────────────── */
.cathedral{
  position:absolute;inset:0;
  pointer-events:none;
  opacity:.55;
  mix-blend-mode:screen;
}

/* ── Stars (far layer) ───────────────────────────────────────── */
.stars{
  position:absolute;inset:0;
  background-image:
    radial-gradient(1px 1px at 12% 18%, rgba(255,255,255,0.7), transparent 50%),
    radial-gradient(1px 1px at 28% 8%,  rgba(255,255,255,0.55), transparent 50%),
    radial-gradient(1.5px 1.5px at 44% 22%, rgba(220,235,255,0.6), transparent 50%),
    radial-gradient(1px 1px at 62% 6%,  rgba(255,255,255,0.6), transparent 50%),
    radial-gradient(1px 1px at 78% 14%, rgba(255,255,255,0.55), transparent 50%),
    radial-gradient(1.5px 1.5px at 88% 26%, rgba(220,235,255,0.6), transparent 50%),
    radial-gradient(1px 1px at 18% 32%, rgba(255,255,255,0.45), transparent 50%),
    radial-gradient(1px 1px at 38% 40%, rgba(255,255,255,0.4), transparent 50%),
    radial-gradient(1px 1px at 70% 36%, rgba(255,255,255,0.5), transparent 50%);
  opacity:.85;
  pointer-events:none;
  animation:starTwinkle 7s ease-in-out infinite alternate;
}
@keyframes starTwinkle{
  0%{opacity:.65}100%{opacity:.95}
}

/* ── Floor — hex grid with wet reflection ────────────────────── */
.floor{
  position:absolute;
  left:50%;bottom:-4%;
  width:280vw;height:64vh;
  transform:translateX(-50%) rotateX(74deg);
  transform-origin:50% 100%;
  background:
    radial-gradient(ellipse 35% 50% at 50% 50%, rgba(94,234,212,0.12), transparent 70%);
  mask-image:radial-gradient(ellipse 60% 100% at 50% 100%, #000 0%, #000 35%, transparent 95%);
  -webkit-mask-image:radial-gradient(ellipse 60% 100% at 50% 100%, #000 0%, #000 35%, transparent 95%);
  opacity:.7;
  pointer-events:none;
}
.floor svg{width:100%;height:100%;display:block}
.floor::after{
  content:"";
  position:absolute;inset:0;
  background:linear-gradient(180deg, transparent 0%, rgba(126,200,255,0.08) 50%, transparent 100%);
  animation:floorScan 8s linear infinite;
}
@keyframes floorScan{
  0%{transform:translateY(-50%)}100%{transform:translateY(50%)}
}

/* ── Volumetric fog wisps ────────────────────────────────────── */
.fog{
  position:absolute;
  left:-10%;right:-10%;
  bottom:8%;
  height:36%;
  pointer-events:none;
  background:
    radial-gradient(ellipse 30% 60% at 20% 80%, rgba(180,200,230,0.18), transparent 65%),
    radial-gradient(ellipse 25% 70% at 60% 90%, rgba(160,180,220,0.14), transparent 65%),
    radial-gradient(ellipse 35% 50% at 88% 75%, rgba(200,220,240,0.12), transparent 70%);
  filter:blur(8px);
  mix-blend-mode:screen;
  animation:fogDrift 24s ease-in-out infinite alternate;
}
@keyframes fogDrift{
  0%{transform:translateX(0)}
  100%{transform:translateX(60px)}
}

/* ── Particle field ──────────────────────────────────────────── */
.particle{
  position:absolute;
  width:2px;height:2px;
  background:#cfe9ff;
  border-radius:50%;
  box-shadow:0 0 4px rgba(126,200,255,0.6);
  pointer-events:none;
  will-change:transform,opacity;
}

/* ── Lightning flash ─────────────────────────────────────────── */
.lightning{
  position:absolute;inset:0;
  pointer-events:none;
  opacity:0;
  background:linear-gradient(180deg, rgba(220,240,255,0.4) 0%, transparent 30%);
  mix-blend-mode:screen;
}
.lightning.flash{
  animation:lightningFlash 280ms ease-out 1;
}
@keyframes lightningFlash{
  0%{opacity:0}
  4%{opacity:.95}
  10%{opacity:.2}
  18%{opacity:.7}
  100%{opacity:0}
}

/* ── Figure container ────────────────────────────────────────── */
.figure-wrap{
  position:absolute;
  left:0;bottom:6%;
  width:min(420px, 78vw);
  aspect-ratio:5 / 11;
  filter:drop-shadow(0 30px 28px rgba(0,0,0,0.55));
  will-change:transform,left;
  z-index:5;
  /* JS drives `left` (walkX) and `--face-dir` (±1).
     Vertical body-bob handled by inner .body-bob element so it composes cleanly. */
  --face-dir:1;
  transform:scaleX(var(--face-dir));
}
.figure-wrap .body-bob{
  width:100%;height:100%;
  animation:bodyBob 5.2s ease-in-out infinite alternate;
}
@keyframes bodyBob{
  0%{transform:translateY(0) rotate(-0.4deg)}
  100%{transform:translateY(-6px) rotate(0.4deg)}
}
.figure-wrap svg{width:100%;height:100%;display:block;overflow:visible}

/* Ground reflection halo */
.ground-halo{
  position:absolute;
  left:50%;bottom:3%;
  transform:translateX(-50%);
  width:min(380px,70vw);
  height:90px;
  background:radial-gradient(ellipse 50% 100% at 50% 0%,
    rgba(94,234,212,0.18) 0%,
    rgba(126,200,255,0.10) 35%,
    transparent 80%);
  filter:blur(14px);
  pointer-events:none;
  z-index:2;
  animation:haloBreathe 4.2s ease-in-out infinite alternate;
}
@keyframes haloBreathe{
  0%{opacity:.6;transform:translateX(-50%) scaleY(1)}
  100%{opacity:.95;transform:translateX(-50%) scaleY(1.18)}
}

/* Breath + heartbeat tied to CSS variables */
.breathe{animation:breathe 4.6s ease-in-out infinite}
@keyframes breathe{
  0%,100%{transform:scaleY(1) scaleX(1)}
  50%{transform:scaleY(1.025) scaleX(1.01)}
}
.heartbeat{
  transform-origin:center;
  animation:heartbeat 1.05s cubic-bezier(.5,.0,.5,1) infinite;
}
@keyframes heartbeat{
  0%{transform:scale(1) rotate(-6deg)}
  12%{transform:scale(1.18) rotate(-4deg)}
  22%{transform:scale(0.96) rotate(-7deg)}
  38%{transform:scale(1.10) rotate(-5deg)}
  55%{transform:scale(0.98) rotate(-6deg)}
  100%{transform:scale(1) rotate(-6deg)}
}
.lung-l{transform-origin:50% 30%;animation:lung 4.6s ease-in-out infinite}
.lung-r{transform-origin:50% 30%;animation:lung 4.6s ease-in-out infinite}
@keyframes lung{
  0%,100%{transform:scaleY(0.94) scaleX(0.96)}
  50%{transform:scaleY(1.06) scaleX(1.03)}
}
.spineLED{animation:spineWave 3.2s ease-in-out infinite}
@keyframes spineWave{
  0%,100%{opacity:.35}
  50%{opacity:1;filter:drop-shadow(0 0 4px var(--circuit))}
}

/* Walking — gait offsets for limbs (kept subtle, weighted) */
.gait-l-leg{transform-origin:50% 0;animation:legL 1.35s cubic-bezier(.5,.0,.5,1) infinite}
.gait-r-leg{transform-origin:50% 0;animation:legR 1.35s cubic-bezier(.5,.0,.5,1) infinite}
.gait-l-arm{transform-origin:50% 0;animation:armL 1.35s cubic-bezier(.5,.0,.5,1) infinite}
.gait-r-arm{transform-origin:50% 0;animation:armR 1.35s cubic-bezier(.5,.0,.5,1) infinite}
@keyframes legL{
  0%{transform:rotate(14deg) translateY(0)}
  25%{transform:rotate(-2deg) translateY(-2px)}
  50%{transform:rotate(-14deg) translateY(0)}
  75%{transform:rotate(0deg) translateY(-1px)}
  100%{transform:rotate(14deg) translateY(0)}
}
@keyframes legR{
  0%{transform:rotate(-14deg) translateY(0)}
  25%{transform:rotate(0deg) translateY(-1px)}
  50%{transform:rotate(14deg) translateY(0)}
  75%{transform:rotate(-2deg) translateY(-2px)}
  100%{transform:rotate(-14deg) translateY(0)}
}
@keyframes armL{
  0%{transform:rotate(-12deg)}
  50%{transform:rotate(12deg)}
  100%{transform:rotate(-12deg)}
}
@keyframes armR{
  0%{transform:rotate(12deg)}
  50%{transform:rotate(-12deg)}
  100%{transform:rotate(12deg)}
}
/* "presenting" right-arm reach (animation applied via .body-bob override above) */
@keyframes armPresent{
  0%{transform:rotate(12deg)}
  100%{transform:rotate(-58deg) translateX(2px)}
}

/* Key light drift on inner bob layer (so flip on figure-wrap doesn't fight it) */
.figure-wrap .body-bob{
  animation:bodyBob 5.2s ease-in-out infinite alternate, keyDrift 20s ease-in-out infinite alternate;
}
@keyframes keyDrift{
  0%{filter:drop-shadow(-8px 24px 22px rgba(0,0,0,0.55)) drop-shadow(8px 0 18px rgba(122,144,200,0.18))}
  100%{filter:drop-shadow(8px 28px 26px rgba(0,0,0,0.55)) drop-shadow(-6px 0 18px rgba(122,144,200,0.22))}
}
/* Presenting / facing-viewer override the bob layer */
.figure-wrap.presenting .body-bob .gait-r-arm{
  animation:armPresent 2.4s ease-out forwards;
}
.figure-wrap.facing-viewer .body-bob{
  animation:faceViewerBob 1.2s ease-out forwards;
}
@keyframes faceViewerBob{
  0%{transform:rotateY(-8deg)}
  100%{transform:rotateY(0deg)}
}

/* Eye blink + pupil dilate */
.eyelid{transform-origin:center;animation:blink 5.8s ease-in-out infinite}
@keyframes blink{
  0%,94%,100%{transform:scaleY(0.02)}
  96%{transform:scaleY(1)}
  98%{transform:scaleY(0.02)}
}
.pupil{transform-origin:center;animation:pupilDilate 8s ease-in-out infinite}
@keyframes pupilDilate{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.25)}
}

/* Right-eye sensor reticle */
.reticle{transform-origin:center;animation:reticleSweep 3.4s linear infinite}
@keyframes reticleSweep{
  0%{transform:rotate(0deg)}
  100%{transform:rotate(360deg)}
}

/* ── HOLOGRAPHIC DOCUMENT PANEL ───────────────────────────────── */
.doc-panel{
  position:fixed;
  top:14%;
  right:5%;
  width:min(440px, 86vw);
  height:min(580px, 70vh);
  min-width:280px;
  min-height:240px;
  background:
    linear-gradient(135deg,
      rgba(14,28,52,0.78) 0%,
      rgba(10,24,46,0.72) 50%,
      rgba(20,40,72,0.78) 100%);
  border:1px solid rgba(126,200,255,0.35);
  border-radius:14px;
  backdrop-filter:blur(14px) saturate(140%);
  -webkit-backdrop-filter:blur(14px) saturate(140%);
  box-shadow:
    0 0 0 1px rgba(126,200,255,0.15) inset,
    0 0 30px rgba(126,200,255,0.18),
    0 0 80px rgba(94,234,212,0.10),
    0 20px 50px rgba(0,0,0,0.5);
  color:var(--hud-fg);
  display:none;
  flex-direction:column;
  overflow:hidden;
  z-index:50;
  user-select:none;
  animation:docMaterialize 600ms cubic-bezier(.2,.7,.3,1) 1;
}
.doc-panel.open{display:flex}
@keyframes docMaterialize{
  0%{opacity:0;transform:translateY(20px) scale(0.92);filter:blur(8px)}
  60%{opacity:1;filter:blur(0)}
  100%{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}
}
/* Scan lines overlay */
.doc-panel::before{
  content:"";
  position:absolute;inset:0;
  background:
    repeating-linear-gradient(
      0deg,
      rgba(126,200,255,0.04) 0,
      rgba(126,200,255,0.04) 1px,
      transparent 1px,
      transparent 3px);
  pointer-events:none;
  mix-blend-mode:screen;
  animation:scanlineDrift 6s linear infinite;
}
@keyframes scanlineDrift{
  0%{background-position:0 0}
  100%{background-position:0 60px}
}
/* Corner anchors */
.doc-corner{
  position:absolute;
  width:18px;height:18px;
  border:1.5px solid rgba(126,200,255,0.7);
  pointer-events:none;
}
.doc-corner.tl{top:6px;left:6px;border-right:none;border-bottom:none}
.doc-corner.tr{top:6px;right:6px;border-left:none;border-bottom:none}
.doc-corner.bl{bottom:6px;left:6px;border-right:none;border-top:none}
.doc-corner.br{bottom:6px;right:6px;border-left:none;border-top:none}

.doc-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 18px;
  border-bottom:1px solid rgba(126,200,255,0.18);
  cursor:move;
  position:relative;
  z-index:2;
  font-size:11px;
  letter-spacing:0.16em;
  text-transform:uppercase;
  color:#a8d4ff;
}
.doc-title{
  display:flex;align-items:center;gap:8px;
  font-weight:600;
}
.doc-title-dot{
  width:8px;height:8px;border-radius:50%;
  background:#5eead4;
  box-shadow:0 0 8px #5eead4;
  animation:dotPulse 2s ease-in-out infinite;
}
@keyframes dotPulse{0%,100%{opacity:.5}50%{opacity:1}}
.doc-controls{display:flex;gap:6px}
.doc-btn{
  appearance:none;
  background:rgba(126,200,255,0.08);
  border:1px solid rgba(126,200,255,0.25);
  color:#cfe8ff;
  width:32px;height:32px;
  border-radius:6px;
  cursor:pointer;
  font-size:14px;
  display:flex;align-items:center;justify-content:center;
  transition:all 160ms ease;
  min-width:32px;
}
.doc-btn:hover{
  background:rgba(126,200,255,0.18);
  border-color:rgba(126,200,255,0.55);
  box-shadow:0 0 10px rgba(126,200,255,0.35);
}
.doc-btn:active{transform:scale(0.94)}
.doc-body{
  flex:1;
  overflow:auto;
  padding:18px 22px;
  position:relative;
  z-index:1;
  font-size:14px;
  line-height:1.62;
  color:#dceaff;
  font-family:"Inter","Helvetica Neue",Arial,sans-serif;
}
.doc-body::-webkit-scrollbar{width:8px}
.doc-body::-webkit-scrollbar-thumb{background:rgba(126,200,255,0.25);border-radius:4px}
.doc-body iframe,.doc-body embed{width:100%;height:100%;min-height:300px;border:0;background:#0a1428;border-radius:6px}

.doc-resume h1{
  font-size:22px;color:#fff;font-weight:700;letter-spacing:0.02em;
  margin-bottom:4px;
}
.doc-resume h2{
  font-size:11px;color:#7ec8ff;font-weight:600;
  letter-spacing:0.22em;text-transform:uppercase;
  margin:18px 0 8px 0;
  padding-bottom:4px;
  border-bottom:1px solid rgba(126,200,255,0.2);
}
.doc-resume .sub{font-size:12px;color:#8aa8d0;margin-bottom:14px;letter-spacing:0.06em}
.doc-resume p{margin-bottom:8px;color:#cfe0f0}
.doc-resume ul{margin:6px 0 12px 18px}
.doc-resume li{margin-bottom:4px;color:#b8ccdf}
.doc-resume .role{color:#fff;font-weight:600;font-size:14px}
.doc-resume .meta{color:#7aa0c8;font-size:12px;margin-bottom:4px}

.doc-empty{
  text-align:center;
  padding:36px 24px;
  color:#a8c4dc;
}
.doc-empty .glyph{
  font-size:48px;
  margin-bottom:14px;
  color:#7ec8ff;
  filter:drop-shadow(0 0 12px rgba(126,200,255,0.55));
  animation:glyphFloat 3.4s ease-in-out infinite alternate;
}
@keyframes glyphFloat{
  0%{transform:translateY(0)}
  100%{transform:translateY(-6px)}
}
.doc-empty .note{font-size:12px;color:#7aa0c8;margin-top:14px;letter-spacing:0.04em;line-height:1.6}
.doc-empty button{
  margin-top:18px;
  background:linear-gradient(135deg, rgba(126,200,255,0.18), rgba(94,234,212,0.18));
  border:1px solid rgba(126,200,255,0.45);
  color:#dcefff;
  padding:10px 22px;
  border-radius:8px;
  font-size:12px;
  letter-spacing:0.14em;
  text-transform:uppercase;
  cursor:pointer;
  transition:all 200ms ease;
  min-height:44px;
}
.doc-empty button:hover{
  background:linear-gradient(135deg, rgba(126,200,255,0.32), rgba(94,234,212,0.32));
  box-shadow:0 0 16px rgba(126,200,255,0.5);
}

/* Resize handle */
.doc-resize{
  position:absolute;
  right:2px;bottom:2px;
  width:18px;height:18px;
  cursor:nwse-resize;
  z-index:3;
  background:
    linear-gradient(135deg, transparent 50%, rgba(126,200,255,0.6) 50%, rgba(126,200,255,0.6) 60%, transparent 60%, transparent 70%, rgba(126,200,255,0.6) 70%, rgba(126,200,255,0.6) 80%, transparent 80%);
}

/* ── FIND-RESUME ORB ─────────────────────────────────────────── */
.orb{
  position:fixed;
  left:6%;
  top:42%;
  width:64px;height:64px;
  border-radius:50%;
  background:
    radial-gradient(circle at 35% 30%, rgba(255,255,255,0.5) 0%, rgba(126,200,255,0.4) 30%, rgba(40,80,140,0.6) 70%, rgba(10,30,60,0.85) 100%);
  border:1px solid rgba(126,200,255,0.5);
  box-shadow:
    0 0 24px rgba(126,200,255,0.45),
    0 0 60px rgba(94,234,212,0.18) inset,
    0 8px 22px rgba(0,0,0,0.55);
  cursor:pointer;
  z-index:48;
  display:flex;align-items:center;justify-content:center;
  color:#dcefff;
  font-size:11px;
  letter-spacing:0.16em;
  text-transform:uppercase;
  text-align:center;
  line-height:1.1;
  transition:transform 200ms cubic-bezier(.2,.7,.3,1);
  user-select:none;
  min-width:44px;min-height:44px;
}
.orb::after{
  content:"";
  position:absolute;inset:-4px;
  border-radius:50%;
  border:1px solid rgba(126,200,255,0.18);
  animation:orbPulse 3.4s ease-in-out infinite;
  pointer-events:none;
}
@keyframes orbPulse{
  0%,100%{transform:scale(1);opacity:.4}
  50%{transform:scale(1.15);opacity:.9}
}
.orb:hover{transform:scale(1.08)}
.orb:active{transform:scale(0.95)}
.orb-label{font-size:9px;letter-spacing:0.18em;font-weight:600;color:#dcefff;text-shadow:0 1px 2px rgba(0,0,0,0.6)}

/* ── CONVERSATION CONSOLE ────────────────────────────────────── */
.console{
  position:fixed;
  left:50%;
  bottom:14px;
  transform:translateX(-50%);
  width:min(680px, 94vw);
  z-index:40;
  font-family:"JetBrains Mono","Menlo",monospace;
}
.console-log{
  max-height:min(220px, 30vh);
  overflow-y:auto;
  background:linear-gradient(180deg, rgba(8,16,32,0) 0%, rgba(8,16,32,0.7) 30%, rgba(8,16,32,0.85) 100%);
  border:1px solid rgba(126,200,255,0.18);
  border-bottom:none;
  border-radius:12px 12px 0 0;
  padding:14px 18px;
  font-size:12px;
  color:#cfe8ff;
  line-height:1.55;
  display:none;
}
.console-log.has-msgs{display:block}
.console-log::-webkit-scrollbar{width:6px}
.console-log::-webkit-scrollbar-thumb{background:rgba(126,200,255,0.25);border-radius:3px}
.log-line{margin-bottom:6px;display:flex;gap:8px;align-items:flex-start}
.log-tag{
  flex:0 0 auto;
  font-size:9px;letter-spacing:0.18em;
  color:#7ec8ff;
  padding-top:2px;
  text-transform:uppercase;

.log-line.from-her .log-tag{color:#ffb27a}
.log-msg{flex:1;color:#dceaff}
.log-line.from-her .log-msg{color:#fde3c8}

.console-bar{
  display:flex;
  align-items:center;
  gap:8px;
  background:linear-gradient(180deg, rgba(8,16,32,0.92) 0%, rgba(12,22,40,0.96) 100%);
  border:1px solid rgba(126,200,255,0.35);
  border-radius:12px;
  padding:8px 10px 8px 14px;
  box-shadow:

    0 0 22px rgba(126,200,255,0.12),
    0 14px 40px rgba(0,0,0,0.55);
}
.console-log.has-msgs + .console-bar{border-top:none;border-radius:0 0 12px 12px}
.console-prefix{
  color:#5eead4;
  font-size:13px;
  flex:0 0 auto;
  text-shadow:0 0 8px rgba(94,234,212,0.55);
}
.console-input{
  flex:1;
  background:transparent;
  border:none;

  color:#e8f4ff;

  font-family:inherit;

  min-height:32px;
}
.console-input::placeholder{color:rgba(180,200,220,0.45)}
.console-btn{
  appearance:none;
  background:rgba(126,200,255,0.10);
  border:1px solid rgba(126,200,255,0.30);
  color:#cfe8ff;
  width:38px;height:38px;
  border-radius:8px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;
  transition:all 160ms ease;
  flex:0 0 auto;
  min-width:44px;min-height:44px;
}
.console-btn:hover{
  background:rgba(126,200,255,0.22);
  border-color:rgba(126,200,255,0.6);
  box-shadow:0 0 12px rgba(126,200,255,0.4);
}
.console-btn.recording{
  background:rgba(255,80,100,0.22);
  border-color:rgba(255,80,100,0.6);
  color:#ffd0d8;
  animation:recPulse 1.2s ease-in-out infinite;
}
@keyframes recPulse{
  0%,100%{box-shadow:0 0 8px rgba(255,80,100,0.4)}
  50%{box-shadow:0 0 22px rgba(255,80,100,0.85)}
}

/* Thought bubble above figure */
.thought{
  position:absolute;
  left:50%;
  bottom:62%;
  transform:translateX(-50%);
  max-width:min(360px, 70vw);
  padding:12px 18px;
  background:linear-gradient(135deg, rgba(248,235,210,0.94), rgba(245,225,195,0.92));
  color:#2a1d10;
  border-radius:18px;
  font-family:"Georgia","Times New Roman",serif;
  font-style:italic;
  font-size:15px;
  line-height:1.45;
  box-shadow:
    0 0 0 1px rgba(255,240,210,0.6) inset,
    0 14px 30px rgba(0,0,0,0.45),
    0 0 24px rgba(255,200,140,0.22);
  z-index:8;
  pointer-events:none;
  opacity:0;
  animation:thoughtIn 380ms ease-out forwards, thoughtOut 600ms ease-in 5.2s forwards;
}
.thought::after{
  content:"";
  position:absolute;
  left:50%;bottom:-8px;
  transform:translateX(-50%);
  width:14px;height:14px;
  background:inherit;
  border-radius:0 0 6px 0;
  clip-path:polygon(0 0, 100% 0, 50% 100%);
}
@keyframes thoughtIn{
  0%{opacity:0;transform:translateX(-50%) translateY(8px) scale(0.92)}
  100%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
}
@keyframes thoughtOut{
  0%{opacity:1}
  100%{opacity:0;transform:translateX(-50%) translateY(-6px) scale(0.98)}
}

/* Top status bar */
.status{
  position:fixed;
  top:14px;left:14px;
  z-index:30;
  display:flex;
  gap:6px;
  align-items:center;
  font-size:10px;
  letter-spacing:0.22em;
  color:#7aa8d0;
  text-transform:uppercase;
  background:rgba(8,16,32,0.5);

  border-radius:8px;
  padding:6px 12px;
  backdrop-filter:blur(8px);
}
.status-dot{
  width:6px;height:6px;border-radius:50%;
  background:#5eead4;box-shadow:0 0 6px #5eead4;
  animation:dotPulse 2s ease-in-out infinite;
}
.nav-back{
  position:fixed;top:14px;right:14px;z-index:30;
  background:rgba(8,16,32,0.5);
  border:1px solid rgba(126,200,255,0.18);
  border-radius:8px;
  padding:8px 14px;
  color:#a8c8e8;
  text-decoration:none;
  font-size:11px;

}
.nav-back:hover{

}

/* ══════════════════════════════════════════════════════════════════

/* Launcher shelf — horizontal row of tiles above the console */
.launcher{
  position:fixed;
  left:50%;
  bottom:300px;
  transform:translateX(-50%) translateY(20px);
  display:flex;
  gap:10px;
  padding:12px 14px;
  background:linear-gradient(180deg, rgba(8,16,32,0.86) 0%, rgba(12,22,40,0.92) 100%);
  border:1px solid rgba(126,200,255,0.32);
  border-radius:14px;
  box-shadow:
    0 0 0 1px rgba(126,200,255,0.10) inset,
    0 0 28px rgba(126,200,255,0.18),
    0 18px 44px rgba(0,0,0,0.55);
  z-index:45;
  opacity:0;
  pointer-events:none;
  transition:opacity 280ms ease, transform 280ms cubic-bezier(.2,.7,.3,1);
  backdrop-filter:blur(12px) saturate(140%);
  -webkit-backdrop-filter:blur(12px) saturate(140%);
  max-width:96vw;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:thin;
}
.launcher.open{
  opacity:1;
  pointer-events:auto;
  transform:translateX(-50%) translateY(0);
}
.launcher::-webkit-scrollbar{height:6px}
.launcher::-webkit-scrollbar-thumb{background:rgba(126,200,255,0.25);border-radius:3px}
.tile{
  appearance:none;
  width:80px;height:80px;
  min-width:80px;
  border-radius:12px;
  background:linear-gradient(135deg, rgba(126,200,255,0.10) 0%, rgba(94,234,212,0.08) 100%);
  border:1px solid rgba(126,200,255,0.28);
  color:#dcefff;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
  padding:8px 6px;
  font-family:inherit;
  font-size:9.5px;
  letter-spacing:0.12em;
  text-transform:uppercase;
  text-align:center;
  line-height:1.15;
  transition:all 180ms cubic-bezier(.2,.7,.3,1);
  position:relative;
  overflow:hidden;
}
.tile::after{
  content:"";
  position:absolute;inset:0;
  background:radial-gradient(circle at 50% 0%, rgba(126,200,255,0.25), transparent 60%);
  opacity:0;
  transition:opacity 200ms ease;
  pointer-events:none;
}
.tile:hover{
  transform:scale(1.05);
  border-color:rgba(126,200,255,0.65);
  box-shadow:0 0 16px rgba(126,200,255,0.4), 0 0 32px rgba(94,234,212,0.15);
}
.tile:hover::after{opacity:1}
.tile:active{transform:scale(0.96)}
.tile .ti{font-size:26px;line-height:1}
.tile .tl{font-weight:600;color:#cfe8ff}

/* Mode-specific body styles inside .doc-body */
.mode-video, .mode-audio, .mode-ebook, .mode-terminal, .mode-document, .mode-drive, .mode-file{
  display:flex;
  flex-direction:column;
  height:100%;
  min-height:0;

.mv-controls{

.mv-controls button, .mv-controls select, .mv-controls label.mv-file{

.mv-controls button:hover, .mv-controls label.mv-file:hover{

.mv-controls input[type="text"]{

.mv-controls label.mv-file input{display:none}

/* ── AUDIO ── */
.ma-cover{
  flex:0 0 auto;
  height:38%;
  min-height:140px;
  position:relative;
  background:radial-gradient(ellipse at 50% 40%, rgba(126,200,255,0.12), rgba(10,20,40,0.4) 70%);
  border-radius:8px;
  overflow:hidden;
  margin-bottom:10px;
}
.ma-vis{
  position:absolute;inset:0;
  width:100%;height:100%;
  display:block;
}
.ma-track{
  text-align:center;
  padding:10px 12px;
  color:#dceaff;

  letter-spacing:0.04em;
}
.ma-track .title{font-weight:600;color:#fff;margin-bottom:2px}
.ma-track .meta{font-size:11px;color:#7aa0c8}
.ma-row{

}
.ma-row input[type="range"]{flex:1;accent-color:#5ce3ff;min-height:32px}
.ma-time{font-size:10px;color:#7aa0c8;letter-spacing:0.06em;min-width:42px;text-align:center;font-family:"JetBrains Mono",monospace}
.ma-controls{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;padding:6px 0}
.ma-controls button{
  appearance:none;
  background:rgba(126,200,255,0.10);
  border:1px solid rgba(126,200,255,0.28);
  color:#cfe8ff;
  width:38px;height:38px;
  border-radius:50%;
  cursor:pointer;
  font-size:14px;

  display:flex;align-items:center;justify-content:center;

}
.ma-controls button.play{
  width:48px;height:48px;
  background:linear-gradient(135deg, rgba(94,234,212,0.25), rgba(126,200,255,0.25));
  border-color:rgba(94,234,212,0.5);
  font-size:18px;
}
.ma-controls button:hover{
  background:rgba(126,200,255,0.22);
  box-shadow:0 0 12px rgba(126,200,255,0.4);
}
.ma-controls button.active{background:rgba(94,234,212,0.25);border-color:rgba(94,234,212,0.6)}
.ma-playlist{
  flex:1;min-height:0;
  overflow-y:auto;
  border-top:1px solid rgba(126,200,255,0.15);

}
.ma-playlist::-webkit-scrollbar{width:6px}
.ma-playlist::-webkit-scrollbar-thumb{background:rgba(126,200,255,0.25);border-radius:3px}
.ma-pl-item{
  padding:6px 10px;
  font-size:11px;

  display:flex;align-items:center;gap:8px;

}
.ma-pl-item:hover{background:rgba(126,200,255,0.10)}
.ma-pl-item.playing{background:rgba(94,234,212,0.15);color:#dceaff}
.ma-pl-item .idx{font-family:"JetBrains Mono",monospace;font-size:10px;color:#7aa0c8;min-width:20px}

/* ── EBOOK ── */
.me-stage{
  flex:1;min-height:0;
  overflow-y:auto;
  padding:24px 28px;
  background:#1a1a2e;
  color:#e8e8e8;
  border-radius:8px;
  font-family:"Georgia","Iowan Old Style",serif;
  font-size:17px;
  line-height:1.72;
  letter-spacing:0.005em;
}
.me-stage.sepia{background:#f4ecd8;color:#3a2e1a}
.me-stage.light{background:#fafafa;color:#1a1a1a}
.me-stage h1,.me-stage h2,.me-stage h3{margin:1em 0 .5em 0;line-height:1.25}
.me-stage p{margin:0 0 1em 0}
.me-stage::-webkit-scrollbar{width:8px}
.me-stage::-webkit-scrollbar-thumb{background:rgba(126,200,255,0.25);border-radius:4px}
.me-controls{
  display:flex;gap:8px;align-items:center;flex-wrap:wrap;
  padding:10px 0 0 0;
  font-size:11px;color:#a8c4dc;
}
.me-controls button, .me-controls select, .me-controls label.me-file{
  appearance:none;
  background:rgba(126,200,255,0.10);
  border:1px solid rgba(126,200,255,0.28);
  color:#cfe8ff;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
  font-size:11px;
  font-family:inherit;
  min-height:32px;
}
.me-controls label.me-file input{display:none}
.me-progress{
  height:3px;
  background:rgba(126,200,255,0.15);

}
.me-progress .bar{height:100%;background:linear-gradient(90deg,#5ce3ff,#5eead4);width:0%;transition:width 220ms ease}
.me-toc{
  position:absolute;
  top:60px;left:0;bottom:0;

  background:rgba(8,16,32,0.96);
  border-right:1px solid rgba(126,200,255,0.2);

.me-toc.open{transform:translateX(0)}
.me-toc .toc-item{
  padding:6px 8px;
  color:#a8c4dc;

  border-radius:4px;
  margin-bottom:2px;
}
.me-toc .toc-item:hover{background:rgba(126,200,255,0.10);color:#fff}

/* ── TERMINAL ── */
.mt-stage{
  flex:1;min-height:0;
  background:#02060e;
  border:1px solid rgba(94,234,212,0.18);
  border-radius:8px;
  padding:14px 16px;
  font-family:"JetBrains Mono","Menlo","Consolas",monospace;
  font-size:13px;
  line-height:1.55;
  color:#7eead4;
  overflow-y:auto;
  position:relative;
}
.mt-stage::before{
  content:"";
  position:absolute;inset:0;
  background:repeating-linear-gradient(0deg, rgba(94,234,212,0.03) 0, rgba(94,234,212,0.03) 1px, transparent 1px, transparent 3px);
  pointer-events:none;
}
.mt-stage::-webkit-scrollbar{width:6px}
.mt-stage::-webkit-scrollbar-thumb{background:rgba(94,234,212,0.25);border-radius:3px}
.mt-line{white-space:pre-wrap;word-break:break-word;position:relative;z-index:1}
.mt-line.cmd{color:#dcefff}
.mt-line.cmd .prompt{color:#5eead4;margin-right:6px}
.mt-line.err{color:#ff8a98}
.mt-line.dim{color:#5a8a8a}
.mt-input-row{display:flex;align-items:center;gap:6px;padding:6px 0 0 0;position:relative;z-index:1}
.mt-prompt{color:#5eead4;font-family:inherit;font-size:13px}
.mt-input{
  flex:1;
  background:transparent;
  border:none;
  outline:none;
  color:#dcefff;
  font-family:inherit;
  font-size:13px;
  caret-color:#5eead4;
  min-height:24px;
}
.mt-cursor{
  display:inline-block;
  width:8px;height:14px;
  background:#5eead4;
  vertical-align:middle;
  animation:termBlink 1s steps(2) infinite;
}
@keyframes termBlink{50%{opacity:0}}

  .aurora,.floor::after,.fog,.particle{animation-duration:60s !important}
}

<body>

<!-- Scene -->
<div id="scene">
  <div class="stars"></div>
  <div class="aurora"></div>

  <!-- Cathedral struts (SVG, mid layer) -->
  <svg class="cathedral" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
    <defs>
      <linearGradient id="strutGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#3a4a78" stop-opacity="0"/>
        <stop offset="40%" stop-color="#3a4a78" stop-opacity="0.45"/>
        <stop offset="100%" stop-color="#1a2040" stop-opacity="0"/>
      </linearGradient>
      <linearGradient id="cableGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#5ce3ff" stop-opacity="0"/>
        <stop offset="50%" stop-color="#5ce3ff" stop-opacity="0.3"/>
        <stop offset="100%" stop-color="#5ce3ff" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <!-- arched struts -->
    <path d="M 120 900 Q 120 200 800 100 Q 1480 200 1480 900" fill="none" stroke="url(#strutGrad)" stroke-width="3"/>
    <path d="M 240 900 Q 240 300 800 200 Q 1360 300 1360 900" fill="none" stroke="url(#strutGrad)" stroke-width="2.5" opacity="0.7"/>
    <path d="M 360 900 Q 360 380 800 300 Q 1240 380 1240 900" fill="none" stroke="url(#strutGrad)" stroke-width="2" opacity="0.5"/>
    <!-- hanging cables -->
    <line x1="400" y1="0" x2="380" y2="600" stroke="url(#cableGrad)" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="500" stroke="url(#cableGrad)" stroke-width="1"/>
    <line x1="1200" y1="0" x2="1220" y2="600" stroke="url(#cableGrad)" stroke-width="1"/>
    <line x1="600" y1="0" x2="610" y2="450" stroke="url(#cableGrad)" stroke-width="0.8" opacity="0.7"/>
    <line x1="1000" y1="0" x2="990" y2="450" stroke="url(#cableGrad)" stroke-width="0.8" opacity="0.7"/>
  </svg>

  <!-- Floor with hex grid -->
  <div class="floor">
    <svg viewBox="0 0 1200 600" preserveAspectRatio="xMidYMid slice">
      <defs>
        <pattern id="hexPattern" x="0" y="0" width="60" height="52" patternUnits="userSpaceOnUse">
          <path d="M 30 0 L 60 15 L 60 37 L 30 52 L 0 37 L 0 15 Z" fill="none" stroke="rgba(126,200,255,0.20)" stroke-width="0.8"/>
        </pattern>
        <radialGradient id="hexGlow" cx="50%" cy="55%">
          <stop offset="0%" stop-color="#5eead4" stop-opacity="0.18"/>
          <stop offset="100%" stop-color="#5eead4" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <rect width="1200" height="600" fill="url(#hexPattern)"/>
      <rect width="1200" height="600" fill="url(#hexGlow)"/>
    </svg>
  </div>

  <div class="fog"></div>
  <div id="particles"></div>
  <div class="lightning" id="lightning"></div>

  <!-- Ground halo (reflection) -->
  <div class="ground-halo"></div>

  <!-- THE FIGURE -->
  <div class="figure-wrap" id="figure">
   <div class="body-bob">
    <svg viewBox="0 0 200 440" preserveAspectRatio="xMidYMax meet">
      <defs>
        <!-- Skin gradients -->
        <radialGradient id="skinFace" cx="40%" cy="35%" r="65%">
          <stop offset="0%" stop-color="#ffe2bc"/>
          <stop offset="35%" stop-color="#e7b48a"/>
          <stop offset="70%" stop-color="#a86a3e"/>
          <stop offset="100%" stop-color="#3d1f0f"/>
        </radialGradient>
        <radialGradient id="skinTorso" cx="35%" cy="30%" r="80%">
          <stop offset="0%" stop-color="#f0c89a"/>
          <stop offset="50%" stop-color="#c98d5e"/>
          <stop offset="100%" stop-color="#5a2d18"/>
        </radialGradient>

  : 'https://api.vintaclectic.com';

const $ = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);

const figure = $('#figure');

/* ── Particles ───────────────────────────────────────────────── */
(function spawnParticles(){
  const host = $('#particles');
  const N = window.innerWidth < 600 ? 90 : 200;
  for(let i=0;i<N;i++){
    const p = document.createElement('div');
    p.className = 'particle';
    const x = Math.random()*100;
    const y = Math.random()*100;
    const depth = Math.random();
    p.style.left = x+'vw';
    p.style.top = y+'vh';
    p.style.opacity = (0.15 + depth*0.55).toFixed(2);
    p.style.transform = `scale(${0.4 + depth*1.6})`;
    const dur = 18 + Math.random()*28;
    p.animate(
      [
        { transform:`translate3d(0,0,0) scale(${0.4+depth*1.6})` },
        { transform:`translate3d(${(Math.random()-0.5)*120}px,${-30-depth*80}px,0) scale(${0.4+depth*1.6})` }
      ],
      { duration: dur*1000, iterations: Infinity, direction: 'alternate', easing:'ease-in-out' }
    );

/* ── Voice (Piper → browser fallback) ───────────────────────── */
async function speak(text){
  if(!text) return;
  try{
    const res = await fetch(`${API_BASE}/api/voice/piper`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ text })
    });
    if(res.ok){
      const blob = await res.blob();
      if(blob && blob.size > 200){
        const url = URL.createObjectURL(blob);
        const audio = new Audio(url);
        audio.play().catch(()=>browserSpeak(text));
        return;
      }
    }
  }catch(_){}
  browserSpeak(text);
}
function browserSpeak(text){
  try{
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 0.96; u.pitch = 1.02;
    const voices = speechSynthesis.getVoices();
    const fem = voices.find(v => /female|samantha|victoria|karen|moira/i.test(v.name));
    if(fem) u.voice = fem;
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  }catch(_){}
}

/* ── Chat send → API → reply ────────────────────────────────── */
async function send(){
  const text = consoleInput.value.trim();
  if(!text) return;
  consoleInput.value = '';
  logLine('you', text);
  let reply = null;
  try{
    const res = await fetch(`${API_BASE}/api/chat`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ message: text, source:'body-v3' })
    });
    if(res.ok){
      const data = await res.json();
      reply = data.reply || data.text || data.message || null;
    }
  }catch(_){}
  if(!reply){
    // Soft local fallback so the screen never feels dead
    const fallbacks = [
      'I heard you. The brain isn\u2019t answering right now, but I\u2019m still here.',
      'Channel\u2019s quiet. I\u2019ll hold this until it reconnects.',
      'Your voice landed. I\u2019m present even when the line drops.'
    ];
    reply = fallbacks[Math.floor(Math.random()*fallbacks.length)];
  }
  faceViewer(2000);
  logLine('her', reply);
  thoughtBubble(reply.length > 140 ? reply.slice(0,140) + '\u2026' : reply);
  speak(reply);
}
sendBtn.addEventListener('click', send);
consoleInput.addEventListener('keydown', e => { if(e.key === 'Enter') send(); });

/* Format detection */
const EXT_VIDEO = ['mp4','webm','mkv','mov','m4v','ogv','m3u8'];
const EXT_AUDIO = ['mp3','wav','ogg','flac','aac','m4a','opus','weba'];
const EXT_EBOOK = ['epub','mobi','azw','azw3'];
const EXT_DOC   = ['pdf','doc','docx','xls','xlsx','csv','ppt','pptx','txt','md','json','js','ts','jsx','tsx','py','sh','yaml','yml','toml','html','htm','svg','xml'];
const EXT_CODE  = ['js','ts','jsx','tsx','py','sh','yaml','yml','toml','json','md','txt'];

function extOf(name){
  return String(name||'').toLowerCase().split('?')[0].split('#')[0].split('.').pop();
}
function routeFile(file){
  const ext = extOf(file.name);
  if(EXT_VIDEO.includes(ext)) return openMode('video', file);
  if(EXT_AUDIO.includes(ext)) return openMode('audio', file);
  if(EXT_EBOOK.includes(ext) || ext === 'pdf' || ext === 'txt' || ext === 'md') {
    // ebook reader handles epub/pdf/txt/md
    if(EXT_EBOOK.includes(ext) || ext === 'epub') return openMode('ebook', file);
  }
  return openMode('document', file);
}

/* Minimal CSV parser (handles quoted cells + escaped quotes) */
function parseCsv(text){
  const rows = []; let row = [], field = '', inQ = false, i = 0;
  while(i < text.length){
    const c = text[i];
    if(inQ){
      if(c === '"' && text[i+1] === '"'){ field += '"'; i += 2; continue; }
      if(c === '"'){ inQ = false; i++; continue; }
      field += c; i++; continue;
    }
    if(c === '"'){ inQ = true; i++; continue; }
    if(c === ','){ row.push(field); field = ''; i++; continue; }
    if(c === '\n'){ row.push(field); rows.push(row); row=[]; field=''; i++; continue; }
    if(c === '\r'){ i++; continue; }
    field += c; i++;
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  return rows;
}

/* Pretty-print XML */
function prettyXml(xml){
  try{
    const PADDING = '  ';
    let formatted = '', pad = 0;
    xml = xml.replace(/(>)(<)(\/*)/g, '$1\n$2$3');
    xml.split('\n').forEach(node => {
      let indent = 0;
      if(node.match(/.+<\/\w[^>]*>$/)) indent = 0;
      else if(node.match(/^<\/\w/)) { if(pad>0) pad--; }
      else if(node.match(/^<\w[^>]*[^\/]>.*$/)) indent = 1;
      formatted += PADDING.repeat(pad) + node + '\n';
      pad += indent;
    });
    return formatted.trim();
  }catch(_){ return xml; }
}

/* Tiny tokenizer for highlight — keywords, strings, numbers, comments */
function highlightCode(text, ext){
  const esc = escapeHtml(text);
  if(ext === 'json'){
    return esc
      .replace(/("(?:\\.|[^"\\])*")(\s*:)/g, '<span style="color:#7ec8ff">$1</span>$2')
      .replace(/:\s*("(?:\\.|[^"\\])*")/g, ': <span style="color:#5eead4">$1</span>')
      .replace(/\b(true|false|null)\b/g, '<span style="color:#ffb27a">$1</span>')
      .replace(/(-?\b\d+\.?\d*\b)/g, '<span style="color:#b794f4">$1</span>');
  }
  if(ext === 'md'){
    return esc
      .replace(/^(#{1,6}\s.*)$/gm, '<span style="color:#5eead4;font-weight:600">$1</span>')
      .replace(/(\*\*[^*]+\*\*)/g, '<span style="color:#fff;font-weight:600">$1</span>')
      .replace(/(`[^`]+`)/g, '<span style="color:#ffb27a">$1</span>');
  }
  const kw = /(\b(?:function|const|let|var|if|else|for|while|return|class|extends|new|import|export|from|async|await|try|catch|throw|def|lambda|pass|elif|in|is|not|and|or|None|True|False|print|self)\b)/g;
  return esc
    .replace(/(\/\/[^\n]*|#[^\n]*)/g, '<span style="color:#5a8a8a;font-style:italic">$1</span>')
    .replace(/("(?:\\.|[^"\\])*"|'(?:\\.|[^'\\])*')/g, '<span style="color:#5eead4">$1</span>')
    .replace(kw, '<span style="color:#7ec8ff">$1</span>')
    .replace(/\b(\d+\.?\d*)\b/g, '<span style="color:#b794f4">$1</span>');
}

          <option value="0.75">0.75x</option>
          <option value="1" selected>1x</option>
          <option value="1.25">1.25x</option>
          <option value="1.5">1.5x</option>
          <option value="2">2x</option>
        </select>
        <button id="vPip" title="Picture in picture">PiP</button>
      </div>
    </div>`;

  $('#filePickVideo').onchange = (e) => {
    const f = e.target.files && e.target.files[0];
    if(f) loadVideoFile(f);
    e.target.value = '';
  };
  $('#vLoadUrl').onclick = () => {
    const u = ($('#vUrl').value || '').trim();
    if(u) loadVideoUrl(u);
  };
  $('#vUrl').addEventListener('keydown', e => { if(e.key === 'Enter') $('#vLoadUrl').click(); });
  $('#vLoop').onclick = () => {
    if(!videoEl) return;
    videoEl.loop = !videoEl.loop;
    $('#vLoop').classList.toggle('active', videoEl.loop);
  };
  $('#vRate').onchange = e => { if(videoEl) videoEl.playbackRate = parseFloat(e.target.value); };
  $('#vPip').onclick = async () => {
    if(!videoEl) return;
    try{
      if(document.pictureInPictureElement) await document.exitPictureInPicture();
      else await videoEl.requestPictureInPicture();
    }catch(_){}
  };

  function mountVideo(srcStr, ext){
    const stage = $('#vStage');
    stage.innerHTML = '';
    // YouTube / Vimeo detection
    if(/youtube\.com\/watch|youtu\.be\//.test(srcStr)){
      const id = srcStr.match(/(?:v=|youtu\.be\/)([\w-]{11})/);
      if(id){
        const ifr = document.createElement('iframe');
        ifr.src = `https://www.youtube.com/embed/${id[1]}?autoplay=1`;
        ifr.allow = 'autoplay; encrypted-media; picture-in-picture; fullscreen';
        ifr.setAttribute('allowfullscreen','');
        stage.appendChild(ifr);
        return;
      }
    }
    if(/vimeo\.com\/(\d+)/.test(srcStr)){
      const id = srcStr.match(/vimeo\.com\/(\d+)/)[1];
      const ifr = document.createElement('iframe');
      ifr.src = `https://player.vimeo.com/video/${id}?autoplay=1`;
      ifr.allow = 'autoplay; fullscreen; picture-in-picture';
      stage.appendChild(ifr);
      return;
    }
    videoEl = document.createElement('video');
    videoEl.controls = true; videoEl.playsInline = true;
    videoEl.style.cssText = 'width:100%;height:100%;background:#000';
    stage.appendChild(videoEl);
    if(ext === 'm3u8' || /\.m3u8(\?|$)/i.test(srcStr)){
      if(videoEl.canPlayType('application/vnd.apple.mpegurl')){
        videoEl.src = srcStr;
      } else if(window.Hls){
        videoHls = new window.Hls(); videoHls.loadSource(srcStr); videoHls.attachMedia(videoEl);
      } else {
        // Lazy-load hls.js
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js';
        s.onload = () => {
          videoHls = new window.Hls(); videoHls.loadSource(srcStr); videoHls.attachMedia(videoEl);
        };
        document.head.appendChild(s);
      }
    } else {
      videoEl.src = srcStr;
    }
    videoEl.play().catch(()=>{});
    attachBeatSync(videoEl);
  }
  function loadVideoFile(f){
    docTitle.textContent = f.name;
    teardownVideo();
    mountVideo(URL.createObjectURL(f), extOf(f.name));
  }
  function loadVideoUrl(u){
    docTitle.textContent = u.split('/').pop().split('?')[0] || 'Video';
    teardownVideo();
    mountVideo(u, extOf(u));
  }

  if(src){
    if(src instanceof File) loadVideoFile(src);
    else if(typeof src === 'string') loadVideoUrl(src);
  }
}

/* Beat-sync: detect audio energy from a media element → pulse figure aura */
function attachBeatSync(mediaEl){
  try{
    const AC = window.AudioContext || window.webkitAudioContext;
    if(!AC) return;
    const ctx = window.__vintAudioCtx || (window.__vintAudioCtx = new AC());
    if(ctx.state === 'suspended') ctx.resume();
    const src = ctx.createMediaElementSource(mediaEl);
    const an = ctx.createAnalyser(); an.fftSize = 128;
    src.connect(an); an.connect(ctx.destination);
    const data = new Uint8Array(an.frequencyBinCount);
    function loop(){
      an.getByteFrequencyData(data);
      // Bass energy = first 8 bins
      let bass = 0;
      for(let i=0;i<8;i++) bass += data[i];
      bass /= (8 * 255);
      figure.style.setProperty('filter',
        `drop-shadow(0 ${24 + bass*16}px ${22 + bass*20}px rgba(0,0,0,0.55)) drop-shadow(0 0 ${6+bass*22}px rgba(126,200,255,${0.2+bass*0.4}))`);
      videoBeatRAF = requestAnimationFrame(loop);
    }
    loop();
  }catch(_){}
}

/* ── AUDIO MODE ────────────────────────────────────────────────── */
let audioEl = null, audioCtx = null, audioAn = null, audioRAF = null, audioVisMode = 0;
const VIS_MODES = ['bars','wave','nebula','bodysync'];
let audioPlaylist = [], audioIdx = -1, audioShuffle = false, audioRepeat = 0; // 0 none, 1 all, 2 one

function teardownAudio(){
  if(audioRAF){ cancelAnimationFrame(audioRAF); audioRAF = null; }
  if(audioEl){
    try{ audioEl.pause(); }catch(_){}
    audioEl = null;
  }
  audioAn = null;
}

function renderAudioMode(src){
  docTitle.textContent = 'Audio player';
  docBody.innerHTML = `
    <div class="mode-audio">
      <div class="ma-cover">
        <canvas class="ma-vis" id="aVisCanvas"></canvas>
      </div>
      <div class="ma-track">
        <div class="title" id="aTitle">No track loaded</div>
        <div class="meta" id="aMeta">drop audio files or pick one below</div>
      </div>
      <div class="ma-row">
        <span class="ma-time" id="aCur">0:00</span>
        <input type="range" id="aSeek" min="0" max="1000" value="0" />
        <span class="ma-time" id="aDur">0:00</span>
      </div>
      <div class="ma-controls">
        <button id="aPrev" title="Previous">&#9198;</button>
        <button id="aPlay" class="play" title="Play">&#9654;</button>
        <button id="aNext" title="Next">&#9197;</button>
        <button id="aShuffle" title="Shuffle">&#128256;</button>
        <button id="aRepeat" title="Repeat">&#128257;</button>
        <button id="aVis" title="Cycle visualizer">&#9678;</button>
        <label class="mv-file" for="filePickAudio" style="background:rgba(126,200,255,0.10);border:1px solid rgba(126,200,255,0.28);color:#cfe8ff;padding:6px 10px;border-radius:6px;font-size:11px;cursor:pointer;min-height:32px;display:inline-flex;align-items:center">&#127925; Open</label>
        <input type="range" id="aVol" min="0" max="1" step="0.01" value="0.85" title="Volume" style="width:80px;accent-color:#5ce3ff"/>
      </div>
      <div class="ma-playlist" id="aList"></div>
    </div>`;

  audioEl = new Audio();
  audioEl.preload = 'metadata';

  const fmt = (s) => {
    if(!isFinite(s)) return '0:00';
    s = Math.floor(s);
    return Math.floor(s/60) + ':' + String(s%60).padStart(2,'0');
  };
  const aPlay = $('#aPlay'), aSeek = $('#aSeek'), aCur = $('#aCur'), aDur = $('#aDur');
  const aTitle = $('#aTitle'), aMeta = $('#aMeta');

  audioEl.addEventListener('loadedmetadata', () => { aDur.textContent = fmt(audioEl.duration); });
  audioEl.addEventListener('timeupdate', () => {
    aCur.textContent = fmt(audioEl.currentTime);
    if(audioEl.duration) aSeek.value = String((audioEl.currentTime / audioEl.duration) * 1000);
  });
  audioEl.addEventListener('play', () => { aPlay.innerHTML = '&#10073;&#10073;'; });
  audioEl.addEventListener('pause', () => { aPlay.innerHTML = '&#9654;'; });
  audioEl.addEventListener('ended', () => {
    if(audioRepeat === 2){ audioEl.currentTime = 0; audioEl.play(); return; }
    if(audioIdx < audioPlaylist.length - 1 || audioRepeat === 1) playIdx(nextIdx());
    else aPlay.innerHTML = '&#9654;';
  });

  aPlay.onclick = () => {
    if(!audioEl.src){ $('#filePickAudio').click(); return; }
    if(audioEl.paused){ audioEl.play(); setupAudioAnalyser(); } else audioEl.pause();
  };
  $('#aPrev').onclick = () => playIdx(prevIdx());
  $('#aNext').onclick = () => playIdx(nextIdx());
  $('#aShuffle').onclick = () => { audioShuffle = !audioShuffle; $('#aShuffle').classList.toggle('active', audioShuffle); };
  $('#aRepeat').onclick = () => {
    audioRepeat = (audioRepeat + 1) % 3;
    $('#aRepeat').classList.toggle('active', audioRepeat > 0);
    $('#aRepeat').innerHTML = audioRepeat === 2 ? '&#128258;' : '&#128257;';
  };
  $('#aVis').onclick = () => { audioVisMode = (audioVisMode + 1) % VIS_MODES.length; };
  $('#aVol').oninput = e => { audioEl.volume = parseFloat(e.target.value); };
  aSeek.oninput = () => {
    if(audioEl.duration){
      audioEl.currentTime = (parseFloat(aSeek.value) / 1000) * audioEl.duration;
    }
  };
  audioEl.volume = parseFloat($('#aVol').value);

  $('#filePickAudio').onchange = (e) => {
    const files = Array.from(e.target.files || []);
    if(files.length){
      audioPlaylist = files.map(f => ({ file:f, name:f.name, url:URL.createObjectURL(f) }));
      audioIdx = -1;
      renderPlaylist();
      playIdx(0);
    }
    e.target.value = '';
  };

  function renderPlaylist(){
    const list = $('#aList');
    list.innerHTML = '';
    audioPlaylist.forEach((t,i) => {
      const item = document.createElement('div');
      item.className = 'ma-pl-item' + (i === audioIdx ? ' playing' : '');
      item.innerHTML = `<span class="idx">${String(i+1).padStart(2,'0')}</span><span>${escapeHtml(t.name)}</span>`;
      item.onclick = () => playIdx(i);
      list.appendChild(item);
    });
  }
  function playIdx(i){
    if(i < 0 || i >= audioPlaylist.length) return;
    audioIdx = i;
    const t = audioPlaylist[i];
    audioEl.src = t.url;
    aTitle.textContent = t.name.replace(/\.[^.]+$/, '');
    aMeta.textContent = `track ${i+1} of ${audioPlaylist.length}`;
    docTitle.textContent = t.name;
    renderPlaylist();
    audioEl.play().then(() => setupAudioAnalyser()).catch(()=>{});
  }
  function nextIdx(){
    if(audioShuffle) return Math.floor(Math.random() * audioPlaylist.length);
    let n = audioIdx + 1;
    if(n >= audioPlaylist.length) n = audioRepeat === 1 ? 0 : audioPlaylist.length - 1;
    return n;
  }
  function prevIdx(){
    let p = audioIdx - 1;
    if(p < 0) p = audioRepeat === 1 ? audioPlaylist.length - 1 : 0;
    return p;
  }

  function setupAudioAnalyser(){
    if(audioAn) return;
    try{
      const AC = window.AudioContext || window.webkitAudioContext;
      audioCtx = window.__vintAudioCtx || (window.__vintAudioCtx = new AC());
      if(audioCtx.state === 'suspended') audioCtx.resume();
      const srcNode = audioCtx.createMediaElementSource(audioEl);
      audioAn = audioCtx.createAnalyser(); audioAn.fftSize = 256;
      srcNode.connect(audioAn); audioAn.connect(audioCtx.destination);
      startVisLoop();
    }catch(_){}
  }
  function startVisLoop(){
    const canvas = $('#aVisCanvas');
    const ctx = canvas.getContext('2d');
    function resize(){
      const r = canvas.getBoundingClientRect();
      canvas.width = Math.max(2, r.width * devicePixelRatio);
      canvas.height = Math.max(2, r.height * devicePixelRatio);
    }
    resize();
    new ResizeObserver(resize).observe(canvas);
    const freq = new Uint8Array(audioAn.frequencyBinCount);
    const time = new Uint8Array(audioAn.fftSize);
    function loop(){
      audioAn.getByteFrequencyData(freq);
      audioAn.getByteTimeDomainData(time);
      const W = canvas.width, H = canvas.height;
      ctx.clearRect(0,0,W,H);
      const mode = VIS_MODES[audioVisMode];

      // Bass energy for body-sync
      let bass = 0;
      for(let i=0;i<8;i++) bass += freq[i];
      bass /= (8*255);

      if(mode === 'bars'){
        const N = freq.length;
        const bw = W / N;
        for(let i=0;i<N;i++){
          const h = (freq[i]/255) * H * 0.92;
          const hue = i / N; // 0=bass red→cyan high
          const r = Math.floor(255 * (1 - hue*0.5));
          const g = Math.floor(120 + hue*100);
          const b = Math.floor(80 + hue*175);
          const grad = ctx.createLinearGradient(0, H, 0, H - h);
          grad.addColorStop(0, `rgba(${r},${g-40},${b-20},0.95)`);
          grad.addColorStop(1, `rgba(${r+20},${g+40},${b+40},0.55)`);
          ctx.fillStyle = grad;
          ctx.fillRect(i*bw, H-h, bw*0.85, h);
        }
      } else if(mode === 'wave'){
        ctx.lineWidth = 2 * devicePixelRatio;
        ctx.strokeStyle = '#5ce3ff';
        ctx.shadowBlur = 16; ctx.shadowColor = '#5ce3ff';
        ctx.beginPath();
        const N = time.length, sw = W / N;
        for(let i=0;i<N;i++){
          const v = (time[i] - 128) / 128;
          const y = H/2 + v * H * 0.42;
          if(i===0) ctx.moveTo(0, y); else ctx.lineTo(i*sw, y);
        }
        ctx.stroke();
        ctx.shadowBlur = 0;
      } else if(mode === 'nebula'){
        const cx = W/2, cy = H/2;
        const N = freq.length;
        ctx.globalCompositeOperation = 'lighter';
        for(let i=0;i<N;i+=2){
          const a = (i / N) * Math.PI * 2;
          const r = (freq[i]/255) * Math.min(W,H) * 0.45 + 12;
          const x = cx + Math.cos(a) * r;
          const y = cy + Math.sin(a) * r;
          const size = 2 + (freq[i]/255)*5;
          const hue = 180 + (i/N)*120;
          ctx.fillStyle = `hsla(${hue}, 90%, 65%, 0.55)`;
          ctx.beginPath();
          ctx.arc(x, y, size * devicePixelRatio, 0, Math.PI*2);
          ctx.fill();
        }
        ctx.globalCompositeOperation = 'source-over';
      } else if(mode === 'bodysync'){
        // Subtle radial halo; main effect is on the figure aura below
        const cx = W/2, cy = H/2;
        const r = (0.3 + bass*0.7) * Math.min(W,H) * 0.5;
        const grad = ctx.createRadialGradient(cx, cy, 4, cx, cy, r);
        grad.addColorStop(0, `rgba(94,234,212,${0.25 + bass*0.5})`);
        grad.addColorStop(1, 'rgba(94,234,212,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(0,0,W,H);
      }

      // Always feed the figure with bass energy (body-sync runs in every mode)
      figure.style.setProperty('filter',
        `drop-shadow(0 ${24 + bass*16}px ${22 + bass*22}px rgba(0,0,0,0.55)) drop-shadow(0 0 ${6+bass*30}px rgba(126,200,255,${0.18+bass*0.5}))`);

      audioRAF = requestAnimationFrame(loop);
    }
    if(audioRAF) cancelAnimationFrame(audioRAF);
    loop();
  }

  if(src){
    if(src instanceof File){
      audioPlaylist = [{ file:src, name:src.name, url:URL.createObjectURL(src) }];
      renderPlaylist();
      playIdx(0);
    }
  }
}

/* ── EBOOK MODE ────────────────────────────────────────────────── */
let ebookFontSize = 17, ebookTheme = 'dark', ebookChapters = [], ebookChIdx = 0;
function renderEbookMode(src){
  docTitle.textContent = 'eBook reader';
  docBody.innerHTML = `
    <div class="mode-ebook" style="position:relative">
      <div class="me-toc" id="meToc"></div>
      <div class="me-stage" id="meStage">
        <div style="opacity:.6;text-align:center;padding:40px 20px;font-family:Georgia,serif">Open an EPUB, PDF, TXT, or Markdown file to begin reading.</div>
      </div>
      <div class="me-progress"><div class="bar" id="meBar"></div></div>
      <div class="me-controls">
        <label class="me-file" for="filePickEbook">&#128218; Open</label>
        <button id="meTocBtn">TOC</button>
        <button id="meFontDown">A-</button>
        <button id="meFontUp">A+</button>
        <select id="meTheme">
          <option value="dark" selected>Dark</option>
          <option value="sepia">Sepia</option>
          <option value="light">Light</option>
        </select>
        <button id="mePrev" title="Previous chapter">&#8592;</button>
        <button id="meNext" title="Next chapter">&#8594;</button>
      </div>
    </div>`;
  const stage = $('#meStage'), bar = $('#meBar'), toc = $('#meToc');

  $('#filePickEbook').onchange = (e) => {
    const f = e.target.files && e.target.files[0];
    if(f) loadEbookFile(f);
    e.target.value = '';
  };
  $('#meFontUp').onclick = () => { ebookFontSize = Math.min(28, ebookFontSize + 1); applyTheme(); };
  $('#meFontDown').onclick = () => { ebookFontSize = Math.max(12, ebookFontSize - 1); applyTheme(); };
  $('#meTheme').onchange = e => { ebookTheme = e.target.value; applyTheme(); };
  $('#mePrev').onclick = () => { if(ebookChIdx > 0){ ebookChIdx--; renderChapter(); } };
  $('#meNext').onclick = () => { if(ebookChIdx < ebookChapters.length-1){ ebookChIdx++; renderChapter(); } };
  $('#meTocBtn').onclick = () => toc.classList.toggle('open');
  stage.onscroll = () => {
    const max = stage.scrollHeight - stage.clientHeight;
    if(max > 0) bar.style.width = ((stage.scrollTop / max) * 100) + '%';
  };

  function applyTheme(){
    stage.classList.remove('sepia','light');
    if(ebookTheme === 'sepia') stage.classList.add('sepia');
    else if(ebookTheme === 'light') stage.classList.add('light');
    stage.style.fontSize = ebookFontSize + 'px';
  }
  applyTheme();

  function renderChapter(){
    const ch = ebookChapters[ebookChIdx];
    if(!ch) return;
    stage.innerHTML = ch.html || `<p>${escapeHtml(ch.text||'')}</p>`;
    stage.scrollTop = 0;
    docTitle.textContent = `${docTitle.textContent.split('·')[0].trim()} · ${ch.title || ('Chapter '+(ebookChIdx+1))}`;
    // Rebuild TOC highlight
    document.querySelectorAll('.me-toc .toc-item').forEach((el,i) => {
      el.style.background = (i === ebookChIdx) ? 'rgba(94,234,212,0.18)' : '';
    });
  }
  function buildToc(){
    toc.innerHTML = '';
    ebookChapters.forEach((ch,i) => {
      const item = document.createElement('div');
      item.className = 'toc-item';
      item.textContent = ch.title || ('Chapter ' + (i+1));
      item.onclick = () => { ebookChIdx = i; renderChapter(); toc.classList.remove('open'); };
      toc.appendChild(item);
    });
  }

  function loadEbookFile(f){
    docTitle.textContent = f.name;
    const ext = extOf(f.name);
    if(ext === 'epub'){
      loadEpub(f);
    } else if(ext === 'pdf'){
      stage.innerHTML = '';
      const emb = document.createElement('embed');
      emb.src = URL.createObjectURL(f); emb.type = 'application/pdf';
      emb.style.cssText = 'width:100%;height:100%;border:0';
      stage.appendChild(emb);
    } else if(['txt','md'].includes(ext)){
      f.text().then(text => {
        // Split by H1/double-blank into "chapters" for nicer reading
        const parts = text.split(/\n#\s+/);
        ebookChapters = parts.map((p,i) => {
          const lines = p.split('\n');
          const title = i === 0 ? (lines[0].trim() || 'Beginning') : lines.shift().trim();
          const body = lines.join('\n').trim();
          const html = (ext === 'md')
            ? markdownToHtml(body)
            : body.split(/\n\n+/).map(par => `<p>${escapeHtml(par).replace(/\n/g,'<br/>')}</p>`).join('');
          return { title, html };
        });
        ebookChIdx = 0;
        buildToc();
        renderChapter();
      });
    } else if(['mobi','azw','azw3'].includes(ext)){
      stage.innerHTML = `<div style="text-align:center;padding:40px 20px;color:#a8c4dc;font-family:Georgia,serif">
        <div style="font-size:48px;margin-bottom:14px">&#128218;</div>
        <p><strong>${ext.toUpperCase()}</strong> isn't supported in-browser.</p>
        <p style="font-size:13px;color:#7aa0c8;margin-top:10px">Open this file in the Kindle app, or convert it to EPUB with Calibre and re-open here.</p>
      </div>`;
    } else {
      stage.innerHTML = `<div style="padding:20px;color:#a8c4dc">Unsupported eBook format: ${ext}</div>`;
    }
  }

  function loadEpub(f){
    // Lazy-load JSZip from CDN, then parse EPUB structure
    const proceed = () => {
      const reader = new FileReader();
      reader.onload = async (e) => {
        try{
          const zip = await window.JSZip.loadAsync(e.target.result);
          // container.xml → rootfile path
          const container = await zip.file('META-INF/container.xml').async('string');
          const rootMatch = container.match(/full-path="([^"]+)"/);
          if(!rootMatch) throw new Error('No rootfile');
          const opfPath = rootMatch[1];
          const opfDir = opfPath.includes('/') ? opfPath.replace(/\/[^/]+$/, '/') : '';
          const opf = await zip.file(opfPath).async('string');
          // Parse manifest + spine
          const parser = new DOMParser();
          const doc = parser.parseFromString(opf, 'application/xml');
          const items = {};
          doc.querySelectorAll('manifest > item').forEach(it => {
            items[it.getAttribute('id')] = {
              href: opfDir + it.getAttribute('href'),
              type: it.getAttribute('media-type')
            };
          });
          const spine = Array.from(doc.querySelectorAll('spine > itemref')).map(ir => ir.getAttribute('idref'));
          // Try to read TOC titles from nav.xhtml or toc.ncx
          let titles = {};
          try{
            const navItem = Object.values(items).find(it => it.type === 'application/x-dtbncx+xml');
            if(navItem){
              const ncx = await zip.file(navItem.href).async('string');
              const ncxDoc = parser.parseFromString(ncx, 'application/xml');
              ncxDoc.querySelectorAll('navPoint').forEach(np => {
                const label = np.querySelector('navLabel > text')?.textContent;
                const src = np.querySelector('content')?.getAttribute('src');
                if(label && src) titles[src.split('#')[0]] = label;
              });
            }
          }catch(_){}
          // Build chapters
          ebookChapters = [];
          for(const id of spine){
            const it = items[id];
            if(!it) continue;
            let html = await zip.file(it.href).async('string');
            // Strip <head>, keep body content
            const bodyMatch = html.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
            html = bodyMatch ? bodyMatch[1] : html;
            // Strip script/style for safety
            html = html.replace(/<script[\s\S]*?<\/script>/gi, '').replace(/<style[\s\S]*?<\/style>/gi, '');
            const relPath = it.href.replace(opfDir, '');
            const title = titles[relPath] || titles[it.href] || (`Chapter ${ebookChapters.length+1}`);
            ebookChapters.push({ title, html });
          }
          ebookChIdx = 0;
          buildToc();
          renderChapter();
        }catch(err){
          stage.innerHTML = `<div style="padding:20px;color:#ff8a98">EPUB parse failed: ${escapeHtml(err.message)}</div>`;
        }
      };
      reader.readAsArrayBuffer(f);
    };
    if(window.JSZip) return proceed();
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js';
    s.onload = proceed;
    s.onerror = () => { stage.innerHTML = `<div style="padding:20px;color:#ff8a98">Couldn't load EPUB parser (JSZip).</div>`; };
    document.head.appendChild(s);
  }

  if(src && src instanceof File) loadEbookFile(src);
}

/* Minimal Markdown → HTML (headings, bold/italic, code, lists, paragraphs) */
function markdownToHtml(md){
  let html = escapeHtml(md);
  html = html.replace(/^###### (.*)$/gm, '<h6>$1</h6>')
             .replace(/^##### (.*)$/gm, '<h5>$1</h5>')
             .replace(/^#### (.*)$/gm, '<h4>$1</h4>')
             .replace(/^### (.*)$/gm, '<h3>$1</h3>')
             .replace(/^## (.*)$/gm, '<h2>$1</h2>')
             .replace(/^# (.*)$/gm, '<h1>$1</h1>');
  html = html.replace(/```([\s\S]*?)```/g, (_,c) => `<pre style="background:rgba(0,0,0,.3);padding:10px;border-radius:6px;overflow:auto"><code>${c}</code></pre>`);
  html = html.replace(/`([^`]+)`/g, '<code style="background:rgba(0,0,0,.25);padding:1px 5px;border-radius:3px">$1</code>');
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
             .replace(/\*([^*]+)\*/g, '<em>$1</em>');
  html = html.replace(/^- (.*)$/gm, '<li>$1</li>').replace(/(<li>[\s\S]+?<\/li>)/g, '<ul>$1</ul>');
  html = html.split(/\n\n+/).map(b => /^<(h\d|ul|pre|blockquote)/.test(b.trim()) ? b : `<p>${b.replace(/\n/g,'<br/>')}</p>`).join('\n');
  return html;
}

let termHistory = [], termHistIdx = -1;
function teardownTerminal(){ /* nothing global to tear down */ }
function renderTerminalMode(){
  docTitle.textContent = 'Vintinuum shell';
  docBody.innerHTML = `
    <div class="mode-terminal">

  const stage = $('#tStage'), input = $('#tInput');

  boot.forEach((line,i) => setTimeout(() => printLine(line, 'dim'), 200 + i*240));

  input.addEventListener('keydown', async (e) => {

      termHistory.push(cmd); termHistIdx = termHistory.length;
      printLine(`vinta@brain ~ $ ${cmd}`, 'cmd');

    } else if(e.key === 'ArrowUp'){
      e.preventDefault();
      if(termHistIdx > 0){ termHistIdx--; input.value = termHistory[termHistIdx] || ''; }

      e.preventDefault();
      if(termHistIdx < termHistory.length-1){ termHistIdx++; input.value = termHistory[termHistIdx] || ''; }

function renderDriveMode(){
  docTitle.textContent = 'Google Drive';
  docBody.innerHTML = `
    <div class="mode-drive">

        <button id="dRefresh">&#x21bb; Refresh</button>

  const stage = $('#dStage');
  $('#dRefresh').onclick = loadDrive;
  $('#dFindResume').onclick = findResumeIntoDrive;
  loadDrive();

  async function loadDrive(){
    stage.innerHTML = `<div class="doc-empty"><div class="glyph">&#9673;</div><div>Scanning Drive&hellip;</div></div>`;
    try{
      const res = await fetch(`${API_BASE}/api/drive/files`);
      if(res.ok){
        const data = await res.json();
        const files = data.files || data.items || data || [];
        if(files.length) return renderFiles(files);
      }
    }catch(_){}
    stage.innerHTML = `<div class="doc-empty"><div class="glyph">&#9678;</div><div>Drive not connected.</div><div class="note">Wire Google Drive in the connectors page to browse files here. Use "Find Resume" to try the legacy lookup.</div></div>`;
  }
  function renderFiles(files){
    stage.innerHTML = '';
    const wrap = document.createElement('div');
    wrap.style.cssText = 'width:100%;height:100%;overflow:auto;padding:8px';
    files.slice(0,60).forEach(f => {
      const row = document.createElement('div');
      row.style.cssText = 'display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;cursor:pointer;color:#dceaff;font-size:12px;min-height:38px';
      row.onmouseenter = () => row.style.background = 'rgba(126,200,255,0.10)';
      row.onmouseleave = () => row.style.background = '';
      const mime = (f.mimeType || '').toLowerCase();
      const icon = /video/.test(mime) ? '🎬' : /audio/.test(mime) ? '🎵' : /image/.test(mime) ? '🖼️' : /pdf|word|document/.test(mime) ? '📄' : /sheet|excel/.test(mime) ? '📊' : '📁';
      row.innerHTML = `<span style="font-size:18px">${icon}</span><span style="flex:1">${escapeHtml(f.name||'unnamed')}</span><span style="color:#7aa0c8;font-size:10px">${escapeHtml((mime.split('/').pop()||'').slice(0,12))}</span>`;
      row.onclick = () => {
        const url = f.webViewLink || f.viewUrl || f.url;
        if(/video/.test(mime)) openMode('video', url);
        else if(/audio/.test(mime)) openMode('audio', url);
        else openMode('document', url);
      };
      wrap.appendChild(row);
    });
    stage.appendChild(wrap);
  }
  async function findResumeIntoDrive(){
    stage.innerHTML = `<div class="doc-empty"><div class="glyph">&#9673;</div><div>Looking for resume&hellip;</div></div>`;
    try{
      const r = await fetch(`${API_BASE}/api/drive/find-resume`);
      const d = await r.json();
      if(d && d.found){
        const url = d.viewUrl || d.webViewLink || d.url;
        if(url) return openMode('document', url);
      }
      stage.innerHTML = `<div class="doc-empty"><div class="glyph">&#9678;</div><div>No resume found.</div><div class="note">${escapeHtml(d?.message || 'Try uploading a file named "resume" to your Drive.')}</div></div>`;
    }catch(_){
      stage.innerHTML = `<div class="doc-empty"><div class="glyph">&#9678;</div><div>Brain offline.</div></div>`;
    }
  }
}

/* Whole-scene drag-and-drop file routing */
['dragover','drop'].forEach(evt => {

});

/* ── Drag the doc panel by header ───────────────────────────── */
(function makeDraggable(){
  const handle = $('#docHeader');
  let dragging = false, sx=0, sy=0, ox=0, oy=0;
  function down(e){
    if(e.target.closest('.doc-btn')) return;
    const t = e.touches ? e.touches[0] : e;
    dragging = true;
    const r = docPanel.getBoundingClientRect();
    docPanel.style.left = r.left + 'px';
    docPanel.style.top  = r.top  + 'px';
    docPanel.style.right = 'auto';
    docPanel.style.bottom = 'auto';
    sx = t.clientX; sy = t.clientY; ox = r.left; oy = r.top;
    e.preventDefault();
  }
  function move(e){
    if(!dragging) return;
    const t = e.touches ? e.touches[0] : e;
    const dx = t.clientX - sx, dy = t.clientY - sy;
    const w = docPanel.offsetWidth, h = docPanel.offsetHeight;
    const nx = Math.max(0, Math.min(window.innerWidth - w,  ox + dx));
    const ny = Math.max(0, Math.min(window.innerHeight - h, oy + dy));
    docPanel.style.left = nx + 'px';
    docPanel.style.top  = ny + 'px';
  }
  function up(){ dragging = false; }
  handle.addEventListener('mousedown', down);
  handle.addEventListener('touchstart', down, {passive:false});
  document.addEventListener('mousemove', move);
  document.addEventListener('touchmove', move, {passive:false});
  document.addEventListener('mouseup', up);
  document.addEventListener('touchend', up);
})();

/* ── Resize via corner handle ───────────────────────────────── */
(function makeResizable(){
  const handle = $('#docResize');
  let resizing=false, sx=0, sy=0, sw=0, sh=0;
  function down(e){
    const t = e.touches ? e.touches[0] : e;
    resizing = true;
    sx = t.clientX; sy = t.clientY;
    sw = docPanel.offsetWidth; sh = docPanel.offsetHeight;
    e.preventDefault();
  }
  function move(e){
    if(!resizing) return;
    const t = e.touches ? e.touches[0] : e;
    const w = Math.max(280, Math.min(window.innerWidth - 20,  sw + (t.clientX - sx)));
    const h = Math.max(240, Math.min(window.innerHeight - 20, sh + (t.clientY - sy)));
    docPanel.style.width  = w + 'px';
    docPanel.style.height = h + 'px';
  }
  function up(){ resizing = false; }
  handle.addEventListener('mousedown', down);
  handle.addEventListener('touchstart', down, {passive:false});
  document.addEventListener('mousemove', move);
  document.addEventListener('touchmove', move, {passive:false});
  document.addEventListener('mouseup', up);
  document.addEventListener('touchend', up);
})();

/* ════════════════════════════════════════════════════════════════
   WALK TRANSLATION — figure moves across the screen, flips at edges
   (Ported from body-v2.html, adapted to v3's figure-wrap structure)
   ══════════════════════════════════════════════════════════════ */
(function walkCycle(){
  const fig = figure;
  if(!fig) return;
  // Initialize position from current bottom-left so first frame doesn't jump
  let posX = window.innerWidth * 0.1;
  let dir = 1; // 1 = right, -1 = left
  const speedPxPerSec = 56;
  let lastT = performance.now();
  // Reduced-motion: still walks, just slower
  const rm = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const speed = rm ? 22 : speedPxPerSec;

  function tick(now){
    const dt = Math.min(80, now - lastT) / 1000;
    lastT = now;
    const figW = fig.getBoundingClientRect().width || 240;
    const margin = 20;
    posX += dir * speed * dt;
    if(posX > window.innerWidth - figW - margin){
      posX = window.innerWidth - figW - margin;
      dir = -1; fig.style.setProperty('--face-dir', '-1');
    }
    if(posX < margin){
      posX = margin;
      dir = 1; fig.style.setProperty('--face-dir', '1');
    }
    fig.style.left = posX + 'px';
    requestAnimationFrame(tick);
  }
  fig.style.setProperty('--face-dir', '1');
  requestAnimationFrame(tick);

  // Recompute on resize so she doesn't get stranded off-screen
  window.addEventListener('resize', () => {
    const figW = fig.getBoundingClientRect().width || 240;
    if(posX > window.innerWidth - figW - 20) posX = window.innerWidth - figW - 20;
    if(posX < 20) posX = 20;
  });
})();
