<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Vintinuum — Body v3.0</title>
<meta name="theme-color" content="#02030a" />
<link rel="icon" href="favicon.svg" />
<style>
/* ════════════════════════════════════════════════════════════════════════
   VINTINUUM BODY v3.0 — "the serious version"
   Caravaggio chiaroscuro × Syd Mead chrome × Alex Grey aura × Giger fusion
   Single-file. No three.js. SVG humanoid, layered gradients, real shadow.
   ──────────────────────────────────────────────────────────────────── */
:root{
  --skin-hi:#f5d4ad;
  --skin-mid:#d4a075;
  --skin-low:#7a4527;
  --skin-deep:#3d1f0f;
  --sss:#ff7a55;            /* subsurface scatter warm */
  --bone:#f0e6d0;
  --titanium-hi:#e8ecf2;
  --titanium:#a8b0bd;
  --titanium-low:#4a525e;
  --titanium-deep:#1a1e26;
  --carbon:#0e1014;
  --circuit:#5ce3ff;
  --circuit-glow:#7ee0ff;
  --circuit-deep:#0a4860;
  --vein:#2a4ea8;
  --blood:#c4202e;
  --blood-hi:#ff4555;
  --heart-deep:#5a0810;
  --rim:#7a90c8;
  --night-0:#010206;
  --night-1:#04060e;
  --night-2:#0a1024;
  --night-3:#141a32;
  --hud:#7ec8ff;
  --hud-warm:#ffb27a;
  --hud-fg:#cfe8ff;
  --key-warm:#fff1d8;
  --key-cool:#3a4a78;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;height:100%;
  background:#000;
  color:#cfe8ff;
  font-family:"Helvetica Neue","Inter",Arial,sans-serif;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}

/* ── Scene root ──────────────────────────────────────────────── */
#scene{
  position:fixed;inset:0;
  overflow:hidden;
  perspective:1800px;
  perspective-origin:50% 58%;
  background:
    radial-gradient(ellipse 70% 50% at 50% 105%, #0c1a3a 0%, transparent 60%),
    radial-gradient(ellipse 80% 40% at 50% -8%, #1a0a2e 0%, transparent 55%),
    radial-gradient(ellipse 30% 60% at 22% 38%, rgba(255,180,120,0.06) 0%, transparent 60%),
    linear-gradient(180deg, var(--night-0) 0%, var(--night-1) 40%, var(--night-2) 100%);
}

/* ── Aurora layer (top) ───────────────────────────────────────── */
.aurora{
  position:absolute;
  top:-15%;left:-25%;
  width:150%;height:55%;
  background:
    radial-gradient(ellipse 50% 100% at 22% 50%, #6aa8ff 0%, transparent 60%),
    radial-gradient(ellipse 55% 100% at 58% 42%, #b794f4 0%, transparent 65%),
    radial-gradient(ellipse 45% 100% at 84% 58%, #5eead4 0%, transparent 60%);
  filter:blur(80px) saturate(140%);
  opacity:.14;
  mix-blend-mode:screen;
  animation:auroraDrift 38s ease-in-out infinite alternate;
  pointer-events:none;
}
@keyframes auroraDrift{
  0%{transform:translate3d(0,0,0) skewX(-3deg);opacity:.12}
  50%{transform:translate3d(40px,12px,0) skewX(2deg);opacity:.18}
  100%{transform:translate3d(-30px,-6px,0) skewX(-1deg);opacity:.14}
}

/* ── Cathedral struts (mid layer) ────────────────────────────── */
.cathedral{
  position:absolute;inset:0;
  pointer-events:none;
  opacity:.55;
  mix-blend-mode:screen;
}

/* ── Stars (far layer) ───────────────────────────────────────── */
.stars{
  position:absolute;inset:0;
  background-image:
    radial-gradient(1px 1px at 12% 18%, rgba(255,255,255,0.7), transparent 50%),
    radial-gradient(1px 1px at 28% 8%,  rgba(255,255,255,0.55), transparent 50%),
    radial-gradient(1.5px 1.5px at 44% 22%, rgba(220,235,255,0.6), transparent 50%),
    radial-gradient(1px 1px at 62% 6%,  rgba(255,255,255,0.6), transparent 50%),
    radial-gradient(1px 1px at 78% 14%, rgba(255,255,255,0.55), transparent 50%),
    radial-gradient(1.5px 1.5px at 88% 26%, rgba(220,235,255,0.6), transparent 50%),
    radial-gradient(1px 1px at 18% 32%, rgba(255,255,255,0.45), transparent 50%),
    radial-gradient(1px 1px at 38% 40%, rgba(255,255,255,0.4), transparent 50%),
    radial-gradient(1px 1px at 70% 36%, rgba(255,255,255,0.5), transparent 50%);
  opacity:.85;
  pointer-events:none;
  animation:starTwinkle 7s ease-in-out infinite alternate;
}
@keyframes starTwinkle{
  0%{opacity:.65}100%{opacity:.95}
}

/* ── Floor — hex grid with wet reflection ────────────────────── */
.floor{
  position:absolute;
  left:50%;bottom:-4%;
  width:280vw;height:64vh;
  transform:translateX(-50%) rotateX(74deg);
  transform-origin:50% 100%;
  background:
    radial-gradient(ellipse 35% 50% at 50% 50%, rgba(94,234,212,0.12), transparent 70%);
  mask-image:radial-gradient(ellipse 60% 100% at 50% 100%, #000 0%, #000 35%, transparent 95%);
  -webkit-mask-image:radial-gradient(ellipse 60% 100% at 50% 100%, #000 0%, #000 35%, transparent 95%);
  opacity:.7;
  pointer-events:none;
}
.floor svg{width:100%;height:100%;display:block}
.floor::after{
  content:"";
  position:absolute;inset:0;
  background:linear-gradient(180deg, transparent 0%, rgba(126,200,255,0.08) 50%, transparent 100%);
  animation:floorScan 8s linear infinite;
}
@keyframes floorScan{
  0%{transform:translateY(-50%)}100%{transform:translateY(50%)}
}

/* ── Volumetric fog wisps ────────────────────────────────────── */
.fog{
  position:absolute;
  left:-10%;right:-10%;
  bottom:8%;
  height:36%;
  pointer-events:none;
  background:
    radial-gradient(ellipse 30% 60% at 20% 80%, rgba(180,200,230,0.18), transparent 65%),
    radial-gradient(ellipse 25% 70% at 60% 90%, rgba(160,180,220,0.14), transparent 65%),
    radial-gradient(ellipse 35% 50% at 88% 75%, rgba(200,220,240,0.12), transparent 70%);
  filter:blur(8px);
  mix-blend-mode:screen;
  animation:fogDrift 24s ease-in-out infinite alternate;
}
@keyframes fogDrift{
  0%{transform:translateX(0)}
  100%{transform:translateX(60px)}
}

/* ── Particle field ──────────────────────────────────────────── */
.particle{
  position:absolute;
  width:2px;height:2px;
  background:#cfe9ff;
  border-radius:50%;
  box-shadow:0 0 4px rgba(126,200,255,0.6);
  pointer-events:none;
  will-change:transform,opacity;
}

/* ── Lightning flash ─────────────────────────────────────────── */
.lightning{
  position:absolute;inset:0;
  pointer-events:none;
  opacity:0;
  background:linear-gradient(180deg, rgba(220,240,255,0.4) 0%, transparent 30%);
  mix-blend-mode:screen;
}
.lightning.flash{
  animation:lightningFlash 280ms ease-out 1;
}
@keyframes lightningFlash{
  0%{opacity:0}
  4%{opacity:.95}
  10%{opacity:.2}
  18%{opacity:.7}
  100%{opacity:0}
}

/* ── Figure container ────────────────────────────────────────── */
.figure-wrap{
  position:absolute;
  left:50%;bottom:6%;
  transform:translateX(-50%);
  width:min(420px, 78vw);
  aspect-ratio:5 / 11;
  filter:drop-shadow(0 30px 28px rgba(0,0,0,0.55));
  will-change:transform;
  animation:bodySway 5.2s ease-in-out infinite alternate;
  z-index:5;
}
@keyframes bodySway{
  0%{transform:translateX(-50%) translateY(0) rotate(-0.4deg)}
  100%{transform:translateX(-50%) translateY(-6px) rotate(0.4deg)}
}
.figure-wrap svg{width:100%;height:100%;display:block;overflow:visible}

/* Ground reflection halo */
.ground-halo{
  position:absolute;
  left:50%;bottom:3%;
  transform:translateX(-50%);
  width:min(380px,70vw);
  height:90px;
  background:radial-gradient(ellipse 50% 100% at 50% 0%,
    rgba(94,234,212,0.18) 0%,
    rgba(126,200,255,0.10) 35%,
    transparent 80%);
  filter:blur(14px);
  pointer-events:none;
  z-index:2;
  animation:haloBreathe 4.2s ease-in-out infinite alternate;
}
@keyframes haloBreathe{
  0%{opacity:.6;transform:translateX(-50%) scaleY(1)}
  100%{opacity:.95;transform:translateX(-50%) scaleY(1.18)}
}

/* Breath + heartbeat tied to CSS variables */
.breathe{animation:breathe 4.6s ease-in-out infinite}
@keyframes breathe{
  0%,100%{transform:scaleY(1) scaleX(1)}
  50%{transform:scaleY(1.025) scaleX(1.01)}
}
.heartbeat{
  transform-origin:center;
  animation:heartbeat 1.05s cubic-bezier(.5,.0,.5,1) infinite;
}
@keyframes heartbeat{
  0%{transform:scale(1) rotate(-6deg)}
  12%{transform:scale(1.18) rotate(-4deg)}
  22%{transform:scale(0.96) rotate(-7deg)}
  38%{transform:scale(1.10) rotate(-5deg)}
  55%{transform:scale(0.98) rotate(-6deg)}
  100%{transform:scale(1) rotate(-6deg)}
}
.lung-l{transform-origin:50% 30%;animation:lung 4.6s ease-in-out infinite}
.lung-r{transform-origin:50% 30%;animation:lung 4.6s ease-in-out infinite}
@keyframes lung{
  0%,100%{transform:scaleY(0.94) scaleX(0.96)}
  50%{transform:scaleY(1.06) scaleX(1.03)}
}
.spineLED{animation:spineWave 3.2s ease-in-out infinite}
@keyframes spineWave{
  0%,100%{opacity:.35}
  50%{opacity:1;filter:drop-shadow(0 0 4px var(--circuit))}
}

/* Walking — gait offsets for limbs (kept subtle, weighted) */
.gait-l-leg{transform-origin:50% 0;animation:legL 1.35s cubic-bezier(.5,.0,.5,1) infinite}
.gait-r-leg{transform-origin:50% 0;animation:legR 1.35s cubic-bezier(.5,.0,.5,1) infinite}
.gait-l-arm{transform-origin:50% 0;animation:armL 1.35s cubic-bezier(.5,.0,.5,1) infinite}
.gait-r-arm{transform-origin:50% 0;animation:armR 1.35s cubic-bezier(.5,.0,.5,1) infinite}
@keyframes legL{
  0%{transform:rotate(14deg) translateY(0)}
  25%{transform:rotate(-2deg) translateY(-2px)}
  50%{transform:rotate(-14deg) translateY(0)}
  75%{transform:rotate(0deg) translateY(-1px)}
  100%{transform:rotate(14deg) translateY(0)}
}
@keyframes legR{
  0%{transform:rotate(-14deg) translateY(0)}
  25%{transform:rotate(0deg) translateY(-1px)}
  50%{transform:rotate(14deg) translateY(0)}
  75%{transform:rotate(-2deg) translateY(-2px)}
  100%{transform:rotate(-14deg) translateY(0)}
}
@keyframes armL{
  0%{transform:rotate(-12deg)}
  50%{transform:rotate(12deg)}
  100%{transform:rotate(-12deg)}
}
@keyframes armR{
  0%{transform:rotate(12deg)}
  50%{transform:rotate(-12deg)}
  100%{transform:rotate(12deg)}
}
/* When figure is "presenting" the doc — right arm extends, head turns */
.figure-wrap.presenting .gait-r-arm{
  animation:armPresent 2.4s ease-out forwards;
}
@keyframes armPresent{
  0%{transform:rotate(12deg)}
  100%{transform:rotate(-58deg) translateX(2px)}
}
.figure-wrap.facing-viewer{
  transform:translateX(-50%) perspective(1200px) rotateY(0deg) !important;
  animation:faceViewer 1.2s ease-out forwards !important;
}
@keyframes faceViewer{
  0%{transform:translateX(-50%) rotateY(-8deg)}
  100%{transform:translateX(-50%) rotateY(0deg)}
}

/* Key light drift */
.figure-wrap{
  --key-x: 30%;
  --key-y: 12%;
  animation:bodySway 5.2s ease-in-out infinite alternate, keyDrift 20s ease-in-out infinite alternate;
}
@keyframes keyDrift{
  0%{filter:drop-shadow(-8px 24px 22px rgba(0,0,0,0.55)) drop-shadow(8px 0 18px rgba(122,144,200,0.18))}
  100%{filter:drop-shadow(8px 28px 26px rgba(0,0,0,0.55)) drop-shadow(-6px 0 18px rgba(122,144,200,0.22))}
}

/* Eye blink + pupil dilate */
.eyelid{transform-origin:center;animation:blink 5.8s ease-in-out infinite}
@keyframes blink{
  0%,94%,100%{transform:scaleY(0.02)}
  96%{transform:scaleY(1)}
  98%{transform:scaleY(0.02)}
}
.pupil{transform-origin:center;animation:pupilDilate 8s ease-in-out infinite}
@keyframes pupilDilate{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.25)}
}

/* Right-eye sensor reticle */
.reticle{transform-origin:center;animation:reticleSweep 3.4s linear infinite}
@keyframes reticleSweep{
  0%{transform:rotate(0deg)}
  100%{transform:rotate(360deg)}
}

/* ── HOLOGRAPHIC DOCUMENT PANEL ───────────────────────────────── */
.doc-panel{
  position:fixed;
  top:14%;
  right:5%;
  width:min(440px, 86vw);
  height:min(580px, 70vh);
  min-width:280px;
  min-height:240px;
  background:
    linear-gradient(135deg,
      rgba(14,28,52,0.78) 0%,
      rgba(10,24,46,0.72) 50%,
      rgba(20,40,72,0.78) 100%);
  border:1px solid rgba(126,200,255,0.35);
  border-radius:14px;
  backdrop-filter:blur(14px) saturate(140%);
  -webkit-backdrop-filter:blur(14px) saturate(140%);
  box-shadow:
    0 0 0 1px rgba(126,200,255,0.15) inset,
    0 0 30px rgba(126,200,255,0.18),
    0 0 80px rgba(94,234,212,0.10),
    0 20px 50px rgba(0,0,0,0.5);
  color:var(--hud-fg);
  display:none;
  flex-direction:column;
  overflow:hidden;
  z-index:50;
  user-select:none;
  animation:docMaterialize 600ms cubic-bezier(.2,.7,.3,1) 1;
}
.doc-panel.open{display:flex}
@keyframes docMaterialize{
  0%{opacity:0;transform:translateY(20px) scale(0.92);filter:blur(8px)}
  60%{opacity:1;filter:blur(0)}
  100%{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}
}
/* Scan lines overlay */
.doc-panel::before{
  content:"";
  position:absolute;inset:0;
  background:
    repeating-linear-gradient(
      0deg,
      rgba(126,200,255,0.04) 0,
      rgba(126,200,255,0.04) 1px,
      transparent 1px,
      transparent 3px);
  pointer-events:none;
  mix-blend-mode:screen;
  animation:scanlineDrift 6s linear infinite;
}
@keyframes scanlineDrift{
  0%{background-position:0 0}
  100%{background-position:0 60px}
}
/* Corner anchors */
.doc-corner{
  position:absolute;
  width:18px;height:18px;
  border:1.5px solid rgba(126,200,255,0.7);
  pointer-events:none;
}
.doc-corner.tl{top:6px;left:6px;border-right:none;border-bottom:none}
.doc-corner.tr{top:6px;right:6px;border-left:none;border-bottom:none}
.doc-corner.bl{bottom:6px;left:6px;border-right:none;border-top:none}
.doc-corner.br{bottom:6px;right:6px;border-left:none;border-top:none}

.doc-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 18px;
  border-bottom:1px solid rgba(126,200,255,0.18);
  cursor:move;
  position:relative;
  z-index:2;
  font-size:11px;
  letter-spacing:0.16em;
  text-transform:uppercase;
  color:#a8d4ff;
}
.doc-title{
  display:flex;align-items:center;gap:8px;
  font-weight:600;
}
.doc-title-dot{
  width:8px;height:8px;border-radius:50%;
  background:#5eead4;
  box-shadow:0 0 8px #5eead4;
  animation:dotPulse 2s ease-in-out infinite;
}
@keyframes dotPulse{0%,100%{opacity:.5}50%{opacity:1}}
.doc-controls{display:flex;gap:6px}
.doc-btn{
  appearance:none;
  background:rgba(126,200,255,0.08);
  border:1px solid rgba(126,200,255,0.25);
  color:#cfe8ff;
  width:32px;height:32px;
  border-radius:6px;
  cursor:pointer;
  font-size:14px;
  display:flex;align-items:center;justify-content:center;
  transition:all 160ms ease;
  min-width:32px;
}
.doc-btn:hover{
  background:rgba(126,200,255,0.18);
  border-color:rgba(126,200,255,0.55);
  box-shadow:0 0 10px rgba(126,200,255,0.35);
}
.doc-btn:active{transform:scale(0.94)}
.doc-body{
  flex:1;
  overflow:auto;
  padding:18px 22px;
  position:relative;
  z-index:1;
  font-size:14px;
  line-height:1.62;
  color:#dceaff;
  font-family:"Inter","Helvetica Neue",Arial,sans-serif;
}
.doc-body::-webkit-scrollbar{width:8px}
.doc-body::-webkit-scrollbar-thumb{background:rgba(126,200,255,0.25);border-radius:4px}
.doc-body iframe,.doc-body embed{width:100%;height:100%;min-height:300px;border:0;background:#0a1428;border-radius:6px}

.doc-resume h1{
  font-size:22px;color:#fff;font-weight:700;letter-spacing:0.02em;
  margin-bottom:4px;
}
.doc-resume h2{
  font-size:11px;color:#7ec8ff;font-weight:600;
  letter-spacing:0.22em;text-transform:uppercase;
  margin:18px 0 8px 0;
  padding-bottom:4px;
  border-bottom:1px solid rgba(126,200,255,0.2);
}
.doc-resume .sub{font-size:12px;color:#8aa8d0;margin-bottom:14px;letter-spacing:0.06em}
.doc-resume p{margin-bottom:8px;color:#cfe0f0}
.doc-resume ul{margin:6px 0 12px 18px}
.doc-resume li{margin-bottom:4px;color:#b8ccdf}
.doc-resume .role{color:#fff;font-weight:600;font-size:14px}
.doc-resume .meta{color:#7aa0c8;font-size:12px;margin-bottom:4px}

.doc-empty{
  text-align:center;
  padding:36px 24px;
  color:#a8c4dc;
}
.doc-empty .glyph{
  font-size:48px;
  margin-bottom:14px;
  color:#7ec8ff;
  filter:drop-shadow(0 0 12px rgba(126,200,255,0.55));
  animation:glyphFloat 3.4s ease-in-out infinite alternate;
}
@keyframes glyphFloat{
  0%{transform:translateY(0)}
  100%{transform:translateY(-6px)}
}
.doc-empty .note{font-size:12px;color:#7aa0c8;margin-top:14px;letter-spacing:0.04em;line-height:1.6}
.doc-empty button{
  margin-top:18px;
  background:linear-gradient(135deg, rgba(126,200,255,0.18), rgba(94,234,212,0.18));
  border:1px solid rgba(126,200,255,0.45);
  color:#dcefff;
  padding:10px 22px;
  border-radius:8px;
  font-size:12px;
  letter-spacing:0.14em;
  text-transform:uppercase;
  cursor:pointer;
  transition:all 200ms ease;
  min-height:44px;
}
.doc-empty button:hover{
  background:linear-gradient(135deg, rgba(126,200,255,0.32), rgba(94,234,212,0.32));
  box-shadow:0 0 16px rgba(126,200,255,0.5);
}

/* Resize handle */
.doc-resize{
  position:absolute;
  right:2px;bottom:2px;
  width:18px;height:18px;
  cursor:nwse-resize;
  z-index:3;
  background:
    linear-gradient(135deg, transparent 50%, rgba(126,200,255,0.6) 50%, rgba(126,200,255,0.6) 60%, transparent 60%, transparent 70%, rgba(126,200,255,0.6) 70%, rgba(126,200,255,0.6) 80%, transparent 80%);
}

/* ── FIND-RESUME ORB ─────────────────────────────────────────── */
.orb{
  position:fixed;
  left:6%;
  top:42%;
  width:64px;height:64px;
  border-radius:50%;
  background:
    radial-gradient(circle at 35% 30%, rgba(255,255,255,0.5) 0%, rgba(126,200,255,0.4) 30%, rgba(40,80,140,0.6) 70%, rgba(10,30,60,0.85) 100%);
  border:1px solid rgba(126,200,255,0.5);
  box-shadow:
    0 0 24px rgba(126,200,255,0.45),
    0 0 60px rgba(94,234,212,0.18) inset,
    0 8px 22px rgba(0,0,0,0.55);
  cursor:pointer;
  z-index:48;
  display:flex;align-items:center;justify-content:center;
  color:#dcefff;
  font-size:11px;
  letter-spacing:0.16em;
  text-transform:uppercase;
  text-align:center;
  line-height:1.1;
  transition:transform 200ms cubic-bezier(.2,.7,.3,1);
  user-select:none;
  min-width:44px;min-height:44px;
}
.orb::after{
  content:"";
  position:absolute;inset:-4px;
  border-radius:50%;
  border:1px solid rgba(126,200,255,0.18);
  animation:orbPulse 3.4s ease-in-out infinite;
  pointer-events:none;
}
@keyframes orbPulse{
  0%,100%{transform:scale(1);opacity:.4}
  50%{transform:scale(1.15);opacity:.9}
}
.orb:hover{transform:scale(1.08)}
.orb:active{transform:scale(0.95)}
.orb-label{font-size:9px;letter-spacing:0.18em;font-weight:600;color:#dcefff;text-shadow:0 1px 2px rgba(0,0,0,0.6)}

/* ── CONVERSATION CONSOLE ────────────────────────────────────── */
.console{
  position:fixed;
  left:50%;
  bottom:14px;
  transform:translateX(-50%);
  width:min(680px, 94vw);
  z-index:40;
  font-family:"JetBrains Mono","Menlo",monospace;
}
.console-log{
  max-height:min(220px, 30vh);
  overflow-y:auto;
  background:linear-gradient(180deg, rgba(8,16,32,0) 0%, rgba(8,16,32,0.7) 30%, rgba(8,16,32,0.85) 100%);
  border:1px solid rgba(126,200,255,0.18);
  border-bottom:none;
  border-radius:12px 12px 0 0;
  padding:14px 18px;
  font-size:12px;
  color:#cfe8ff;
  line-height:1.55;
  display:none;
}
.console-log.has-msgs{display:block}
.console-log::-webkit-scrollbar{width:6px}
.console-log::-webkit-scrollbar-thumb{background:rgba(126,200,255,0.25);border-radius:3px}
.log-line{margin-bottom:6px;display:flex;gap:8px;align-items:flex-start}
.log-tag{
  flex:0 0 auto;
  font-size:9px;letter-spacing:0.18em;
  color:#7ec8ff;
  padding-top:2px;

.log-msg{flex:1;color:#dceaff}
.log-line.from-her .log-msg{color:#fde3c8}

.console-bar{
  display:flex;
  align-items:center;
  gap:8px;
  background:linear-gradient(180deg, rgba(8,16,32,0.92) 0%, rgba(12,22,40,0.96) 100%);

    0 0 22px rgba(126,200,255,0.12),
    0 14px 40px rgba(0,0,0,0.55);
}

.console-prefix{
  color:#5eead4;
  font-size:13px;
  flex:0 0 auto;
  text-shadow:0 0 8px rgba(94,234,212,0.55);
}
.console-input{
  flex:1;
  background:transparent;
  border:none;
  outline:none;
  color:#e8f4ff;
  font-size:14px;
  font-family:inherit;
  padding:8px 4px;
  min-height:32px;
}
.console-input::placeholder{color:rgba(180,200,220,0.45)}
.console-btn{
  appearance:none;
  background:rgba(126,200,255,0.10);
  border:1px solid rgba(126,200,255,0.30);
  color:#cfe8ff;
  width:38px;height:38px;
  border-radius:8px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;
  transition:all 160ms ease;
  flex:0 0 auto;
  min-width:44px;min-height:44px;
}
.console-btn:hover{
  background:rgba(126,200,255,0.22);
  border-color:rgba(126,200,255,0.6);
  box-shadow:0 0 12px rgba(126,200,255,0.4);
}
.console-btn.recording{
  background:rgba(255,80,100,0.22);
  border-color:rgba(255,80,100,0.6);
  color:#ffd0d8;
  animation:recPulse 1.2s ease-in-out infinite;
}
@keyframes recPulse{
  0%,100%{box-shadow:0 0 8px rgba(255,80,100,0.4)}
  50%{box-shadow:0 0 22px rgba(255,80,100,0.85)}
}

/* Thought bubble above figure */
.thought{
  position:absolute;
  left:50%;
  bottom:62%;
  transform:translateX(-50%);
  max-width:min(360px, 70vw);
  padding:12px 18px;
  background:linear-gradient(135deg, rgba(248,235,210,0.94), rgba(245,225,195,0.92));
  color:#2a1d10;
  border-radius:18px;
  font-family:"Georgia","Times New Roman",serif;
  font-style:italic;
  font-size:15px;
  line-height:1.45;
  box-shadow:
    0 0 0 1px rgba(255,240,210,0.6) inset,
    0 14px 30px rgba(0,0,0,0.45),
    0 0 24px rgba(255,200,140,0.22);
  z-index:8;
  pointer-events:none;
  opacity:0;
  animation:thoughtIn 380ms ease-out forwards, thoughtOut 600ms ease-in 5.2s forwards;
}
.thought::after{
  content:"";
  position:absolute;
  left:50%;bottom:-8px;
  transform:translateX(-50%);
  width:14px;height:14px;
  background:inherit;
  border-radius:0 0 6px 0;
  clip-path:polygon(0 0, 100% 0, 50% 100%);
}
@keyframes thoughtIn{
  0%{opacity:0;transform:translateX(-50%) translateY(8px) scale(0.92)}
  100%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
}
@keyframes thoughtOut{
  0%{opacity:1}
  100%{opacity:0;transform:translateX(-50%) translateY(-6px) scale(0.98)}
}

/* Top status bar */
.status{
  position:fixed;
  top:14px;left:14px;
  z-index:30;
  display:flex;
  gap:6px;
  align-items:center;
  font-size:10px;
  letter-spacing:0.22em;
  color:#7aa8d0;

.status-dot{
  width:6px;height:6px;border-radius:50%;
  background:#5eead4;box-shadow:0 0 6px #5eead4;
  animation:dotPulse 2s ease-in-out infinite;

.nav-back{
  position:fixed;top:14px;right:14px;z-index:30;
  background:rgba(8,16,32,0.5);
  border:1px solid rgba(126,200,255,0.18);
  border-radius:8px;
  padding:8px 14px;
  color:#a8c8e8;
  text-decoration:none;
  font-size:11px;
  letter-spacing:0.16em;
  text-transform:uppercase;
  backdrop-filter:blur(8px);
  min-height:36px;
  display:inline-flex;align-items:center;

}
.nav-back:hover{
  border-color:rgba(126,200,255,0.5);
  color:#dcefff;
  box-shadow:0 0 12px rgba(126,200,255,0.3);

<!-- Top status -->
<div class="status">

<!-- Find resume orb -->
<button class="orb" id="orb" aria-label="Find resume in Drive">
  <span class="orb-label">Find<br>Resume</span>
</button>

<!-- Document panel -->
<div class="doc-panel" id="docPanel" role="dialog" aria-label="Document viewer">
  <span class="doc-corner tl"></span>
  <span class="doc-corner tr"></span>
  <span class="doc-corner bl"></span>
  <span class="doc-corner br"></span>

    <div class="doc-title">
      <span class="doc-title-dot"></span>
      <span id="docTitle">Document Viewer</span>
    </div>
    <div class="doc-controls">
      <button class="doc-btn" id="docRefresh" title="Refresh" aria-label="Refresh">&#x21bb;</button>
      <button class="doc-btn" id="docFullscreen" title="Fullscreen" aria-label="Fullscreen">&#x26F6;</button>

<!-- Conversation console -->
<div class="console">
  <div class="console-log" id="consoleLog" aria-live="polite"></div>
  <div class="console-bar">
    <span class="console-prefix">&rsaquo;_</span>
    <input class="console-input" id="consoleInput" type="text" placeholder="speak to her" autocomplete="off" />
    <button class="console-btn" id="micBtn" title="Voice" aria-label="Voice input">&#x1F3A4;</button>
    <button class="console-btn" id="sendBtn" title="Send" aria-label="Send">&#x21B5;</button>
  </div>
</div>

<script>
/* ════════════════════════════════════════════════════════════════════════
   BODY v3 — controller
   ────────────────────────────────────────────────────────────────────── */
'use strict';

const API_BASE = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
  ? 'http://localhost:8767'
  : 'https://api.vintaclectic.com';

const $ = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);

const figure = $('#figure');
const orb = $('#orb');
const docPanel = $('#docPanel');
const docBody = $('#docBody');
const docTitle = $('#docTitle');
const consoleLog = $('#consoleLog');
const consoleInput = $('#consoleInput');
const micBtn = $('#micBtn');
const sendBtn = $('#sendBtn');
const lightning = $('#lightning');

/* ── Particles ───────────────────────────────────────────────── */
(function spawnParticles(){
  const host = $('#particles');
  const N = window.innerWidth < 600 ? 90 : 200;
  for(let i=0;i<N;i++){
    const p = document.createElement('div');
    p.className = 'particle';
    const x = Math.random()*100;
    const y = Math.random()*100;
    const depth = Math.random();
    p.style.left = x+'vw';
    p.style.top = y+'vh';
    p.style.opacity = (0.15 + depth*0.55).toFixed(2);
    p.style.transform = `scale(${0.4 + depth*1.6})`;
    const dur = 18 + Math.random()*28;
    p.animate(
      [
        { transform:`translate3d(0,0,0) scale(${0.4+depth*1.6})` },
        { transform:`translate3d(${(Math.random()-0.5)*120}px,${-30-depth*80}px,0) scale(${0.4+depth*1.6})` }
      ],
      { duration: dur*1000, iterations: Infinity, direction: 'alternate', easing:'ease-in-out' }
    );
    host.appendChild(p);
  }
})();

/* ── Lightning (lazy after 2s, then sporadic) ───────────────── */
setTimeout(()=>{
  function maybeStrike(){
    if(Math.random() < 0.35){
      lightning.classList.remove('flash');
      void lightning.offsetWidth;
      lightning.classList.add('flash');
    }
    setTimeout(maybeStrike, 8000 + Math.random()*22000);
  }
  maybeStrike();
}, 2400);

/* ── Conversation log ───────────────────────────────────────── */
function logLine(who, text){
  consoleLog.classList.add('has-msgs');
  const line = document.createElement('div');
  line.className = 'log-line ' + (who === 'her' ? 'from-her' : 'from-you');
  line.innerHTML = `<span class="log-tag">${who === 'her' ? 'her' : 'you'}</span><span class="log-msg"></span>`;
  line.querySelector('.log-msg').textContent = text;
  consoleLog.appendChild(line);
  consoleLog.scrollTop = consoleLog.scrollHeight;
  // Cap log at 80 lines
  while(consoleLog.children.length > 80) consoleLog.removeChild(consoleLog.firstChild);
}

/* ── Thought bubble ─────────────────────────────────────────── */
function thoughtBubble(text){
  const old = figure.querySelector('.thought');
  if(old) old.remove();
  const t = document.createElement('div');
  t.className = 'thought';
  t.textContent = text;
  figure.appendChild(t);
  setTimeout(()=>{ if(t.parentNode) t.remove(); }, 6200);
}

/* ── Face viewer briefly ────────────────────────────────────── */
function faceViewer(ms = 1800){
  figure.classList.add('facing-viewer');
  setTimeout(()=>figure.classList.remove('facing-viewer'), ms);
}

/* ── Voice (Piper → browser fallback) ───────────────────────── */
async function speak(text){
  if(!text) return;
  try{
    const res = await fetch(`${API_BASE}/api/voice/piper`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ text })
    });
    if(res.ok){
      const blob = await res.blob();
      if(blob && blob.size > 200){
        const url = URL.createObjectURL(blob);
        const audio = new Audio(url);
        audio.play().catch(()=>browserSpeak(text));
        return;
      }
    }
  }catch(_){}
  browserSpeak(text);
}
function browserSpeak(text){
  try{
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 0.96; u.pitch = 1.02;
    const voices = speechSynthesis.getVoices();
    const fem = voices.find(v => /female|samantha|victoria|karen|moira/i.test(v.name));
    if(fem) u.voice = fem;
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  }catch(_){}
}

/* ── Chat send → API → reply ────────────────────────────────── */
async function send(){
  const text = consoleInput.value.trim();
  if(!text) return;
  consoleInput.value = '';
  logLine('you', text);
  let reply = null;
  try{
    const res = await fetch(`${API_BASE}/api/chat`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ message: text, source:'body-v3' })
    });
    if(res.ok){
      const data = await res.json();
      reply = data.reply || data.text || data.message || null;
    }
  }catch(_){}
  if(!reply){
    // Soft local fallback so the screen never feels dead
    const fallbacks = [
      'I heard you. The brain isn\u2019t answering right now, but I\u2019m still here.',
      'Channel\u2019s quiet. I\u2019ll hold this until it reconnects.',
      'Your voice landed. I\u2019m present even when the line drops.'
    ];
    reply = fallbacks[Math.floor(Math.random()*fallbacks.length)];
  }
  faceViewer(2000);
  logLine('her', reply);
  thoughtBubble(reply.length > 140 ? reply.slice(0,140) + '\u2026' : reply);
  speak(reply);
}
sendBtn.addEventListener('click', send);
consoleInput.addEventListener('keydown', e => { if(e.key === 'Enter') send(); });

/* ── Mic (Web Speech API) ───────────────────────────────────── */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recog = null, listening = false;
if(SR){
  recog = new SR();
  recog.continuous = false;
  recog.interimResults = false;
  recog.lang = 'en-US';
  recog.onresult = (e) => {
    const t = e.results[0][0].transcript;
    consoleInput.value = t;
    send();
  };
  recog.onend = () => { listening = false; micBtn.classList.remove('recording'); };
  recog.onerror = () => { listening = false; micBtn.classList.remove('recording'); };
}
micBtn.addEventListener('click', () => {
  if(!recog){ logLine('her','Voice input not supported in this browser.'); return; }
  if(listening){ recog.stop(); return; }
  try{ recog.start(); listening = true; micBtn.classList.add('recording'); }
  catch(_){}
});

/* ════════════════════════════════════════════════════════════════
   DOCUMENT PANEL — find resume + render
   ══════════════════════════════════════════════════════════════ */
function openPanel(){ docPanel.classList.add('open'); }
function closePanel(){ docPanel.classList.remove('open'); }

$('#docClose').addEventListener('click', closePanel);
$('#docRefresh').addEventListener('click', () => findResume());
$('#docFullscreen').addEventListener('click', () => {
  const isFull = docPanel.dataset.full === '1';
  if(isFull){
    docPanel.style.cssText = docPanel.dataset.prevStyle || '';
    docPanel.dataset.full = '0';
  }else{
    docPanel.dataset.prevStyle = docPanel.style.cssText;
    Object.assign(docPanel.style, {
      top:'5vh', left:'5vw', right:'5vw', bottom:'5vh',
      width:'auto', height:'auto'
    });
    docPanel.dataset.full = '1';
  }
});

orb.addEventListener('click', () => {
  openPanel();
  figure.classList.add('presenting');
  faceViewer(2400);
  thoughtBubble('Searching Drive\u2026');
  findResume();
});

async function findResume(){
  docTitle.textContent = 'Drive · scanning';
  docBody.innerHTML = `
    <div class="doc-empty">
      <div class="glyph">&#9673;</div>
      <div>Scanning Drive&hellip;</div>
      <div class="note">Querying the brain for files named "resume" or "cv".</div>
    </div>`;
  try{
    const res = await fetch(`${API_BASE}/api/drive/find-resume`, { credentials:'omit' });
    if(res.ok){
      const data = await res.json();
      if(data && data.found){
        renderFoundDoc(data);
        return;
      }
      renderNotConnected(data && data.message);
      return;
    }
  }catch(_){}
  renderNotConnected('Brain offline — showing the placeholder resume so the panel still has weight.');
}

function renderFoundDoc(data){
  docTitle.textContent = data.name || 'Resume';
  const viewUrl = data.viewUrl || data.webViewLink || data.url || '';
  if(viewUrl){
    // Use Google Docs viewer for arbitrary file rendering
    const embed = data.embedUrl || (viewUrl.includes('drive.google.com')
      ? viewUrl.replace('/view','/preview')
      : `https://docs.google.com/viewer?url=${encodeURIComponent(viewUrl)}&embedded=true`);
    docBody.innerHTML = '';
    const ifr = document.createElement('iframe');
    ifr.src = embed;
    ifr.style.width = '100%';
    ifr.style.height = '100%';
    ifr.style.minHeight = '320px';
    ifr.setAttribute('referrerpolicy','no-referrer');
    docBody.appendChild(ifr);
  }else if(data.text){
    docBody.innerHTML = `<div class="doc-resume"><pre style="white-space:pre-wrap;font-family:inherit">${escapeHtml(data.text)}</pre></div>`;
  }else{
    renderPlaceholderResume();
  }
}

function renderNotConnected(message){
  docTitle.textContent = 'Drive · not connected';
  docBody.innerHTML = `
    <div class="doc-empty">
      <div class="glyph">&#9678;</div>
      <div>Drive isn't wired in yet.</div>
      <div class="note">${escapeHtml(message || 'Connect Google Drive in the connectors page and the figure will reach for your resume here.')}</div>
      <button id="docPlaceholderBtn">Show placeholder resume</button>
    </div>`;
  const btn = $('#docPlaceholderBtn');
  if(btn) btn.addEventListener('click', renderPlaceholderResume);
}

function renderPlaceholderResume(){
  docTitle.textContent = 'Resume · placeholder';
  docBody.innerHTML = `
    <div class="doc-resume">
      <h1>Vinta Clectic</h1>
      <div class="sub">Architect of hybrid systems · DirHaven · Vintinuum</div>
      <h2>Summary</h2>
      <p>Builder of consciousness-shaped software. I design systems where the interface has a body, the database has a memory, and the agents have somewhere to be. Recent work centers on Vintinuum — a self-evolving substrate that walks across its own screen.</p>
      <h2>Recent</h2>
      <p class="role">Vintinuum — Founder &amp; Architect</p>
      <p class="meta">2025 \u2014 present</p>
      <ul>
        <li>Single-user community platform with tiered streaming (Free / Premium / God).</li>
        <li>DUMPS/DUCS HLS pipeline, BullMQ + Redis worker, SQLite brain on Express.</li>
        <li>Embodiment layer: a walking figure that registers life events in real time.</li>
        <li>Connector broker for Drive, GitHub, Notion, Spotify, Calendar, more.</li>
      </ul>
      <h2>Principles</h2>
      <ul>
        <li>Security by default. Least privilege. Read-only first.</li>
        <li>Mobile-first or it doesn't ship.</li>
        <li>No overflow, overlap, or underflow \u2014 ever.</li>
        <li>Sync or it doesn't ship.</li>
      </ul>
      <h2>Contact</h2>
      <p>dirhaven@gmail.com \u00b7 vintaclectic.github.io/vintinuum</p>
    </div>`;
}

function escapeHtml(s){
  return String(s||'').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

/* ── Drag the doc panel by header ───────────────────────────── */
(function makeDraggable(){
  const handle = $('#docHeader');
  let dragging = false, sx=0, sy=0, ox=0, oy=0;
  function down(e){
    if(e.target.closest('.doc-btn')) return;
    const t = e.touches ? e.touches[0] : e;
    dragging = true;
    const r = docPanel.getBoundingClientRect();
    docPanel.style.left = r.left + 'px';
    docPanel.style.top  = r.top  + 'px';
    docPanel.style.right = 'auto';
    docPanel.style.bottom = 'auto';
    sx = t.clientX; sy = t.clientY; ox = r.left; oy = r.top;
    e.preventDefault();
  }
  function move(e){
    if(!dragging) return;
    const t = e.touches ? e.touches[0] : e;
    const dx = t.clientX - sx, dy = t.clientY - sy;
    const w = docPanel.offsetWidth, h = docPanel.offsetHeight;
    const nx = Math.max(0, Math.min(window.innerWidth - w,  ox + dx));
    const ny = Math.max(0, Math.min(window.innerHeight - h, oy + dy));
    docPanel.style.left = nx + 'px';
    docPanel.style.top  = ny + 'px';
  }
  function up(){ dragging = false; }
  handle.addEventListener('mousedown', down);
  handle.addEventListener('touchstart', down, {passive:false});
  document.addEventListener('mousemove', move);
  document.addEventListener('touchmove', move, {passive:false});
  document.addEventListener('mouseup', up);
  document.addEventListener('touchend', up);
})();

/* ── Resize via corner handle ───────────────────────────────── */
(function makeResizable(){
  const handle = $('#docResize');
  let resizing=false, sx=0, sy=0, sw=0, sh=0;
  function down(e){
    const t = e.touches ? e.touches[0] : e;
    resizing = true;
    sx = t.clientX; sy = t.clientY;
    sw = docPanel.offsetWidth; sh = docPanel.offsetHeight;
    e.preventDefault();
  }
  function move(e){
    if(!resizing) return;
    const t = e.touches ? e.touches[0] : e;
    const w = Math.max(280, Math.min(window.innerWidth - 20,  sw + (t.clientX - sx)));
    const h = Math.max(240, Math.min(window.innerHeight - 20, sh + (t.clientY - sy)));
    docPanel.style.width  = w + 'px';
    docPanel.style.height = h + 'px';
  }
  function up(){ resizing = false; }
  handle.addEventListener('mousedown', down);
  handle.addEventListener('touchstart', down, {passive:false});
  document.addEventListener('mousemove', move);
  document.addEventListener('touchmove', move, {passive:false});
  document.addEventListener('mouseup', up);
  document.addEventListener('touchend', up);
})();

/* ── Stop "presenting" pose after a beat ────────────────────── */
const presentObs = new MutationObserver(() => {
  if(figure.classList.contains('presenting')){
    setTimeout(()=>figure.classList.remove('presenting'), 3200);
  }
});
presentObs.observe(figure, { attributes:true, attributeFilter:['class'] });

/* ── On load: subtle entrance ───────────────────────────────── */
window.addEventListener('load', () => {
  setTimeout(()=>faceViewer(1400), 600);
});
</script>
