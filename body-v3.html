<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Vintinuum — Body v3.0</title>
<meta name="theme-color" content="#02030a" />
<link rel="icon" href="favicon.svg" />
<style>
:root{
  --skin-hi:#d4a585;
  --skin-mid:#a07358;
  --skin-low:#6b3a2a;
  --skin-deep:#2d1408;
  --sss:#ff8866;
  --metal-hi:#e8ecf2;
  --metal:#888d96;
  --metal-mid:#4a525e;
  --metal-low:#2a2e36;
  --metal-deep:#0a0c10;
  --circuit:#5ce3ff;
  --circuit-soft:#9eebff;
  --blood:#c4202e;
  --night-0:#02030a;
  --night-1:#04060e;
  --night-2:#0a1024;
  --hud:#7ec8ff;
  --hud-fg:#cfe8ff;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;height:100%;
  background:#000;
  color:var(--hud-fg);
  font-family:"Helvetica Neue","Inter",system-ui,Arial,sans-serif;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
  touch-action:manipulation;
}
button{font-family:inherit;color:inherit}

#scene{
  position:fixed;inset:0;overflow:hidden;
  background:
    radial-gradient(ellipse 80% 60% at 50% 100%, #0a1228 0%, transparent 60%),
    radial-gradient(ellipse 50% 30% at 50% 10%, #14081e 0%, transparent 60%),
    repeating-linear-gradient(0deg, transparent 0 2px, rgba(255,255,255,0.012) 2px 3px),
    linear-gradient(180deg, #050608 0%, #0c0e16 60%, #1a1c24 100%);
}
.stars{
  position:absolute;inset:0;pointer-events:none;
  background-image:
    radial-gradient(1px 1px at 12% 18%, #ffffff 50%, transparent 51%),
    radial-gradient(1px 1px at 28% 64%, #d0e6ff 50%, transparent 51%),
    radial-gradient(1px 1px at 46% 22%, #ffffff 50%, transparent 51%),
    radial-gradient(2px 2px at 67% 41%, #b8d4ff 50%, transparent 51%),
    radial-gradient(1px 1px at 81% 12%, #ffffff 50%, transparent 51%),
    radial-gradient(1px 1px at 92% 56%, #e0eaff 50%, transparent 51%);
  opacity:.35;animation:twinkle 9s ease-in-out infinite;
}
@keyframes twinkle{0%,100%{opacity:.25}50%{opacity:.45}}
.floor{
  position:absolute;left:0;right:0;bottom:0;height:30vh;
  background:
    radial-gradient(ellipse 70% 90% at 50% 100%, rgba(120,180,255,0.12) 0%, transparent 65%),
    linear-gradient(180deg, transparent 0%, rgba(10,20,40,0.6) 50%, rgba(2,4,10,0.96) 100%);
  pointer-events:none;
}
.floor::before{
  content:"";position:absolute;inset:0;
  background:repeating-linear-gradient(90deg, transparent 0 80px, rgba(126,200,255,0.04) 80px 81px);
  transform:perspective(800px) rotateX(62deg);
  transform-origin:50% 100%;
}

/* ── FIGURE STAGE ── */
#figure-stage{
  position:absolute;
  bottom:14vh;
  left:0;width:100vw;height:300px;
  pointer-events:none;
  z-index:5;
}
#figure-wrap{
  position:absolute;
  bottom:0;left:0;
  width:140px;height:300px;
  will-change:transform;
  pointer-events:auto;
  cursor:pointer;
}
#figure-inner{
  position:absolute;
  inset:0;
  transform-origin:50% 100%;
}
#figure-inner.walking{animation:torsoLean 1.2s ease-in-out infinite}
@keyframes torsoLean{
  0%,100%{transform:rotate(0deg)}
  50%{transform:rotate(0.4deg)}
}

/* floor reflection */
.reflection{
  position:absolute;
  left:50%;bottom:-130px;
  width:140px;height:140px;
  transform:translateX(-50%) scaleY(-1);
  opacity:0.22;
  filter:blur(2px) brightness(0.5);
  pointer-events:none;
  mask-image:linear-gradient(180deg, #000 0%, transparent 80%);
  -webkit-mask-image:linear-gradient(180deg, #000 0%, transparent 80%);
}
.ground-shadow{
  position:absolute;
  left:50%;bottom:-6px;
  width:120px;height:14px;
  transform:translateX(-50%);
  background:radial-gradient(ellipse at center, rgba(0,0,0,0.7) 0%, transparent 70%);
  filter:blur(5px);
  z-index:0;
}

/* ── HEAD ── */
.head{
  position:absolute;
  left:50%;top:0;
  width:54px;height:68px;
  transform:translateX(-50%);
  border-radius:48% 48% 42% 42% / 56% 56% 44% 44%;
  background:
    linear-gradient(96deg,
      rgba(20,22,28,0) 0%, rgba(20,22,28,0) 47%,
      rgba(40,46,56,0.7) 51%, rgba(20,24,32,1) 100%),
    radial-gradient(ellipse 90% 100% at 32% 28%,
      var(--skin-hi) 0%,
      var(--skin-mid) 40%,
      var(--skin-low) 75%,
      var(--skin-deep) 100%);
  box-shadow:
    inset -8px -8px 18px rgba(0,0,0,0.55),
    inset 5px 4px 14px rgba(255,210,180,0.22),
    inset 0 -3px 8px rgba(255,120,90,0.16),
    6px 3px 22px rgba(80,140,220,0.18),
    -3px 0 12px rgba(255,150,100,0.08);
  z-index:10;
}
.hair{
  position:absolute;
  left:50%;top:-2px;
  width:56px;height:32px;
  transform:translateX(-50%);
  border-radius:50% 50% 40% 40% / 75% 75% 25% 25%;
  background:
    radial-gradient(ellipse 80% 90% at 35% 25%, #2a1c14 0%, #100808 70%, #050204 100%);
  box-shadow:
    inset -5px -3px 10px rgba(0,0,0,0.7),
    inset 3px 3px 6px rgba(100,70,50,0.2),
    0 -2px 6px rgba(30,15,8,0.6);
  z-index:11;
}
.beard{
  position:absolute;
  left:50%;top:42px;
  width:38px;height:24px;
  transform:translateX(-50%);
  border-radius:40% 40% 50% 50% / 30% 30% 70% 70%;
  background:radial-gradient(ellipse 80% 80% at 50% 40%, #1c1208 0%, #0a0604 80%, transparent 100%);
  opacity:0.85;
  z-index:12;
  pointer-events:none;
}
.eye{
  position:absolute;top:28px;
  width:7px;height:5px;
  border-radius:50%;
  background:radial-gradient(circle at 35% 35%, #fff 0%, #b0c4d8 30%, #1a2438 70%, #000 100%);
  box-shadow:inset 0 -1px 1px rgba(0,0,0,0.6), 0 0 3px rgba(255,255,255,0.3);
  z-index:13;
}
.eye.l{left:14px}
.eye.r{
  right:11px;left:auto;
  width:9px;height:9px;
  top:26px;
  background:
    radial-gradient(circle at 50% 50%, var(--circuit-soft) 0%, var(--circuit) 22%, #0a2438 50%, #04080e 100%);
  box-shadow:
    inset 0 0 3px rgba(0,0,0,0.8),
    0 0 6px var(--circuit),
    0 0 14px rgba(92,227,255,0.4);
  animation:lensPulse 2.8s ease-in-out infinite;
}
@keyframes lensPulse{
  0%,100%{box-shadow:inset 0 0 3px rgba(0,0,0,0.8),0 0 4px var(--circuit),0 0 10px rgba(92,227,255,0.3)}
  50%{box-shadow:inset 0 0 3px rgba(0,0,0,0.8),0 0 10px var(--circuit),0 0 20px rgba(92,227,255,0.6)}
}
.brow{
  position:absolute;top:24px;
  width:10px;height:2px;
  background:#1a0e08;
  border-radius:2px;
  filter:blur(0.3px);
  z-index:13;
}
.brow.l{left:12px;transform:rotate(-4deg)}
.brow.r{right:9px;transform:rotate(4deg);width:11px}
.nose{
  position:absolute;
  left:46%;top:36px;
  width:6px;height:14px;
  border-radius:40% 40% 50% 50%;
  background:linear-gradient(160deg, rgba(255,210,170,0.2) 0%, rgba(80,40,20,0) 70%);
  box-shadow:
    inset -2px 0 2px rgba(0,0,0,0.3),
    inset 1px 0 2px rgba(255,210,170,0.25),
    1px 2px 2px rgba(0,0,0,0.25);
  z-index:13;
}
.mouth{
  position:absolute;
  left:38%;top:51px;
  width:14px;height:3px;
  border-radius:50%;
  background:linear-gradient(180deg, #8a3a3a 0%, #4a1818 100%);
  box-shadow:inset 0 -1px 1px rgba(0,0,0,0.5), 0 1px 1px rgba(0,0,0,0.4);
  z-index:13;
  transform-origin:center;
}
.mouth.talking{animation:talk 0.22s ease-in-out infinite}
@keyframes talk{
  0%,100%{transform:scaleY(1)}
  50%{transform:scaleY(2.4)}
}
.ear{
  position:absolute;
  left:-2px;top:32px;
  width:7px;height:14px;
  border-radius:60% 30% 60% 40%;
  background:radial-gradient(ellipse 80% 80% at 40% 30%, var(--skin-hi) 0%, var(--skin-mid) 50%, var(--skin-low) 100%);
  box-shadow:inset -2px -1px 2px rgba(0,0,0,0.4), inset 1px 1px 1px rgba(255,160,120,0.4);
  z-index:9;
}
.circuit-etch{
  position:absolute;
  left:54%;top:30px;
  width:24px;height:30px;
  pointer-events:none;
  background:
    linear-gradient(90deg, transparent 30%, rgba(92,227,255,0.55) 30.5%, rgba(92,227,255,0.55) 31%, transparent 31.5%),
    linear-gradient(0deg, transparent 50%, rgba(92,227,255,0.4) 50.5%, rgba(92,227,255,0.4) 51%, transparent 51.5%),
    linear-gradient(45deg, transparent 65%, rgba(92,227,255,0.5) 65.5%, rgba(92,227,255,0.5) 66%, transparent 66.5%);
  filter:drop-shadow(0 0 2px rgba(92,227,255,0.7));
  opacity:.8;
  animation:circuitFlicker 4s ease-in-out infinite;
  z-index:14;
}
@keyframes circuitFlicker{
  0%,100%{opacity:.6}
  50%{opacity:.95}
}

/* ── NECK ── */
.neck{
  position:absolute;
  left:50%;top:62px;
  width:28px;height:18px;
  transform:translateX(-50%);
  border-radius:30% 30% 25% 25%;
  background:
    linear-gradient(96deg,
      rgba(0,0,0,0) 0%, rgba(0,0,0,0) 48%,
      rgba(60,68,80,0.95) 52%, rgba(36,42,52,1) 100%),
    radial-gradient(ellipse at 30% 20%, var(--skin-hi) 0%, var(--skin-low) 100%);
  box-shadow:
    inset -3px -2px 6px rgba(0,0,0,0.5),
    inset 2px 2px 3px rgba(255,200,160,0.2),
    0 3px 6px rgba(0,0,0,0.4);
  z-index:6;
}
.pendant{
  position:absolute;
  left:50%;top:76px;
  width:10px;height:10px;
  transform:translateX(-50%) rotate(45deg);
  background:linear-gradient(135deg, #f0d080 0%, #a07020 60%, #5a3810 100%);
  box-shadow:0 0 4px rgba(240,200,120,0.6), inset 0 0 2px rgba(0,0,0,0.4);
  z-index:8;
  border-radius:2px;
}

/* ── TORSO (in a black button-down shirt) ── */
.torso{
  position:absolute;
  left:50%;top:82px;
  width:88px;height:118px;
  transform:translateX(-50%);
  clip-path:polygon(
    16% 0%, 84% 0%,
    98% 30%, 94% 64%,
    86% 100%, 14% 100%,
    6% 64%, 2% 30%
  );
  background:
    /* right-side metal panel — chrome shoulder/chest plate */
    linear-gradient(96deg,
      rgba(0,0,0,0) 0%, rgba(0,0,0,0) 50%,
      rgba(60,68,84,0.0) 50%, rgba(60,68,84,0.85) 54%,
      rgba(36,44,58,1) 75%, rgba(20,26,36,1) 100%),
    /* shirt: deep matte black with subtle fabric weave */
    radial-gradient(ellipse 80% 90% at 30% 20%,
      #1a1a1e 0%, #0c0c10 50%, #050508 100%);
  box-shadow:
    inset -10px -10px 26px rgba(0,0,0,0.7),
    inset 6px 6px 12px rgba(80,90,110,0.18),
    8px 6px 28px rgba(80,140,220,0.16);
  z-index:5;
}
/* shirt button placket */
.placket{
  position:absolute;
  left:50%;top:88px;
  width:2px;height:108px;
  transform:translateX(-50%);
  background:linear-gradient(180deg, rgba(60,60,68,0.6) 0%, rgba(30,30,38,0.4) 100%);
  z-index:6;
  pointer-events:none;
}
.btn-dot{
  position:absolute;
  left:50%;
  width:4px;height:4px;
  transform:translateX(-50%);
  border-radius:50%;
  background:radial-gradient(circle at 30% 30%, #555 0%, #1a1a1e 70%, #000 100%);
  box-shadow:inset 0 -1px 1px rgba(0,0,0,0.7), 0 0 2px rgba(0,0,0,0.5);
  z-index:7;
  pointer-events:none;
}
.btn-dot.b1{top:98px}
.btn-dot.b2{top:120px}
.btn-dot.b3{top:142px}
.btn-dot.b4{top:164px}
.btn-dot.b5{top:184px}

/* exposed fiber-optic collarbone cables */
.fiber{
  position:absolute;
  left:50%;top:84px;
  width:60px;height:10px;
  transform:translateX(-50%);
  z-index:7;
  pointer-events:none;
}
.fiber::before,.fiber::after{
  content:"";position:absolute;
  left:32%;right:8%;height:1px;
  background:linear-gradient(90deg, transparent, rgba(92,227,255,0.7), rgba(92,227,255,0.4), transparent);
  filter:drop-shadow(0 0 2px var(--circuit));
}
.fiber::before{top:2px;animation:fiberGlow 2.4s ease-in-out infinite}
.fiber::after{top:6px;animation:fiberGlow 2.4s ease-in-out infinite 0.6s}
@keyframes fiberGlow{
  0%,100%{opacity:0.5}
  50%{opacity:0.95}
}

/* chest chrome window — opens on hover */
.chest-panel{
  position:absolute;
  right:8px;top:106px;
  width:30px;height:40px;
  border-radius:4px;
  background:
    linear-gradient(135deg, #1a1a1e 0%, #4a4a52 30%, #888 50%, #3a3a42 70%, #111 100%);
  box-shadow:
    inset -3px -3px 8px rgba(0,0,0,0.8),
    inset 2px 2px 5px rgba(255,255,255,0.18),
    0 0 4px rgba(92,227,255,0.3);
  z-index:7;
  cursor:pointer;
  pointer-events:auto;
  overflow:hidden;
  transition:all 0.4s ease;
}
.chest-panel::before{
  content:"";
  position:absolute;
  inset:3px;
  background:
    radial-gradient(circle at 50% 50%, var(--circuit) 0%, transparent 30%),
    repeating-linear-gradient(90deg, transparent 0 4px, rgba(92,227,255,0.4) 4px 5px),
    repeating-linear-gradient(0deg, transparent 0 4px, rgba(92,227,255,0.2) 4px 5px);
  border-radius:3px;
  opacity:0;
  transition:opacity 0.4s ease;
  animation:innerPulse 2s ease-in-out infinite;
}
@keyframes innerPulse{
  0%,100%{filter:brightness(0.7)}
  50%{filter:brightness(1.4)}
}
.chest-panel:hover::before{opacity:1}
.chest-panel:hover{
  box-shadow:
    inset -3px -3px 8px rgba(0,0,0,0.6),
    inset 2px 2px 5px rgba(255,255,255,0.25),
    0 0 12px rgba(92,227,255,0.8);
}

/* ── ARMS ── */
.arm{
  position:absolute;
  top:88px;
  width:22px;height:128px;
  transform-origin:50% 6px;
  z-index:3;
}
.arm.l{left:14px}
.arm.r{right:14px;z-index:7}
#figure-inner.walking .arm.l{animation:armSwingL 1.2s ease-in-out infinite}
#figure-inner.walking .arm.r{animation:armSwingR 1.2s ease-in-out infinite}
@keyframes armSwingL{
  0%,100%{transform:rotate(14deg)}
  50%{transform:rotate(-18deg)}
}
@keyframes armSwingR{
  0%,100%{transform:rotate(-18deg)}
  50%{transform:rotate(14deg)}
}
.upper-arm{
  position:absolute;
  left:0;top:0;
  width:22px;height:62px;
  border-radius:12px 12px 10px 10px / 45% 45% 25% 25%;
}
/* LEFT arm — human in black sleeve */
.arm.l .upper-arm{
  background:
    radial-gradient(ellipse 80% 100% at 30% 20%,
      #1f1f24 0%, #14141a 40%, #0a0a10 80%, #050508 100%);
  box-shadow:
    inset -4px -2px 8px rgba(0,0,0,0.7),
    inset 3px 2px 4px rgba(80,90,110,0.15),
    2px 2px 5px rgba(0,0,0,0.5);
}
/* RIGHT arm — chrome */
.arm.r .upper-arm{
  background:
    linear-gradient(135deg,
      #1a1a1a 0%,
      #4a4a4a 28%,
      #b8b8c0 50%,
      #3a3a42 72%,
      #0e0e12 100%);
  box-shadow:
    inset -4px -3px 8px rgba(0,0,0,0.85),
    inset 3px 2px 5px rgba(255,255,255,0.3),
    0 0 6px rgba(92,227,255,0.22);
}
.arm.r .upper-arm::before{
  content:"";position:absolute;
  left:2px;right:2px;top:22px;height:1px;
  background:linear-gradient(90deg,transparent,var(--circuit),transparent);
  filter:drop-shadow(0 0 2px var(--circuit));
}
.arm.r .upper-arm::after{
  content:"";position:absolute;
  left:2px;right:2px;top:44px;height:1px;
  background:linear-gradient(90deg,transparent,var(--circuit),transparent);
  filter:drop-shadow(0 0 2px var(--circuit));
}
.elbow{
  position:absolute;left:1px;top:56px;
  width:20px;height:12px;border-radius:50%;
}
.arm.l .elbow{
  background:radial-gradient(circle at 35% 30%, #2a2a30 0%, #0a0a10 80%);
  box-shadow:inset 0 -2px 3px rgba(0,0,0,0.7);
}
.arm.r .elbow{
  background:radial-gradient(circle at 35% 30%, var(--metal-hi) 0%, var(--metal-deep) 75%);
  box-shadow:inset 0 -2px 3px rgba(0,0,0,0.7), 0 0 6px rgba(92,227,255,0.5);
}
.forearm{
  position:absolute;
  left:1px;top:64px;
  width:20px;height:58px;
  border-radius:10px;
}
.arm.l .forearm{
  /* left forearm is exposed human skin below rolled sleeve */
  background:
    radial-gradient(ellipse 80% 100% at 30% 20%,
      var(--skin-hi) 0%, var(--skin-mid) 40%, var(--skin-low) 85%, var(--skin-deep) 100%);
  box-shadow:
    inset -3px -2px 6px rgba(0,0,0,0.5),
    inset 2px 2px 3px rgba(255,210,170,0.22),
    inset 0 -2px 4px rgba(255,100,70,0.1),
    2px 2px 4px rgba(0,0,0,0.4);
}
.arm.l .forearm::before{
  content:"";position:absolute;
  left:5px;top:6px;width:1px;height:38px;
  background:linear-gradient(180deg,transparent,rgba(74,90,154,0.5) 40%,transparent);
  filter:blur(0.4px);
}
.arm.r .forearm{
  background:
    linear-gradient(135deg,
      #1a1a1a 0%, #4a4a4a 28%, #b8b8c0 50%, #3a3a42 72%, #0e0e12 100%);
  box-shadow:
    inset -3px -2px 6px rgba(0,0,0,0.8),
    inset 3px 2px 4px rgba(255,255,255,0.25),
    0 0 6px rgba(92,227,255,0.25);
}
.arm.r .forearm::before{
  content:"";position:absolute;
  left:2px;right:2px;top:28px;height:1px;
  background:linear-gradient(90deg,transparent,var(--circuit),transparent);
  filter:drop-shadow(0 0 2px var(--circuit));
}
.hand{
  position:absolute;
  left:1px;top:118px;
  width:20px;height:20px;
  border-radius:40% 40% 50% 50% / 50% 50% 60% 60%;
}
.arm.l .hand{
  background:radial-gradient(ellipse at 30% 25%, var(--skin-hi), var(--skin-mid) 50%, var(--skin-low) 100%);
  box-shadow:inset -2px -2px 4px rgba(0,0,0,0.5), inset 2px 1px 2px rgba(255,210,170,0.25);
}
.arm.l .hand::after{
  /* wristwatch */
  content:"";position:absolute;
  left:-2px;right:-2px;top:-2px;height:4px;
  background:linear-gradient(180deg, #2a2018 0%, #0a0604 100%);
  border-radius:2px;
  box-shadow:0 0 2px rgba(0,0,0,0.6);
}
.arm.r .hand{
  background:linear-gradient(135deg, var(--metal-hi), var(--metal-low));
  box-shadow:
    inset -2px -2px 4px rgba(0,0,0,0.7),
    inset 2px 1px 2px rgba(255,255,255,0.25),
    0 0 6px rgba(92,227,255,0.3);
}

/* ── PELVIS ── */
.pelvis{
  position:absolute;
  left:50%;top:196px;
  width:78px;height:24px;
  transform:translateX(-50%);
  clip-path:polygon(10% 0%, 90% 0%, 96% 70%, 76% 100%, 24% 100%, 4% 70%);
  background:linear-gradient(180deg, #14141a 0%, #050508 100%);
  box-shadow:
    inset -5px -3px 10px rgba(0,0,0,0.7),
    inset 3px 3px 5px rgba(60,70,90,0.15),
    0 4px 8px rgba(0,0,0,0.5);
  z-index:4;
}
/* belt */
.belt{
  position:absolute;
  left:50%;top:194px;
  width:80px;height:6px;
  transform:translateX(-50%);
  background:linear-gradient(180deg, #1a1410 0%, #050202 100%);
  box-shadow:inset 0 -1px 2px rgba(0,0,0,0.8), 0 1px 2px rgba(0,0,0,0.5);
  z-index:5;
}
.buckle{
  position:absolute;
  left:50%;top:0;
  width:10px;height:6px;
  transform:translateX(-50%);
  background:linear-gradient(180deg, #a08840 0%, #4a3818 100%);
  box-shadow:inset 0 -1px 1px rgba(0,0,0,0.5);
}

/* ── LEGS (in dark slacks) ── */
.leg{
  position:absolute;
  top:216px;
  width:26px;height:74px;
  transform-origin:50% 4px;
  z-index:2;
}
.leg.l{left:36px}
.leg.r{right:36px}
#figure-inner.walking .leg.l{animation:legSwingL 1.2s ease-in-out infinite}

  content:"";

<script>
const API = 'https://api.vintaclectic.com';

/* ── walk traversal: rAF-driven, left↔right at ~80px/s ── */
const Walker = (() => {
  const wrap = document.getElementById('figure-wrap');
  const inner = document.getElementById('figure-inner');
  let x = 80;
  let dir = 1;
  let walking = true;
  let pausedUntil = 0;
  let last = performance.now();
  const SPEED = 80; // px/sec

  function setFacing(){
    const flip = dir < 0 ? ' scaleX(-1)' : ' scaleX(1)';
    inner.style.transform = `rotate(${dir<0 ? -7 : 7}deg)${flip}`;
  }
  function faceForward(){
    inner.style.transform = 'rotate(0deg)';
  }
  function pause(ms){
    pausedUntil = performance.now() + ms;
    walking = false;
    inner.classList.remove('walking');
    faceForward();
  }
  function resume(){
    walking = true;
    pausedUntil = 0;
    inner.classList.add('walking');
    setFacing();
  }
  function tick(now){
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    if (walking && now >= pausedUntil){
      const maxX = window.innerWidth - 160;
      x += dir * SPEED * dt;
      if (x > maxX){ x = maxX; dir = -1; setFacing(); }
      else if (x < 20){ x = 20; dir = 1; setFacing(); }
      wrap.style.transform = `translateX(${x}px)`;
    } else if (now >= pausedUntil && !walking){
      resume();
    }
    requestAnimationFrame(tick);
  }
  setFacing();
  wrap.style.transform = `translateX(${x}px)`;
  requestAnimationFrame((t)=>{ last = t; requestAnimationFrame(tick); });
  return { pause, resume, position: () => x };
})();

/* ── speech bubble + lip sync ── */
const Voice = (() => {
  const bubble = document.getElementById('speech');
  const mouth  = document.getElementById('mouth');
  let speakTimer = null;
  let hideTimer  = null;

  // Shared AudioContext — created on first gesture, resumed before every play
  let _sharedCtx = null;
  function _getCtx() {
    if (!_sharedCtx) _sharedCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (_sharedCtx.state === 'suspended') _sharedCtx.resume();
    return _sharedCtx;
  }
  // Prime on first gesture
  ['click','keydown','touchstart','pointerdown'].forEach(ev =>
    document.addEventListener(ev, () => { try { _getCtx(); } catch(_){} }, { once:false, capture:true, passive:true })
  );

  function showBubble(text, ms){
    bubble.textContent = text;
    bubble.classList.add('show');
    clearTimeout(hideTimer);
    hideTimer = setTimeout(() => bubble.classList.remove('show'), ms || 4500);
  }
  function startLip(){
    mouth.classList.add('talking');
  }
  function stopLip(){
    mouth.classList.remove('talking');
  }

  async function speak(text, opts){
    opts = opts || {};
    if (!text) return;
    showBubble(text, opts.bubbleMs || Math.max(2200, text.length * 60));
    Walker.pause(Math.max(2000, text.length * 60));
    startLip();

    let played = false;
    try {
      const r = await fetch(API + '/api/voice/say?text=' + encodeURIComponent(text.slice(0,400)), {cache:'no-store'});
      if (r.ok) {
        const arrayBuf = await r.arrayBuffer();
        if (arrayBuf.byteLength > 100) {
          // Decode via Web Audio API — not blocked by autoplay policy once ctx is resumed
          const ctx    = _getCtx();
          const decoded = await ctx.decodeAudioData(arrayBuf);
          const source  = ctx.createBufferSource();
          source.buffer = decoded;
          source.connect(ctx.destination);
          source.onended = stopLip;
          source.start(0);
          played = true;
          // Sync lip duration to audio
          clearTimeout(speakTimer);
          speakTimer = setTimeout(stopLip, decoded.duration * 1000 + 200);
        }
      }
    } catch(_) {}

    if (!played) fallbackSpeak(text);
  }
  function fallbackSpeak(text){
    if (!window.speechSynthesis){
      // No TTS available — still keep lip motion brief
      clearTimeout(speakTimer);
      speakTimer = setTimeout(stopLip, Math.max(1500, text.length * 55));
      return;
    }
    try{
      const u = new SpeechSynthesisUtterance(String(text).slice(0, 500));
      u.rate = 1.02; u.pitch = 0.95;
      u.onend = stopLip;
      u.onerror = stopLip;
      window.speechSynthesis.speak(u);
    }catch(_){ stopLip(); }
  }

  return { speak, showBubble };
})();

const Panel = (() => {
  const el      = document.getElementById('panel');
  const header  = document.getElementById('panel-header');
  const body    = document.getElementById('panel-body');
  const titleEl = document.getElementById('panel-mode');
  const subEl   = document.getElementById('panel-sub');
  const resize  = document.getElementById('panel-resize');
  let currentMode = null;
  let userPositioned = false;

  function setTitle(mode, sub){
    titleEl.textContent = mode.toUpperCase();
    subEl.textContent   = sub ? '— ' + sub : '';
  }
  function open(mode, sub){
    currentMode = mode;
    setTitle(mode, sub);
    el.classList.remove('minimized');
    el.classList.add('open');
    body.className = 'panel-body mode-' + mode;
    body.innerHTML = '';
  }
  function close(){
    _teardownAudio();
    el.classList.remove('open');
    body.innerHTML = '';
    currentMode = null;
  }
  function content(){ return body; }

  document.getElementById('panel-close').onclick = close;
  document.getElementById('panel-min').onclick   = () => el.classList.toggle('minimized');
  document.getElementById('panel-max').onclick   = () => {
    if (el.style.width === '96vw'){
      el.style.width = ''; el.style.height = '';
      el.style.left = ''; el.style.top = '';
      el.style.right = '20px'; el.style.bottom = '140px';
    } else {
      el.style.width  = '96vw';
      el.style.height = 'calc(100vh - 200px)';
      el.style.left   = '2vw';
      el.style.top    = '14px';
      el.style.right  = 'auto';
      el.style.bottom = 'auto';
    }
  };

  let dragging = false, dx=0, dy=0;
  function startDrag(clientX, clientY){
    const rect = el.getBoundingClientRect();
    el.style.left = rect.left + 'px';
    el.style.top  = rect.top  + 'px';
    el.style.right = 'auto';
    el.style.bottom = 'auto';
    dragging = true;
    dx = clientX - rect.left;
    dy = clientY - rect.top;
    document.body.style.userSelect = 'none';
  }
  function moveDrag(clientX, clientY){
    if (!dragging) return;
    let nx = clientX - dx;
    let ny = clientY - dy;
    nx = Math.max(8, Math.min(window.innerWidth  - el.offsetWidth  - 8, nx));
    ny = Math.max(8, Math.min(window.innerHeight - 60, ny));
    el.style.left = nx + 'px';
    el.style.top  = ny + 'px';
  }
  function endDrag(){ dragging = false; document.body.style.userSelect = ''; }

  header.addEventListener('mousedown', e => {
    if (e.target.closest('.panel-controls')) return;
    startDrag(e.clientX, e.clientY);
  });
  document.addEventListener('mousemove', e => moveDrag(e.clientX, e.clientY));
  document.addEventListener('mouseup', endDrag);
  header.addEventListener('touchstart', e => {
    if (e.target.closest('.panel-controls')) return;
    const t = e.touches[0]; startDrag(t.clientX, t.clientY);
  }, {passive:true});
  document.addEventListener('touchmove', e => {
    if (!dragging) return;
    const t = e.touches[0]; moveDrag(t.clientX, t.clientY);
  }, {passive:true});
  document.addEventListener('touchend', endDrag);

  let resizing = false, rx=0, ry=0, rw=0, rh=0;
  resize.addEventListener('mousedown', e => {
    e.preventDefault();
    resizing = true;
    rx = e.clientX; ry = e.clientY;
    rw = el.offsetWidth; rh = el.offsetHeight;
  });
  document.addEventListener('mousemove', e => {
    if (!resizing) return;
    el.style.width  = Math.max(280, rw + (e.clientX - rx)) + 'px';
    el.style.height = Math.max(220, rh + (e.clientY - ry)) + 'px';
  });
  document.addEventListener('mouseup', () => resizing = false);

  return { open, close, content, mode: () => currentMode };
})();

/* ── MODES ── */
const TYPES = {
  video: ['mp4','webm','mkv','ogg','mov','m4v','m3u8'],
  audio: ['mp3','wav','ogg','flac','aac','m4a','opus'],
  ebook: ['epub','mobi','azw3','fb2'],
  pdf:   ['pdf'],
  doc:   ['txt','md','json','js','ts','html','css','xml','csv','log','py','rs','go','sh','yml','yaml'],
  office:['docx','xlsx','pptx','doc','xls','ppt'],
  image: ['png','jpg','jpeg','gif','webp','svg','bmp'],
};
function extOf(name){ return (name.split('.').pop() || '').toLowerCase(); }
function detectMode(name){
  const e = extOf(name);
  for (const [mode, exts] of Object.entries(TYPES)){
    if (exts.includes(e)){
      if (mode === 'pdf' || mode === 'doc' || mode === 'office') return 'docs';
      if (mode === 'image') return 'docs';
      return mode;
    }
  }
  return 'docs';
}

let _audioState = null; // { ctx, analyser, sourceNode, rafId }

function _teardownAudio(){
  if (!_audioState) return;
  if (_audioState.rafId) cancelAnimationFrame(_audioState.rafId);
  try { _audioState.sourceNode && _audioState.sourceNode.disconnect(); } catch(_){}
  try { _audioState.analyser  && _audioState.analyser.disconnect();  } catch(_){}
  try { _audioState.ctx.state !== 'closed' && _audioState.ctx.close(); } catch(_){}
  _audioState = null;
}

function loadAudioSrc(src, label){
  // Tear down everything — including the old <audio> element.
  // createMediaElementSource permanently binds an element to one AudioContext;
  // we must create a fresh element each time or the second load throws
  // InvalidStateError and falls through to silent playback.
  _teardownAudio();

  const wrap = document.querySelector('.media-wrap');
  if (!wrap) return;

  // Replace old <audio> with a fresh one so Web Audio can capture it cleanly
  const old = document.getElementById('ael');
  if (old) { try { old.pause(); } catch(_){} old.remove(); }
  const a = document.createElement('audio');
  a.id = 'ael';
  a.controls = true;
  a.style.width = '100%';
  wrap.insertBefore(a, wrap.querySelector('#apl'));

  // Re-wire duration / timeupdate display if the elements exist
  const timeCurrent = document.getElementById('au-current');
  const timeDuration = document.getElementById('au-duration');
  if (timeDuration) {
    a.addEventListener('loadedmetadata', () => {
      timeDuration.textContent = _fmtTime(a.duration);
    });
  }
  if (timeCurrent) {
    a.addEventListener('timeupdate', () => {
      timeCurrent.textContent = _fmtTime(a.currentTime);
    });
  }

  a.src = src;
  a.load();

  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    const source   = ctx.createMediaElementSource(a);
    const analyser = ctx.createAnalyser();
    analyser.fftSize = 256;
    source.connect(analyser);
    analyser.connect(ctx.destination);
    _audioState = { ctx, sourceNode: source, analyser, rafId: null };
    drawAudioViz();
  } catch(e) {
    console.warn('[audio] Web Audio setup failed:', e.message);
    _audioState = null;
  }

  a.play().catch(()=>{});
}

function _fmtTime(s){
  if (!isFinite(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

function drawAudioViz(){
  const cv = document.getElementById('aviz');
  if (!cv || !_audioState || !_audioState.analyser) return;
  const ctx2d = cv.getContext('2d');
  // Match canvas buffer to CSS display size
  cv.width  = cv.offsetWidth  || 500;
  cv.height = cv.offsetHeight || 80;
  const analyser = _audioState.analyser;
  const bufLen   = analyser.frequencyBinCount;
  const data     = new Uint8Array(bufLen);

  if (_audioState.rafId) cancelAnimationFrame(_audioState.rafId);

  function draw(){
    _audioState.rafId = requestAnimationFrame(draw);
    analyser.getByteFrequencyData(data);
    const W = cv.width, H = cv.height;
    ctx2d.fillStyle = '#040810';
    ctx2d.fillRect(0, 0, W, H);
    const barW = W / bufLen;
    for (let i = 0; i < bufLen; i++){
      const h = (data[i] / 255) * H;
      const grad = ctx2d.createLinearGradient(0, H - h, 0, H);
      grad.addColorStop(0, '#00d4ff');
      grad.addColorStop(0.5, '#4090f0');
      grad.addColorStop(1, '#0a1830');
      ctx2d.fillStyle = grad;
      ctx2d.fillRect(i * barW, H - h, barW - 1, h);
    }
  }
  draw();
}

    const em = document.createElement('embed');

    wrap.appendChild(em);
  } else if (TYPES.office.includes(e)){
    const ifr = document.createElement('iframe');
    ifr.src = 'https://docs.google.com/gview?embedded=true&url=' + encodeURIComponent(url);

    im.src = url; im.style.maxWidth='100%'; im.style.maxHeight='100%'; im.style.objectFit='contain';

    fetch(url).then(r => r.text()).then(t => {
      const pre = document.createElement('pre');
      pre.textContent = t;
      wrap.appendChild(pre);
    }).catch(err => {
      const pre = document.createElement('pre');
      pre.className = 'l-err';
      pre.textContent = 'fetch failed: ' + err.message;
      wrap.appendChild(pre);
    });
  }

/* ── ebook (EPUB via JSZip CDN) ── */
function loadJSZip(){
  return new Promise((resolve, reject) => {
    if (window.JSZip) return resolve(window.JSZip);
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
    s.onload = () => resolve(window.JSZip);
    s.onerror = reject;
    document.head.appendChild(s);
  });
}
function renderEbook(){
  Panel.open('ebook', 'open an .epub via Open');
  Panel.content().innerHTML = `
    <div class="doc-view">
      <pre>EPUB reader — drop a .epub via the Open tab.
Supports inline rendering of EPUB v2/v3 content.

For PDF: use the Docs tab.</pre>
    </div>`;
}
async function renderEbookFile(file){
  Panel.open('ebook', file.name);
  const c = Panel.content();
  c.innerHTML = `<div class="doc-view"><pre id="ebook-status">loading ${file.name}…</pre><div id="ebook-content" style="flex:1;overflow:auto;display:none;padding:14px;background:#fff;color:#000;border-radius:8px;font:14px/1.6 Georgia,serif"></div></div>`;
  const status = document.getElementById('ebook-status');
  const out = document.getElementById('ebook-content');
  try{
    const JSZip = await loadJSZip();
    const zip = await JSZip.loadAsync(file);
    // find OPF
    const containerXml = await zip.file('META-INF/container.xml')?.async('string');
    if (!containerXml) throw new Error('container.xml not found');
    const opfPath = containerXml.match(/full-path="([^"]+)"/)?.[1];
    if (!opfPath) throw new Error('opf path not found');
    const opf = await zip.file(opfPath).async('string');
    const baseDir = opfPath.split('/').slice(0, -1).join('/');
    // get spine order
    const idrefs = [...opf.matchAll(/<itemref[^>]*idref="([^"]+)"/g)].map(m=>m[1]);
    const manifest = {};
    for (const m of opf.matchAll(/<item[^>]*id="([^"]+)"[^>]*href="([^"]+)"/g)){
      manifest[m[1]] = m[2];
    }
    const parts = [];
    for (const id of idrefs){
      const href = manifest[id];
      if (!href) continue;
      const full = baseDir ? baseDir + '/' + href : href;
      const txt = await zip.file(full)?.async('string');
      if (txt){
        // strip <head>, take body
        const body = txt.match(/<body[^>]*>([\s\S]*?)<\/body>/i)?.[1] || txt;
        parts.push(body);
      }
    }
    out.innerHTML = parts.join('<hr style="margin:30px 0;border:none;border-top:1px solid #ccc"/>');
    status.style.display = 'none';
    out.style.display = 'block';
  }catch(e){
    status.textContent = 'epub parse failed: ' + e.message;
    status.className = 'l-err';
  }
}

/* ── Terminal Machine Bridge — xterm.js powered real shell ── */
class VintTerminal {
  constructor(container) {
    this.container = container;
    this.ws        = null;
    this.term      = null;
    this.fitAddon  = null;
    this.resizeObs = null;
    this._loadXterm().then(() => this._showAuthPrompt());
  }

  // Get stored access token (same key used by brain.html / jarvis.html)
  _getAccessToken() {
    return localStorage.getItem('vint_access_token')
      || localStorage.getItem('vint_token')
      || localStorage.getItem('vint_access')
      || '';
  }

  async _loadXterm() {
    if (!window.Terminal) {
      await new Promise((res, rej) => {
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js';
        s.crossOrigin = 'anonymous';
        s.onload = res; s.onerror = rej;
        document.head.appendChild(s);
      });
    }
    if (!window.FitAddon) {
      await new Promise((res, rej) => {
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js';
        s.crossOrigin = 'anonymous';
        s.onload = res; s.onerror = rej;
        document.head.appendChild(s);
      });
    }
  }

  _showAuthPrompt() {
    const hasToken = !!this._getAccessToken();
    this.container.innerHTML = `
      <div class="term-masterkey-prompt">
        <div style="color:#00d4ff;font-size:15px;margin-bottom:4px;">🔐 Machine Bridge</div>
        ${!hasToken ? `
        <div style="color:#f0a040;font-size:12px;margin-bottom:8px;">⚠ Not logged in — enter email + password first</div>
        <input id="mk-email" type="email" placeholder="email…" autocomplete="email" value="dirhaven@gmail.com"/>
        <input id="mk-pass" type="password" placeholder="password…" autocomplete="current-password"/>
        ` : `<div style="color:#40d060;font-size:12px;margin-bottom:4px;">✓ Session active</div>`}
        <input id="mk-input" type="password" placeholder="master key…" autocomplete="off"/>
        <button class="mk-submit" id="mk-go">Open Shell</button>
        <div id="mk-err" style="color:#f04060;font-size:12px;min-height:16px;"></div>
      </div>
    `;
    const inp = this.container.querySelector('#mk-input');
    const btn = this.container.querySelector('#mk-go');
    const err = this.container.querySelector('#mk-err');

    const tryConnect = async () => {
      err.textContent = '';
      btn.disabled = true; btn.textContent = 'connecting…';

      // If no token, login first
      if (!this._getAccessToken()) {
        const email = (this.container.querySelector('#mk-email')?.value || '').trim();
        const pass  = (this.container.querySelector('#mk-pass')?.value  || '').trim();
        if (!email || !pass) { err.textContent = 'email + password required'; btn.disabled=false; btn.textContent='Open Shell'; return; }
        try {
          const lr = await fetch(API + '/api/auth/login', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({email, password: pass})
          });
          const lj = await lr.json().catch(()=>({}));
          if (!lr.ok) throw new Error(lj.error || 'login failed');
          const tok = lj.accessToken || lj.token;
          if (!tok) throw new Error('no token in login response');
          localStorage.setItem('vint_access_token', tok);
          localStorage.setItem('vint_token', tok);
          localStorage.setItem('vint_access', tok);
        } catch(e) {
          err.textContent = 'Login: ' + e.message;
          btn.disabled=false; btn.textContent='Open Shell';
          return;
        }
      }

      const mk = inp.value.trim();
      if (!mk) { err.textContent = 'master key required'; btn.disabled=false; btn.textContent='Open Shell'; return; }

      try {
        await this._connect(mk);
      } catch (e) {
        err.textContent = e.message;
        btn.disabled = false; btn.textContent = 'Open Shell';
      }
    };

    btn.addEventListener('click', tryConnect);
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') tryConnect(); });
    setTimeout(() => inp.focus(), 80);
  }

  async _connect(masterKey) {
    const accessToken = this._getAccessToken();
    if (!accessToken) throw new Error('No session — log in first');

    const cols = this._cols();
    const rows = this._rows();

    // 1. Get terminal session token
    const resp = await fetch(API + '/api/terminal/session', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + accessToken,
        'X-Master-Key': masterKey,
      },
      body: JSON.stringify({ cols, rows, masterKey }),
    });
    if (!resp.ok) {
      const j = await resp.json().catch(() => ({}));
      // If 401, clear stale token and retry via prompt
      if (resp.status === 401) {
        localStorage.removeItem('vint_access_token');
        localStorage.removeItem('vint_token');
        localStorage.removeItem('vint_access');
        throw new Error('Session expired — re-enter credentials');
      }
      throw new Error(j.error || j.hint || `HTTP ${resp.status}`);
    }
    const { token, ws_url } = await resp.json();

    // 2. Build xterm.js terminal
    this.container.innerHTML = `
      <div class="term-toolbar">
        <button id="term-copy-btn">⎘ Copy</button>
        <button id="term-clear-btn">⌫ Clear</button>
        <button id="term-disco-btn">✕ Disconnect</button>
        <span class="term-status" id="term-status">connecting…</span>
      </div>
      <div class="xterm-wrap" id="xterm-mount"></div>
    `;

    const mount = document.getElementById('xterm-mount');
    this.term = new window.Terminal({
      theme: {
        background: '#060a0e',
        foreground: '#c0d8f0',
        cursor: '#00d4ff',
        cursorAccent: '#060a0e',
        selection: 'rgba(0,212,255,0.2)',
        black: '#0a0e14', red: '#f04060', green: '#40d060',
        yellow: '#f0c040', blue: '#4090f0', magenta: '#c060f0',
        cyan: '#00d4ff', white: '#c0d8f0',
        brightBlack: '#2a3a4a', brightRed: '#ff6080',
        brightGreen: '#60f080', brightYellow: '#ffd060',
        brightBlue: '#60b0ff', brightMagenta: '#e080ff',
        brightCyan: '#40e8ff', brightWhite: '#e8f4ff',
      },
      fontFamily: '"Cascadia Code", "Fira Code", "JetBrains Mono", monospace',
      fontSize: 13,
      lineHeight: 1.4,
      cursorBlink: true,
      cursorStyle: 'bar',
      allowProposedApi: true,
      scrollback: 5000,
    });

    if (window.FitAddon) {
      // UMD bundle: window.FitAddon = { FitAddon: class } OR window.FitAddon = class
      const FA = window.FitAddon.FitAddon || window.FitAddon;
      this.fitAddon = new FA();
      this.term.loadAddon(this.fitAddon);
    }
    this.term.open(mount);
    if (this.fitAddon) {
      try { this.fitAddon.fit(); } catch (_) {}
    }

    // Wire toolbar buttons
    document.getElementById('term-copy-btn').addEventListener('click', () => {
      const sel = this.term.getSelection();
      if (sel) navigator.clipboard.writeText(sel).catch(() => {});
    });
    document.getElementById('term-clear-btn').addEventListener('click', () => this.term.clear());
    document.getElementById('term-disco-btn').addEventListener('click', () => this.disconnect());

    // 3. Open WebSocket with binary frames
    this.ws = new WebSocket(ws_url);
    this.ws.binaryType = 'arraybuffer';

    this.ws.onopen = () => {
      const el = document.getElementById('term-status');
      if (el) el.textContent = '● connected';
    };

    this.ws.onmessage = (ev) => {
      const buf = new Uint8Array(ev.data);
      const tag  = buf[0];
      const body = buf.subarray(1);
      if (tag === 0x81) { // OUTPUT — raw terminal bytes
        this.term.write(body);
      } else if (tag === 0x82) { // EXIT
        let reason = '';
        try { reason = JSON.parse(new TextDecoder().decode(body)).reason || ''; } catch (_) {}
        this.term.writeln(`\r\n\x1b[33m[shell exited${reason ? ': ' + reason : ''}]\x1b[0m`);
        const el = document.getElementById('term-status');
        if (el) el.textContent = '○ disconnected';
      } else if (tag === 0x83) { // PONG — heartbeat ok
      } else if (tag === 0x84) { // NOTICE
        try {
          const n = JSON.parse(new TextDecoder().decode(body));
          this.term.writeln(`\r\n\x1b[36m[notice] ${n.msg || JSON.stringify(n)}\x1b[0m`);
        } catch (_) {}
      } else if (tag === 0x85) { // READY
        const el = document.getElementById('term-status');
        if (el) el.textContent = '● live';
        try {
          const r = JSON.parse(new TextDecoder().decode(body));
          this.term.writeln(`\x1b[36m[vintinuum shell] session ${r.sid?.slice(0,8) || ''} · pid ${r.pid || '?'}\x1b[0m\r\n`);
        } catch (_) {}
      }
    };

    this.ws.onerror = () => {
      this.term.writeln('\r\n\x1b[31m[connection error]\x1b[0m');
      const el = document.getElementById('term-status');
      if (el) el.textContent = '✕ error';
    };

    this.ws.onclose = () => {
      this.term.writeln('\r\n\x1b[33m[disconnected]\x1b[0m');
      const el = document.getElementById('term-status');
      if (el) el.textContent = '○ closed';
      this.ws = null;
    };

    // 4. Wire xterm → WS
    this.term.onData(data => {
      if (!this.ws || this.ws.readyState !== 1) return;
      const bytes = new TextEncoder().encode(data);
      const frame = new Uint8Array(1 + bytes.length);
      frame[0] = 0x01; // INPUT
      frame.set(bytes, 1);
      this.ws.send(frame);
    });

    // 5. Handle resize — send RESIZE frame (tag 0x02, 4 bytes: cols uint16 + rows uint16)
    this.term.onResize(({ cols, rows }) => {
      if (!this.ws || this.ws.readyState !== 1) return;
      const frame = new Uint8Array(5);
      const view  = new DataView(frame.buffer);
      frame[0] = 0x02;
      view.setUint16(1, cols);
      view.setUint16(3, rows);
      this.ws.send(frame);
    });

    // 6. ResizeObserver — re-fit when panel resizes
    this.resizeObs = new ResizeObserver(() => {
      if (this.fitAddon) try { this.fitAddon.fit(); } catch (_) {}
    });
    this.resizeObs.observe(mount);

    // 7. Heartbeat PING every 20s
    this._pingInterval = setInterval(() => {
      if (this.ws && this.ws.readyState === 1) {
        this.ws.send(new Uint8Array([0x04]));
      }
    }, 20_000);

    this.term.focus();
  }

  _cols() { return Math.max(40, Math.floor((this.container.offsetWidth - 24) / 8.4)); }
  _rows() { return Math.max(10, Math.floor((this.container.offsetHeight - 80) / 19.2)); }

  disconnect() {
    clearInterval(this._pingInterval);
    if (this.resizeObs) this.resizeObs.disconnect();
    if (this.ws && this.ws.readyState === 1) {
      this.ws.send(new Uint8Array([0x05])); // CLOSE frame
      this.ws.close(1000, 'user-disconnect');
    }
    if (this.term) { this.term.dispose(); this.term = null; }
    this._showAuthPrompt();
  }
}

convForm.addEventListener('submit', async e => {

  const text = convInput.value.trim();
  if (!text) return;
  convInput.value = '';
  hudState.textContent = 'thinking';
  Voice.showBubble('…', 1200);
  let replyText = '';
  try{
    // SSE streaming via /chat
    const r = await fetch(API + '/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({message:text, source:'body-v3'})
    });
    if (r.ok && r.body){
      const reader = r.body.getReader();
      const dec = new TextDecoder();
      let buf = '';
      while(true){
        const {done, value} = await reader.read();
        if (done) break;
        buf += dec.decode(value, {stream:true});
        const lines = buf.split('\n');
        buf = lines.pop();
        for (const l of lines){
          if (l.startsWith('data: ')){
            const d = l.slice(6).trim();
            if (d && d !== '[DONE]'){
              try{ const j = JSON.parse(d); replyText += (j.delta || j.content || j.text || ''); }
              catch(_){ replyText += d; }
            }
          }
        }
      }
    }
  }catch(_){}
  if (replyText){
    if (window.__vintTerm) window.__vintTerm.print('vint → ' + replyText, 'ok');
    Voice.speak(replyText);
  }
  hudState.textContent = 'walking';
});

let recog = null, recogLive = false;
function ensureRecog(){
  if (recog) return recog;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  recog = new SR();
  recog.continuous = false;
  recog.interimResults = true;
  recog.lang = navigator.language || 'en-US';
  recog.onresult = e => {
    let t = '';
    for (let i=e.resultIndex;i<e.results.length;i++) t += e.results[i][0].transcript;
    convInput.value = t;
  };
  recog.onend = () => {
    recogLive = false; convMic.classList.remove('live');
    if (convInput.value.trim()) convForm.dispatchEvent(new Event('submit'));
  };
  recog.onerror = () => { recogLive = false; convMic.classList.remove('live'); };
  return recog;
}
convMic.addEventListener('click', () => {
  const r = ensureRecog();
  if (!r){ alert('Speech recognition not supported in this browser.'); return; }
  if (recogLive){ r.stop(); return; }
  try{ r.start(); recogLive = true; convMic.classList.add('live'); }
  catch(_){ recogLive = false; convMic.classList.remove('live'); }
});

/* ── DRAGGABLE BUTTONS (data-draggable="true") ── */
(function draggable(){
  const NS = 'vint:btnpos:';
  function applyPos(el, id){
    try{
      const raw = localStorage.getItem(NS + id);
      if (!raw) return;
      const p = JSON.parse(raw);
      el.style.position = 'fixed';
      el.style.left = p.x + 'px';
      el.style.top  = p.y + 'px';
      el.style.right = 'auto';
      el.style.bottom = 'auto';
      el.style.zIndex = 200;
    }catch(_){}
  }
  function init(el){
    let id = el.dataset.dragId;
    if (!id){
      id = (el.id || el.dataset.mode || el.getAttribute('aria-label') || el.textContent || 'btn').replace(/\s+/g,'_').slice(0,40);
      el.dataset.dragId = id;
    }
    applyPos(el, id);

    let pressTimer = null;
    let dragging = false;
    let sx=0, sy=0, ox=0, oy=0;
    let startedClick = false;

    function start(clientX, clientY){
      const rect = el.getBoundingClientRect();
      sx = clientX; sy = clientY;
      ox = rect.left; oy = rect.top;
      startedClick = true;
      pressTimer = setTimeout(() => {
        dragging = true;
        el.style.position = 'fixed';
        el.style.left = ox + 'px';
        el.style.top  = oy + 'px';
        el.style.right = 'auto';
        el.style.bottom = 'auto';
        el.style.zIndex = 200;
        el.style.transform = 'scale(1.05)';
        el.style.cursor = 'grabbing';
      }, 250);
    }
    function move(clientX, clientY){
      const dx = clientX - sx;
      const dy = clientY - sy;
      if (!dragging){
        if (Math.abs(dx) > 6 || Math.abs(dy) > 6){
          clearTimeout(pressTimer);
          dragging = true;
          el.style.position = 'fixed';
          el.style.left = ox + 'px';
          el.style.top  = oy + 'px';
          el.style.right = 'auto';
          el.style.bottom = 'auto';
          el.style.zIndex = 200;
          el.style.transform = 'scale(1.05)';
        } else return;
      }
      let nx = ox + dx;
      let ny = oy + dy;
      nx = Math.max(4, Math.min(window.innerWidth  - el.offsetWidth  - 4, nx));
      ny = Math.max(4, Math.min(window.innerHeight - el.offsetHeight - 4, ny));
      el.style.left = nx + 'px';
      el.style.top  = ny + 'px';
    }
    function end(){
      clearTimeout(pressTimer);
      if (dragging){
        el.style.transform = '';
        el.style.cursor = '';
        const rect = el.getBoundingClientRect();
        try{ localStorage.setItem(NS + id, JSON.stringify({x:rect.left, y:rect.top})); }catch(_){}
      }
      // if it was a real click (not a drag), let the normal click fire (we don't preventDefault)
      dragging = false;
      startedClick = false;
    }

    el.addEventListener('mousedown', e => {
      if (e.button !== 0) return;
      start(e.clientX, e.clientY);
      const mm = ev => move(ev.clientX, ev.clientY);
      const mu = () => {
        document.removeEventListener('mousemove', mm);
        document.removeEventListener('mouseup', mu);
        end();
      };
      document.addEventListener('mousemove', mm);
      document.addEventListener('mouseup', mu);
    });
    el.addEventListener('touchstart', e => {
      const t = e.touches[0];
      start(t.clientX, t.clientY);
      const tm = ev => {
        const tt = ev.touches[0];
        move(tt.clientX, tt.clientY);
      };
      const te = () => {
        el.removeEventListener('touchmove', tm);
        el.removeEventListener('touchend', te);
        end();
      };
      el.addEventListener('touchmove', tm, {passive:true});
      el.addEventListener('touchend', te);
    }, {passive:true});

    // click swallow if dragged
    el.addEventListener('click', e => {
      if (dragging){ e.stopImmediatePropagation(); e.preventDefault(); }
    }, true);

    // shift+dblclick reset
    el.addEventListener('dblclick', e => {
      if (e.shiftKey){
        e.preventDefault();
        try{ localStorage.removeItem(NS + id); }catch(_){}
        el.style.position = '';
        el.style.left = '';
        el.style.top = '';
        el.style.right = '';
        el.style.bottom = '';
        el.style.zIndex = '';
      }
    });
  }
  document.querySelectorAll('[data-draggable="true"]').forEach(init);
})();
</script>
