<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Vintinuum — Body v3.1</title>
<meta name="theme-color" content="#02030a" />
<link rel="icon" href="favicon.svg" />
<style>
/* ════════════════════════════════════════════════════════════════════════
   VINTINUUM BODY v3.1 — "ground-up rebuild"
   CSS 3D sculpted human-machine hybrid · real walk-cycle traversal ·
   holographic media dock · terminal w/ WS bridge scaffold.
   No SVG figure. No three.js. Single file.
   ──────────────────────────────────────────────────────────────────── */
:root{
  /* skin */
  --skin-hi:#f5d4ad;
  --skin-mid:#d4a075;
  --skin-low:#7a4527;
  --skin-deep:#3d1f0f;
  --sss:#ff7a55;            /* subsurface scatter */
  --lip:#a8444a;
  --vein:#4a5a9a;
  /* metal */
  --metal-hi:#e8ecf2;
  --metal:#a8b0bd;
  --metal-low:#4a525e;
  --metal-deep:#1a1e26;
  --carbon:#0e1014;
  /* circuit / glow */
  --circuit:#5ce3ff;
  --circuit-soft:#7ee0ff;
  --circuit-deep:#0a4860;
  /* heart */
  --blood:#c4202e;
  --blood-hi:#ff4555;
  --heart-deep:#5a0810;
  /* world */
  --night-0:#010206;
  --night-1:#04060e;
  --night-2:#0a1024;
  --night-3:#141a32;
  --hud:#7ec8ff;
  --hud-fg:#cfe8ff;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;height:100%;
  background:#000;
  color:var(--hud-fg);
  font-family:"Helvetica Neue","Inter",system-ui,Arial,sans-serif;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  touch-action:manipulation;
}
button{font-family:inherit;color:inherit}

/* ── Scene root ──────────────────────────────────────────────── */
#scene{
  position:fixed;inset:0;
  overflow:hidden;
  perspective:1800px;
  perspective-origin:50% 60%;
  background:
    radial-gradient(ellipse 70% 50% at 50% 105%, #0c1a3a 0%, transparent 60%),
    radial-gradient(ellipse 80% 40% at 50% -8%, #1a0a2e 0%, transparent 55%),
    radial-gradient(ellipse 30% 60% at 22% 38%, rgba(255,180,120,0.06) 0%, transparent 60%),
    linear-gradient(180deg, var(--night-0) 0%, var(--night-1) 40%, var(--night-2) 100%);
}

/* aurora */
.aurora{
  position:absolute;top:-15%;left:-25%;
  width:150%;height:55%;
  background:
    radial-gradient(ellipse 50% 100% at 22% 50%, #6aa8ff 0%, transparent 60%),
    radial-gradient(ellipse 55% 100% at 58% 42%, #b794f4 0%, transparent 65%),
    radial-gradient(ellipse 45% 100% at 84% 58%, #5eead4 0%, transparent 60%);
  filter:blur(80px) saturate(140%);
  opacity:.14;
  mix-blend-mode:screen;
  animation:auroraDrift 38s ease-in-out infinite alternate;
  pointer-events:none;
}
@keyframes auroraDrift{
  0%{transform:translate3d(0,0,0) skewX(-3deg);opacity:.12}
  50%{transform:translate3d(40px,12px,0) skewX(2deg);opacity:.18}
  100%{transform:translate3d(-30px,-6px,0) skewX(-1deg);opacity:.14}
}
.stars{
  position:absolute;inset:0;pointer-events:none;
  background-image:
    radial-gradient(1px 1px at 12% 18%, #ffffff 50%, transparent 51%),
    radial-gradient(1px 1px at 28% 64%, #d0e6ff 50%, transparent 51%),
    radial-gradient(1px 1px at 46% 22%, #ffffff 50%, transparent 51%),
    radial-gradient(2px 2px at 67% 41%, #b8d4ff 50%, transparent 51%),
    radial-gradient(1px 1px at 81% 12%, #ffffff 50%, transparent 51%),
    radial-gradient(1px 1px at 92% 56%, #e0eaff 50%, transparent 51%),
    radial-gradient(1px 1px at 7% 80%, #ffffff 50%, transparent 51%);
  opacity:.45;animation:twinkle 9s ease-in-out infinite;
}
@keyframes twinkle{0%,100%{opacity:.35}50%{opacity:.55}}

/* floor */
.floor{
  position:absolute;left:0;right:0;bottom:0;
  height:38vh;
  background:
    radial-gradient(ellipse 60% 80% at 50% 100%, rgba(120,180,255,0.18) 0%, transparent 60%),
    linear-gradient(180deg, transparent 0%, rgba(20,32,68,0.55) 60%, rgba(2,4,10,0.95) 100%);
  pointer-events:none;
}
.floor::before{
  content:"";position:absolute;inset:0;
  background:
    linear-gradient(180deg, transparent 0%, rgba(126,200,255,0.08) 60%, transparent 100%),
    repeating-linear-gradient(90deg, transparent 0 60px, rgba(126,200,255,0.05) 60px 61px);
  transform:perspective(800px) rotateX(62deg);
  transform-origin:50% 100%;
}

/* ── Walking figure stage ───────────────────────────────────── */
#figure-stage{
  position:absolute;
  bottom:14%;
  left:0;
  width:100vw;height:60vh;
  pointer-events:none;
  z-index:5;
}
/* the wrapper that JS translates — only horizontal traversal lives here */
#figure-wrap{
  position:absolute;
  bottom:0;
  left:0;
  width:200px;height:60vh;
  transform-origin:50% 100%;
  transition:none;
  will-change:transform,left;
}
/* The figure itself — preserves 3d, runs bob animation locally so the JS
   translate stays additive and you can SEE traversal. */
#vint-body{
  position:absolute;
  bottom:0;left:50%;
  width:200px;height:60vh;
  transform:translateX(-50%);
  transform-style:preserve-3d;
  animation:bodyBob 1.2s ease-in-out infinite;
}
@keyframes bodyBob{
  0%,100%{transform:translateX(-50%) translateY(0)}
  50%{transform:translateX(-50%) translateY(-6px)}
}

/* ── HEAD ──
   The head is a single rounded div sculpted with stacked radial
   gradients (top-left light → bottom-right shadow) plus three inset
   shadow layers for volume, plus a left/right split: the left half is
   warm flesh, the right half is gunmetal exoskull.
*/
.head{
  position:absolute;
  left:50%;top:0;
  width:64px;height:84px;
  transform:translateX(-50%);
  border-radius:48% 48% 44% 44% / 56% 56% 44% 44%;
  background:
    /* right-side metal skull (split via mask gradient) */
    linear-gradient(90deg,
      transparent 0%, transparent 48%,
      rgba(60,72,90,0.0) 48%, rgba(60,72,90,0.85) 52%,
      rgba(40,50,66,1) 100%),
    /* skin base with subsurface warmth and top-left key */
    radial-gradient(ellipse 80% 90% at 32% 26%,
      var(--skin-hi) 0%,
      var(--skin-mid) 38%,
      var(--skin-low) 72%,
      var(--skin-deep) 100%);
  box-shadow:
    inset -10px -10px 22px rgba(0,0,0,0.55),
    inset 6px 6px 16px rgba(255,220,180,0.22),
    inset 0 -2px 8px rgba(255,120,80,0.18),
    8px 4px 28px rgba(80,140,220,0.18),
    -4px 0 14px rgba(255,150,100,0.08);
}
/* hair / scalp plate */
.hair{
  position:absolute;
  left:50%;top:-4px;
  width:66px;height:36px;
  transform:translateX(-50%);
  border-radius:50% 50% 40% 40% / 70% 70% 30% 30%;
  background:
    radial-gradient(ellipse 80% 80% at 35% 25%, #2a1e16 0%, #14080a 70%, #050204 100%);
  box-shadow:
    inset -6px -4px 12px rgba(0,0,0,0.6),
    inset 4px 4px 8px rgba(120,80,60,0.18),
    0 -2px 8px rgba(40,20,10,0.6);
}
/* eyes */
.eye{
  position:absolute;top:34px;
  width:9px;height:6px;
  border-radius:50%;
  background:radial-gradient(circle at 35% 35%, #fff 0%, #b0d4f0 30%, #1a2840 70%, #000 100%);
  box-shadow:inset 0 -1px 2px rgba(0,0,0,0.6), 0 0 4px rgba(255,255,255,0.4);
}
.eye.l{left:18px}
.eye.r{
  right:14px;left:auto;
  /* right eye is camera lens */
  width:11px;height:11px;
  top:32px;
  background:
    radial-gradient(circle at 50% 50%, var(--circuit-soft) 0%, var(--circuit) 22%, #0a2a40 50%, #050a14 100%);
  box-shadow:
    inset 0 0 4px rgba(0,0,0,0.8),
    0 0 8px var(--circuit),
    0 0 16px rgba(92,227,255,0.4);
  animation:lensPulse 2.8s ease-in-out infinite;
}
@keyframes lensPulse{
  0%,100%{box-shadow:inset 0 0 4px rgba(0,0,0,0.8),0 0 6px var(--circuit),0 0 12px rgba(92,227,255,0.3)}
  50%{box-shadow:inset 0 0 4px rgba(0,0,0,0.8),0 0 12px var(--circuit),0 0 22px rgba(92,227,255,0.6)}
}
/* nose suggestion (soft inset shadow shape) */
.nose{
  position:absolute;
  left:46%;top:44px;
  width:8px;height:18px;
  border-radius:40% 40% 50% 50%;
  background:linear-gradient(160deg, rgba(255,220,180,0.15) 0%, rgba(80,40,20,0.0) 70%);
  box-shadow:
    inset -2px 0 3px rgba(0,0,0,0.3),
    inset 1px 0 2px rgba(255,220,180,0.25),
    1px 2px 3px rgba(0,0,0,0.25);
}
/* lips */
.mouth{
  position:absolute;
  left:38%;top:62px;
  width:18px;height:5px;
  border-radius:50%;
  background:linear-gradient(180deg, var(--lip) 0%, #6a2226 100%);
  box-shadow:
    inset 0 -1px 2px rgba(0,0,0,0.5),
    inset 0 1px 1px rgba(255,180,160,0.3),
    0 1px 2px rgba(0,0,0,0.4);
}
/* circuit etching across right cheek */
.circuit-etch{
  position:absolute;
  left:50%;top:38px;
  width:30px;height:32px;
  pointer-events:none;
  background:
    linear-gradient(90deg, transparent 40%, rgba(92,227,255,0.6) 40.5%, rgba(92,227,255,0.6) 41%, transparent 41.5%),
    linear-gradient(0deg, transparent 60%, rgba(92,227,255,0.4) 60.5%, rgba(92,227,255,0.4) 61%, transparent 61.5%),
    linear-gradient(45deg, transparent 70%, rgba(92,227,255,0.5) 70.5%, rgba(92,227,255,0.5) 71%, transparent 71.5%);
  filter:drop-shadow(0 0 2px rgba(92,227,255,0.7));
  opacity:.85;
  animation:circuitFlicker 4s ease-in-out infinite;
}
@keyframes circuitFlicker{
  0%,100%{opacity:.7}
  50%{opacity:.95}
}
/* ear (left, organic) */
.ear{
  position:absolute;
  left:-3px;top:38px;
  width:9px;height:18px;
  border-radius:60% 30% 60% 40%;
  background:
    radial-gradient(ellipse 80% 80% at 40% 30%, var(--skin-hi) 0%, var(--skin-mid) 50%, var(--skin-low) 100%);
  box-shadow:
    inset -2px -1px 3px rgba(0,0,0,0.4),
    inset 1px 1px 2px rgba(255,160,120,0.4),
    0 0 3px rgba(255,100,80,0.25);
}

/* ── NECK ── */
.neck{
  position:absolute;
  left:50%;top:78px;
  width:32px;height:22px;
  transform:translateX(-50%);
  border-radius:30% 30% 20% 20%;
  background:
    linear-gradient(90deg,
      var(--skin-mid) 0%, var(--skin-mid) 48%,
      rgba(70,80,96,0.95) 52%, rgba(50,60,76,1) 100%),
    radial-gradient(ellipse at 30% 20%, var(--skin-hi) 0%, var(--skin-low) 100%);
  box-shadow:
    inset -3px -3px 8px rgba(0,0,0,0.5),
    inset 2px 2px 4px rgba(255,200,160,0.2),
    0 4px 8px rgba(0,0,0,0.4);
}

/* ── TORSO ──
   Tapered chest using clip-path; layered radial gradient creates the
   chest-window glow where the heart shows through.
*/
.torso{
  position:absolute;
  left:50%;top:96px;
  width:96px;height:140px;
  transform:translateX(-50%);
  clip-path:polygon(
    14% 0%, 86% 0%,
    98% 28%, 92% 60%,
    82% 100%, 18% 100%,
    8% 60%, 2% 28%
  );
  background:
    /* right-side metal panel */
    linear-gradient(90deg,
      transparent 0%, transparent 50%,
      rgba(60,72,90,0.7) 54%, rgba(36,46,60,0.95) 100%),
    /* heart window — the dark center */
    radial-gradient(ellipse 30% 26% at 40% 40%,
      rgba(20,4,8,0.85) 0%, rgba(40,8,12,0.4) 50%, transparent 75%),
    /* skin base */
    radial-gradient(ellipse 80% 90% at 30% 20%,
      var(--skin-hi) 0%,
      var(--skin-mid) 38%,
      var(--skin-low) 72%,
      var(--skin-deep) 100%);
  box-shadow:
    inset -12px -12px 30px rgba(0,0,0,0.55),
    inset 8px 8px 18px rgba(255,210,170,0.18),
    inset 0 -8px 14px rgba(255,100,70,0.1),
    10px 6px 32px rgba(80,140,220,0.18);
}
/* heart inside chest window */
.heart{
  position:absolute;
  left:32%;top:118px;
  width:36px;height:34px;
  z-index:2;
  filter:drop-shadow(0 0 6px rgba(255,40,60,0.6)) drop-shadow(0 0 18px rgba(255,40,60,0.25));
  animation:heartBeat 0.9s ease-in-out infinite;
}
.heart svg{width:100%;height:100%;display:block}
@keyframes heartBeat{
  0%,100%{transform:scale(1)}
  20%{transform:scale(1.12)}
  40%{transform:scale(0.96)}
  60%{transform:scale(1.06)}
}
/* chest window glass overlay */
.chest-glass{
  position:absolute;
  left:28%;top:108px;
  width:44px;height:56px;
  border-radius:14px / 18px;
  background:
    linear-gradient(135deg, rgba(180,220,255,0.16) 0%, transparent 40%, rgba(40,80,140,0.1) 100%);
  border:1px solid rgba(126,200,255,0.35);
  box-shadow:
    inset 0 0 12px rgba(126,200,255,0.18),
    0 0 8px rgba(126,200,255,0.2);
  z-index:3;
  pointer-events:none;
}
/* right-side chest plate seams */
.plate-seam{
  position:absolute;
  background:linear-gradient(90deg, transparent, rgba(92,227,255,0.5), transparent);
  filter:drop-shadow(0 0 2px rgba(92,227,255,0.6));
  z-index:3;
  pointer-events:none;
}
.plate-seam.s1{left:62%;top:108px;width:32px;height:1px}
.plate-seam.s2{left:60%;top:140px;width:36px;height:1px}
.plate-seam.s3{left:64%;top:172px;width:30px;height:1px}
.plate-seam.v1{left:74%;top:104px;width:1px;height:96px;background:linear-gradient(180deg,transparent,rgba(92,227,255,0.4),transparent)}

/* ── PELVIS ── */
.pelvis{
  position:absolute;
  left:50%;top:230px;
  width:84px;height:36px;
  transform:translateX(-50%);
  clip-path:polygon(8% 0%, 92% 0%, 96% 70%, 76% 100%, 24% 100%, 4% 70%);
  background:
    linear-gradient(90deg,
      transparent 0%, transparent 48%,
      rgba(50,62,78,0.9) 52%, rgba(30,40,54,1) 100%),
    radial-gradient(ellipse at 30% 30%,
      var(--skin-mid) 0%, var(--skin-low) 60%, var(--skin-deep) 100%);
  box-shadow:
    inset -6px -6px 14px rgba(0,0,0,0.5),
    inset 4px 4px 8px rgba(255,200,160,0.16),
    0 6px 12px rgba(0,0,0,0.4);
}

/* ── ARMS ──
   Each arm has a shoulder-anchored wrap that JS doesn't touch.
   The wrap rotates via @keyframes for swing. Inside the wrap the
   upper/forearm divs handle their own cylinder shading.
*/
.arm{
  position:absolute;
  top:104px;
  width:24px;height:140px;
  transform-origin:50% 6px;
  transform-style:preserve-3d;
}
.arm.l{left:18%;animation:armSwingL 1.2s ease-in-out infinite}
.arm.r{right:18%;animation:armSwingR 1.2s ease-in-out infinite}
@keyframes armSwingL{
  0%,100%{transform:rotate(18deg)}
  50%{transform:rotate(-22deg)}
}
@keyframes armSwingR{
  0%,100%{transform:rotate(-22deg)}
  50%{transform:rotate(18deg)}
}
/* upper arm */
.upper-arm{
  position:absolute;
  left:0;top:0;
  width:24px;height:72px;
  border-radius:14px 14px 12px 12px / 50% 50% 30% 30%;
}
.arm.l .upper-arm{
  background:
    radial-gradient(ellipse 80% 100% at 30% 20%,
      var(--skin-hi) 0%, var(--skin-mid) 40%, var(--skin-low) 80%, var(--skin-deep) 100%);
  box-shadow:
    inset -5px -3px 10px rgba(0,0,0,0.55),
    inset 3px 2px 6px rgba(255,210,170,0.25),
    inset 0 -2px 6px rgba(255,100,70,0.12),
    2px 2px 6px rgba(0,0,0,0.4);
}
.arm.r .upper-arm{
  background:
    linear-gradient(135deg,
      var(--metal-hi) 0%,
      var(--metal) 30%,
      var(--metal-low) 70%,
      var(--metal-deep) 100%);
  box-shadow:
    inset -4px -3px 8px rgba(0,0,0,0.6),
    inset 3px 2px 4px rgba(255,255,255,0.25),
    0 0 6px rgba(92,227,255,0.2);
}
.arm.r .upper-arm::before{
  content:"";position:absolute;
  left:2px;right:2px;top:24px;height:1px;
  background:linear-gradient(90deg,transparent,var(--circuit),transparent);
  filter:drop-shadow(0 0 2px var(--circuit));
}
.arm.r .upper-arm::after{
  content:"";position:absolute;
  left:2px;right:2px;top:48px;height:1px;
  background:linear-gradient(90deg,transparent,var(--circuit),transparent);
  filter:drop-shadow(0 0 2px var(--circuit));
}
/* forearm */
.forearm{
  position:absolute;
  left:0;top:68px;
  width:22px;height:68px;
  border-radius:11px;
  transform-origin:50% 6px;
}
.arm.l .forearm{
  background:
    radial-gradient(ellipse 80% 100% at 30% 20%,
      var(--skin-hi) 0%, var(--skin-mid) 40%, var(--skin-low) 85%, var(--skin-deep) 100%);
  box-shadow:
    inset -4px -3px 8px rgba(0,0,0,0.5),
    inset 2px 2px 4px rgba(255,210,170,0.22),
    inset 0 -2px 4px rgba(255,100,70,0.1),
    2px 2px 5px rgba(0,0,0,0.4);
}
/* vein hint on left forearm */
.arm.l .forearm::before{
  content:"";position:absolute;
  left:6px;top:8px;width:1px;height:46px;
  background:linear-gradient(180deg,transparent,rgba(74,90,154,0.5) 40%,transparent);
  filter:blur(0.4px);
}
.arm.r .forearm{
  background:
    linear-gradient(135deg,
      var(--metal-hi) 0%,
      var(--metal) 30%,
      var(--metal-low) 70%,
      var(--metal-deep) 100%);
  box-shadow:
    inset -4px -3px 8px rgba(0,0,0,0.6),
    inset 3px 2px 4px rgba(255,255,255,0.2),
    0 0 6px rgba(92,227,255,0.25);
}
.arm.r .forearm::before{
  content:"";position:absolute;
  left:2px;right:2px;top:30px;height:1px;
  background:linear-gradient(90deg,transparent,var(--circuit),transparent);
  filter:drop-shadow(0 0 2px var(--circuit));
}
/* elbow joint */
.elbow{
  position:absolute;left:1px;top:64px;
  width:20px;height:10px;border-radius:50%;
}
.arm.l .elbow{
  background:radial-gradient(circle at 35% 30%, var(--skin-hi), var(--skin-low) 80%);
  box-shadow:inset 0 -2px 4px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,200,160,0.3);
}
.arm.r .elbow{
  background:radial-gradient(circle at 35% 30%, var(--metal-hi), var(--metal-deep) 80%);
  box-shadow:inset 0 -2px 4px rgba(0,0,0,0.7), 0 0 8px rgba(92,227,255,0.5);
}
/* hand */
.hand{
  position:absolute;
  left:1px;top:130px;
  width:22px;height:24px;
  border-radius:40% 40% 50% 50% / 50% 50% 60% 60%;
}
.arm.l .hand{
  background:
    radial-gradient(ellipse at 30% 25%, var(--skin-hi), var(--skin-mid) 50%, var(--skin-low) 100%);
  box-shadow:
    inset -3px -2px 6px rgba(0,0,0,0.5),
    inset 2px 1px 3px rgba(255,210,170,0.25);
}
.arm.r .hand{
  background:
    linear-gradient(135deg, var(--metal-hi), var(--metal-low));
  box-shadow:
    inset -3px -2px 6px rgba(0,0,0,0.6),
    inset 2px 1px 3px rgba(255,255,255,0.2),
    0 0 6px rgba(92,227,255,0.3);
}

/* ── LEGS ── */
.leg{
  position:absolute;
  top:258px;
  width:30px;height:240px;
  transform-origin:50% 4px;
  transform-style:preserve-3d;
}
.leg.l{left:36%;animation:legSwingL 1.2s ease-in-out infinite}
.leg.r{right:36%;animation:legSwingR 1.2s ease-in-out infinite}
@keyframes legSwingL{
  0%,100%{transform:rotate(-14deg)}
  50%{transform:rotate(18deg)}
}
@keyframes legSwingR{
  0%,100%{transform:rotate(18deg)}
  50%{transform:rotate(-14deg)}
}
.thigh{
  position:absolute;left:0;top:0;
  width:30px;height:120px;
  border-radius:15px 15px 12px 12px / 40% 40% 30% 30%;
}
.leg.l .thigh{
  background:
    radial-gradient(ellipse 80% 100% at 30% 20%,
      var(--skin-hi) 0%, var(--skin-mid) 40%, var(--skin-low) 85%, var(--skin-deep) 100%);
  box-shadow:
    inset -6px -4px 12px rgba(0,0,0,0.55),
    inset 3px 2px 6px rgba(255,210,170,0.22),
    inset 0 -3px 8px rgba(255,100,70,0.1),
    3px 2px 8px rgba(0,0,0,0.4);
}
.leg.r .thigh{
  background:
    linear-gradient(135deg, var(--metal-hi) 0%, var(--metal) 30%, var(--metal-low) 70%, var(--metal-deep) 100%);
  box-shadow:
    inset -5px -3px 10px rgba(0,0,0,0.6),
    inset 3px 2px 5px rgba(255,255,255,0.2),
    0 0 8px rgba(92,227,255,0.22);
}
.leg.r .thigh::before{
  content:"";position:absolute;
  left:3px;right:3px;top:40px;height:1px;
  background:linear-gradient(90deg,transparent,var(--circuit),transparent);

<script>
/* ════════════════════════════════════════════════════════════════════════
   VINTINUUM BODY v3.1 — runtime
   ──────────────────────────────────────────────────────────────────── */
const API = 'https://api.vintaclectic.com';

/* ── Walk traversal — JS-driven horizontal motion ────────────── */
(function walk(){
  const wrap = document.getElementById('figure-wrap');
  const body = document.getElementById('vint-body');
  let x = 80;
  let dir = 1;
  const speed = 0.7;          // px per frame ≈ 42 px/sec at 60fps
  function tick(){
    const maxX = window.innerWidth - 220;
    x += dir * speed;
    if (x > maxX){ x = maxX; dir = -1; }
    else if (x < 50){ x = 50; dir = 1; }
    wrap.style.left = x + 'px';
    // flip the body (not the wrap) so its bob keeps centering math intact
    body.style.transform = (dir < 0 ? 'translateX(-50%) scaleX(-1)' : 'translateX(-50%) scaleX(1)');
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
})();

/* ── HUD: brain ping ────────────────────────────────────────── */
(function brainPing(){
  const el = document.getElementById('hud-brain');
  fetch(API + '/api/health', {cache:'no-store'})
    .then(r => r.ok ? r.json().catch(()=>({ok:true})) : Promise.reject())
    .then(() => { el.textContent = 'online'; el.style.color = '#7ee0ff'; })
    .catch(() => { el.textContent = 'offline'; el.style.color = '#ff7a8a'; });
})();

/* ════════════════════════════════════════════════════════════════
   PANEL CORE
   ──────────────────────────────────────────────────────────── */
const Panel = (() => {
  const el      = document.getElementById('panel');
  const header  = document.getElementById('panel-header');
  const body    = document.getElementById('panel-body');
  const titleEl = document.getElementById('panel-mode');
  const subEl   = document.getElementById('panel-sub');
  const resize  = document.getElementById('panel-resize');
  let currentMode = null;

  function setTitle(mode, sub){
    titleEl.textContent = mode.toUpperCase();
    subEl.textContent   = sub ? '— ' + sub : '';
  }
  function open(mode, sub){
    currentMode = mode;
    setTitle(mode, sub);
    el.classList.remove('minimized');
    el.classList.add('open');
    body.className = 'panel-body mode-' + mode;
    body.innerHTML = '';
  }
  function close(){
    el.classList.remove('open');
    body.innerHTML = '';
    currentMode = null;
  }
  function content(){ return body; }

  document.getElementById('panel-close').onclick = close;
  document.getElementById('panel-min').onclick   = () => el.classList.toggle('minimized');
  document.getElementById('panel-max').onclick   = () => {
    if (el.style.width === '96vw'){
      el.style.width = ''; el.style.height = '';
      el.style.left = '50%'; el.style.top = '50%';
      el.style.transform = 'translate(-50%,-50%)';
    } else {
      el.style.width  = '96vw';
      el.style.height = 'calc(100vh - 180px)';
      el.style.left   = '2vw';
      el.style.top    = '14px';
      el.style.transform = 'none';
    }
  };

  /* drag */
  let dragging = false, dx=0, dy=0;
  function startDrag(clientX, clientY){
    const rect = el.getBoundingClientRect();
    el.style.left = rect.left + 'px';
    el.style.top  = rect.top  + 'px';
    el.style.transform = 'none';
    dragging = true;
    dx = clientX - rect.left;
    dy = clientY - rect.top;
    document.body.style.userSelect = 'none';
  }
  function moveDrag(clientX, clientY){
    if (!dragging) return;
    let nx = clientX - dx;
    let ny = clientY - dy;
    // clamp to viewport — no overflow rule
    nx = Math.max(8, Math.min(window.innerWidth  - el.offsetWidth  - 8, nx));
    ny = Math.max(8, Math.min(window.innerHeight - 60, ny));
    el.style.left = nx + 'px';
    el.style.top  = ny + 'px';
  }
  function endDrag(){ dragging = false; document.body.style.userSelect = ''; }

  header.addEventListener('mousedown', e => {
    if (e.target.closest('.panel-controls')) return;
    startDrag(e.clientX, e.clientY);
  });
  document.addEventListener('mousemove', e => moveDrag(e.clientX, e.clientY));
  document.addEventListener('mouseup', endDrag);
  header.addEventListener('touchstart', e => {
    if (e.target.closest('.panel-controls')) return;
    const t = e.touches[0]; startDrag(t.clientX, t.clientY);
  }, {passive:true});
  document.addEventListener('touchmove', e => {
    if (!dragging) return;
    const t = e.touches[0]; moveDrag(t.clientX, t.clientY);
  }, {passive:true});
  document.addEventListener('touchend', endDrag);

  /* resize */
  let resizing = false, rx=0, ry=0, rw=0, rh=0;
  resize.addEventListener('mousedown', e => {
    e.preventDefault();
    resizing = true;
    rx = e.clientX; ry = e.clientY;
    rw = el.offsetWidth; rh = el.offsetHeight;
  });
  document.addEventListener('mousemove', e => {
    if (!resizing) return;
    el.style.width  = Math.max(280, rw + (e.clientX - rx)) + 'px';
    el.style.height = Math.max(220, rh + (e.clientY - ry)) + 'px';
  });
  document.addEventListener('mouseup', () => resizing = false);

  return { open, close, content, mode: () => currentMode };
})();

/* ════════════════════════════════════════════════════════════════
   MODES
   ──────────────────────────────────────────────────────────── */
const TYPES = {
  video: ['mp4','webm','mkv','ogg','mov','m4v'],
  audio: ['mp3','wav','ogg','flac','aac','m4a','opus'],
  ebook: ['epub','mobi','azw3','fb2'],
  pdf:   ['pdf'],
  doc:   ['txt','md','json','js','ts','html','css','xml','csv','log','py','rs','go','sh','yml','yaml'],
  office:['docx','xlsx','pptx','doc','xls','ppt'],
  image: ['png','jpg','jpeg','gif','webp','svg','bmp'],
};
function extOf(name){ return (name.split('.').pop() || '').toLowerCase(); }
function detectMode(name){
  const e = extOf(name);
  for (const [mode, exts] of Object.entries(TYPES)){
    if (exts.includes(e)){
      if (mode === 'pdf' || mode === 'doc' || mode === 'office') return 'docs';
      if (mode === 'image') return 'docs';
      return mode;
    }
  }
  return 'docs';
}

function renderFile(){
  Panel.open('file', 'choose or drop');
  const c = Panel.content();
  c.innerHTML = `
    <div class="drop-zone" id="dz">
      <div class="ico">📁</div>
      <div><strong>Drop a file here</strong> or click to choose</div>
      <div class="hint">video · audio · pdf · doc · image · code · txt</div>
      <input type="file" id="fz" multiple/>
    </div>
  `;
  const dz = document.getElementById('dz');
  const fz = document.getElementById('fz');
  dz.onclick = () => fz.click();
  fz.onchange = () => handleFiles(fz.files);
  ['dragenter','dragover'].forEach(ev => dz.addEventListener(ev, e => {
    e.preventDefault(); dz.classList.add('drag');
  }));
  ['dragleave','drop'].forEach(ev => dz.addEventListener(ev, e => {
    e.preventDefault(); dz.classList.remove('drag');
  }));
  dz.addEventListener('drop', e => {
    if (e.dataTransfer && e.dataTransfer.files) handleFiles(e.dataTransfer.files);
  });
}
function handleFiles(fileList){
  const files = Array.from(fileList);
  if (!files.length) return;
  const first = files[0];
  const mode = detectMode(first.name);
  if (mode === 'video') return renderVideoFiles(files);
  if (mode === 'audio') return renderAudioFiles(files);
  if (mode === 'ebook') return renderEbookFile(first);
  return renderDocFile(first);
}

let audioCtx, audioAnalyser, audioRaf;
function stopAudioViz(){
  if (audioRaf) cancelAnimationFrame(audioRaf);
  audioRaf = null;
}
function renderAudio(){
  Panel.open('audio', 'visualizer');
  const c = Panel.content();
  c.innerHTML = `
    <div class="url-row">
      <input id="au" type="text" placeholder="https://…  (mp3 / wav / ogg)" />
      <button id="ag">load</button>
    </div>
    <div class="media-wrap">
      <canvas id="aviz" width="900" height="120"></canvas>
      <audio id="ael" controls style="width:100%"></audio>
      <div class="playlist" id="apl"></div>
    </div>
  `;
  document.getElementById('ag').onclick = () => {
    const url = document.getElementById('au').value.trim();
    if (url) loadAudioSrc(url, url.split('/').pop());
  };
}
function renderAudioFiles(files){
  renderAudio();
  const pl = document.getElementById('apl');
  files.forEach((f, i) => {
    const it = document.createElement('div');
    it.className = 'item' + (i === 0 ? ' active' : '');
    it.textContent = '♫  ' + f.name;
    it.onclick = () => {
      pl.querySelectorAll('.item').forEach(n => n.classList.remove('active'));
      it.classList.add('active');
      loadAudioSrc(URL.createObjectURL(f), f.name);
    };
    pl.appendChild(it);
  });
  loadAudioSrc(URL.createObjectURL(files[0]), files[0].name);
}
function loadAudioSrc(src, label){
  const a = document.getElementById('ael');
  a.src = src;
  a.play().catch(()=>{});
  try{
    if (!audioCtx){
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const source = audioCtx.createMediaElementSource(a);
      audioAnalyser = audioCtx.createAnalyser();
      audioAnalyser.fftSize = 128;
      source.connect(audioAnalyser);
      audioAnalyser.connect(audioCtx.destination);
    }
  }catch(_){}
  drawAudioViz();
}
function drawAudioViz(){
  const cv = document.getElementById('aviz');
  if (!cv || !audioAnalyser) return;
  const ctx = cv.getContext('2d');
  const bufferLength = audioAnalyser.frequencyBinCount;
  const data = new Uint8Array(bufferLength);
  stopAudioViz();
  function draw(){
    audioRaf = requestAnimationFrame(draw);
    audioAnalyser.getByteFrequencyData(data);
    ctx.clearRect(0,0,cv.width,cv.height);
    const barW = (cv.width / bufferLength) * 1.4;
    let x = 0;
    for (let i=0;i<bufferLength;i++){
      const h = (data[i] / 255) * cv.height;
      const grad = ctx.createLinearGradient(0, cv.height-h, 0, cv.height);
      grad.addColorStop(0, '#7ee0ff');
      grad.addColorStop(1, '#3a5a9a');
      ctx.fillStyle = grad;
      ctx.fillRect(x, cv.height-h, barW-1, h);
      x += barW;
    }
  }
  draw();
}

/* ── terminal ────────────────────────────────────────────── */
class VintTerminal {
  constructor(rootEl){
    this.root = rootEl;
    this.out = rootEl.querySelector('.term-out');
    this.input = rootEl.querySelector('.term-input');
    this.ws = null;
    this.mode = 'vint';      // 'vint' | 'shell'
    this.history = JSON.parse(localStorage.getItem('vint:term:hist') || '[]');
    this.histIdx = this.history.length;
    this.bind();
    this.banner();
  }
  banner(){
    this.print('╔═════════════════════════════════════╗', 'sys');
    this.print('║ VINTINUUM SHELL v1.0                ║', 'sys');
    this.print('║ type "help" for commands            ║', 'sys');
    this.print('╚═════════════════════════════════════╝', 'sys');
    this.print('', '');
  }
  bind(){
    this.input.addEventListener('keydown', e => {
      if (e.key === 'Enter'){
        const v = this.input.value;
        this.input.value = '';
        if (!v.trim()) return;
        this.history.push(v);
        if (this.history.length > 200) this.history.shift();
        localStorage.setItem('vint:term:hist', JSON.stringify(this.history));
        this.histIdx = this.history.length;
        this.run(v);
      } else if (e.key === 'ArrowUp'){
        e.preventDefault();
        if (this.histIdx > 0){ this.histIdx--; this.input.value = this.history[this.histIdx] || ''; }
      } else if (e.key === 'ArrowDown'){
        e.preventDefault();
        if (this.histIdx < this.history.length){ this.histIdx++; this.input.value = this.history[this.histIdx] || ''; }
      } else if (e.key === 'Tab'){
        e.preventDefault();
        const v = this.input.value;
        const cmds = ['help','whoami','status','ask','clear','ls','date','genome','memory','pulse','ping','version','shell','exit'];
        const match = cmds.find(c => c.startsWith(v));
        if (match) this.input.value = match + ' ';
      }
    });
  }
  print(line, cls){
    const span = document.createElement('div');
    if (cls) span.className = 'l-' + cls;
    span.textContent = line;
    this.out.appendChild(span);
    this.out.scrollTop = this.out.scrollHeight;
  }
  echo(cmd){ this.print('$ ' + cmd, 'dim'); }
  async run(cmd){
    this.echo(cmd);
    const [head, ...rest] = cmd.trim().split(/\s+/);
    const arg = rest.join(' ');
    if (this.mode === 'shell' && this.ws && this.ws.readyState === 1){
      this.ws.send(cmd);
      return;
    }
    switch ((head||'').toLowerCase()){
      case 'help':
        this.print('commands:', 'ok');
        this.print('  help               this list');
        this.print('  whoami             identity');
        this.print('  status             /api/health');
        this.print('  ask <text>         talk to vintinuum (POST /api/chat)');
        this.print('  pulse <text>       record a pulse');
        this.print('  genome             snapshot');
        this.print('  memory             recent fragments');
        this.print('  ping               brain reachability');
        this.print('  version            build');
        this.print('  date               local time');
        this.print('  ls                 panel modes');
        this.print('  shell              attempt machine bridge (pending)');
        this.print('  exit               leave shell mode');
        this.print('  clear              clear screen');
        break;
      case 'whoami':
        this.print('vinta · operator of vintinuum · this is the body, the brain runs at ' + API, 'ok');
        break;
      case 'status':
        try{
          const r = await fetch(API + '/api/health', {cache:'no-store'});
          this.print(r.ok ? 'brain: online · ' + r.status : 'brain: ' + r.status, r.ok ? 'ok' : 'err');
        }catch(e){ this.print('brain: unreachable · ' + e.message, 'err'); }
        break;
      case 'ping':
        const t0 = performance.now();
        try{
          await fetch(API + '/api/health', {cache:'no-store'});
          this.print(`pong · ${(performance.now()-t0).toFixed(1)}ms`, 'ok');
        }catch(e){ this.print('timeout', 'err'); }
        break;
      case 'ask':
        if (!arg){ this.print('usage: ask <text>', 'err'); break; }
        this.print('…', 'dim');
        try{
          const r = await fetch(API + '/api/chat', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({message: arg, source:'body-v3-terminal'})
          });
          const j = await r.json().catch(()=>({}));
          const reply = j.reply || j.response || j.text || j.message || JSON.stringify(j);
          this.print(reply, 'ok');
          if (window.speechSynthesis && reply){
            try{
              const u = new SpeechSynthesisUtterance(String(reply).slice(0,400));
              u.rate = 1.0; u.pitch = 1.0;
              window.speechSynthesis.speak(u);
            }catch(_){}
          }
        }catch(e){ this.print('chat failed: ' + e.message, 'err'); }
        break;
      case 'pulse':
        if (!arg){ this.print('usage: pulse <text>', 'err'); break; }
        try{
          const r = await fetch(API + '/api/pulse', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({content: arg, source:'body-v3-terminal'})
          });
          this.print(r.ok ? 'pulse recorded' : 'pulse failed · ' + r.status, r.ok ? 'ok' : 'err');
        }catch(e){ this.print(e.message, 'err'); }
        break;
      case 'genome':
        try{
          const r = await fetch(API + '/api/genome', {cache:'no-store'});
          const j = await r.json();
          this.print(JSON.stringify(j, null, 2));
        }catch(e){ this.print(e.message, 'err'); }
        break;
      case 'memory':
        try{
          const r = await fetch(API + '/api/memory/recent?limit=8', {cache:'no-store'});
          const j = await r.json();
          const items = Array.isArray(j) ? j : (j.items || j.data || []);
          if (!items.length) this.print('(empty)', 'dim');
          items.forEach(it => this.print('• ' + (it.content || it.text || JSON.stringify(it)).slice(0,140)));
        }catch(e){ this.print(e.message, 'err'); }
        break;
      case 'date':
        this.print(new Date().toString(), 'ok');
        break;
      case 'version':
        this.print('vintinuum body v3.1 · brain ' + API, 'ok');
        break;
      case 'ls':
        this.print('modes: file · video · audio · docs · ebook · terminal · drive', 'ok');
        break;
      case 'clear':
        this.out.innerHTML = '';
        this.banner();
        break;
      case 'shell':
        this.print('attempting machine bridge…', 'dim');
        this.connectShell();
        break;
      case 'exit':
        if (this.mode === 'shell'){
          try{ this.ws && this.ws.close(); }catch(_){}
          this.mode = 'vint';
          this.print('left shell mode', 'ok');
        } else {
          this.print('not in shell mode', 'dim');
        }
        break;
      case '':
        break;
      default:
        this.print('unknown command: ' + head + ' (try "help")', 'err');
    }
  }
  connectShell(){
    try{
      this.ws = new WebSocket(API.replace(/^http/, 'ws') + '/ws/terminal');
    }catch(e){
      this.print('[PENDING] Machine bridge not yet activated — ' + e.message, 'err');
      return;
    }
    this.ws.onopen = () => {
      this.mode = 'shell';
      this.print('shell connected. type freely. "exit" returns to vintinuum.', 'ok');
    };
    this.ws.onmessage = (e) => {
      try{
        const j = JSON.parse(e.data);
        if (j.type === 'error'){ this.print('[server] ' + j.msg, 'err'); }
        else if (j.type === 'data'){ this.print(j.data); }
        else this.print(e.data);
      }catch(_){
        this.print(e.data);
      }
    };
    this.ws.onerror = () => {
      this.print('[PENDING] Machine bridge not yet activated — coming soon', 'err');
    };
    this.ws.onclose = () => {
      this.ws = null;
      this.mode = 'vint';
      this.print('shell closed', 'dim');
    };
  }
}

document.querySelectorAll('#media-dock button').forEach(b => {
  b.addEventListener('click', () => {
    const m = b.dataset.mode;
    stopAudioViz();
    if (MODES[m]) MODES[m]();
  });
});

/* close panel on Esc */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') Panel.close();
});

/* ════════════════════════════════════════════════════════════════
   CONVERSATION BAR
   ──────────────────────────────────────────────────────────── */
const convForm  = document.getElementById('conv-bar');
const convInput = document.getElementById('conv-input');
const convMic   = document.getElementById('conv-mic');
const hudState  = document.getElementById('hud-state');

convForm.addEventListener('submit', async e => {
  e.preventDefault();
  const text = convInput.value.trim();
  if (!text) return;
  convInput.value = '';
  hudState.textContent = 'thinking';
  try{
    const r = await fetch(API + '/api/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({message:text, source:'body-v3'})
    });
    const j = await r.json().catch(()=>({}));
    const reply = j.reply || j.response || j.text || j.message;
    if (reply){
      // also push into terminal if open
      if (window.__vintTerm){
        window.__vintTerm.print('vint → ' + reply, 'ok');
      }
      if (window.speechSynthesis){
        try{
          const u = new SpeechSynthesisUtterance(String(reply).slice(0,400));
          u.rate = 1.0; u.pitch = 1.0;
          window.speechSynthesis.speak(u);
        }catch(_){}
      }
    }
  }catch(_){
  }
  hudState.textContent = 'walking';
});

/* mic — Web Speech API */
let recog = null, recogLive = false;
function ensureRecog(){
  if (recog) return recog;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  recog = new SR();
  recog.continuous = false;
  recog.interimResults = true;
  recog.lang = navigator.language || 'en-US';
  recog.onresult = e => {
    let t = '';
    for (let i=e.resultIndex;i<e.results.length;i++) t += e.results[i][0].transcript;
    convInput.value = t;
  };
  recog.onend = () => {
    recogLive = false; convMic.classList.remove('live');
    if (convInput.value.trim()) convForm.dispatchEvent(new Event('submit'));
  };
  recog.onerror = () => { recogLive = false; convMic.classList.remove('live'); };
  return recog;
}
convMic.addEventListener('click', () => {
  const r = ensureRecog();
  if (!r){
    alert('Speech recognition not supported in this browser.');
    return;
  }
  if (recogLive){ r.stop(); return; }
  try{ r.start(); recogLive = true; convMic.classList.add('live'); }
  catch(_){ recogLive = false; convMic.classList.remove('live'); }
});
</script>
