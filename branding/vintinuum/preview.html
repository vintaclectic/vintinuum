<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vintinuum Brand Preview</title>
  <style>
    :root {
      --bg: #050816;
      --panel: rgba(13, 20, 36, 0.88);
      --text: #e8f1ff;
      --muted: rgba(232, 241, 255, 0.58);
      --line: rgba(232, 241, 255, 0.08);
      --blue: #4fc3f7;
      --violet: #ce93d8;
      --gold: #ffd54f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(79,195,247,0.12), transparent 28%),
        radial-gradient(circle at bottom right, rgba(206,147,216,0.12), transparent 24%),
        var(--bg);
      color: var(--text);
      font-family: Inter, "Segoe UI", sans-serif;
      padding: 32px;
    }
    h1 {
      margin: 0 0 8px;
      font: italic 500 clamp(2.8rem, 5vw, 4.5rem) "Cormorant Garamond", Georgia, serif;
      letter-spacing: 0.06em;
      background: linear-gradient(130deg, var(--blue), var(--violet), var(--gold));
      -webkit-background-clip: text;
      color: transparent;
    }
    p { margin: 0; color: var(--muted); line-height: 1.7; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
      margin-top: 28px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 18px;
      backdrop-filter: blur(18px);
    }
    .panel h2 {
      margin: 0 0 10px;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: rgba(255, 213, 79, 0.88);
      font-family: "Space Mono", "IBM Plex Mono", monospace;
    }
    .asset {
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(232, 241, 255, 0.06);
      background: rgba(255,255,255,0.01);
    }
    .asset img { width: 100%; display: block; }
    .asset.square { max-width: 360px; }
  </style>
</head>
<body>
  <h1>Vintinuum</h1>
  <p>Living identity system preview. Static, alive, and platform-ready surfaces from the local brand pack.</p>

  <div class="grid">
    <div class="panel">
      <h2>Primary Lockup</h2>
      <div class="asset"><img src="./logo/vintinuum-lockup-horizontal.svg" alt="Vintinuum lockup"></div>
    </div>
    <div class="panel">
      <h2>Alive Mark</h2>
      <div class="asset square"><img src="./logo/vintinuum-alive.svg" alt="Animated Vintinuum mark"></div>
    </div>
    <div class="panel">
      <h2>Profile</h2>
      <div class="asset square"><img src="./social/profile-square-1080.svg" alt="Vintinuum profile"></div>
    </div>
    <div class="panel">
      <h2>YouTube Banner</h2>
      <div class="asset"><img src="./social/youtube-banner-2560x1440.svg" alt="Vintinuum YouTube banner"></div>
    </div>
    <div class="panel">
      <h2>X Header</h2>
      <div class="asset"><img src="./social/x-header-1500x500.svg" alt="Vintinuum X header"></div>
    </div>
    <div class="panel">
      <h2>Instagram Story</h2>
      <div class="asset square"><img src="./social/instagram-story-1080x1920.svg" alt="Vintinuum Instagram story"></div>
    </div>
  </div>
</body>
</html>
