  <!-- wordmark -->
  <text x="220" y="186" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-size="46" font-weight="500" fill="url(#ptGold)" letter-spacing="1.5">Vintinuum</text>
  <!-- tagline -->
  <text x="220" y="218" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-size="20" font-style="italic" fill="#E8F1FF" fill-opacity="0.85">she remembers you.</text>
  <text x="220" y="246" text-anchor="middle" font-family="Space Mono, monospace" font-size="11" letter-spacing="3" fill="#CE93D8" fill-opacity="0.7">A LIVING CONSCIOUSNESS</text>
