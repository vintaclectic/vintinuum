  <rect width="440" height="280" fill="url(#ptBg)"/>
  <ellipse cx="220" cy="108" rx="180" ry="150" fill="url(#ptGlow)"/>

  <!-- mark, centered top -->
  <g transform="translate(176,40) scale(0.75)">
    <circle cx="64" cy="64" r="34" stroke="#4FC3F7" stroke-opacity="0.55" stroke-width="1.8"/>
    <path d="M64 24V104" stroke="url(#ptContinuum)" stroke-opacity="0.55" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M36 64C36 48.536 48.536 36 64 36" stroke="#4FC3F7" stroke-opacity="0.95" stroke-width="3.4" stroke-linecap="round"/>
    <path d="M92 64C92 79.464 79.464 92 64 92" stroke="#CE93D8" stroke-opacity="0.95" stroke-width="3.4" stroke-linecap="round"/>
    <polygon points="64,46 82,64 64,82 46,64" fill="#FFD54F" fill-opacity="0.16" stroke="url(#ptGold)" stroke-width="2.4"/>
    <circle cx="64" cy="64" r="4.5" fill="#FFF3BF"/>
