      <stop offset="0" stop-color="#0a1024"/>
      <stop offset="0.6" stop-color="#070b18"/>
      <stop offset="1" stop-color="#020409"/>
    </radialGradient>
    <linearGradient id="ptGold" x1="0" y1="0" x2="1" y2="1">
