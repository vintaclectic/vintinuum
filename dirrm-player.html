      _updateLoading(text) {
        const el = this.loading.querySelector('.dirrm-loading-text');
        if (el) el.textContent = text;
        else this.loading.innerHTML = `<div class="dirrm-loading-orb"></div><div class="dirrm-loading-text">${this.escapeHtml(text)}</div>`;
        this.loading.style.display = 'flex';
      }

      /**
       * Future-proof fallback. Cascade:
       *   1. Try <video src>
       *   2. Try <audio src>
       *   3. Try iframe embed
       *   4. Present download card with detected MIME (HEAD request)
       */
      async loadUnknown(url, reasonText) {
        this.setBadge('File');

        // Step 1: video
        const tryVideo = () => new Promise(resolve => {
          const v = document.createElement('video');
          v.src = url; v.controls = false; v.playsInline = true; v.volume = this.volume;
          let settled = false;
          const done = (ok) => { if (settled) return; settled = true; resolve(ok ? v : null); if (!ok) v.remove(); };
          v.addEventListener('loadedmetadata', () => done(true), { once: true });
          v.addEventListener('error', () => done(false), { once: true });
          // Don't append yet — only on success
          setTimeout(() => done(false), 4000);
        });

        const v = await tryVideo();
        if (v) {
          this.loading.style.display = 'none';
          v.controls = true;
          v.addEventListener('play',  () => { this.isPlaying = true;  this.playIcon.textContent = '⏸'; });
          v.addEventListener('pause', () => { this.isPlaying = false; this.playIcon.textContent = '▶'; });
          v.addEventListener('timeupdate', () => {
            const p = (v.currentTime / v.duration) * 100;
            this.seekFill.style.width = `${p}%`;
            this.timeCurrent.textContent = this.formatTime(v.currentTime);
          });
          this.timeDuration.textContent = this.formatTime(v.duration);
          this.mediaContainer.appendChild(v);
          this.mediaElement = v;
          this.controls.style.display = '';
          try { await v.play(); } catch (_) {}
          this.setBadge('Video');
          return;
        }

        // Step 2: audio
        const tryAudio = () => new Promise(resolve => {
          const a = document.createElement('audio');
          a.src = url; a.controls = true;
          let settled = false;
          const done = (ok) => { if (settled) return; settled = true; resolve(ok ? a : null); if (!ok) a.remove(); };
          a.addEventListener('loadedmetadata', () => done(true), { once: true });
          a.addEventListener('error', () => done(false), { once: true });
          setTimeout(() => done(false), 4000);
        });

        const a = await tryAudio();
        if (a) {
          this.loading.style.display = 'none';
          this.mediaContainer.appendChild(a);
          this.mediaElement = a;
          this.controls.style.display = '';
          this.setBadge('Audio');
          return;
        }

        // Step 3 + 4: detect MIME and either iframe or download card
        let mime = '';
        try {
          const head = await fetch(url, { method: 'HEAD' });
          mime = (head.headers.get('content-type') || '').split(';')[0].trim();
        } catch (_) {}

        if (mime.startsWith('text/html') || mime === 'application/xhtml+xml') {
          // Embed as iframe
          this.loading.style.display = 'none';
          const viewer = document.createElement('div');
          viewer.className = 'dirrm-document-viewer';
          const iframe = document.createElement('iframe');
          iframe.src = url;
          iframe.addEventListener('load', () => { this.loading.style.display = 'none'; });
          viewer.appendChild(iframe);
          this.mediaContainer.appendChild(viewer);
          this.controls.style.display = 'none';
          this.setBadge('Web Page');
          return;
        }

        // Final: download card
        this.loading.style.display = 'none';
        const filename = this.extractTitle(url);
        const card = document.createElement('div');
        card.className = 'dirrm-info-card';
        card.innerHTML = `
          <div class="dirrm-info-card-inner">
            <div class="dirrm-info-icon">📁</div>
            <div class="dirrm-info-title">${filename}</div>
            <div class="dirrm-info-meta">${reasonText || (mime || 'Unknown file type')}</div>
            <div class="dirrm-info-actions">
              <a class="dirrm-info-btn" href="${url}" download>Download</a>
              <a class="dirrm-info-btn" href="${url}" target="_blank" rel="noopener">Open in browser</a>
            </div>
          </div>
        `;
        this.mediaContainer.appendChild(card);
        this.controls.style.display = 'none';
      }

      /**
       * Helpers.
       */
      escapeHtml(s) {
        return (s || '').replace(/[&<>"']/g, c => ({
          '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
        }[c]));
      }

      formatBytes(n) {
        if (!n || !isFinite(n)) return '';
        const units = ['B','KB','MB','GB','TB'];
        let i = 0;
        while (n >= 1024 && i < units.length - 1) { n /= 1024; i++; }
        return `${n.toFixed(n >= 100 || i === 0 ? 0 : 1)} ${units[i]}`;
      }

      formatTime(sec) {
        if (!sec || !isFinite(sec)) return '0:00';
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60);
        return `${m}:${s.toString().padStart(2, '0')}`;
      }

      // Playback controls
      togglePlay() {
        if (!this.mediaElement) return;
        if (this.isPlaying) {
          this.pause();
        } else {
          this.play();
        }
      }

      play() {
        if (this.mediaElement?.play) {
          this.mediaElement.play();
        }
      }

      pause() {
        if (this.mediaElement?.pause) {
          this.mediaElement.pause();
        }
      }

      seek(delta) {
        if (!this.mediaElement) return;
        this.mediaElement.currentTime = Math.max(0, 
          Math.min(this.mediaElement.duration, this.mediaElement.currentTime + delta)
        );
      }

      handleSeek(e) {
        if (!this.mediaElement) return;
        const rect = this.seekTrack.getBoundingClientRect();
        const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
        this.mediaElement.currentTime = ratio * this.mediaElement.duration;
      }

      toggleMute() {
        if (!this.mediaElement) return;
        this.isMuted = !this.isMuted;
        this.mediaElement.muted = this.isMuted;
        this.volumeIcon.textContent = this.isMuted ? '🔇' : '🔊';
        this.volumeFill.style.width = this.isMuted ? '0%' : `${this.volume * 100}%`;
      }

      handleVolume(e) {
        if (!this.mediaElement) return;
        const rect = this.volumeTrack.getBoundingClientRect();
        const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
        this.volume = ratio;
        this.mediaElement.volume = ratio;
        this.volumeFill.style.width = `${ratio * 100}%`;
        this.isMuted = ratio === 0;
        this.volumeIcon.textContent = ratio === 0 ? '🔇' : '🔊';
      }

      // Navigate the play-history stack. There is no playlist in this player,
      // so prev/next walk the sequence of media actually loaded this session.
      prev() {
        if (!this._history || this._histIndex <= 0) return;
        this._histIndex--;
        this._playFromHistory();
      }

      next() {
        if (!this._history || this._histIndex >= this._history.length - 1) return;
        this._histIndex++;
        this._playFromHistory();
      }

      _playFromHistory() {
        const entry = this._history[this._histIndex];
        if (!entry) return;
        this._navigating = true;              // suppress history mutation in loadMedia
        try { this.loadMedia(entry.url, entry.title, entry.type); }
        finally { this._navigating = false; }
        this._updateNavButtons();
      }

      // Enable/disable + dim the prev/next buttons at the ends of history.
      _updateNavButtons() {
        const prevBtn = document.getElementById('btn-prev');
        const nextBtn = document.getElementById('btn-next');
        const hist = this._history || [];
        const atStart = this._histIndex <= 0;
        const atEnd = this._histIndex >= hist.length - 1;
        if (prevBtn) { prevBtn.disabled = atStart; prevBtn.style.opacity = atStart ? '0.35' : ''; }
        if (nextBtn) { nextBtn.disabled = atEnd;   nextBtn.style.opacity = atEnd ? '0.35' : ''; }
      }

      // Window modes
      setMode(mode) {
        this.mode = mode;
        this.player.dataset.mode = mode;

        // Adjust size based on mode
        if (mode === 'main') {
          this.player.style.width = '860px';
          this.player.style.height = '520px';
        } else if (mode === 'mini') {
          this.player.style.width = '380px';
          this.player.style.height = 'auto';
        } else if (mode === 'pip') {
          this.player.style.width = '320px';
          this.player.style.height = '180px';
        } else if (mode === 'theater') {
          this.player.style.width = '100vw';
          this.player.style.height = '100vh';
        }

        // Notify parent frame so it can resize the iframe to match
        window.parent?.postMessage({ action: 'modeChanged', mode: mode }, '*');
      }

      toggleFullscreen() {
        if (this.mediaElement && this.mediaElement.requestFullscreen) {
          if (document.fullscreenElement) {
            document.exitFullscreen();
          } else {
            this.mediaElement.requestFullscreen();
          }
        }
      }

      close() {
        if (this.mediaElement) {
          this.mediaElement.pause();
        }
        this.player.style.display = 'none';
        
        // Notify parent
        window.parent?.postMessage({ action: 'playerClosed' }, '*');
      }

      // Positioning
      centerPlayer() {
        // On mobile (<= 900px) the CSS makes it fullscreen — no JS centering needed
        if (window.innerWidth <= 900) return;
        const w = this.player.offsetWidth || 860;
        const h = this.player.offsetHeight || 520;
        this.player.style.left = `${Math.max(0, (window.innerWidth - w) / 2)}px`;
        this.player.style.top = `${Math.max(0, (window.innerHeight - h) / 2)}px`;
      }

      // Drag functionality
      startDrag(e) {
        if (e.target.closest('.dirrm-btn')) return;
        this.isDragging = true;
        const rect = this.player.getBoundingClientRect();
        this.dragOffset = {
          x: e.clientX - rect.left,
          y: e.clientY - rect.top
        };
        this.player.style.willChange = 'left, top';
        this.player.style.transition = 'none';
      }

      onDrag(e) {
        if (!this.isDragging) return;
        
        const newX = e.clientX - this.dragOffset.x;
        const newY = e.clientY - this.dragOffset.y;
        
        // Clamp to viewport
        const maxX = window.innerWidth - this.player.offsetWidth;
        const maxY = window.innerHeight - this.player.offsetHeight;
        
        this.player.style.left = `${Math.max(0, Math.min(maxX, newX))}px`;
        this.player.style.top = `${Math.max(0, Math.min(maxY, newY))}px`;
      }

      endDrag() {
        this.isDragging = false;
        this.player.style.willChange = '';
      }

      // Resize functionality
      startResize(e) {
        this.isResizing = true;
        this.resizeDir = e.target.dataset.dir;
        this.startRect = this.player.getBoundingClientRect();
        this.startPos = { x: e.clientX, y: e.clientY };
        this.player.style.willChange = 'width, height, left, top';
        this.player.style.transition = 'none';
        e.preventDefault();
      }

      onResize(e) {
        if (!this.isResizing) return;

        const dx = e.clientX - this.startPos.x;
        const dy = e.clientY - this.startPos.y;
        const dir = this.resizeDir;

        let newWidth = this.startRect.width;
        let newHeight = this.startRect.height;
        let newLeft = this.startRect.left;
        let newTop = this.startRect.top;

        // Calculate new dimensions based on resize direction
        if (dir.includes('e')) newWidth = this.startRect.width + dx;
        if (dir.includes('w')) {
          newWidth = this.startRect.width - dx;
          newLeft = this.startRect.left + dx;
        }
        if (dir.includes('s')) newHeight = this.startRect.height + dy;
        if (dir.includes('n')) {
          newHeight = this.startRect.height - dy;
          newTop = this.startRect.top + dy;
        }

        // Apply min constraints
        const minW = parseInt(getComputedStyle(this.player).minWidth) || 200;
        const minH = parseInt(getComputedStyle(this.player).minHeight) || 120;

        // Apply max constraints — the player must never escape the viewport.
        // Anti-overlap rule: no edge may cross the viewport boundary.
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        // West edge: left cannot go below 0; clamp width accordingly.
        if (dir.includes('w') && newLeft < 0) {
          newWidth = newWidth + newLeft; // shrink by overshoot
          newLeft = 0;
        }
        // North edge: top cannot go below 0; clamp height accordingly.
        if (dir.includes('n') && newTop < 0) {
          newHeight = newHeight + newTop;
          newTop = 0;
        }
        // East edge: left + width cannot exceed viewport width.
        if (dir.includes('e') && (this.startRect.left + newWidth) > vw) {
          newWidth = vw - this.startRect.left;
        }
        // South edge: top + height cannot exceed viewport height.
        if (dir.includes('s') && (this.startRect.top + newHeight) > vh) {
          newHeight = vh - this.startRect.top;
        }
        // Absolute clamp regardless of direction.
        newWidth = Math.min(newWidth, vw);
        newHeight = Math.min(newHeight, vh);

        if (newWidth >= minW) {
          this.player.style.width = `${newWidth}px`;
          if (dir.includes('w')) this.player.style.left = `${newLeft}px`;
        }
        if (newHeight >= minH) {
          this.player.style.height = `${newHeight}px`;
          if (dir.includes('n')) this.player.style.top = `${newTop}px`;
        }
      }

      endResize() {
        this.isResizing = false;
        this.resizeDir = null;
        this.player.style.willChange = '';
      }

      // Keyboard shortcuts
      handleKeyboard(e) {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

        // Surface the legend on first key, auto-hide after 4s
        const legendKeys = [' ', 'k', 'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'm', 'f'];
        if (legendKeys.includes(e.key)) this.showKbdLegend(4000);

        switch (e.key) {
          case ' ':
          case 'k':
            e.preventDefault();
            this.togglePlay();
            break;
          case 'ArrowLeft':
            e.preventDefault();
            this.seek(-5);
            break;
          case 'ArrowRight':
            e.preventDefault();
            this.seek(5);
            break;
          case 'ArrowUp':
            e.preventDefault();
            this.handleVolumeKey(0.1);
            break;
          case 'ArrowDown':
            e.preventDefault();
            this.handleVolumeKey(-0.1);
            break;
          case 'm':
            e.preventDefault();
            this.toggleMute();
            break;
          case 'f':
            e.preventDefault();
            this.toggleFullscreen();
            break;
          case 'Escape':
            if (this.mode === 'pip') {
              this.setMode('main');
            } else if (document.fullscreenElement) {
              document.exitFullscreen();
            }
            break;
        }
      }

      handleVolumeKey(delta) {
        if (!this.mediaElement) return;
        this.volume = Math.max(0, Math.min(1, this.volume + delta));
        this.mediaElement.volume = this.volume;
        this.volumeFill.style.width = `${this.volume * 100}%`;
        this.isMuted = this.volume === 0;
        this.volumeIcon.textContent = this.volume === 0 ? '🔇' : '🔊';
      }
    }

    // Initialize player
    const player = new DirRMPlayer();

    // Expose global API for external control
    window.DirRM = {
      load: (url, title, type) => player.loadMedia(url, title, type),
      play: () => player.play(),
      pause: () => player.pause(),
      togglePlay: () => player.togglePlay(),
      seek: (delta) => player.seek(delta),
      setMode: (mode) => player.setMode(mode),
      close: () => player.close(),
      setVolume: (v) => {
        player.volume = Math.max(0, Math.min(1, v));
        if (player.mediaElement) player.mediaElement.volume = player.volume;
        player.volumeFill.style.width = `${player.volume * 100}%`;
      }
    };
  </script>
</body>
</html>
