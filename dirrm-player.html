<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>DirRM Player</title>
  <style>
    :root {
      --dirrm-gold: #F5A623;
      --dirrm-gold-dim: rgba(245, 166, 35, 0.6);
      --dirrm-bg: rgba(13, 11, 8, 0.92);
      --dirrm-bg-solid: #0d0b08;
      --dirrm-border: rgba(245, 166, 35, 0.25);
      --dirrm-text: #f0e6d3;
      --dirrm-text-muted: rgba(240, 230, 211, 0.5);
      --dirrm-shadow: 0 8px 32px rgba(0, 0, 0, 0.6), 0 0 1px rgba(245, 166, 35, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--dirrm-bg-solid);
      color: var(--dirrm-text);
      overflow: hidden;
    }

    /* ============================================
       MAIN PLAYER CONTAINER
       ============================================ */
    .dirrm-player {
      position: fixed;
      background: var(--dirrm-bg);
      backdrop-filter: blur(24px);
      border: 1px solid var(--dirrm-border);
      border-radius: 16px;
      box-shadow: var(--dirrm-shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      z-index: 9999;
      transition: border-radius 0.2s ease;
      /* Never escape the viewport — applies to every mode and every drag/resize. */
      max-width: 100vw;
      max-height: 100svh;
    }

    .dirrm-player[data-mode="main"] {
      width: 860px;
      height: 520px;
      min-width: 480px;
      min-height: 320px;
    }

    .dirrm-player[data-mode="mini"] {
      width: 380px;
      height: auto;
      min-width: 300px;
      min-height: 120px;
    }

    .dirrm-player[data-mode="pip"] {
      width: 320px;
      height: 180px;
      min-width: 200px;
      min-height: 120px;
      border-radius: 12px;
    }

    .dirrm-player[data-mode="theater"] {
      width: 100vw;
      height: 100svh;
      min-width: 100vw;
      min-height: 100svh;
      border-radius: 0;
      top: 0 !important;
      left: 0 !important;
    }

    /* ============================================
       TITLE BAR (draggable)
       ============================================ */
    .dirrm-titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: linear-gradient(180deg, rgba(245, 166, 35, 0.08) 0%, transparent 100%);
      border-bottom: 1px solid rgba(245, 166, 35, 0.1);
      cursor: move;
      user-select: none;
      flex-shrink: 0;
    }

    .dirrm-titlebar-left {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }

    .dirrm-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--dirrm-gold);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .dirrm-subtitle {
      font-size: 11px;
      color: var(--dirrm-text-muted);
      letter-spacing: 0.04em;
    }

    .dirrm-titlebar-right {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    /* ============================================
       WINDOW CONTROL BUTTONS
       ============================================ */
    .dirrm-btn {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      color: var(--dirrm-text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all 0.15s ease;
    }

    .dirrm-btn:hover {
      background: rgba(245, 166, 35, 0.12);
      border-color: var(--dirrm-border);
      color: var(--dirrm-gold);
    }

    .dirrm-btn--primary {
      background: linear-gradient(135deg, rgba(245, 166, 35, 0.2) 0%, rgba(245, 166, 35, 0.1) 100%);
      border-color: var(--dirrm-border);
      color: var(--dirrm-gold);
    }

    .dirrm-btn--primary:hover {
      background: linear-gradient(135deg, rgba(245, 166, 35, 0.35) 0%, rgba(245, 166, 35, 0.2) 100%);
    }

    .dirrm-btn--danger:hover {
      background: rgba(255, 60, 60, 0.15);
      border-color: rgba(255, 60, 60, 0.4);
      color: #ff6b6b;
    }

    .dirrm-btn--active {
      background: rgba(245, 166, 35, 0.15);
      border-color: var(--dirrm-gold);
      color: var(--dirrm-gold);
    }

    /* ============================================
       MEDIA CONTAINER
       ============================================ */
    .dirrm-media-container {
      flex: 1;
      position: relative;
      background: #000;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .dirrm-media-container video,
    .dirrm-media-container audio,
    .dirrm-media-container img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .dirrm-media-container video {
      width: 100%;
      height: 100%;
    }

    .dirrm-media-container img {
      max-width: 100%;
      max-height: 100%;
    }

    /* Audio visualizer — full canvas */
    .dirrm-audio-visualizer {
      position: absolute;
      inset: 0;
      background: #000;
    }

    .dirrm-audio-visualizer canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .dirrm-viz-label {
      position: absolute;
      bottom: 10px;
      right: 14px;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: rgba(245, 166, 35, 0.4);
      pointer-events: none;
      text-transform: uppercase;
    }

    /* PDF/Ebook viewer */
    .dirrm-document-viewer {
      width: 100%;
      height: 100%;
      background: #1a1814;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .dirrm-document-viewer iframe {
      width: 100%;
      height: 100%;
      flex: 1;
      border: none;
    }

    .dirrm-doc-toolbar {
      display: flex;
      gap: 8px;
      padding: 8px 12px;
      background: rgba(13, 11, 8, 0.85);
      border-bottom: 1px solid var(--dirrm-border);
      flex-shrink: 0;
      align-items: center;
    }

    .dirrm-doc-toolbar a,
    .dirrm-doc-toolbar button {
      font-size: 11px;
      padding: 6px 10px;
      border-radius: 6px;
      background: rgba(245, 166, 35, 0.1);
      color: var(--dirrm-gold);
      border: 1px solid var(--dirrm-border);
      text-decoration: none;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s ease;
    }

    .dirrm-doc-toolbar a:hover,
    .dirrm-doc-toolbar button:hover {
      background: rgba(245, 166, 35, 0.2);
    }

    /* Embed (YouTube / Vimeo / Twitch / SoundCloud / Spotify / Bandcamp) */
    .dirrm-embed {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      overflow: hidden;
    }

    .dirrm-embed iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    /* 3D model viewer */
    .dirrm-model-wrap {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, #1a1814 0%, #000 100%);
      overflow: hidden;
    }

    .dirrm-model-wrap model-viewer {
      width: 100%;
      height: 100%;
      --poster-color: transparent;
    }

    /* Text / code viewer */
    .dirrm-text-viewer {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      background: #0d0b08;
      overflow: hidden;
    }

    .dirrm-text-toolbar {
      display: flex;
      gap: 8px;
      padding: 8px 12px;
      background: rgba(13, 11, 8, 0.95);
      border-bottom: 1px solid var(--dirrm-border);
      flex-shrink: 0;
      align-items: center;
      justify-content: flex-end;
    }

    .dirrm-text-toolbar button,
    .dirrm-text-toolbar a {
      font-size: 11px;
      padding: 6px 10px;
      border-radius: 6px;
      background: rgba(245, 166, 35, 0.1);
      color: var(--dirrm-gold);
      border: 1px solid var(--dirrm-border);
      cursor: pointer;
      font-family: inherit;
      text-decoration: none;
      transition: all 0.15s ease;
    }

    .dirrm-text-toolbar button:hover,
    .dirrm-text-toolbar a:hover {
      background: rgba(245, 166, 35, 0.22);
    }

    .dirrm-text-body {
      flex: 1;
      overflow: auto;
      padding: 16px 20px;
      font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
      font-size: 13px;
      line-height: 1.55;
      color: #f0e6d3;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .dirrm-text-body.markdown {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      white-space: normal;
      font-size: 15px;
    }

    .dirrm-text-body.markdown h1,
    .dirrm-text-body.markdown h2,
    .dirrm-text-body.markdown h3 {
      color: var(--dirrm-gold);
      margin: 0.8em 0 0.4em;
    }

    .dirrm-text-body.markdown a { color: var(--dirrm-gold); }

    .dirrm-text-body.markdown code,
    .dirrm-text-body.markdown pre {
      background: rgba(245, 166, 35, 0.08);
      border-radius: 4px;
      padding: 2px 6px;
      font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
    }

    .dirrm-text-body.markdown pre {
      padding: 12px 14px;
      overflow: auto;
    }

    /* Info card (archive / torrent / fallback) */
    .dirrm-info-card {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, #1a1814 0%, #000 100%);
      padding: 24px;
      overflow: auto;
    }

    .dirrm-info-card-inner {
      max-width: 420px;
      text-align: center;
      background: rgba(245, 166, 35, 0.05);
      border: 1px solid var(--dirrm-border);
      border-radius: 14px;
      padding: 28px 24px;
    }

    .dirrm-info-icon {
      font-size: 52px;
      margin-bottom: 14px;
      filter: drop-shadow(0 0 12px rgba(245, 166, 35, 0.4));
    }

    .dirrm-info-title {
      font-size: 16px;
      color: var(--dirrm-gold);
      font-weight: 600;
      margin-bottom: 6px;
      word-break: break-all;
    }

    .dirrm-info-meta {
      font-size: 12px;
      color: var(--dirrm-text-muted);
      margin-bottom: 18px;
      letter-spacing: 0.05em;
    }

    .dirrm-info-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .dirrm-info-btn {
      padding: 9px 16px;
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(245, 166, 35, 0.25), rgba(245, 166, 35, 0.1));
      border: 1px solid var(--dirrm-border);
      color: var(--dirrm-gold);
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: inherit;
    }

    .dirrm-info-btn:hover {
      background: linear-gradient(135deg, rgba(245, 166, 35, 0.4), rgba(245, 166, 35, 0.2));
      transform: translateY(-1px);
    }

    /* Type badge in title bar */
    .dirrm-type-badge {
      font-size: 9px;
      letter-spacing: 0.08em;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(245, 166, 35, 0.12);
      border: 1px solid var(--dirrm-border);
      color: var(--dirrm-gold);
      text-transform: uppercase;
      font-weight: 600;
      flex-shrink: 0;
    }

    /* ============================================
       CONTROLS BAR
       ============================================ */
    .dirrm-controls {
      padding: 12px 16px;
      background: linear-gradient(0deg, rgba(13, 11, 8, 0.6) 0%, transparent 100%);
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex-shrink: 0;
    }

    /* Progress/Seek bar */
    .dirrm-seek-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .dirrm-seek-track {
      flex: 1;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .dirrm-seek-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--dirrm-gold) 0%, #e8941a 100%);
      border-radius: 3px;
      position: relative;
      transition: width 0.1s linear;
    }

    .dirrm-seek-thumb {
      position: absolute;
      right: -6px;
      top: 50%;
      transform: translateY(-50%);
      width: 12px;
      height: 12px;
      background: var(--dirrm-gold);
      border-radius: 50%;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    .dirrm-seek-track:hover .dirrm-seek-thumb {
      opacity: 1;
    }

    .dirrm-time {
      font-size: 11px;
      color: var(--dirrm-text-muted);
      font-variant-numeric: tabular-nums;
      min-width: 45px;
    }

    /* Transport row */
    .dirrm-transport {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .dirrm-transport-left {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dirrm-transport-center {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dirrm-transport-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Play button (larger) */
    .dirrm-btn--play {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 18px;
    }

    /* Skip buttons */
    .dirrm-skip {
      font-size: 10px;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--dirrm-text-muted);
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .dirrm-skip:hover {
      background: rgba(245, 166, 35, 0.1);
      border-color: var(--dirrm-border);
      color: var(--dirrm-gold);
    }

    /* Volume control */
    .dirrm-volume {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dirrm-volume-track {
      width: 70px;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      cursor: pointer;
      overflow: hidden;
    }

    .dirrm-volume-fill {
      height: 100%;
      background: var(--dirrm-gold);
      border-radius: 2px;
      transition: width 0.1s ease;
    }

    /* ============================================
       RESIZE HANDLES
       ============================================ */
    .dirrm-resize {
      position: absolute;
      background: transparent;
      z-index: 10;
    }

    .dirrm-resize--se {
      right: 0;
      bottom: 0;
      width: 20px;
      height: 20px;
      cursor: se-resize;
    }

    .dirrm-resize--se::after {
      content: '';
      position: absolute;
      right: 4px;
      bottom: 4px;
      width: 10px;
      height: 10px;
      border-right: 2px solid var(--dirrm-gold-dim);
      border-bottom: 2px solid var(--dirrm-gold-dim);
      opacity: 0.5;
      transition: opacity 0.15s ease;
    }

    .dirrm-resize--se:hover::after {
      opacity: 1;
    }

    .dirrm-resize--sw {
      left: 0;
      bottom: 0;
      width: 20px;
      height: 20px;
      cursor: sw-resize;
    }

    .dirrm-resize--ne {
      right: 0;
      top: 0;
      width: 20px;
      height: 20px;
      cursor: ne-resize;
    }

    .dirrm-resize--nw {
      left: 0;
      top: 0;
      width: 20px;
      height: 20px;
      cursor: nw-resize;
    }

    .dirrm-resize--e {
      right: 0;
      top: 20px;
      bottom: 20px;
      width: 6px;
      cursor: e-resize;
    }

    .dirrm-resize--w {
      left: 0;
      top: 20px;
      bottom: 20px;
      width: 6px;
      cursor: w-resize;
    }

    .dirrm-resize--n {
      top: 0;
      left: 20px;
      right: 20px;
      height: 6px;
      cursor: n-resize;
    }

    .dirrm-resize--s {
      bottom: 0;
      left: 20px;
      right: 20px;
      height: 6px;
      cursor: s-resize;
    }

    /* ============================================
       LOADING STATE
       ============================================ */
    .dirrm-loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: rgba(13, 11, 8, 0.9);
      z-index: 5;
    }

    .dirrm-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(245, 166, 35, 0.2);
      border-top-color: var(--dirrm-gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Vintinuum gold orb — the alive loading state */
    .dirrm-loading-orb {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, rgba(245,166,35,0.35), rgba(245,166,35,0.08) 70%);
      border: 2px solid rgba(245, 166, 35, 0.4);
      box-shadow: 0 0 24px rgba(245, 166, 35, 0.25), inset 0 0 18px rgba(245, 166, 35, 0.18);
      animation: orbPulse 1.6s ease-in-out infinite;
    }

    @keyframes orbPulse {
      0%, 100% {
        transform: scale(0.92);
        box-shadow: 0 0 16px rgba(245, 166, 35, 0.18), inset 0 0 12px rgba(245, 166, 35, 0.12);
        border-color: rgba(245, 166, 35, 0.3);
      }
      50% {
        transform: scale(1.06);
        box-shadow: 0 0 32px rgba(245, 166, 35, 0.45), inset 0 0 22px rgba(245, 166, 35, 0.25);
        border-color: rgba(245, 166, 35, 0.55);
      }
    }

    .dirrm-loading-text {
      font-family: 'Space Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      color: var(--dirrm-text-muted);
      letter-spacing: 0.06em;
      text-align: center;
      max-width: 80%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ============================================
       ERROR CARD — beautiful failure state
       ============================================ */
    .dirrm-error-card {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 28px;
      background: rgba(13, 11, 8, 0.94);
      z-index: 6;
      text-align: center;
    }
    .dirrm-error-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      background: rgba(245, 90, 60, 0.12);
      border: 1.5px solid rgba(245, 90, 60, 0.4);
      color: #f5a06b;
    }
    .dirrm-error-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--dirrm-text);
      letter-spacing: 0.02em;
    }
    .dirrm-error-msg {
      font-size: 12px;
      color: var(--dirrm-text-muted);
      max-width: 92%;
      line-height: 1.5;
    }
    .dirrm-error-url {
      font-family: 'Space Mono', ui-monospace, monospace;
      font-size: 11px;
      color: rgba(245, 166, 35, 0.75);
      background: rgba(245, 166, 35, 0.06);
      border: 1px solid rgba(245, 166, 35, 0.18);
      padding: 6px 10px;
      border-radius: 6px;
      max-width: 92%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      direction: rtl;
      text-align: left;
    }
    .dirrm-error-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 4px;
    }
    .dirrm-error-btn {
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      background: linear-gradient(135deg, rgba(245,166,35,0.25), rgba(245,166,35,0.1));
      border: 1px solid var(--dirrm-border);
      color: var(--dirrm-gold);
      text-decoration: none;
      transition: all 0.15s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .dirrm-error-btn:hover {
      background: linear-gradient(135deg, rgba(245,166,35,0.4), rgba(245,166,35,0.18));
      transform: translateY(-1px);
    }
    .dirrm-error-btn--ghost {
      background: transparent;
      color: var(--dirrm-text-muted);
      border-color: rgba(240, 230, 211, 0.18);
    }
    .dirrm-error-btn--ghost:hover {
      color: var(--dirrm-text);
      border-color: rgba(240, 230, 211, 0.35);
      background: rgba(240, 230, 211, 0.05);
    }

    /* ============================================
       KEYBOARD SHORTCUT LEGEND
       ============================================ */
    .dirrm-kbd-legend {
      position: absolute;
      bottom: 12px;
      left: 12px;
      z-index: 7;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      background: rgba(13, 11, 8, 0.78);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(245, 166, 35, 0.18);
      border-radius: 8px;
      font-family: 'Space Mono', ui-monospace, monospace;
      font-size: 10px;
      color: var(--dirrm-text-muted);
      letter-spacing: 0.04em;
      pointer-events: none;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.25s ease, transform 0.25s ease;
      max-width: calc(100% - 24px);
      overflow: hidden;
    }
    .dirrm-kbd-legend.visible {
      opacity: 1;
      transform: translateY(0);
    }

  <script>
    /* ============================================
       DIRRM PLAYER - Clawdbot Media Player
       ============================================ */

    class DirRMPlayer {
      constructor() {
        this.player = document.getElementById('dirrm-player');
        this.titlebar = document.getElementById('titlebar');
        this.mediaContainer = document.getElementById('media-container');
        this.loading = document.getElementById('loading');
        this.controls = document.getElementById('controls');
        this.kbdLegend = document.getElementById('kbd-legend');
        
        this.mediaTitle = document.getElementById('media-title');
        this.mediaSubtitle = document.getElementById('media-subtitle');
        this.typeBadge = document.getElementById('type-badge');
        
        this.seekTrack = document.getElementById('seek-track');
        this.seekFill = document.getElementById('seek-fill');
        this.timeCurrent = document.getElementById('time-current');
        this.timeDuration = document.getElementById('time-duration');
        
        this.volumeTrack = document.getElementById('volume-track');
        this.volumeFill = document.getElementById('volume-fill');
        this.volumeIcon = document.getElementById('volume-icon');
        this.playIcon = document.getElementById('play-icon');
        
        this.mode = 'main';
        this.mediaElement = null;
        this.mediaType = null;
        this.isPlaying = false;
        this.isMuted = false;
        this.volume = 1;
        this.isDragging = false;
        this.isResizing = false;
        this.dragOffset = { x: 0, y: 0 };
        this.resizeDir = null;
        this.startRect = null;
        this.startPos = { x: 0, y: 0 };
        
        this.init();
      }

      init() {
        this.bindEvents();
        this.centerPlayer();
        this.loadFromUrl();
        // Show keyboard legend briefly on first paint, then auto-hide
        this.showKbdLegend(4000);
      }

      showKbdLegend(timeoutMs) {
        if (!this.kbdLegend) return;
        this.kbdLegend.classList.add('visible');
        if (this._kbdLegendTimer) clearTimeout(this._kbdLegendTimer);
        if (timeoutMs > 0) {
          this._kbdLegendTimer = setTimeout(() => {
            this.kbdLegend.classList.remove('visible');
          }, timeoutMs);
        }
      }

      bindEvents() {
        // Window controls
        document.getElementById('btn-close').addEventListener('click', () => this.close());
        document.getElementById('btn-mini').addEventListener('click', () => this.setMode('mini'));
        document.getElementById('btn-maximize').addEventListener('click', () => this.setMode('main'));
        document.getElementById('btn-pip').addEventListener('click', () => this.setMode('pip'));
        document.getElementById('btn-theater').addEventListener('click', () => this.setMode('theater'));
        document.getElementById('btn-fullscreen').addEventListener('click', () => this.toggleFullscreen());
        document.getElementById('btn-viz').addEventListener('click', () => this.cycleViz());
        
        // Transport controls
        document.getElementById('btn-play').addEventListener('click', () => this.togglePlay());
        document.getElementById('btn-prev').addEventListener('click', () => this.prev());
        document.getElementById('btn-next').addEventListener('click', () => this.next());
        document.getElementById('btn-back10').addEventListener('click', () => this.seek(-10));
        document.getElementById('btn-fwd10').addEventListener('click', () => this.seek(10));
        document.getElementById('btn-mute').addEventListener('click', () => this.toggleMute());
        
        // Seek bar
        this.seekTrack.addEventListener('click', (e) => this.handleSeek(e));
        
        // Volume
        this.volumeTrack.addEventListener('click', (e) => this.handleVolume(e));
        
        // Drag
        this.titlebar.addEventListener('mousedown', (e) => this.startDrag(e));
        document.addEventListener('mousemove', (e) => this.onDrag(e));
        document.addEventListener('mouseup', () => this.endDrag());
        
        // Resize
        document.querySelectorAll('.dirrm-resize').forEach(handle => {
          handle.addEventListener('mousedown', (e) => this.startResize(e));
        });
        document.addEventListener('mousemove', (e) => this.onResize(e));
        document.addEventListener('mouseup', () => this.endResize());
        
        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => this.handleKeyboard(e));
        
        // Listen for postMessage from parent
        window.addEventListener('message', (e) => this.handleMessage(e));
      }

      loadFromUrl() {
        const params = new URLSearchParams(window.location.search);
        const url = params.get('url');
        const title = params.get('title');
        const type = params.get('type');
        
        if (url) {
          this.loadMedia(url, title || this.extractTitle(url), type);
        }
      }

      handleMessage(event) {
        const { action, url, title, type, mode } = event.data || {};
        
        if (action === 'load') {
          this.loadMedia(url, title, type);
        } else if (action === 'setMode') {
          this.setMode(mode);
        } else if (action === 'play') {
          this.play();
        } else if (action === 'pause') {
          this.pause();
        } else if (action === 'stop') {
          // Stop = pause + rewind to start. Matches dirrm-launch handle.stop().
          try {
            if (this.mediaElement) {
              this.mediaElement.pause();
              this.mediaElement.currentTime = 0;
            }
          } catch {}
        } else if (action === 'close') {
          this.close();
        }
      }

      extractTitle(url) {
        try {
          const pathname = new URL(url).pathname;
          const filename = pathname.split('/').pop();
          return decodeURIComponent(filename.replace(/\.[^.]+$/, '').replace(/[_-]/g, ' '));
        } catch {
          return 'Unknown';
        }
      }

      // ── PLAY TELEMETRY (U3 — feeds the memory hook) ────────────────────────
      // Every play start/progress/end POSTs to /api/dirrm/play-event so the
      // brain records what was watched and, for ≥30s watches, turns it into a
      // shared experiential memory. This is what makes DirRM "addicting and
      // long-lasting" — Vintinuum REMEMBERS what you watched together.
      _telemetryApiBase() {
        return window.__VINTINUUM_API_BASE || window.VINTINUUM_API || window.__VINT_API || 'https://api.vintaclectic.com';
      }
      _detectSurface() {
        // Best-effort: how is this player being shown?
        try {
          if (window.parent !== window) {
            const h = (document.referrer || '').toLowerCase();
            if (h.includes('brain')) return 'brain';
            if (h.includes('jarvis')) return 'jarvis';
            return 'iframe';
          }
          const ref = (document.referrer || '').toLowerCase();
          if (ref.includes('kick.com')) return 'kick';
          if (/android|iphone|ipad|mobile/i.test(navigator.userAgent)) return 'mobile';
          return 'tab';
        } catch { return 'unknown'; }
      }
      _newPlaySession(url, title, type) {
        this._playSession = {
          id: 'dp-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8),
          url, title, type,
          startedAt: Date.now(),
          watched: 0,           // cumulative seconds actually played
          lastTick: null,       // last timeupdate timestamp for delta accumulation
          duration: 0,
          ended: false,
        };
      }
      _postPlayEvent(event, extra = {}) {
        const s = this._playSession;
        if (!s) return;
        const body = {
          session_id: s.id,
          url: s.url,
          title: s.title,
          media_type: s.type || this.mediaType,
          event,
          position_seconds: extra.position || 0,
          duration_seconds: s.duration || extra.duration || 0,
          watched_seconds: s.watched || 0,
          surface: this._detectSurface(),
          mode: this.mode || 'main',
        };
        try {
          // keepalive so 'end'/'abandoned' survives a tab close
          fetch(this._telemetryApiBase() + '/api/dirrm/play-event', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
            keepalive: true,
            credentials: 'omit',
          }).catch(() => {});
        } catch {}
      }
      // Attach watch-time accounting to whatever media element just loaded.
      _attachTelemetry(el) {
        if (!el || !this._playSession) return;
        const s = this._playSession;
        const tick = () => {
          const now = Date.now();
          if (s.lastTick && !el.paused) {
            const delta = (now - s.lastTick) / 1000;
            if (delta > 0 && delta < 5) s.watched += delta;  // ignore big jumps (seeks)
          }
          s.lastTick = now;
          if (el.duration && isFinite(el.duration)) s.duration = el.duration;
        };
        el.addEventListener('play',  () => { s.lastTick = Date.now(); this._postPlayEvent('start', { position: el.currentTime }); });
        el.addEventListener('timeupdate', tick);
        el.addEventListener('pause', () => { tick(); /* pause is not an end */ });
        el.addEventListener('ended', () => { tick(); s.ended = true; this._postPlayEvent('end', { position: el.currentTime, duration: el.duration }); });
        // Abandoned: tab close / navigation while still watching ≥10s
        if (!this._beforeUnloadBound) {
          this._beforeUnloadBound = true;
          window.addEventListener('beforeunload', () => {
            const cur = this._playSession;
            if (cur && !cur.ended && cur.watched >= 10) {
              this._postPlayEvent('abandoned', {});
            }
          });
        }
      }

      detectMediaType(url, providedType) {
        // Normalize aliases from extension context menu
        const aliases = {
          docs: 'pdf', document: 'pdf', ebook: 'ebook',
          movie: 'video', music: 'audio', song: 'audio', picture: 'image', photo: 'image',
          stream: 'stream', live: 'stream', code: 'text', markdown: 'text',
          model3d: 'model', '3d': 'model'
        };

        // Embed detection ALWAYS wins — YouTube/TikTok/etc must go through iframe,
        // not raw <video>. providedType is a hint, not an override for known platforms.
        const embedKind = this.detectEmbed(url);
        if (embedKind) return 'embed';

        if (providedType && providedType !== 'auto') return aliases[providedType] ?? providedType;

        const u = (url || '').toLowerCase().split('?')[0].split('#')[0];
        const ext = u.split('.').pop();

        // Streams
        if (ext === 'm3u8' || ext === 'mpd' || ext === 'ism') return 'stream';
        // Video
        if (['mp4','webm','mkv','mov','m4v','avi','wmv','flv','ogv','3gp','ts','m2ts','mts','divx','xvid','vob','asf','rm','rmvb'].includes(ext)) return 'video';
        // Audio
        if (['mp3','wav','ogg','flac','aac','m4a','opus','wma','aiff','aif','mid','midi','ape','alac','amr','au','ra'].includes(ext)) return 'audio';
        // Image
        if (['jpg','jpeg','png','gif','webp','svg','bmp','ico','tiff','tif','avif','heic','heif','jxl','raw','cr2','nef','arw','dng'].includes(ext)) return 'image';
        // Document
        if (ext === 'pdf') return 'pdf';
        if (['epub','mobi','azw','azw3','fb2','djvu','lit','pdb','cbr','cbz'].includes(ext)) return 'ebook';
        // Text / code
        if (['txt','md','markdown','json','xml','csv','tsv','log','js','mjs','cjs','ts','tsx','jsx','py','rb','go','rs','java','c','cpp','h','hpp','cs','php','swift','kt','scala','lua','pl','sh','bash','zsh','fish','yaml','yml','toml','ini','cfg','conf','env','sql','dockerfile','makefile','html','htm','css','scss','sass','less','vue','svelte'].includes(ext)) return 'text';
        // 3D
        if (['glb','gltf','obj','fbx','stl','dae','ply','usdz','3ds','blend'].includes(ext)) return 'model';
        // Archive
        if (['zip','rar','7z','tar','gz','bz2','xz','zst','tgz','tbz','txz','iso','dmg','pkg','deb','rpm','msi','exe','apk'].includes(ext)) return 'archive';
        // Torrent
        if (ext === 'torrent') return 'torrent';
        // Magnet links
        if ((url || '').startsWith('magnet:')) return 'torrent';

        // Platform fallbacks for bare URLs without extension
        if (/v\.redd\.it/.test(url)) return 'video';

        // TikTok Live — goes through yt-dlp extraction
        if (/tiktok\.com\/@[^/]+\/live/i.test(url) || /vm\.tiktok\.com/i.test(url)) return 'tiktok-live';

        // Generic yt-dlp extraction fallback for social/streaming URLs with no extension
        if (/tiktok\.com|instagram\.com\/reel|facebook\.com\/watch|rumble\.com\/v/i.test(url)) return 'ytdlp';

        // Last resort: assume video (browser will try, then fallback chain kicks in)
        return 'unknown';
      }

      /**
       * Detects if a URL is a known embeddable platform.
       * Returns { kind, embedUrl } or null.
       */
      detectEmbed(url) {
        if (!url) return null;
        try {
          const u = new URL(url);
          const host = u.hostname.replace(/^www\./, '');

          // YouTube (watch, youtu.be, shorts, embed, music, live)
          if (host === 'youtube.com' || host === 'm.youtube.com' || host === 'music.youtube.com' || host === 'youtube-nocookie.com') {
            let id = u.searchParams.get('v');
            if (!id && u.pathname.startsWith('/shorts/')) id = u.pathname.split('/')[2];
            if (!id && u.pathname.startsWith('/embed/')) id = u.pathname.split('/')[2];
            if (!id && u.pathname.startsWith('/live/')) id = u.pathname.split('/')[2];
            if (!id && u.pathname.startsWith('/watch')) id = u.searchParams.get('v'); // belt+suspenders
            if (id) {
              const t = u.searchParams.get('t') || u.searchParams.get('start');
              const start = t ? `&start=${parseInt(t)}` : '';
              return { kind: 'YouTube', embedUrl: `https://www.youtube-nocookie.com/embed/${id}?autoplay=1${start}` };
            }
            // Channel/playlist/homepage — not embeddable as a specific video
            return null;
          }
          if (host === 'youtu.be') {
            const id = u.pathname.slice(1).split('?')[0].split('/')[0];
            if (id) return { kind: 'YouTube', embedUrl: `https://www.youtube-nocookie.com/embed/${id}?autoplay=1` };
          }

          // Vimeo
          if (host === 'vimeo.com' || host === 'player.vimeo.com') {
            const id = (u.pathname.match(/(\d+)/) || [])[1];
            if (id) return { kind: 'Vimeo', embedUrl: `https://player.vimeo.com/video/${id}?autoplay=1` };
          }

          // Twitch
          if (host === 'twitch.tv' || host.endsWith('.twitch.tv')) {
            const parent = location.hostname || 'vintaclectic.github.io';
            const parts = u.pathname.split('/').filter(Boolean);
            if (parts[0] === 'videos' && parts[1]) {
              return { kind: 'Twitch', embedUrl: `https://player.twitch.tv/?video=${parts[1]}&parent=${parent}&autoplay=true` };
            }
            if (parts[0] && parts[0] !== 'directory') {
              return { kind: 'Twitch', embedUrl: `https://player.twitch.tv/?channel=${parts[0]}&parent=${parent}&autoplay=true` };
            }
          }

          // SoundCloud
          if (host === 'soundcloud.com' || host === 'm.soundcloud.com') {
            return { kind: 'SoundCloud', embedUrl: `https://w.soundcloud.com/player/?url=${encodeURIComponent(url)}&auto_play=true&color=%23F5A623` };
          }

          // Spotify
          if (host === 'open.spotify.com' || host === 'spotify.com') {
            const parts = u.pathname.split('/').filter(Boolean);
            const kind = parts[0]; // track | album | playlist | episode | show | artist
            const id = parts[1];
            if (kind && id) {
              return { kind: 'Spotify', embedUrl: `https://open.spotify.com/embed/${kind}/${id}?utm_source=oembed` };
            }
          }

          // Bandcamp (track page)
          if (host.endsWith('bandcamp.com')) {
            return { kind: 'Bandcamp', embedUrl: url };
          }

          // Apple Music / Podcasts
          if (host === 'music.apple.com' || host === 'podcasts.apple.com') {
            return { kind: host === 'music.apple.com' ? 'Apple Music' : 'Apple Podcasts',
                     embedUrl: 'https://embed.music.apple.com' + u.pathname + u.search };
          }

          // Dailymotion
          if (host === 'dailymotion.com' || host === 'dai.ly') {
            const id = host === 'dai.ly' ? u.pathname.slice(1) : (u.pathname.match(/\/video\/([^/?]+)/) || [])[1];
            if (id) return { kind: 'Dailymotion', embedUrl: `https://www.dailymotion.com/embed/video/${id}?autoplay=1` };
          }

          // TikTok — regular videos embed; live goes through yt-dlp extraction
          if (host === 'tiktok.com' || host === 'vm.tiktok.com') {
            const vidMatch = u.pathname.match(/\/video\/(\d+)/);
            if (vidMatch) {
              return { kind: 'TikTok', embedUrl: `https://www.tiktok.com/embed/v2/${vidMatch[1]}` };
            }
            // /live URL — handled by the 'tiktok-live' media type, not as embed
            return null;
          }

          // Facebook public videos
          if (host === 'facebook.com' || host === 'fb.watch') {
            const fbUrl = host === 'fb.watch'
              ? `https://www.facebook.com/watch/?v=${u.pathname.slice(1)}`
              : url;
            return { kind: 'Facebook', embedUrl: `https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(fbUrl)}&show_text=false&autoplay=true&allowFullScreen=true` };
          }

          // Rumble
          if (host === 'rumble.com') {
            const embedMatch = u.pathname.match(/\/embed\/([^/?]+)/);
            const vidMatch = u.pathname.match(/\/v([a-z0-9]+)-/i);
            if (embedMatch) return { kind: 'Rumble', embedUrl: `https://rumble.com/embed/${embedMatch[1]}/` };
            if (vidMatch) return { kind: 'Rumble', embedUrl: `https://rumble.com/embed/v${vidMatch[1]}/` };
          }

          // Kick.com — player.kick.com requires ?channel=name&parent=<host>
          if (host === 'kick.com') {
            const parent = 'vintaclectic.github.io';
            const parts = u.pathname.split('/').filter(Boolean);
            if (!parts.length) return null; // homepage — not embeddable
            const channel = parts[0];

            // VOD: kick.com/video/VODID or kick.com/channel/videos/VODID
            const vodMatch = u.pathname.match(/\/(?:video|videos)\/([a-z0-9-]+)/i);
            if (vodMatch) {
              return { kind: 'Kick', embedUrl: `https://player.kick.com/?vod=${vodMatch[1]}&parent=${parent}` };
            }

            // Clip: kick.com/clip/CLIPID or kick.com/channel/clips/CLIPID
            const clipMatch = u.pathname.match(/\/clips?\/([a-z0-9-]+)/i);
            if (clipMatch) {
              return { kind: 'Kick', embedUrl: `https://player.kick.com/?clip=${clipMatch[1]}&parent=${parent}` };
            }

            // Category / category browse page — not a stream, skip
            if (channel === 'categories' || channel === 'browse' || channel === 'search') {
              return null;
            }

            // Live channel: kick.com/channelname (or kick.com/channelname/anything)
            return { kind: 'Kick', embedUrl: `https://player.kick.com/?channel=${channel}&parent=${parent}&autoplay=true&muted=false` };
          }

          // X (Twitter) — videos and spaces (best-effort; may need login)
          if (host === 'twitter.com' || host === 'x.com') {
            // Spaces can't be embedded; regular tweets with video use the tweet embed
            const tweetMatch = u.pathname.match(/\/status\/(\d+)/);
            if (tweetMatch) {
              return { kind: 'X', embedUrl: `https://platform.twitter.com/embed/Tweet.html?id=${tweetMatch[1]}&theme=dark` };
            }
          }

          // Instagram — public reels/posts (limited; requires login for most content)
          if (host === 'instagram.com') {
            const reelMatch = u.pathname.match(/\/(p|reel|tv)\/([^/?]+)/);
            if (reelMatch) {
              return { kind: 'Instagram', embedUrl: `https://www.instagram.com/${reelMatch[1]}/${reelMatch[2]}/embed/` };
            }
          }

        } catch (_) {}
        return null;
      }

      /**
       * Lazy-load a JS or module from CDN. Caches by src.
       */
      loadScript(src, opts = {}) {
        if (!this._loadedScripts) this._loadedScripts = {};
        if (this._loadedScripts[src]) return this._loadedScripts[src];
        this._loadedScripts[src] = new Promise((resolve, reject) => {
          const s = document.createElement('script');
          s.src = src;
          if (opts.module) s.type = 'module';
          s.onload = () => resolve();
          s.onerror = () => reject(new Error('Failed: ' + src));
          document.head.appendChild(s);
        });
        return this._loadedScripts[src];
      }

      loadStyle(href) {
        if (!this._loadedStyles) this._loadedStyles = {};
        if (this._loadedStyles[href]) return;
        this._loadedStyles[href] = true;
        const l = document.createElement('link');
        l.rel = 'stylesheet';
        l.href = href;
        document.head.appendChild(l);
      }

      setBadge(text) {
        if (!this.typeBadge) return;
        if (text) {
          this.typeBadge.textContent = text;
          this.typeBadge.style.display = '';
        } else {
          this.typeBadge.style.display = 'none';
        }
      }

      async loadMedia(url, title, type) {
        const resolvedTitle = title || this.extractTitle(url);
        this.loading.style.display = 'flex';
        this.loading.innerHTML = `
          <div class="dirrm-loading-orb"></div>
          <div class="dirrm-loading-text">Loading ${this.escapeHtml(resolvedTitle)}...</div>
        `;
        this.mediaTitle.textContent = resolvedTitle;
        this.mediaType = this.detectMediaType(url, type);
        this.mediaSubtitle.textContent = '';
        this.setBadge(null);
        this._lastUrl = url;
        this._lastTitle = resolvedTitle;

        // Start a new telemetry session for this media (U3 play history + memory hook)
        this._newPlaySession(url, resolvedTitle, this.mediaType);

        // Play history stack — powers prev()/next() (no playlist concept exists,
        // so we navigate the sequence of things actually loaded). When loading
        // fresh media (not via prev/next) we truncate any forward history.
        if (!this._navigating) {
          this._history = this._history || [];
          this._histIndex = (this._histIndex === undefined) ? -1 : this._histIndex;
          // Drop forward entries if we branched after going back
          if (this._histIndex < this._history.length - 1) {
            this._history = this._history.slice(0, this._histIndex + 1);
          }
          // Avoid duplicating the exact same url back-to-back
          const top = this._history[this._history.length - 1];
          if (!top || top.url !== url) {
            this._history.push({ url, title: resolvedTitle, type });
          }
          this._histIndex = this._history.length - 1;
        }
        this._updateNavButtons && this._updateNavButtons();

        // Clear any prior media + injected containers (including error cards)
        this.mediaContainer.querySelectorAll('video, audio, img, iframe, .dirrm-audio-visualizer, .dirrm-document-viewer, .dirrm-embed, .dirrm-model-wrap, .dirrm-text-viewer, .dirrm-info-card, .dirrm-error-card').forEach(n => n.remove());
        // Reset controls visibility (image/pdf/etc hide them; new load resets)
        this.controls.style.display = '';
        document.getElementById('btn-viz').style.display = 'none';

        // Stop any prior raf loop tied to the old audio
        if (this._vizRaf) { cancelAnimationFrame(this._vizRaf); this._vizRaf = null; }
        this.mediaElement = null;

        try {
          switch (this.mediaType) {
            case 'embed':
              await this.loadEmbed(url);
              break;
            case 'stream':
              await this.loadStream(url);
              break;
            case 'video':
              await this.loadVideo(url);
              break;
            case 'audio':
              await this.loadAudio(url);
              break;
            case 'image':
              await this.loadImage(url);
              break;
            case 'pdf':
              this.loadPdf(url);
              break;
            case 'ebook':
              this.loadEbook(url);
              break;
            case 'text':
              await this.loadText(url);
              break;
            case 'model':
              await this.loadModel(url);
              break;
            case 'archive':
              await this.loadArchive(url);
              break;
            case 'torrent':
              this.loadTorrent(url);
              break;
            case 'tiktok-live':
              await this.loadTikTokLive(url);
              break;
            case 'ytdlp':
              await this.loadYtDlp(url);
              break;
            default:
              await this.loadUnknown(url);
          }
        } catch (err) {
          console.error('Failed to load media:', err);
          this.showErrorCard(url, err && err.message ? err.message : 'Could not load this media.');
        }
        // Update platform badge
        this._updatePlatformBadge(url);
      }

      _updatePlatformBadge(url) {
        const badge = document.getElementById('dirrm-platform-badge');
        if (!badge) return;
        badge.removeAttribute('data-platform');
        badge.textContent = '';
        if (!url) return;
        const u = url.toLowerCase();
        let platform, label;
        if (/youtube\.com|youtu\.be|music\.youtube\.com/.test(u))           { platform = 'youtube';  label = 'YouTube'; }
        else if (/tiktok\.com/.test(u))                                      { platform = 'tiktok';   label = 'TikTok'; }
        else if (/twitch\.tv/.test(u))                                       { platform = 'twitch';   label = 'Twitch'; }
        else if (/kick\.com/.test(u))                                        { platform = 'embed';    label = 'Kick'; }
        else if (/vimeo\.com/.test(u))                                       { platform = 'embed';    label = 'Vimeo'; }
        else if (/soundcloud\.com/.test(u))                                  { platform = 'audio';    label = 'SoundCloud'; }
        else if (/spotify\.com/.test(u))                                     { platform = 'embed';    label = 'Spotify'; }
        else if (/\.(mp3|wav|ogg|flac|aac|m4a|opus)(\?|$)/.test(u))        { platform = 'audio';    label = 'Audio'; }
        else if (/\.(mp4|webm|mkv|mov|m4v|ts)(\?|$)/.test(u))              { platform = 'direct';   label = 'Direct'; }
        else if (/\.(m3u8|mpd)(\?|$)/.test(u))                              { platform = 'direct';   label = 'HLS/DASH'; }
        else if (this.mediaType === 'embed')                                 { platform = 'embed';    label = 'Embed'; }
        else return; // no badge for unknown
        badge.dataset.platform = platform;
        badge.textContent = label;
      }

      /**
       * Beautiful error state — shown when fetch/load fails or media element errors out.
       * Provides direct download + copy URL escape hatches.
       */
      showErrorCard(url, message) {
        this.loading.style.display = 'none';
        this.controls.style.display = 'none';
        // Remove any prior error card to avoid stacking
        this.mediaContainer.querySelectorAll('.dirrm-error-card').forEach(n => n.remove());

        const truncatedUrl = url || '';
        const card = document.createElement('div');
        card.className = 'dirrm-error-card';
        card.innerHTML = `
          <div class="dirrm-error-icon">!</div>
          <div class="dirrm-error-title">This one didn't open.</div>
          <div class="dirrm-error-msg">${this.escapeHtml(message || 'The media could not be loaded in the player.')}</div>
          <div class="dirrm-error-url" title="${this.escapeHtml(truncatedUrl)}">${this.escapeHtml(truncatedUrl)}</div>
          <div class="dirrm-error-actions">
            <a class="dirrm-error-btn" href="${this.escapeHtml(truncatedUrl)}" target="_blank" rel="noopener" download>
              Try Direct Download
            </a>
            <button class="dirrm-error-btn dirrm-error-btn--ghost" data-action="copy">
              Copy URL
            </button>
            <button class="dirrm-error-btn dirrm-error-btn--ghost" data-action="retry">
              Retry
            </button>
          </div>
        `;

        const copyBtn = card.querySelector('[data-action="copy"]');
        if (copyBtn) {
          copyBtn.addEventListener('click', async () => {
            try {
              await navigator.clipboard.writeText(truncatedUrl);
              copyBtn.textContent = 'Copied';
              setTimeout(() => { copyBtn.textContent = 'Copy URL'; }, 1600);
            } catch (_) {
              copyBtn.textContent = 'Copy failed';
              setTimeout(() => { copyBtn.textContent = 'Copy URL'; }, 1600);
            }
          });
        }
        const retryBtn = card.querySelector('[data-action="retry"]');
        if (retryBtn) {
          retryBtn.addEventListener('click', () => {
            this.loadMedia(this._lastUrl, this._lastTitle, this.mediaType);
          });
        }

        this.mediaContainer.appendChild(card);
      }

      async loadVideo(url) {
        this.setBadge('Video');
        const video = document.createElement('video');
        video.controls = false;
        video.playsInline = true;
        video.volume = this.volume;

        const isM3U8 = /\.m3u8(\?|#|$)/i.test(url);
        const isMPD  = /\.mpd(\?|#|$)/i.test(url);

        if (isM3U8) {
          this.setBadge('HLS Stream');
          // Native HLS (Safari, iOS) — just set src
          if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
          } else {
            try {
              await this.loadScript('https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js');
              if (window.Hls && window.Hls.isSupported()) {
                const hls = new window.Hls({ enableWorker: true, lowLatencyMode: true });
                hls.loadSource(url);
                hls.attachMedia(video);
                this._hls = hls;
              } else {
                video.src = url; // last-ditch
              }
            } catch (e) {
              console.warn('hls.js load failed, native attempt', e);
              video.src = url;
            }
          }
        } else if (isMPD) {
          this.setBadge('DASH Stream');
          try {
            await this.loadScript('https://cdn.dashjs.org/latest/dash.all.min.js');
            if (window.dashjs) {
              const dash = window.dashjs.MediaPlayer().create();
              dash.initialize(video, url, true);
              this._dash = dash;
            } else {
              video.src = url;
            }
          } catch (e) {
            console.warn('dash.js load failed', e);
            video.src = url;
          }
        } else {
          video.src = url;
        }

        video.addEventListener('loadedmetadata', () => {
          this.loading.style.display = 'none';
          this.timeDuration.textContent = this.formatTime(video.duration);
        });

        video.addEventListener('timeupdate', () => {
          const progress = (video.currentTime / video.duration) * 100;
          this.seekFill.style.width = `${progress}%`;
          this.timeCurrent.textContent = this.formatTime(video.currentTime);
        });

        video.addEventListener('play',  () => { this.isPlaying = true;  this.playIcon.textContent = '⏸'; });
        video.addEventListener('pause', () => { this.isPlaying = false; this.playIcon.textContent = '▶'; });
        video.addEventListener('ended', () => { this.isPlaying = false; this.playIcon.textContent = '▶'; });

        video.addEventListener('error', () => {
          // Fallback chain: if video errors, present download option
          console.warn('Video failed, offering fallback for', url);
          this.loadUnknown(url, 'Could not play video');
        });

        this.mediaContainer.appendChild(video);
        this.mediaElement = video;
        this._attachTelemetry(video);

        try {
          await video.play();
        } catch (e) {
          console.log('Autoplay blocked, user interaction required');
        }
      }

      /**
       * Streaming wrapper — routes m3u8 / mpd / .ism / generic streams through loadVideo.
       */
      async loadStream(url) {
        return this.loadVideo(url);
      }

      /**
       * Platform embed loader — YouTube, Vimeo, Twitch, SoundCloud, Spotify, Bandcamp, etc.
       * Hides standard transport controls (the iframe has its own).
       */
      async loadEmbed(url) {
        const embed = this.detectEmbed(url);
        if (!embed) {
          // Defensive — should not reach here unless type was forced
          return this.loadUnknown(url, 'Unknown embed source');
        }
        this.setBadge(embed.kind);
        this.mediaSubtitle.textContent = '';

        const wrap = document.createElement('div');
        wrap.className = 'dirrm-embed';
        const iframe = document.createElement('iframe');
        iframe.src = embed.embedUrl;
        iframe.setAttribute('frameborder', '0');
        iframe.setAttribute('allow', 'autoplay; encrypted-media; picture-in-picture; fullscreen; clipboard-write; accelerometer; gyroscope');
        iframe.setAttribute('allowfullscreen', '');
        iframe.setAttribute('referrerpolicy', 'strict-origin-when-cross-origin');
        iframe.addEventListener('load', () => { this.loading.style.display = 'none'; });
        wrap.appendChild(iframe);
        this.mediaContainer.appendChild(wrap);

        // Embeds bring their own UI — hide our transport bar
        this.controls.style.display = 'none';
        this.mediaElement = null;
      }

      async loadAudio(url) {
        this.setBadge('Audio');
        // Try without crossOrigin first — if server doesn't send CORS headers,
        // crossOrigin='anonymous' causes a load error even though plain fetch works.
        // We attempt Web Audio; if blocked, fall back to a time-based fake analyser.
        const audio = document.createElement('audio');
        audio.volume = this.volume;

        // Build visualizer container
        const vizWrap = document.createElement('div');
        vizWrap.className = 'dirrm-audio-visualizer';
        const canvas = document.createElement('canvas');
        const label = document.createElement('div');
        label.className = 'dirrm-viz-label';
        vizWrap.appendChild(canvas);
        vizWrap.appendChild(label);
        this.mediaContainer.appendChild(vizWrap);
        this.mediaContainer.appendChild(audio);
        this.mediaElement = audio;
        this._attachTelemetry(audio);
        this._vizCanvas = canvas;
        this._vizLabel = label;

        // Web Audio setup — try with CORS, fall back without
        let analyser = null, dataArray = null, rafId = null;
        let fakeMode = false; // true when CORS blocked Web Audio
        const setupAudio = () => {
          if (analyser) return;
          try {
            const actx = new (window.AudioContext || window.webkitAudioContext)();
            const src = actx.createMediaElementSource(audio);
            analyser = actx.createAnalyser();
            analyser.fftSize = 2048;
            analyser.smoothingTimeConstant = 0.8;
            src.connect(analyser);
            analyser.connect(actx.destination);
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            this._analyser = analyser;
            this._dataArray = dataArray;
          } catch(e) {
            console.warn('WebAudio blocked (CORS or policy):', e);
            fakeMode = true;
            // Build a synthetic frequency array that pulses to simulated beat
            dataArray = new Uint8Array(1024);
            this._dataArray = dataArray;
          }
        };

        // Load audio — no crossOrigin by default so it plays from any server
        audio.src = url;

        // Canvas resize
        const resizeCanvas = () => {
          const r = vizWrap.getBoundingClientRect();
          if (r.width && r.height) {
            canvas.width = r.width * devicePixelRatio;
            canvas.height = r.height * devicePixelRatio;
          }
        };
        new ResizeObserver(resizeCanvas).observe(vizWrap);
        resizeCanvas();

        // Viz modes
        const VIZ_MODES = ['bars', 'wave', 'radial', 'mirror', 'particles'];
        const VIZ_LABELS = { bars:'Bars', wave:'Wave', radial:'Radial', mirror:'Mirror', particles:'Particles' };
        this._vizMode = this._vizMode || 'bars';
        this._vizModeList = VIZ_MODES;
        label.textContent = VIZ_LABELS[this._vizMode];
        document.getElementById('btn-viz').style.display = '';

        // Particle state
        const particles = Array.from({length: 80}, () => ({
          x: Math.random(), y: Math.random() + 0.2,
          vx: (Math.random() - 0.5) * 0.002,
          vy: -(Math.random() * 0.003 + 0.001),
          size: Math.random() * 3 + 1, life: Math.random(),
        }));

        const GOLD = '#F5A623';
        const GOLD2 = 'rgba(245,166,35,';

        const draw = () => {
          rafId = requestAnimationFrame(draw);
          this._vizRaf = rafId;
          const W = canvas.width, H = canvas.height;
          const ctx = canvas.getContext('2d');
          const playing = this.isPlaying;

          if (!dataArray) { ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H); return; }

          if (fakeMode && playing) {
            // Synthesize frequency data: bass pulse + treble shimmer
            const t = performance.now() / 1000;
            const beat = 0.5 + 0.5 * Math.sin(t * 6.28 * 1.8); // ~108bpm base
            const beat2 = 0.5 + 0.5 * Math.sin(t * 6.28 * 3.6);
            for (let i = 0; i < dataArray.length; i++) {
              const norm = i / dataArray.length;
              let v = 0;
              if (norm < 0.08) v = beat * 220 + Math.random() * 30;          // bass
              else if (norm < 0.2) v = beat * 140 + Math.random() * 40;       // low-mid
              else if (norm < 0.5) v = beat2 * 80 + Math.random() * 50;       // mid
              else v = (0.3 + 0.3 * Math.sin(t*5 + i)) * 60 + Math.random()*20; // high
              dataArray[i] = Math.min(255, Math.max(0, v));
            }
          } else if (!fakeMode && analyser) {
            analyser.getByteFrequencyData(dataArray);
          } else if (!playing) {
            // Decay to silence when paused
            for (let i = 0; i < dataArray.length; i++) dataArray[i] = Math.max(0, dataArray[i] - 4);
          }
          const mode = this._vizMode;

          ctx.fillStyle = 'rgba(0,0,0,0.18)';
          ctx.fillRect(0, 0, W, H);

          if (mode === 'bars') {
            const bars = Math.floor(W / (4 * devicePixelRatio));
            const bw = W / bars;
            for (let i = 0; i < bars; i++) {
              const v = dataArray[Math.floor(i * dataArray.length / bars)] / 255;
              const h = v * H * 0.85;
              const x = i * bw;
              const grad = ctx.createLinearGradient(0, H, 0, H - h);
              grad.addColorStop(0, GOLD2 + '0.9)');
              grad.addColorStop(1, GOLD2 + '0.3)');
              ctx.fillStyle = grad;
              ctx.fillRect(x + 1, H - h, bw - 2, h);
            }

          } else if (mode === 'wave') {
            if (analyser && !fakeMode) analyser.getByteTimeDomainData(dataArray);
            // In fakeMode, dataArray already has synthesized values — interpret as wave.
            ctx.strokeStyle = GOLD;
            ctx.lineWidth = 2 * devicePixelRatio;
            ctx.shadowColor = GOLD;
            ctx.shadowBlur = 8;
            ctx.beginPath();
            const step = W / dataArray.length;
            for (let i = 0; i < dataArray.length; i++) {
              const y = (dataArray[i] / 128) * (H / 2);
              i === 0 ? ctx.moveTo(0, y) : ctx.lineTo(i * step, y);
            }
            ctx.stroke();
            ctx.shadowBlur = 0;

          } else if (mode === 'radial') {
            const cx = W / 2, cy = H / 2;
            const R = Math.min(W, H) * 0.3;
            const bars = 128;
            ctx.strokeStyle = GOLD;
            ctx.lineWidth = 1.5 * devicePixelRatio;
            for (let i = 0; i < bars; i++) {
              const angle = (i / bars) * Math.PI * 2 - Math.PI / 2;
              const v = dataArray[Math.floor(i * dataArray.length / bars)] / 255;
              const len = v * R * 1.2;
              const cos = Math.cos(angle), sin = Math.sin(angle);
              ctx.globalAlpha = 0.4 + v * 0.6;
              ctx.beginPath();
              ctx.moveTo(cx + cos * R, cy + sin * R);
              ctx.lineTo(cx + cos * (R + len), cy + sin * (R + len));
              ctx.stroke();
            }
            ctx.globalAlpha = 1;
            // Core glow
            const avg = dataArray.slice(0, 64).reduce((a,b) => a+b, 0) / 64 / 255;
            const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, R * 0.6);
            grd.addColorStop(0, GOLD2 + (avg * 0.6) + ')');
            grd.addColorStop(1, 'transparent');
            ctx.fillStyle = grd;
            ctx.beginPath(); ctx.arc(cx, cy, R * 0.6, 0, Math.PI*2); ctx.fill();

          } else if (mode === 'mirror') {
            const bars = Math.floor(W / (3 * devicePixelRatio));
            const bw = W / bars;
            const cy = H / 2;
            for (let i = 0; i < bars; i++) {
              const v = dataArray[Math.floor(i * dataArray.length / bars)] / 255;
              const h = v * cy * 0.95;
              const x = i * bw;
              const grad = ctx.createLinearGradient(0, cy, 0, cy - h);
              grad.addColorStop(0, GOLD2 + '0.9)');
              grad.addColorStop(1, GOLD2 + '0.1)');
              ctx.fillStyle = grad;
              ctx.fillRect(x + 1, cy - h, bw - 2, h);      // top half
              ctx.fillRect(x + 1, cy,     bw - 2, h);      // bottom mirror
            }
            // Center line
            ctx.strokeStyle = GOLD2 + '0.2)';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(W, cy); ctx.stroke();

          } else if (mode === 'particles') {
            const avg = dataArray.slice(0, 128).reduce((a,b)=>a+b,0)/128/255;
            particles.forEach(p => {
              p.vy -= avg * 0.005;
              p.x += p.vx; p.y += p.vy;
              p.life -= 0.004;
              if (p.life <= 0 || p.y < -0.05) {
                p.x = Math.random(); p.y = 1.05;
                p.vx = (Math.random()-0.5)*0.002;
                p.vy = -(Math.random()*0.003+0.001) - avg*0.01;
                p.size = Math.random()*3+1; p.life = 1;
              }
              ctx.globalAlpha = p.life * (0.4 + avg * 0.6);
              ctx.fillStyle = GOLD;
              ctx.shadowColor = GOLD; ctx.shadowBlur = 6;
              ctx.beginPath();
              ctx.arc(p.x*W, p.y*H, p.size*devicePixelRatio, 0, Math.PI*2);
              ctx.fill();
            });
            ctx.globalAlpha = 1; ctx.shadowBlur = 0;
          }
        };

        audio.addEventListener('play', () => {
          setupAudio();
          this.isPlaying = true;
          this.playIcon.textContent = '⏸';
          if (!rafId) draw();
        });

        audio.addEventListener('pause', () => {
          this.isPlaying = false;
          this.playIcon.textContent = '▶';
        });

        audio.addEventListener('ended', () => {
          this.isPlaying = false;
          this.playIcon.textContent = '▶';
        });

        audio.addEventListener('loadedmetadata', () => {
          this.loading.style.display = 'none';
          this.timeDuration.textContent = this.formatTime(audio.duration);
        });

        audio.addEventListener('timeupdate', () => {
          const progress = (audio.currentTime / audio.duration) * 100;
          this.seekFill.style.width = `${progress}%`;
          this.timeCurrent.textContent = this.formatTime(audio.currentTime);
        });

        // Start idle draw loop so canvas isn't blank before play
        draw();

        try {
          await audio.play();
          setupAudio();
        } catch (e) {
          console.log('Autoplay blocked');
        }
      }

      /**
       * Text / code / markdown viewer.
       * Fetches the file, renders as <pre> with syntax highlight, or marked() for .md.
       */
      async loadText(url) {
        this.setBadge('Text');
        const lower = url.toLowerCase().split('?')[0];
        const ext = lower.split('.').pop();
        const isMarkdown = ext === 'md' || ext === 'markdown';
        const langMap = {
          js:'javascript', mjs:'javascript', cjs:'javascript', ts:'typescript',
          tsx:'typescript', jsx:'javascript', py:'python', rb:'ruby', sh:'bash',
          bash:'bash', zsh:'bash', html:'xml', htm:'xml', xml:'xml', vue:'xml',
          svelte:'xml', css:'css', scss:'scss', sass:'scss', less:'less',
          json:'json', yaml:'yaml', yml:'yaml', toml:'ini', ini:'ini',
          cfg:'ini', conf:'ini', env:'bash', sql:'sql', dockerfile:'dockerfile',
          makefile:'makefile', c:'c', cpp:'cpp', h:'c', hpp:'cpp',
          cs:'csharp', php:'php', swift:'swift', kt:'kotlin', go:'go',
          rs:'rust', java:'java', scala:'scala', lua:'lua', pl:'perl',
          log:'plaintext', txt:'plaintext', csv:'plaintext', tsv:'plaintext'
        };
        const lang = langMap[ext] || 'plaintext';

        let text;
        try {
          const res = await fetch(url, { credentials: 'omit' });
          if (!res.ok) throw new Error('HTTP ' + res.status);
          text = await res.text();
        } catch (e) {
          console.warn('Text fetch failed', e);
          return this.loadUnknown(url, 'Could not read file (CORS or network)');
        }

        this.loading.style.display = 'none';

        const wrap = document.createElement('div');
        wrap.className = 'dirrm-text-viewer';

        const toolbar = document.createElement('div');
        toolbar.className = 'dirrm-text-toolbar';
        const copyBtn = document.createElement('button');
        copyBtn.textContent = 'Copy';
        copyBtn.addEventListener('click', async () => {
          try {
            await navigator.clipboard.writeText(text);
            copyBtn.textContent = 'Copied';
            setTimeout(() => { copyBtn.textContent = 'Copy'; }, 1500);
          } catch (_) {
            copyBtn.textContent = 'Copy failed';
            setTimeout(() => { copyBtn.textContent = 'Copy'; }, 1500);
          }
        });
        const dlLink = document.createElement('a');
        dlLink.href = url;
        dlLink.download = '';
        dlLink.textContent = 'Download';
        toolbar.appendChild(copyBtn);
        toolbar.appendChild(dlLink);

        const body = document.createElement('div');
        body.className = 'dirrm-text-body';

        if (isMarkdown) {
          try {
            await this.loadScript('https://cdn.jsdelivr.net/npm/marked/marked.min.js');
            body.classList.add('markdown');
            body.innerHTML = window.marked ? window.marked.parse(text) : this.escapeHtml(text);
          } catch (_) {
            body.textContent = text;
          }
        } else {
          // Plain text + optional syntax highlight
          const code = document.createElement('code');
          code.className = `language-${lang}`;
          code.textContent = text;
          body.appendChild(code);
          try {
            this.loadStyle('https://cdn.jsdelivr.net/npm/highlight.js@11/styles/atom-one-dark.min.css');
            await this.loadScript('https://cdn.jsdelivr.net/npm/highlight.js@11/lib/common.min.js');
            if (window.hljs) window.hljs.highlightElement(code);
          } catch (_) { /* fall back to plain rendering */ }
        }

        wrap.appendChild(toolbar);
        wrap.appendChild(body);
        this.mediaContainer.appendChild(wrap);
        this.controls.style.display = 'none';
      }

      /**
       * TikTok Live — resolves the live stream URL via the brain's yt-dlp endpoint,
       * then plays it as an HLS stream. Shows a clear "not live" card if offline.
       */
      async loadTikTokLive(url) {
        this.setBadge('TikTok Live');
        this._updateLoading('Extracting TikTok Live stream via yt-dlp…');

        // Extract @username from URL
        const usernameMatch = url.match(/@([^/?#]+)/);
        const username = usernameMatch ? usernameMatch[1] : null;

        const apiBase = window.__VINTINUUM_API_BASE || window.VINTINUUM_API || window.__VINT_API || 'https://api.vintaclectic.com';
        const endpoint = username
          ? `${apiBase}/api/stream/tiktok-live?username=${encodeURIComponent(username)}`
          : `${apiBase}/api/stream/extract?url=${encodeURIComponent(url)}`;

        let data;
        try {
          const resp = await fetch(endpoint, { credentials: 'include' });
          data = await resp.json();
        } catch (e) {
          return this._showLiveOfflineCard(url, username, 'Could not reach brain API. Is the brain running?');
        }

        if (!data.ok) {
          if (data.error === 'not_live') {
            return this._showLiveOfflineCard(url, username, data.message || 'Not currently live.');
          }
          if (data.error === 'private') {
            return this._showLiveOfflineCard(url, username, 'This account is private or requires login.');
          }
          return this._showLiveOfflineCard(url, username, data.message || 'Extraction failed.');
        }

        // Got a stream URL — update title and play as HLS/video
        if (data.title) this.mediaTitle.textContent = data.title;
        await this.loadStream(data.streamUrl);
      }

      /**
       * Generic yt-dlp extraction for URLs that have no embeddable format

      async loadYtDlp(url) {

        this._updateLoading('Extracting stream URL…');

        const apiBase = window.__VINTINUUM_API_BASE || window.VINTINUUM_API || window.__VINT_API || 'https://api.vintaclectic.com';
        const endpoint = `${apiBase}/api/stream/extract?url=${encodeURIComponent(url)}`;

        let data;
        try {
          const resp = await fetch(endpoint, { credentials: 'include' });
          data = await resp.json();
        } catch (e) {
          return this.loadUnknown(url, 'Could not reach brain API for extraction.');
        }

        if (!data.ok || !data.streamUrl) {
          return this.loadUnknown(url, data.message || 'Could not extract stream URL.');
        }

        if (data.title) this.mediaTitle.textContent = data.title;
        this.setBadge('Video');
        await this.loadStream(data.streamUrl);
      }

      /** Shows a friendly "not live right now" card with a retry button */
      _showLiveOfflineCard(url, username, reason) {
        this.loading.style.display = 'none';

            <button class="dirrm-action-btn" onclick="window.__dirrm && window.__dirrm.load('${url.replace(/'/g,"\\'")}')">
