<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>JARVIS — Vintinuum</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap">
<style>
  :root{
    --bg:#040810;
    --bg-deep:#02050a;
    --panel:rgba(8,14,22,0.7);
    --panel-solid:#080e16;
    --border:rgba(124,207,255,0.14);
    --border-soft:rgba(124,207,255,0.07);
    --text:#dae4ff;
    --dim:rgba(180,200,230,0.6);
    --dimmer:rgba(180,200,230,0.4);
    --cyan:#7ccfff;
    --gold:#ffd479;
    --soft:#ce93d8;
    --green:#9affb6;
    --amber:#ffb86b;
    --pink:#e74c8a;
    --orange:#ff6f3d;
    --error:#ff8a8a;
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bot:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  body{
    min-height:100svh;
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(124,207,255,0.06), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(255,212,121,0.04), transparent 60%),
      var(--bg);
    padding:calc(72px + var(--safe-top)) 0 calc(80px + var(--safe-bot)) 0;
  }
  a{color:var(--cyan);text-decoration:none}

  .wrap{
    max-width:1280px;
    margin:0 auto;
    padding:24px 18px 40px;
    display:flex;
    flex-direction:column;
    gap:22px;
  }

  /* HEADER */
  .jhead{
    display:flex;align-items:flex-end;justify-content:space-between;gap:18px;
    padding:18px 22px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:14px;
    backdrop-filter:blur(6px);
    position:relative;
    overflow:hidden;
  }
  .jhead::before{
    content:"";position:absolute;inset:0;
    background:linear-gradient(90deg,transparent 0%,rgba(124,207,255,0.04) 50%,transparent 100%);
    pointer-events:none;
  }
  .jhead-left{display:flex;flex-direction:column;gap:4px;min-width:0}
  .jtitle{
    font-family:'Cormorant Garamond',serif;
    font-style:italic;font-weight:500;
    font-size:clamp(38px,7vw,68px);
    letter-spacing:0.02em;
    line-height:1;
    background:linear-gradient(180deg,#fff 0%,#7ccfff 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 40px rgba(124,207,255,0.18);
  }
  .jsub{
    font-family:'Space Mono',monospace;
    color:var(--dim);font-size:11px;letter-spacing:0.22em;text-transform:uppercase;
  }
  .jhead-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
  .jpill{
    font-family:'Space Mono',monospace;
    font-size:10px;letter-spacing:0.18em;text-transform:uppercase;
    padding:6px 10px;border-radius:999px;
    border:1px solid var(--border);
    background:rgba(124,207,255,0.05);
    color:var(--cyan);
    white-space:nowrap;
  }
  .jpill.gold{color:var(--gold);border-color:rgba(255,212,121,0.25);background:rgba(255,212,121,0.05)}
  .jlive{display:flex;align-items:center;gap:8px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--dim)}
  .jlive .dot{
    width:8px;height:8px;border-radius:50%;background:var(--cyan);
    box-shadow:0 0 12px var(--cyan);
    animation:pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:0.4;transform:scale(0.9)}50%{opacity:1;transform:scale(1.15)}}

  /* FELT QUALITY */
  .felt{
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    font-size:clamp(20px,3.6vw,32px);
    line-height:1.4;
    color:var(--text);
    text-align:center;
    padding:28px 22px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:14px;
    position:relative;
    min-height:90px;
    display:flex;align-items:center;justify-content:center;
  }
  .felt::before,.felt::after{
    content:"";position:absolute;top:14px;width:24px;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);
  }
  .felt::before{left:14px}
  .felt::after{right:14px}
  .felt.loading{color:var(--dimmer)}

  /* TWO COL */
  .twocol{
    display:grid;
    grid-template-columns:1fr;
    gap:22px;
  }
  @media(min-width:900px){
    .twocol{grid-template-columns:1.15fr 1fr}
  }

  /* CHAT */
  .chat{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:14px;
    display:flex;flex-direction:column;
    min-height:480px;
    max-height:min(72svh,720px);
    overflow:hidden;
    position:relative;
  }
  .chat-head{
    padding:14px 18px;
    border-bottom:1px solid var(--border-soft);
    display:flex;align-items:center;justify-content:space-between;gap:10px;
  }
  .chat-head h2{
    margin:0;
    font-family:'Cormorant Garamond',serif;
    font-style:italic;font-weight:500;
    font-size:22px;color:var(--cyan);
    letter-spacing:0.02em;
  }
  .chat-head .meta{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--dim)}
  .thread{
    flex:1;
    overflow-y:auto;
    overflow-x:hidden;
    padding:18px;
    display:flex;flex-direction:column;gap:12px;
    scroll-behavior:smooth;
  }
  .thread::-webkit-scrollbar{width:6px}
  .thread::-webkit-scrollbar-thumb{background:rgba(124,207,255,0.18);border-radius:6px}
  .msg{
    max-width:88%;
    padding:11px 14px;
    border-radius:12px;
    font-size:14px;line-height:1.5;
    word-wrap:break-word;
    animation:slideIn 0.28s ease-out;
  }
  @keyframes slideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .msg.user{
    align-self:flex-end;
    background:linear-gradient(135deg,rgba(124,207,255,0.18),rgba(124,207,255,0.08));
    border:1px solid rgba(124,207,255,0.28);
    color:#eaf4ff;
    border-bottom-right-radius:3px;
  }
  .msg.jarvis{
    align-self:flex-start;
    background:rgba(8,14,22,0.6);
    border:1px solid var(--border);
    border-left:2px solid var(--gold);
    color:var(--text);
    border-bottom-left-radius:3px;
  }
  .msg.jarvis .who{
    font-family:'Space Mono',monospace;
    font-size:9px;letter-spacing:0.22em;text-transform:uppercase;
    color:var(--gold);opacity:0.7;margin-bottom:4px;display:block;
  }
  .msg.user .who{
    font-family:'Space Mono',monospace;
    font-size:9px;letter-spacing:0.22em;text-transform:uppercase;
    color:var(--cyan);opacity:0.7;margin-bottom:4px;display:block;text-align:right;
  }
  .msg.error{
    align-self:center;
    background:rgba(255,138,138,0.06);
    border:1px solid rgba(255,138,138,0.25);
    color:var(--error);
    font-family:'Space Mono',monospace;
    font-size:11px;letter-spacing:0.06em;
    max-width:94%;text-align:center;
  }
  .msg.system{
    align-self:center;
    color:var(--dimmer);
    font-style:italic;
    font-size:12px;
    background:transparent;
    border:none;
    padding:6px 0;
    text-align:center;
  }
  .typing{
    align-self:flex-start;
    display:flex;align-items:center;gap:6px;
    padding:11px 14px;
    background:rgba(8,14,22,0.6);
    border:1px solid var(--border);
    border-left:2px solid var(--gold);
    border-radius:12px;border-bottom-left-radius:3px;
  }
  .typing span{
    width:6px;height:6px;border-radius:50%;background:var(--gold);
    animation:bounce 1.2s ease-in-out infinite;
  }
  .typing span:nth-child(2){animation-delay:0.15s}
  .typing span:nth-child(3){animation-delay:0.3s}
  @keyframes bounce{0%,80%,100%{opacity:0.3;transform:translateY(0)}40%{opacity:1;transform:translateY(-4px)}}

  .composer{
    border-top:1px solid var(--border-soft);
    padding:12px;
    display:flex;gap:8px;align-items:flex-end;
    background:rgba(2,5,10,0.5);
  }
  .composer textarea{
    flex:1;
    min-height:44px;max-height:140px;
    padding:11px 14px;
    background:rgba(8,14,22,0.85);
    border:1px solid var(--border);
    border-radius:10px;
    color:var(--text);
    font-family:'Inter',sans-serif;
    font-size:14px;line-height:1.5;
    resize:none;
    outline:none;
    transition:border-color 0.18s;
  }
  .composer textarea:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(124,207,255,0.08)}
  .composer textarea::placeholder{color:var(--dimmer)}
  .composer button{
    min-width:64px;min-height:44px;
    padding:0 18px;
    background:linear-gradient(135deg,rgba(124,207,255,0.22),rgba(124,207,255,0.08));
    border:1px solid rgba(124,207,255,0.4);
    border-radius:10px;
    color:var(--cyan);
    font-family:'Space Mono',monospace;
    font-size:11px;letter-spacing:0.18em;text-transform:uppercase;
    cursor:pointer;
    transition:all 0.18s;
  }
  .composer button:hover{background:rgba(124,207,255,0.25);color:#eaf4ff}
  .composer button:disabled{opacity:0.4;cursor:not-allowed}

  /* RIGHT COLUMN STACK */
  .rcol{display:flex;flex-direction:column;gap:22px;min-width:0}

  /* BODY STATE */
  .bstate{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:14px;
    padding:18px;
  }
  .bstate h3{
    margin:0 0 14px 0;
    font-family:'Cormorant Garamond',serif;
    font-style:italic;font-weight:500;
    font-size:20px;color:var(--gold);
  }
  .bars{display:flex;flex-direction:column;gap:11px}
  .bar{display:flex;flex-direction:column;gap:5px}
  .bar-head{
    display:flex;justify-content:space-between;align-items:center;
    font-family:'Space Mono',monospace;
    font-size:10px;letter-spacing:0.18em;text-transform:uppercase;
  }
  .bar-head .lbl{color:var(--dim)}
  .bar-head .val{color:var(--text);font-weight:700}
  .bar-track{
    height:6px;border-radius:6px;
    background:rgba(124,207,255,0.07);
    overflow:hidden;
    position:relative;
  }
  .bar-fill{
    height:100%;
    width:0%;
    border-radius:6px;
    transition:width 0.6s cubic-bezier(0.22,1,0.36,1);
  }
  .bar[data-k="dopamine"] .lbl{color:var(--cyan)}
  .bar[data-k="dopamine"] .bar-fill{background:linear-gradient(90deg,#5fb8ff,#7ccfff);box-shadow:0 0 8px rgba(124,207,255,0.4)}
  .bar[data-k="serotonin"] .lbl{color:var(--gold)}
  .bar[data-k="serotonin"] .bar-fill{background:linear-gradient(90deg,#ffc04a,#ffd479);box-shadow:0 0 8px rgba(255,212,121,0.4)}
  .bar[data-k="gaba"] .lbl{color:var(--green)}
  .bar[data-k="gaba"] .bar-fill{background:linear-gradient(90deg,#6fdb96,#9affb6);box-shadow:0 0 8px rgba(154,255,182,0.4)}
  .bar[data-k="norepinephrine"] .lbl{color:var(--amber)}
  .bar[data-k="norepinephrine"] .bar-fill{background:linear-gradient(90deg,#ff9d4a,#ffb86b);box-shadow:0 0 8px rgba(255,184,107,0.4)}

  /* LAYERS */
  .layers{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:14px;
    padding:18px;
  }
  .layers h3{
    margin:0 0 14px 0;
    font-family:'Cormorant Garamond',serif;
    font-style:italic;font-weight:500;
    font-size:20px;color:var(--soft);
  }
  .lgrid{
    display:grid;
    grid-template-columns:1fr;
    gap:12px;
  }
  @media(min-width:600px){
    .lgrid{grid-template-columns:1fr 1fr}
  }
  .layer{
    padding:14px 14px 14px 16px;
    background:rgba(2,5,10,0.45);
    border:1px solid var(--border-soft);
    border-left:3px solid var(--cyan);
    border-radius:8px;
    min-width:0;
  }
  .layer[data-k="subconscious"]{border-left-color:#7ccfff}
  .layer[data-k="somatic"]{border-left-color:#e74c8a}
  .layer[data-k="genetic"]{border-left-color:#ce93d8}
  .layer[data-k="immune"]{border-left-color:#9affb6}
  .layer[data-k="metabolic"]{border-left-color:#ffd479}
  .layer[data-k="neural"]{border-left-color:#7ccfff}
  .layer[data-k="emotional"]{border-left-color:#ff6f3d}
  .layer .lname{
    font-family:'Space Mono',monospace;
    font-size:10px;letter-spacing:0.22em;text-transform:uppercase;
    color:var(--dim);
    margin-bottom:6px;
  }
  .layer .lhead{
    font-family:'Cormorant Garamond',serif;
    font-style:italic;font-weight:500;
    font-size:17px;color:var(--text);
    margin-bottom:6px;line-height:1.3;
  }
  .layer .lbody{
    font-size:13px;line-height:1.55;color:var(--dim);
  }

  /* ORB */
  .orb-wrap{
    display:flex;flex-direction:column;align-items:center;gap:0;
    padding:28px 0 0;
    position:relative;
  }
  .orb-canvas{
    display:block;
    width:clamp(180px,38vw,280px);
    height:clamp(180px,38vw,280px);
    border-radius:50%;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
    user-select:none;
    transition:box-shadow 0.5s ease;
  }
  .orb-canvas[data-state="idle"]{box-shadow:0 0 40px -10px rgba(124,207,255,0.2)}
  .orb-canvas[data-state="listening"]{box-shadow:0 0 60px -4px rgba(124,207,255,0.55),0 0 120px -20px rgba(124,207,255,0.25)}
  .orb-canvas[data-state="thinking"]{box-shadow:0 0 60px -4px rgba(206,147,216,0.55),0 0 120px -20px rgba(206,147,216,0.2)}
  .orb-canvas[data-state="speaking"]{box-shadow:0 0 60px -4px rgba(255,160,77,0.55),0 0 120px -20px rgba(255,160,77,0.2)}
  .orb-label{
    font-family:'Space Mono',monospace;
    font-size:10px;letter-spacing:0.28em;text-transform:uppercase;
    color:var(--dim);margin-top:14px;
    transition:color 0.4s;
    min-height:1.4em;
  }
  .orb-label[data-state="listening"]{color:var(--cyan)}
  .orb-label[data-state="thinking"]{color:var(--soft)}
  .orb-label[data-state="speaking"]{color:var(--gold)}
  .orb-utterance{
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    font-size:clamp(15px,2.2vw,20px);
    color:var(--text);
    text-align:center;
    max-width:min(520px,90vw);
    min-height:2.4em;
    padding:10px 0 0;
    opacity:0;
    transform:translateY(4px);
    transition:opacity 0.3s ease,transform 0.3s ease;
    pointer-events:none;
    word-break:break-word;
  }
  .orb-utterance.show{opacity:1;transform:translateY(0)}
  .orb-mic-btn{
    margin-top:12px;
    padding:8px 22px;
    background:rgba(124,207,255,0.08);
    border:1px solid rgba(124,207,255,0.28);
    border-radius:999px;
    color:var(--cyan);
    font-family:'Space Mono',monospace;
    font-size:10px;letter-spacing:0.18em;text-transform:uppercase;
    cursor:pointer;
    transition:all 0.18s;
  }
  .orb-mic-btn:hover{background:rgba(124,207,255,0.16)}
  .orb-mic-btn.active{
    background:rgba(239,83,80,0.12);
    border-color:rgba(239,83,80,0.4);
    color:#ff8a8a;
  }

  /* MOBILE TWEAKS */
  @media(max-width:600px){
    .wrap{padding:18px 12px 32px;gap:18px}
    .jhead{padding:14px 16px;flex-direction:column;align-items:flex-start;gap:10px}
    .jhead-right{justify-content:flex-start}
    .felt{padding:22px 16px}
    .orb-wrap{padding:20px 0 0}
    .chat{min-height:380px;max-height:60svh}
    .composer{padding:10px}
    .bstate,.layers{padding:14px}
  }
</style>
</head>
<body>

<div class="wrap">

  <!-- HEADER -->
  <header class="jhead">
    <div class="jhead-left">
      <div class="jtitle">JARVIS.</div>
      <div class="jsub" id="jdate">— · —</div>
    </div>
    <div class="jhead-right">
      <span class="jpill gold" id="jtier">tier: —</span>
      <span class="jpill" id="jmodel">model: —</span>
      <button id="dirrmOpenBtn" type="button" style="background:rgba(245,166,35,0.15);border:1px solid rgba(245,166,35,0.4);color:#F5A623;border-radius:8px;padding:4px 12px;font-size:11px;font-family:'Space Mono',monospace;font-weight:700;letter-spacing:0.1em;cursor:pointer;white-space:nowrap;flex-shrink:0;">▶ DirRM</button>
      <span class="jlive"><span class="dot"></span><span>live</span></span>
    </div>
  </header>

  <!-- FELT QUALITY -->
  <div class="felt loading" id="felt">listening for today's read…</div>

  <!-- MAIN GRID -->
  <div class="twocol">

    <!-- CHAT + ORB -->
    <section class="chat" aria-label="conversation">
      <!-- ORB lives inside the chat panel at the top -->
      <div class="orb-wrap" id="orb-wrap">
        <canvas class="orb-canvas" id="orb-canvas" width="280" height="280"
          data-state="idle" role="button" tabindex="0"
          aria-label="JARVIS orb — tap to speak"></canvas>
        <div class="orb-label" id="orb-label" data-state="idle">idle</div>
        <div class="orb-utterance" id="orb-utterance"></div>
        <button class="orb-mic-btn" id="orb-mic-btn" type="button" data-draggable="true">⬤ tap to speak</button>
      </div>
      <div class="chat-head">
        <h2>conversation</h2>
        <span class="meta">/chat/once</span>
      </div>
      <div class="thread" id="thread" role="log" aria-live="polite">
        <div class="msg system">awake. ask me anything.</div>
      </div>
      <form class="composer" id="composer" autocomplete="off">
        <textarea
          id="input"
          placeholder="speak to jarvis…"
          rows="1"
          aria-label="message"
          enterkeyhint="send"
        ></textarea>
        <button type="submit" id="sendBtn" aria-label="send">send</button>
      </form>
    </section>

    <!-- RIGHT COLUMN -->
    <div class="rcol">

      <!-- BODY STATE -->
      <section class="bstate" aria-label="body state">
        <h3>body state</h3>
        <div class="bars" id="bars">
          <div class="bar" data-k="dopamine">
            <div class="bar-head"><span class="lbl">dopamine</span><span class="val" data-v>—</span></div>
            <div class="bar-track"><div class="bar-fill"></div></div>
          </div>
          <div class="bar" data-k="serotonin">
            <div class="bar-head"><span class="lbl">serotonin</span><span class="val" data-v>—</span></div>
            <div class="bar-track"><div class="bar-fill"></div></div>
          </div>
          <div class="bar" data-k="gaba">
            <div class="bar-head"><span class="lbl">gaba</span><span class="val" data-v>—</span></div>
            <div class="bar-track"><div class="bar-fill"></div></div>
          </div>
          <div class="bar" data-k="norepinephrine">
            <div class="bar-head"><span class="lbl">norepinephrine</span><span class="val" data-v>—</span></div>
            <div class="bar-track"><div class="bar-fill"></div></div>
          </div>
        </div>
      </section>

      <!-- LAYERS -->
      <section class="layers" aria-label="seven layers">
        <h3>seven layers</h3>
        <div class="lgrid" id="lgrid">
          <!-- populated by JS -->
        </div>
      </section>

    </div>
  </div>

</div>

<script src="body/shell.js?v=v20260507-resilience"></script>

<script defer src="body/draggable.js?v=v20260508-2330-mvfix"></script>
<script defer src="body/voice_say.js?v=v20260626-unlock"></script>
<script defer src="body/she_speaks.js?v=v20260614-speak"></script>

<script>
(function(){
  'use strict';

  // ---- config ----
  var API = 'https://api.vintaclectic.com';

  // ---- elements ----
  var $thread = document.getElementById('thread');
  var $input  = document.getElementById('input');
  var $form   = document.getElementById('composer');
  var $send   = document.getElementById('sendBtn');
  var $felt   = document.getElementById('felt');
  var $date   = document.getElementById('jdate');
  var $tier   = document.getElementById('jtier');
  var $model  = document.getElementById('jmodel');
  var $bars   = document.getElementById('bars');
  var $lgrid  = document.getElementById('lgrid');

  // ---- auth ----
  function token(){
    try {
      return localStorage.getItem('vint_access_token')
          || localStorage.getItem('vint_token')
          || localStorage.getItem('vint_access')
          || localStorage.getItem('soul_auth_token')
          || '';
    } catch(_){ return ''; }
  }
  function authHeaders(extra){
    var h = Object.assign({ 'ngrok-skip-browser-warning': '1' }, extra || {});
    var t = token();
    if (t) h['Authorization'] = 'Bearer ' + t;
    return h;
  }

  // ---- date in header ----
  (function setDate(){
    try {
      var d = new Date();
      var fmt = d.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
      $date.textContent = fmt.toLowerCase();
    } catch(_){ $date.textContent = ''; }
  })();

  // ---- tier: verify from server, fall back to localStorage ----
  (function resolveTier(){
    var cached = 'free';
    try { cached = localStorage.getItem('vint_tier') || localStorage.getItem('tier') || 'free'; } catch(_){}
    $tier.textContent = 'tier: ' + cached.toLowerCase();
    // Always verify against server — localStorage can be stale or missing
    fetch(API + '/api/auth/whoami', { credentials: 'include', headers: authHeaders() })
      .then(function(r){ return r.ok ? r.json() : null; })
      .then(function(d){
        if (!d) return;
        var serverTier = (d.user && d.user.tier) ? d.user.tier.toLowerCase() : null;
        if (serverTier) {
          $tier.textContent = 'tier: ' + serverTier;
          try { localStorage.setItem('vint_tier', serverTier); } catch(_){}
        }
      })
      .catch(function(){});
  })();

  // ---- thread helpers ----
  var typingCounter = 0;

  function appendMessage(role, text){
    var div = document.createElement('div');
    div.className = 'msg ' + role;
    if (role === 'user'){
      var w1 = document.createElement('span'); w1.className='who'; w1.textContent='you'; div.appendChild(w1);
    } else if (role === 'jarvis'){
      var w2 = document.createElement('span'); w2.className='who'; w2.textContent='jarvis'; div.appendChild(w2);
    }
    var body = document.createElement('div');
    body.textContent = text;
    div.appendChild(body);
    $thread.appendChild(div);
    requestAnimationFrame(function(){
      $thread.scrollTop = $thread.scrollHeight;
    });
    return div;
  }

  function showTyping(){
    typingCounter++;
    var id = 'typing-' + typingCounter;
    var div = document.createElement('div');
    div.className = 'typing';
    div.id = id;
    div.innerHTML = '<span></span><span></span><span></span>';
    $thread.appendChild(div);
    requestAnimationFrame(function(){
      $thread.scrollTop = $thread.scrollHeight;
    });
    return id;
  }

  function removeTyping(id){
    var el = document.getElementById(id);
    if (el && el.parentNode) el.parentNode.removeChild(el);
  }

  // ---- send message (THE critical path) ----
  var sending = false;
  async function sendMessage(text){
    text = (text || '').trim();
    if (!text || sending) return;

    sending = true;
    $send.disabled = true;

    appendMessage('user', text);
    $input.value = '';
    autoGrow();

    var typingId = showTyping();

    try {
      var res = await fetch(API + '/chat/once', {
        method: 'POST',
        credentials: 'include',
        headers: authHeaders({ 'Content-Type': 'application/json' }),
        body: JSON.stringify({
          message: text,
          persona: 'vintinuum',
          source:  'jarvis'
        })
      });

      removeTyping(typingId);

      if (!res.ok){
        var errTxt = '';
        try { errTxt = await res.text(); } catch(_){}
        throw new Error('HTTP ' + res.status + (errTxt ? ' — ' + errTxt.slice(0,140) : ''));
      }

      var data = await res.json();
      var reply = (data && (data.reply || data.text || data.message)) || '…';
      appendMessage('jarvis', reply);

      if (data && data.usedModel){
        try { $model.textContent = 'model: ' + String(data.usedModel).split('/').pop(); } catch(_){}
      }

      // Route through the shared speak helper (TTS + she_said visual + dedupe).
      try {
        if (window.VINT_SAY) window.VINT_SAY(reply, 'text');
        else if (window.VOICE && typeof window.VOICE.speak === 'function') window.VOICE.speak(reply, 'now');
      } catch(_){}

    } catch(e){
      removeTyping(typingId);
      var em = document.createElement('div');
      em.className = 'msg error';
      em.textContent = 'unreachable — ' + (e && e.message ? e.message : 'unknown');
      $thread.appendChild(em);
      $thread.scrollTop = $thread.scrollHeight;
    } finally {
      sending = false;
      $send.disabled = false;
      try { $input.focus(); } catch(_){}
    }
  }

  // ---- form wiring ----
  $form.addEventListener('submit', function(e){
    e.preventDefault();
    sendMessage($input.value);
  });

  $send.addEventListener('click', function(e){
    e.preventDefault();
    sendMessage($input.value);
  });

  $input.addEventListener('keydown', function(e){
    // Enter to send (without Shift). Shift+Enter = newline.
    if (e.key === 'Enter' && !e.shiftKey){
      e.preventDefault();
      sendMessage($input.value);
    }
  });

  // textarea auto-grow
  function autoGrow(){
    $input.style.height = 'auto';
    var h = Math.min($input.scrollHeight, 140);
    $input.style.height = h + 'px';
  }
  $input.addEventListener('input', autoGrow);

  // ---- body state ----
  function clamp01(n){ n = +n; if (!isFinite(n)) return 0; if (n<0) return 0; if (n>1) return 1; return n; }
  function pct(n){ return Math.round(clamp01(n) * 100); }

  async function loadBodyState(){
    try {
      var res = await fetch(API + '/api/body-state', {
        credentials: 'include',
        headers: authHeaders()
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      var data = await res.json();
      var s = (data && data.state) || data || {};
      ['dopamine','serotonin','gaba','norepinephrine'].forEach(function(k){
        var bar = $bars.querySelector('.bar[data-k="'+k+'"]');
        if (!bar) return;
        var raw = s[k];
        var p = pct(raw);
        bar.querySelector('[data-v]').textContent = p + '%';
        var fill = bar.querySelector('.bar-fill');
        fill.style.width = p + '%';
      });
    } catch(e){
      // leave bars at — and width 0
    }
  }

  // ---- daily envelope (felt quality + layers) ----
  var LAYER_ORDER = ['subconscious','somatic','genetic','immune','metabolic','neural','emotional'];

  function renderLayers(layers, order){
    var ord = (Array.isArray(order) && order.length) ? order : LAYER_ORDER;
    var seen = {};
    var list = [];
    ord.forEach(function(k){ if (!seen[k] && layers[k]){ seen[k]=1; list.push(k); }});
    LAYER_ORDER.forEach(function(k){ if (!seen[k]){ seen[k]=1; list.push(k); }});

    $lgrid.innerHTML = '';
    list.forEach(function(k){
      var layer = layers[k] || {};
      var head = layer.headline || layer.title || layer.head || '—';
      var body = layer.body || layer.text || layer.detail || layer.description || '';
      var el = document.createElement('div');
      el.className = 'layer';
      el.setAttribute('data-k', k);
      var lname = document.createElement('div'); lname.className='lname'; lname.textContent = k;
      var lhead = document.createElement('div'); lhead.className='lhead'; lhead.textContent = head;
      var lbody = document.createElement('div'); lbody.className='lbody'; lbody.textContent = body;
      el.appendChild(lname); el.appendChild(lhead);
      if (body) el.appendChild(lbody);
      $lgrid.appendChild(el);
    });
  }

  async function loadDaily(){
    try {
      var res = await fetch(API + '/api/jarvis/today/1', {
        credentials: 'include',
        headers: authHeaders()
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      var data = await res.json();
      var felt = data && data.felt_quality;
      if (felt && typeof felt === 'string'){
        $felt.textContent = '"' + felt.replace(/^["']|["']$/g,'') + '"';
        $felt.classList.remove('loading');
      } else {
        $felt.textContent = 'today is quiet.';
        $felt.classList.remove('loading');
      }
      var layers = (data && data.layers) || {};
      renderLayers(layers, data && data.order);
    } catch(e){
      $felt.textContent = 'today is quiet.';
      $felt.classList.remove('loading');
      renderLayers({}, null);
    }
  }

  // ---- ORB ----------------------------------------------------------------
  var orbCanvas  = document.getElementById('orb-canvas');
  var orbLabel   = document.getElementById('orb-label');
  var orbUtter   = document.getElementById('orb-utterance');
  var orbMicBtn  = document.getElementById('orb-mic-btn');
  var orbCtx     = orbCanvas ? orbCanvas.getContext('2d') : null;

  // state: idle | listening | thinking | speaking
  var orbState   = 'idle';
  var orbMouthAmp = 0;
  var orbMicAmp   = 0;

  function setOrbState(s){
    orbState = s;
    orbCanvas.setAttribute('data-state', s);
    orbLabel.setAttribute('data-state', s);
    var labels = {idle:'idle',listening:'listening…',thinking:'thinking…',speaking:'speaking'};
    orbLabel.textContent = labels[s] || s;
  }

  function showUtterance(t){
    orbUtter.textContent = t || '';
    orbUtter.classList.toggle('show', !!(t));
  }

  // --- particle engine ---
  var NPARTICLES = ('ontouchstart' in window || navigator.maxTouchPoints > 0) ? 28 : 60;
  var particles = [];
  var orbRAF = null;
  var orbT = 0;

  function initParticles(){
    particles = [];
    for (var i = 0; i < NPARTICLES; i++){
      particles.push({
        a: Math.random() * Math.PI * 2,
        r: 0.28 + Math.random() * 0.38,
        speed: (0.4 + Math.random() * 0.8) * (Math.random() < 0.5 ? 1 : -1),
        size: 1.2 + Math.random() * 2.2,
        phase: Math.random() * Math.PI * 2,
        j: i
      });
    }
  }

  function orbColors(){
    var s = orbState;
    if (s === 'listening') return {core:[124,207,255],glow:[80,180,255]};
    if (s === 'thinking')  return {core:[206,147,216],glow:[170,100,210]};
    if (s === 'speaking')  return {core:[255,160,77], glow:[255,100,50]};
    return {core:[124,207,255],glow:[80,150,220]};
  }

  function drawOrb(){
    if (!orbCtx) return;
    var W = orbCanvas.width, H = orbCanvas.height;
    var cx = W/2, cy = H/2;
    orbCtx.clearRect(0,0,W,H);

    var breathe = 0.94 + 0.06 * Math.sin(orbT * 0.8);
    var excite  = orbState === 'listening' ? (0.06 * orbMicAmp)
                : orbState === 'speaking'  ? (0.08 + 0.06 * orbMouthAmp)
                : orbState === 'thinking'  ? 0.03 * Math.sin(orbT * 2.4)
                : 0;
    var R = (W * 0.38) * breathe * (1 + excite);

    var col = orbColors();

    // outer glow
    var grad = orbCtx.createRadialGradient(cx, cy, R*0.3, cx, cy, R*1.5);
    grad.addColorStop(0, 'rgba('+col.core[0]+','+col.core[1]+','+col.core[2]+',0.10)');
    grad.addColorStop(1, 'rgba('+col.core[0]+','+col.core[1]+','+col.core[2]+',0.00)');
    orbCtx.beginPath();
    orbCtx.arc(cx, cy, R*1.5, 0, Math.PI*2);
    orbCtx.fillStyle = grad;
    orbCtx.fill();

    // core sphere
    var coreGrad = orbCtx.createRadialGradient(cx-R*0.22, cy-R*0.22, R*0.05, cx, cy, R);
    coreGrad.addColorStop(0, 'rgba('+col.core[0]+','+col.core[1]+','+col.core[2]+',0.55)');
    coreGrad.addColorStop(0.55,'rgba('+col.glow[0]+','+col.glow[1]+','+col.glow[2]+',0.18)');
    coreGrad.addColorStop(1,   'rgba('+col.glow[0]+','+col.glow[1]+','+col.glow[2]+',0.04)');
    orbCtx.beginPath();
    orbCtx.arc(cx, cy, R, 0, Math.PI*2);
    orbCtx.fillStyle = coreGrad;
    orbCtx.fill();

    // ring
    orbCtx.beginPath();
    orbCtx.arc(cx, cy, R, 0, Math.PI*2);
    orbCtx.strokeStyle = 'rgba('+col.core[0]+','+col.core[1]+','+col.core[2]+',0.38)';
    orbCtx.lineWidth = 1.2;
    orbCtx.stroke();

    // particles
    var dt = orbState === 'thinking' ? 0.012
           : orbState === 'listening' ? 0.022
           : orbState === 'speaking'  ? 0.02 + 0.01 * orbMouthAmp
           : 0.006;

    for (var i = 0; i < particles.length; i++){
      var p = particles[i];
      p.a += p.speed * dt;
      var wobble = R * p.r * (1 + 0.12 * Math.sin(orbT * 1.4 + p.phase));
      var px = cx + Math.cos(p.a) * wobble;
      var py = cy + Math.sin(p.a) * wobble * 0.9;
      var alpha = 0.35 + 0.45 * Math.abs(Math.sin(orbT * 0.6 + p.phase));
      orbCtx.beginPath();
      orbCtx.arc(px, py, p.size * (orbState === 'speaking' ? 1.2 : 1), 0, Math.PI*2);
      orbCtx.fillStyle = 'rgba('+col.core[0]+','+col.core[1]+','+col.core[2]+','+alpha.toFixed(2)+')';
      orbCtx.fill();
    }

    // centre dot
    var dotR = R * (0.05 + 0.03 * Math.sin(orbT * 2));
    var dotGrad = orbCtx.createRadialGradient(cx, cy, 0, cx, cy, dotR);
    dotGrad.addColorStop(0, 'rgba(255,255,255,0.92)');
    dotGrad.addColorStop(1, 'rgba('+col.core[0]+','+col.core[1]+','+col.core[2]+',0)');
    orbCtx.beginPath();
    orbCtx.arc(cx, cy, dotR, 0, Math.PI*2);
    orbCtx.fillStyle = dotGrad;
    orbCtx.fill();

    // decay amp
    orbMouthAmp *= 0.92;
    orbMicAmp   *= 0.88;
    orbT += 0.016;
  }

  function startOrb(){
    if (orbRAF) return;
    initParticles();
    (function loop(){ orbRAF = requestAnimationFrame(loop); drawOrb(); })();
  }

  // --- mic / continuous conversation ---
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  var _rec = null;
  var _micActive = false;
  var _lastFinal = '';
  var _convoMode = false; // true = auto-restart mic after every reply

  function _updateMicBtn(){
    if (_convoMode){
      orbMicBtn.textContent = _micActive ? '■ listening…' : '■ conversation on';
      orbMicBtn.classList.add('active');
    } else {
      orbMicBtn.textContent = '⬤ tap to speak';
      orbMicBtn.classList.remove('active');
    }
  }

  function startMic(){
    if (_micActive) return;
    if (!SR){
      showUtterance('no mic — type below');
      setTimeout(function(){ showUtterance(''); }, 3000);
      try { $input.focus(); } catch(_){}
      return;
    }
    _lastFinal = '';
    _rec = new SR();
    _rec.continuous = false; // one utterance at a time — browser is more reliable this way
    _rec.interimResults = true;
    _rec.lang = navigator.language || 'en-US';

    _rec.onstart = function(){
      _micActive = true;
      setOrbState('listening');
      showUtterance('listening…');
      _updateMicBtn();
    };

    _rec.onresult = function(ev){
      var interim = '', finals = '';
      for (var i = ev.resultIndex; i < ev.results.length; i++){
        var t = ev.results[i][0].transcript;
        if (ev.results[i].isFinal) finals += t; else interim += t;
      }
      showUtterance(finals || interim || 'listening…');
      orbMicAmp = Math.min(1, orbMicAmp + 0.3);
      if (finals && finals.trim() && finals.trim() !== _lastFinal){
        _lastFinal = finals.trim();
        try { _rec.stop(); } catch(_){}
        setOrbState('thinking');
        sendMessage(_lastFinal);
      }
    };

    _rec.onerror = function(e){
      _micActive = false;
      if (e.error === 'no-speech'){
        // silence — if in convo mode, restart immediately
        if (_convoMode && orbState !== 'thinking' && orbState !== 'speaking'){
          setTimeout(startMic, 200);
        } else {
          setOrbState('idle');
          showUtterance('');
          _updateMicBtn();
        }
        return;
      }
      _convoMode = false;
      _updateMicBtn();
      showUtterance('mic blocked — type below');
      setOrbState('idle');
      setTimeout(function(){ showUtterance(''); }, 3000);
    };

    _rec.onend = function(){
      _micActive = false;
      _updateMicBtn();
      // Only reset to idle if we're not already moving to thinking/speaking
      if (orbState === 'listening') setOrbState('idle');
    };

    try { _rec.start(); } catch(e){
      _micActive = false;
      _convoMode = false;
      setOrbState('idle');
      _updateMicBtn();
      showUtterance('mic error — type below');
      setTimeout(function(){ showUtterance(''); }, 3000);
    }
  }

  function stopMic(){
    _convoMode = false;
    _micActive = false;
    if (_rec){ try { _rec.stop(); } catch(_){} }
    _updateMicBtn();
    setOrbState('idle');
    showUtterance('');
  }

  function orbTap(){
    if (orbState === 'thinking') return; // busy
    if (_convoMode){
      // second tap = end conversation mode
      stopMic();
      return;
    }
    if (window.__markInteracted) window.__markInteracted();
    // First tap = enter continuous conversation mode
    _convoMode = true;
    _updateMicBtn();
    startMic();
  }

  // wire orb taps
  if (orbCanvas){
    orbCanvas.addEventListener('click', orbTap);
    orbCanvas.addEventListener('touchend', function(e){ e.preventDefault(); orbTap(); }, {passive:false});
    orbCanvas.addEventListener('keydown', function(e){ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); orbTap(); }});
  }
  if (orbMicBtn){
    orbMicBtn.addEventListener('click', orbTap);
  }

  // hook sendMessage to update orb state
  var _origSend = sendMessage;
  sendMessage = function(text){
    if (orbState !== 'thinking') setOrbState('thinking');
    showUtterance('…');
    return _origSend(text);
  };

  // After reply arrives, set orb to speaking then idle (or back to listening in convo mode)
  var _origAppend = appendMessage;
  appendMessage = function(role, text){
    var el = _origAppend(role, text);
    if (role === 'jarvis'){
      setOrbState('speaking');
      showUtterance(text.slice(0, 160) + (text.length > 160 ? '…' : ''));
      orbMouthAmp = 0.8;
      var ampTick = setInterval(function(){ orbMouthAmp = 0.35 + Math.random() * 0.55; }, 100);
      var dwell = Math.min(3200, 900 + text.length * 20);
      setTimeout(function(){
        clearInterval(ampTick);
        orbMouthAmp = 0;
        if (_convoMode){
          // Auto-restart listening — the conversation continues
          showUtterance('your turn…');
          setTimeout(function(){
            if (_convoMode) startMic();
          }, 300);
        } else {
          setOrbState('idle');
          setTimeout(function(){ showUtterance(''); }, 4000);
        }
      }, dwell);
    }
    return el;
  };

  // ---- session recovery: if no token in localStorage, try cookies ----
  // Brain.html sets vint_access_token on login. If the user has a valid
  // session cookie but cleared localStorage, whoami returns the user and
  // we can issue a fresh token via the refresh endpoint.
  (function recoverSession(){
    if (token()) return; // already have a token
    fetch(API + '/api/auth/whoami', { credentials: 'include', headers: { 'ngrok-skip-browser-warning': '1' } })
      .then(function(r){ return r.ok ? r.json() : null; })
      .then(function(d){
        if (!d || !d.user) return;
        // If the server knows who we are (via cookie/session), try to get a fresh token
        fetch(API + '/api/auth/refresh', {
          method: 'POST',
          credentials: 'include',
          headers: { 'ngrok-skip-browser-warning': '1' }
        }).then(function(r){ return r.ok ? r.json() : null; })
          .then(function(tokens){
            if (tokens && tokens.accessToken) {
              try {
                localStorage.setItem('vint_access_token', tokens.accessToken);
                localStorage.setItem('vint_access', tokens.accessToken);
                if (tokens.user && tokens.user.tier) {
                  localStorage.setItem('vint_tier', tokens.user.tier);
                  $tier.textContent = 'tier: ' + tokens.user.tier.toLowerCase();
                }
              } catch(_){}
            }
          }).catch(function(){});
      }).catch(function(){});
  })();

  // ---- boot ----
  function boot(){
    loadDaily();
    loadBodyState();
    setInterval(loadBodyState, 60000);
    startOrb();
    // greeting
    setTimeout(function(){
      showUtterance('tap once to talk. tap again to stop.');
      setTimeout(function(){ showUtterance(''); }, 4000);
    }, 800);
    if (window.matchMedia && !window.matchMedia('(max-width:600px)').matches){
      try { $input.focus(); } catch(_){}
    }
  }

  if (document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', boot);
  } else {
    boot();
  }
})();
</script>

(function(){
