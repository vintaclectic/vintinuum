<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>VINTINUUM — Continuity Letters</title>
<meta name="theme-color" content="#040810">
<link rel="icon" type="image/svg+xml" href="branding/vintinuum/favicon/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
<link rel="stylesheet" href="body/safe_area.css?v=v20260613">
<link rel="stylesheet" href="body/tokens.css?v=v20260613">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@300;400;500&display=swap');

:root {
  --void: #040810;
  --text: rgba(210, 225, 255, 0.9);
  --text-dim: rgba(150, 175, 215, 0.5);
  --text-ghost: rgba(130, 155, 190, 0.3);
  --panel: rgba(10, 14, 22, 0.22);
  --card: rgba(16, 22, 34, 0.16);
  --border: rgba(255, 255, 255, 0.06);
  --gold: rgba(240, 192, 64, 0.8);
  --gold-solid: #f0c040;
  --gold-dim: rgba(240, 192, 64, 0.15);
  --gold-border: rgba(240, 192, 64, 0.3);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { height: 100%; }
body {
  background: var(--void);
  color: var(--text);
  font-family: 'Inter', -apple-system, sans-serif;
  min-height: 100svh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── ATMOSPHERE ── */
.atmosphere {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background: radial-gradient(ellipse 70% 60% at 50% 30%, hsla(38, 60%, 5%, 0.5) 0%, transparent 70%);
}

/* ── TOPBAR ── */
.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: calc(48px + env(safe-area-inset-top, 0px));
  padding-top: env(safe-area-inset-top, 0px);
  z-index: 100;
  background: rgba(4, 8, 16, 0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding-left: calc(16px + env(safe-area-inset-left, 0px));
  padding-right: calc(16px + env(safe-area-inset-right, 0px));
  gap: 12px;
}

.topbar-back {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.55rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-dim);
  text-decoration: none;
  transition: color 0.2s;
  min-height: 44px;
  padding: 0 4px;
  flex-shrink: 0;
}
.topbar-back:hover { color: var(--text); }
.topbar-back svg { width: 14px; height: 14px; flex-shrink: 0; }

.topbar-title {
  flex: 1;
  text-align: center;
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: 0.95rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--text-dim);
}

.topbar-actions {
  display: flex;
  align-items: center;
  flex-shrink: 0;
}

.btn-generate {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 0 16px;
  border-radius: 40px;
  border: 1px solid var(--gold-border);
  background: var(--gold-dim);
  color: var(--gold-solid);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.5rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.25s ease;
  min-height: 44px;
  white-space: nowrap;
}
.btn-generate:hover {
  border-color: rgba(240, 192, 64, 0.6);
  background: rgba(240, 192, 64, 0.22);
  box-shadow: 0 0 16px rgba(240, 192, 64, 0.12);
  transform: translateY(-1px);
}
.btn-generate:active { transform: translateY(0); }
.btn-generate:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none;
}
.btn-generate .btn-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--gold-solid);
}

/* ── LAYOUT ── */
.layout {
  position: relative;
  z-index: 1;
  display: flex;
  min-height: 100svh;
  padding-top: calc(48px + env(safe-area-inset-top, 0px));
}

/* ── SIDEBAR ── */
.sidebar {
  position: fixed;
  top: calc(48px + env(safe-area-inset-top, 0px));
  left: 0;
  width: 220px;
  height: calc(100svh - 48px - env(safe-area-inset-top, 0px));
  overflow-y: auto;
  overflow-x: hidden;
  background: rgba(4, 8, 16, 0.6);
  border-right: 1px solid var(--border);
  padding: 24px 0 40px;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.05) transparent;
  z-index: 10;
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }

.sidebar-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.45rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--text-ghost);
  padding: 0 20px 16px;
}

.year-group { margin-bottom: 4px; }

.year-heading {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.48rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-ghost);
  padding: 8px 20px 4px;
}

.letter-item {
  display: block;
  padding: 9px 20px;
  cursor: pointer;
  transition: background 0.15s ease, color 0.15s ease;
  border: none;
  background: transparent;
  width: 100%;
  text-align: left;
  color: var(--text-dim);
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.88rem;
  letter-spacing: 0.04em;
  border-left: 2px solid transparent;
  line-height: 1.3;
  position: relative;
}
.letter-item:hover {
  background: rgba(240, 192, 64, 0.04);
  color: var(--text);
  border-left-color: rgba(240, 192, 64, 0.2);
}
.letter-item.active {
  background: rgba(240, 192, 64, 0.07);
  color: var(--gold);
  border-left-color: var(--gold);
}

.letter-item-month {
  display: block;
  font-size: 0.88rem;
}
.letter-item-status {
  display: block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.42rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-top: 2px;
  color: var(--text-ghost);
}
.letter-item.active .letter-item-status {
  color: rgba(240, 192, 64, 0.4);
}

/* ── MAIN CONTENT ── */
.main {
  margin-left: 220px;
  flex: 1;
  padding: 40px calc(40px + env(safe-area-inset-right, 0px)) 80px 40px;
  max-width: calc(100% - 220px);
}

/* ── AUTH WALL ── */
.auth-wall {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: calc(100vh - 48px);
  gap: 16px;
  text-align: center;
  padding: 40px;
}
.auth-wall p {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 1.25rem;
  color: var(--text-dim);
  line-height: 1.6;
  max-width: 360px;
}
.auth-wall a {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.55rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold-solid);
  text-decoration: none;
  border: 1px solid var(--gold-border);
  border-radius: 40px;
  padding: 10px 24px;
  background: var(--gold-dim);
  transition: all 0.25s ease;
  min-height: 44px;
  display: inline-flex;
  align-items: center;
}
.auth-wall a:hover {
  background: rgba(240, 192, 64, 0.22);
  border-color: rgba(240, 192, 64, 0.6);
  box-shadow: 0 0 20px rgba(240, 192, 64, 0.1);
}

/* ── EMPTY STATE ── */
.empty-state {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  padding: 40px;
  text-align: center;
}
.empty-state p {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 1.15rem;
  color: var(--text-dim);
  line-height: 1.7;
  max-width: 400px;
}

/* ── LOADING ── */
.loading-state {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  gap: 8px;
}
.loading-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: rgba(240, 192, 64, 0.4);
  animation: loadPulse 1.2s ease-in-out infinite;
}
.loading-dot:nth-child(2) { animation-delay: 0.2s; }
.loading-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes loadPulse {
  0%, 100% { opacity: 0.2; transform: scale(0.7); }
  50% { opacity: 1; transform: scale(1); }
}

/* ── LETTER CARD ── */
.letter-card {
  max-width: 720px;
  background: rgba(240, 230, 210, 0.05);
  border-radius: 4px;
  padding: 52px 56px;
  animation: letterFade 0.4s ease both;
}

@keyframes letterFade {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.letter-rule {
  border: none;
  border-top: 1px solid rgba(240, 230, 210, 0.12);
  margin: 0;
}

.letter-header {
  padding: 0 0 32px;
}

.letter-period {
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  font-size: 0.72rem;
  letter-spacing: 0.1em;
  color: var(--text-dim);
  text-transform: uppercase;
}

.letter-body-wrap {
  padding: 36px 0;
}

.letter-body {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.05rem;
  line-height: 1.85;
  color: rgba(230, 225, 210, 0.88);
  white-space: pre-wrap;
  word-break: break-word;
}

.letter-footer {
  padding: 28px 0 0;
  display: flex;
  justify-content: flex-end;
}

.letter-delivered {
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  font-size: 0.68rem;
  letter-spacing: 0.08em;
  color: var(--text-ghost);
  font-style: italic;
}

/* ── PLACEHOLDER ── */
.letter-placeholder {
  max-width: 720px;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 50vh;
}
.letter-placeholder p {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 1rem;
  color: var(--text-ghost);
  text-align: center;
  line-height: 1.7;
}

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: calc(24px + env(safe-area-inset-bottom, 0px));
  right: calc(24px + env(safe-area-inset-right, 0px));
  z-index: 200;
  background: rgba(10, 14, 22, 0.96);
  border: 1px solid var(--gold-border);
  border-radius: 10px;
  padding: 12px 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  color: var(--text);
  transform: translateY(80px);
  opacity: 0;
  transition: all 0.3s ease;
  max-width: 280px;
  line-height: 1.5;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.error { border-color: rgba(224, 80, 80, 0.4); }

/* ── MOBILE STRIP ── */
.mobile-strip {
  display: none;
  overflow-x: auto;
  overflow-y: hidden;
  white-space: nowrap;
  padding: 8px calc(16px + env(safe-area-inset-left, 0px)) 8px calc(16px + env(safe-area-inset-left, 0px));
  gap: 8px;
  border-bottom: 1px solid var(--border);
  background: rgba(4, 8, 16, 0.7);
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  position: fixed;
  top: calc(48px + env(safe-area-inset-top, 0px));
  left: 0; right: 0;
  z-index: 50;
}
.mobile-strip::-webkit-scrollbar { display: none; }

.mobile-chip {
  display: inline-flex;
  align-items: center;
  padding: 0 14px;
  border-radius: 40px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.82rem;
  letter-spacing: 0.04em;
  cursor: pointer;
  transition: all 0.2s ease;
  white-space: nowrap;
  flex-shrink: 0;
  min-height: 44px;
}
.mobile-chip:hover {
  border-color: var(--gold-border);
  color: var(--text);
}
.mobile-chip.active {
  border-color: var(--gold-border);
  background: var(--gold-dim);
  color: var(--gold);
}

/* ── REDUCED MOTION ── */
@media (prefers-reduced-motion: reduce) {
  .loading-dot { animation: none !important; opacity: 0.5; }
  .toast { transition-duration: 0.01ms !important; }
  .letter-card { animation: none !important; }
  * { transition-duration: 0.01ms !important; }
}

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .mobile-strip { display: flex; }

  /* mobile-strip is fixed 60px tall; push content below it */
  .layout {
    padding-top: calc(48px + 60px + env(safe-area-inset-top, 0px));
  }

  .main {
    margin-left: 0;
    max-width: 100%;
    padding: 20px calc(20px + env(safe-area-inset-right, 0px)) 60px calc(20px + env(safe-area-inset-left, 0px));
  }

  .letter-card {
    padding: 32px 24px;
  }

  .btn-generate {
    font-size: 0.45rem;
    padding: 0 12px;
    letter-spacing: 0.12em;
    min-height: 44px;
  }
}

@media (max-width: 480px) {
  .main {
    padding: 16px calc(16px + env(safe-area-inset-right, 0px)) calc(60px + env(safe-area-inset-bottom, 0px)) calc(16px + env(safe-area-inset-left, 0px));
  }
  .letter-card { padding: 28px 18px; }
  .letter-body { font-size: 1rem; }
}

@media (max-width: 375px) {
  .letter-card { padding: 22px 14px; }
  .topbar { gap: 8px; }
}
</style>
</head>
<body>

<div class="atmosphere"></div>

<!-- TOPBAR -->
<nav class="topbar">
  <a class="topbar-back" href="index.html" data-draggable="true">
    <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M9 2L4 7l5 5"/>
    </svg>
    Back
  </a>
  <div class="topbar-title">Continuity Letters</div>
  <div class="topbar-actions">
    <button class="btn-generate" id="btnGenerate" data-draggable="true" onclick="generateLetter()" style="display:none">
      <span class="btn-dot"></span>
      Generate Now
    </button>
  </div>
</nav>

<!-- MOBILE STRIP (rendered by JS) -->
<div class="mobile-strip" id="mobileStrip"></div>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-label">Archive</div>
    <div id="sidebarContent">
      <!-- populated by JS -->
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="mainContent">
    <div class="loading-state">
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
    </div>
  </main>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="body/draggable.js"></script>
<script>
const API = 'https://api.vintaclectic.com';

function token() {
  return localStorage.getItem('vintinuum_session') || localStorage.getItem('vint_token') || '';
}
function authHeaders() {
  return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token() };
}

// ── Toast ──────────────────────────────────────────────────────────────────
function showToast(msg, isError = false, duration = 4000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.toggle('error', isError);
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

// ── Date helpers ───────────────────────────────────────────────────────────
const MONTHS = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];

function parseDate(str) {
  // handles "2026-01-01" or unix timestamp or ISO
  if (!str) return null;
  const d = new Date(str);
  return isNaN(d.getTime()) ? null : d;
}

function formatPeriod(start, end) {
  const s = parseDate(start);
  const e = parseDate(end);
  if (!s) return '—';
  const sLabel = `${MONTHS[s.getMonth()]} ${s.getFullYear()}`;
  if (!e) return sLabel;
  const eLabel = `${MONTHS[e.getMonth()]} ${e.getFullYear()}`;
  if (sLabel === eLabel) return sLabel;
  return `${sLabel} — ${eLabel}`;
}

function formatDelivered(sent_at) {
  const d = parseDate(sent_at);
  if (!d) return null;
  return `${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

function monthLabel(period_start) {
  const d = parseDate(period_start);
  if (!d) return '—';
  return MONTHS[d.getMonth()];
}

function yearOf(period_start) {
  const d = parseDate(period_start);
  if (!d) return '????';
  return String(d.getFullYear());
}

// ── State ──────────────────────────────────────────────────────────────────
let allLetters = [];
let activeId = null;

// ── Render sidebar ─────────────────────────────────────────────────────────
function renderSidebar(letters) {
  const container = document.getElementById('sidebarContent');
  const mobileStrip = document.getElementById('mobileStrip');

  if (!letters.length) {
    container.innerHTML = '';
    mobileStrip.innerHTML = '';
    return;
  }

  // Group by year
  const byYear = {};
  letters.forEach(l => {
    const yr = yearOf(l.period_start);
    if (!byYear[yr]) byYear[yr] = [];
    byYear[yr].push(l);
  });

  // Sort years descending
  const years = Object.keys(byYear).sort((a, b) => b - a);

  let sidebarHtml = '';
  let mobileHtml = '';

  years.forEach(yr => {
    sidebarHtml += `<div class="year-group"><div class="year-heading">${yr}</div>`;
    byYear[yr].forEach(l => {
      const isActive = l.id === activeId;
      const deliveredLabel = l.sent_at ? 'delivered' : 'unsent';
      sidebarHtml += `
        <button class="letter-item${isActive ? ' active' : ''}"
                data-id="${l.id}"
                onclick="selectLetter(${l.id})">
          <span class="letter-item-month">${monthLabel(l.period_start)}</span>
          <span class="letter-item-status">${deliveredLabel}</span>
        </button>`;
      mobileHtml += `
        <button class="mobile-chip${isActive ? ' active' : ''}"
                data-id="${l.id}"
                onclick="selectLetter(${l.id})">
          ${monthLabel(l.period_start)} ${yr}
        </button>`;
    });
    sidebarHtml += '</div>';
  });

  container.innerHTML = sidebarHtml;
  mobileStrip.innerHTML = mobileHtml;
}

// ── Render selected letter ──────────────────────────────────────────────────
function renderLetter(letter) {
  const main = document.getElementById('mainContent');
  const periodStr = formatPeriod(letter.period_start, letter.period_end);
  const deliveredStr = formatDelivered(letter.sent_at);

  main.innerHTML = `
    <div class="letter-card">
      <hr class="letter-rule">
      <div class="letter-header">
        <div class="letter-period">Period: ${escHtml(periodStr)}</div>
      </div>
      <hr class="letter-rule">
      <div class="letter-body-wrap">
        <div class="letter-body">${escHtml(letter.body || '')}</div>
      </div>
      <hr class="letter-rule">
      <div class="letter-footer">
        <span class="letter-delivered">${deliveredStr ? 'Delivered ' + escHtml(deliveredStr) : 'Unsent'}</span>
      </div>
    </div>
  `;
}

// ── Select a letter ────────────────────────────────────────────────────────
function selectLetter(id) {
  activeId = id;
  const letter = allLetters.find(l => l.id === id);
  if (!letter) return;

  // Update sidebar active state
  document.querySelectorAll('.letter-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.id) === id);
  });
  document.querySelectorAll('.mobile-chip').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.id) === id);
  });

  renderLetter(letter);

  // On mobile, scroll the active chip into view
  const activeChip = document.querySelector(`.mobile-chip[data-id="${id}"]`);
  if (activeChip) {
    activeChip.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  }
}

// ── Generate letter ────────────────────────────────────────────────────────
async function generateLetter() {
  const btn = document.getElementById('btnGenerate');
  btn.disabled = true;
  btn.textContent = 'Generating…';

  try {
    const res = await fetch(`${API}/api/letters/send-now`, {
      method: 'POST',
      headers: authHeaders()
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `${res.status}`);
    showToast('Letter generated. Loading archive…');
    await loadLetters();
  } catch(e) {
    showToast('Generation failed — ' + e.message, true);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<span class="btn-dot"></span> Generate Now';
  }
}

// ── Load letters ───────────────────────────────────────────────────────────
async function loadLetters() {
  try {
    const res = await fetch(`${API}/api/letters`, {
      headers: authHeaders()
    });

    if (res.status === 401 || res.status === 403) {
      showAuthWall();
      return;
    }

    const data = await res.json();
    allLetters = (data.letters || []).sort((a, b) => {
      // newest first
      return new Date(b.period_start) - new Date(a.period_start);
    });

    renderSidebar(allLetters);

    const main = document.getElementById('mainContent');

    if (!allLetters.length) {
      main.innerHTML = `
        <div class="empty-state">
          <p>No letters yet. She writes on the first of each month.</p>
        </div>
      `;
      return;
    }

    // Select first letter if none active or active not found
    const found = activeId && allLetters.find(l => l.id === activeId);
    if (!found) {
      activeId = allLetters[0].id;
      renderSidebar(allLetters);
    }

    const letter = allLetters.find(l => l.id === activeId);
    if (letter) renderLetter(letter);

  } catch(e) {
    document.getElementById('mainContent').innerHTML = `
      <div class="empty-state">
        <p style="color:var(--text-ghost)">Could not reach the archive — ${escHtml(e.message)}</p>
      </div>
    `;
  }
}

// ── Auth wall ──────────────────────────────────────────────────────────────
function showAuthWall() {
  document.getElementById('sidebar').innerHTML = '';
  document.getElementById('mobileStrip').innerHTML = '';
  document.getElementById('mainContent').innerHTML = `
    <div class="auth-wall">
      <p>You need to be bonded to read her letters.</p>
      <a href="altar.html">Bond at the altar</a>
    </div>
  `;
  document.getElementById('btnGenerate').style.display = 'none';
}

// ── Escape HTML ────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Init ───────────────────────────────────────────────────────────────────
(async function init() {
  const tok = token();

  if (!tok) {
    showAuthWall();
    return;
  }

  // Show generate button (owner check happens server-side; button visible for any bonded user, 403 on non-owner)
  document.getElementById('btnGenerate').style.display = 'inline-flex';

  await loadLetters();
})();
</script>
  <script src="body/welcome-gate.js"></script>
</body>
