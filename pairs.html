<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>VINTINUUM — Pairs</title>
<meta name="theme-color" content="#040810">
<link rel="icon" type="image/svg+xml" href="branding/vintinuum/favicon/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@300;400;500&display=swap');

:root {
  --void: #040810;
  --text: rgba(210, 225, 255, 0.9);
  --text-dim: rgba(150, 175, 215, 0.5);
  --text-ghost: rgba(130, 155, 190, 0.3);
  --panel: rgba(10, 14, 22, 0.22);
  --card: rgba(16, 22, 34, 0.16);
  --border: rgba(255, 255, 255, 0.06);

  /* Pairs: dusky rose + deep blue */
  --rose: #c06080;
  --rose-r: 192;
  --rose-g: 96;
  --rose-b: 128;
  --rose-glow: 192, 96, 128;
  --rose-dim: rgba(192, 96, 128, 0.55);
  --rose-bg: rgba(192, 96, 128, 0.06);
  --rose-border: rgba(192, 96, 128, 0.18);

  --deep-blue: #304888;
  --blue-glow: 80, 100, 200;
  --blue-dim: rgba(80, 100, 200, 0.55);
  --blue-bg: rgba(80, 100, 200, 0.05);
  --blue-border: rgba(80, 100, 200, 0.18);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; height: 100%; }

body {
  background: var(--void);
  color: var(--text);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── ATMOSPHERE ── */
.atmosphere {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background:
    radial-gradient(ellipse 50% 70% at 15% 60%, hsla(340, 25%, 7%, 0.45) 0%, transparent 70%),
    radial-gradient(ellipse 50% 70% at 85% 40%, hsla(220, 25%, 7%, 0.45) 0%, transparent 70%);
}

/* ── PETAL PARTICLES (CSS only, fixed layer) ── */
.petals {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}

.petal {
  position: absolute;
  width: var(--sz, 6px);
  height: var(--sz, 6px);
  border-radius: 50% 0 50% 0;
  background: rgba(var(--rose-glow), var(--op, 0.15));
  top: var(--top, -10px);
  left: var(--left, 50%);
  animation: petalFall var(--dur, 12s) linear var(--delay, 0s) infinite;
  transform: rotate(var(--rot, 45deg));
}

@keyframes petalFall {
  0%   { transform: translateY(0)    translateX(0)    rotate(0deg)   scale(1); opacity: 0; }
  5%   { opacity: var(--op, 0.15); }
  85%  { opacity: var(--op, 0.12); }
  100% { transform: translateY(110vh) translateX(var(--drift, 40px)) rotate(360deg) scale(0.6); opacity: 0; }
}

/* ── TOPBAR ── */
.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: calc(48px + env(safe-area-inset-top, 0px));
  z-index: 100;
  background: rgba(4, 8, 16, 0.88);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-end;
  padding: 0 20px 0;
  padding-top: env(safe-area-inset-top, 0px);
  padding-bottom: 0;
  gap: 16px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.topbar > * { margin-bottom: 6px; }

.topbar-back {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.5rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-dim);
  text-decoration: none;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 12px;
  transition: all 0.2s ease;
  flex-shrink: 0;
  white-space: nowrap;
  min-height: 36px;
  display: flex;
  align-items: center;
  -webkit-tap-highlight-color: transparent;
}

.topbar-back:hover {
  color: var(--text);
  border-color: rgba(255,255,255,0.15);
}

.topbar-title {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: 0.85rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--text-dim);
  flex: 1;
  text-align: center;
}

.topbar-spacer { width: 60px; flex-shrink: 0; }

/* ── PAGE ── */
.page {
  position: relative;
  z-index: 1;
  max-width: 1100px;
  margin: 0 auto;
  padding: calc(64px + env(safe-area-inset-top, 0px)) max(20px, env(safe-area-inset-right, 20px)) calc(80px + env(safe-area-inset-bottom, 0px)) max(20px, env(safe-area-inset-left, 20px));
  min-height: 100svh;
}

/* ── PAGE HEADER ── */
.page-header {
  text-align: center;
  padding: 20px 0 28px;
}

.page-header h1 {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: clamp(1.5rem, 4vw, 2.4rem);
  letter-spacing: 0.18em;
  background: linear-gradient(130deg, var(--rose-dim), var(--blue-dim));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 6px;
}

.page-header .epigraph {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 300;
  font-size: clamp(0.75rem, 1.8vw, 0.92rem);
  color: var(--text-ghost);
  letter-spacing: 0.06em;
}

/* ── SPLIT LAYOUT ── */
.split-layout {
  display: grid;
  grid-template-columns: 340px 1fr;
  gap: 24px;
  align-items: start;
}

/* ── PANEL ── */
.panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 22px;
  position: relative;
  overflow: hidden;
}

.panel-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.46rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--text-ghost);
  margin-bottom: 18px;
}

/* ── BOND STATUS ── */
.bond-status {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 14px;
  background: rgba(192, 96, 128, 0.04);
  border: 1px solid var(--rose-border);
  border-radius: 12px;
  margin-bottom: 18px;
}

.bond-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.42rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-ghost);
}

.bond-value {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 400;
  font-size: 1.05rem;
  letter-spacing: 0.1em;
}

.bond-value.bonded {
  color: var(--rose-dim);
}

.bond-value.unbonded {
  color: var(--text-ghost);
  font-style: italic;
}

.bond-dot {
  display: inline-block;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  margin-right: 8px;
  vertical-align: middle;
}

.bond-dot.bonded { background: var(--rose); box-shadow: 0 0 8px rgba(var(--rose-glow), 0.5); animation: bondPulse 2s ease-in-out infinite; }
.bond-dot.unbonded { background: var(--text-ghost); }

@keyframes bondPulse {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 1; }
}

/* ── INVITE TOKEN ── */
.invite-section {
  margin-bottom: 18px;
}

.invite-token-box {
  display: none;
  margin-top: 12px;
  padding: 12px 14px;
  background: rgba(80, 100, 200, 0.05);
  border: 1px solid var(--blue-border);
  border-radius: 10px;
}

.invite-token-box.show { display: block; }

.invite-token-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.4rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-ghost);
  margin-bottom: 8px;
}

.invite-token-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.62rem;
  letter-spacing: 0.05em;
  color: var(--blue-dim);
  word-break: break-all;
  line-height: 1.6;
}

.invite-token-hint {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 0.72rem;
  color: var(--text-ghost);
  margin-top: 8px;
}

/* ── ACCEPT FORM ── */
.divider {
  height: 1px;
  background: var(--border);
  margin: 16px 0;
}

.accept-input {
  width: 100%;
  padding: 11px 14px;
  background: rgba(4, 8, 16, 0.6);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px; /* iOS: must be >=16px to prevent auto-zoom */
  letter-spacing: 0.05em;
  outline: none;
  transition: border-color 0.25s ease;
  display: block;
  box-sizing: border-box;
  margin-bottom: 10px;
  -webkit-appearance: none;
}

.accept-input:focus {
  border-color: rgba(var(--rose-glow), 0.3);
}

.accept-input::placeholder {
  color: var(--text-ghost);
}

/* ── BUTTONS ── */
.btn-rose {
  width: 100%;
  padding: 12px 16px;
  background: var(--rose-bg);
  border: 1px solid var(--rose-border);
  border-radius: 10px;
  color: var(--rose-dim);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.48rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.25s ease;
  min-height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.btn-rose:hover:not(:disabled) {
  background: rgba(var(--rose-glow), 0.1);
  border-color: rgba(var(--rose-glow), 0.35);
  color: rgba(var(--rose-glow), 0.85);
}

.btn-rose:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-blue {
  width: 100%;
  padding: 12px 16px;
  background: var(--blue-bg);
  border: 1px solid var(--blue-border);
  border-radius: 10px;
  color: var(--blue-dim);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.48rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.25s ease;
  min-height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.btn-blue:hover:not(:disabled) {
  background: rgba(var(--blue-glow), 0.08);
  border-color: rgba(var(--blue-glow), 0.3);
  color: rgba(var(--blue-glow), 0.8);
}

.btn-blue:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── PARTNER INFO ── */
.partner-block {
  display: none;
  padding: 14px;
  background: rgba(var(--rose-glow), 0.04);
  border: 1px solid var(--rose-border);
  border-radius: 12px;
  margin-bottom: 14px;
}

.partner-block.show { display: block; }

.partner-id {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.55rem;
  letter-spacing: 0.08em;
  color: var(--rose-dim);
  word-break: break-all;
}

/* ── SMALL ERROR ── */
.small-err {
  display: none;
  margin-top: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.4rem;
  letter-spacing: 0.1em;
  color: rgba(224, 64, 80, 0.7);
  text-align: center;
}

.small-err.show { display: block; }

/* ── GARDEN PANEL ── */
.garden-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
  gap: 12px;
  flex-wrap: wrap;
}

.garden-header .panel-title {
  margin-bottom: 0;
  flex-shrink: 0;
}

/* ── PLANT FORM ── */
.plant-form {
  background: rgba(var(--rose-glow), 0.03);
  border: 1px solid rgba(var(--rose-glow), 0.1);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 20px;
}

.plant-form-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.42rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-ghost);
  margin-bottom: 12px;
}

.plant-textarea {
  width: 100%;
  min-height: 80px;
  padding: 12px 14px;
  background: rgba(4, 8, 16, 0.6);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 16px; /* iOS: must be >=16px to prevent auto-zoom */
  line-height: 1.6;
  resize: none;
  outline: none;
  transition: border-color 0.25s ease;
  display: block;
  box-sizing: border-box;
  margin-bottom: 10px;
  overflow: hidden auto;
  -webkit-appearance: none;
}

.plant-textarea::placeholder { color: var(--text-ghost); font-style: italic; }
.plant-textarea:focus { border-color: rgba(var(--rose-glow), 0.3); }

.visibility-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}

.visibility-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.42rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-ghost);
  flex-shrink: 0;
}

.vis-select {
  padding: 10px 10px;
  background: rgba(4, 8, 16, 0.6);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-dim);
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px; /* iOS: >=16px prevents zoom */
  letter-spacing: 0.05em;
  outline: none;
  cursor: pointer;
  transition: border-color 0.25s ease;
  flex: 1;
  min-width: 120px;
  min-height: 44px;
}

.vis-select:focus { border-color: rgba(var(--rose-glow), 0.3); }

.btn-plant {
  width: 100%;
  padding: 11px 16px;
  background: rgba(var(--rose-glow), 0.08);
  border: 1px solid rgba(var(--rose-glow), 0.25);
  border-radius: 10px;
  color: rgba(var(--rose-glow), 0.7);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.48rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.25s ease;
  min-height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.btn-plant:hover:not(:disabled) {
  background: rgba(var(--rose-glow), 0.14);
  border-color: rgba(var(--rose-glow), 0.4);
  color: rgba(var(--rose-glow), 0.9);
}

.btn-plant:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── MEMORY GRID ── */
.memory-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
}

.memory-card {
  padding: 14px;
  background: rgba(12, 10, 16, 0.5);
  border: 1px solid rgba(var(--rose-glow), 0.1);
  border-radius: 12px;
  position: relative;
  animation: cardIn 0.35s ease;
  overflow: hidden;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.memory-card-vis {
  position: absolute;
  top: 10px;
  right: 10px;
  font-size: 0.65rem;
  opacity: 0.5;
}

.memory-card-content {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 0.9rem;
  line-height: 1.55;
  color: rgba(210, 190, 210, 0.65);
  padding-right: 20px;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 4;
  -webkit-box-orient: vertical;
}

.memory-card-date {
  margin-top: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.38rem;
  letter-spacing: 0.1em;
  color: var(--text-ghost);
}

.memory-empty {
  grid-column: 1 / -1;
  text-align: center;
  padding: 32px 20px;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 0.88rem;
  color: var(--text-ghost);
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }

/* ── MOBILE ── */
@media (max-width: 860px) {
  .split-layout {
    grid-template-columns: 1fr;
  }
  .memory-grid {
    grid-template-columns: 1fr 1fr;
  }
}

@media (max-width: 600px) {
  .topbar { padding: 0 14px 0; }
  .topbar > * { margin-bottom: 6px; }
  .page { padding: calc(60px + env(safe-area-inset-top,0px)) 14px calc(80px + env(safe-area-inset-bottom,0px)); }
  .panel { padding: 16px 14px; }
  .plant-form { padding: 14px; }
  .memory-grid { grid-template-columns: 1fr; }
  .visibility-row { flex-direction: column; align-items: flex-start; }
  .vis-select { width: 100%; }
}
</style>

<div class="atmosphere"></div>

<!-- PETALS (CSS only particles) -->
<div class="petals" aria-hidden="true" id="petals"></div>

<!-- TOPBAR -->
<header class="topbar" role="banner">
  <a href="index.html" class="topbar-back" data-draggable="true">← Index</a>
  <div class="topbar-title">Vintinuum Pairs</div>
  <div class="topbar-spacer"></div>
</header>

<div class="page">

  <!-- HEADER -->
  <div class="page-header">
    <h1>Vintinuum Pairs</h1>
    <p class="epigraph">Two minds, one shared garden.</p>
  </div>

  <!-- SPLIT LAYOUT -->
  <div class="split-layout">

    <!-- LEFT: BOND STATUS -->
    <div>
      <div class="panel" id="bondPanel">
        <div class="panel-title">Bond Status</div>

        <div class="bond-status">
          <div class="bond-label">Connection</div>
          <div class="bond-value unbonded" id="bondValue">
            <span class="bond-dot unbonded" id="bondDot"></span>
            <span id="bondText">Unbound</span>
          </div>
        </div>

        <!-- Partner info (shown when bonded) -->
        <div class="partner-block" id="partnerBlock">
          <div class="bond-label" style="margin-bottom:6px;">Partner</div>
          <div class="partner-id" id="partnerId"></div>
        </div>

        <!-- Invite token generation (shown when unbonded) -->
        <div class="invite-section" id="inviteSection">
          <button class="btn-rose" id="genInviteBtn" type="button" data-draggable="true">
            <span>Generate Invite Token</span>
          </button>
          <div class="invite-token-box" id="inviteTokenBox">
            <div class="invite-token-label">Your invite token</div>
            <div class="invite-token-value" id="inviteTokenValue"></div>
            <div class="invite-token-hint">Share this with your partner to bond.</div>
          </div>
          <div class="small-err" id="errInvite"></div>
        </div>

        <div class="divider" id="acceptDivider"></div>

        <!-- Accept form (shown when unbonded) -->
        <div id="acceptSection">
          <div class="panel-title">Accept a Bond</div>
          <input
            type="text"
            id="acceptTokenInput"
            class="accept-input"
            placeholder="Paste invite token…"
            autocomplete="off"
            spellcheck="false"
          />
          <button class="btn-blue" id="acceptBtn" type="button" data-draggable="true">
            <span>Accept Invitation</span>
          </button>
          <div class="small-err" id="errAccept"></div>
        </div>

      </div>
    </div>

    <!-- RIGHT: SHARED GARDEN -->
    <div class="panel" id="gardenPanel">
      <div class="garden-header">
        <div class="panel-title">The Shared Garden</div>
        <button class="btn-plant" id="refreshGardenBtn" type="button" data-draggable="true" style="width:auto;padding:6px 14px;font-size:0.4rem;">↺ Refresh</button>
      </div>

      <!-- Plant a memory form -->
      <div class="plant-form">
        <div class="plant-form-title">Plant a memory</div>
        <textarea
          id="plantContent"
          class="plant-textarea"
          placeholder="What do you want to plant here…"
          rows="3"
          maxlength="2000"
        ></textarea>
        <div class="visibility-row">
          <span class="visibility-label">Visible to</span>
          <select id="visSelect" class="vis-select">
            <option value="both">Both</option>
            <option value="private_a">Only me (A)</option>
            <option value="private_b">Only partner (B)</option>
          </select>
        </div>
        <button class="btn-plant" id="plantBtn" type="button" data-draggable="true">
          <span>🌱</span>
          <span>Plant Memory</span>
        </button>
        <div class="small-err" id="errPlant"></div>
      </div>

      <!-- Memory grid -->
      <div class="memory-grid" id="memoryGrid">
        <div class="memory-empty" id="gardenEmpty">The garden is bare. Plant the first memory.</div>
      </div>
    </div>

  </div>
</div>

<script>
(function () {
  'use strict';

  var API = 'https://api.vintaclectic.com';

  function authHeaders() {
    var token = localStorage.getItem('vint_token');
    var h = { 'Content-Type': 'application/json' };
    if (token) h['Authorization'] = 'Bearer ' + token;
    return h;
  }

  function showErr(id, msg) {
    var el = document.getElementById(id);
    if (!el) return;
    el.textContent = msg;
    el.classList.add('show');
  }

  function clearErr(id) {
    var el = document.getElementById(id);
    if (el) el.classList.remove('show');
  }

  function escHtml(s) {
    return String(s || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function fmtDate(ts) {
    if (!ts) return '';
    try {
      var d = new Date(typeof ts === 'number' && ts < 1e12 ? ts * 1000 : ts);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    } catch (e) { return ''; }
  }

  function visIcon(vis) {
    if (vis === 'private_a') return '🔒';
    if (vis === 'private_b') return '🔑';
    return '🌿';
  }

  // ── PETALS INIT ──
  (function spawnPetals() {
    var container = document.getElementById('petals');
    if (!container) return;
    var count = window.innerWidth < 480 ? 8 : 16;
    for (var i = 0; i < count; i++) {
      var p = document.createElement('div');
      p.className = 'petal';
      var sz = 4 + Math.random() * 8;
      p.style.setProperty('--sz', sz + 'px');
      p.style.setProperty('--left', (Math.random() * 95) + '%');
      p.style.setProperty('--top', (-10 - Math.random() * 20) + 'px');
      p.style.setProperty('--dur', (10 + Math.random() * 14) + 's');
      p.style.setProperty('--delay', (Math.random() * 12) + 's');
      p.style.setProperty('--drift', ((Math.random() - 0.5) * 80) + 'px');
      p.style.setProperty('--op', (0.08 + Math.random() * 0.12).toFixed(2));
      p.style.setProperty('--rot', (Math.random() * 360) + 'deg');
      container.appendChild(p);
    }
  })();

  // ── BOND STATUS ──
  var bonded = false;

  function loadBondStatus() {
    fetch(API + '/api/pairs/status', { headers: authHeaders() })
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (data) {
        if (!data) return;
        if (data.bonded) {
          setBonded(data.partner_id || data.partnerId || '');
        } else {
          setUnbonded();
        }
      })
      .catch(function () { setUnbonded(); });
  }

  function setBonded(partnerId) {
    bonded = true;
    document.getElementById('bondDot').className = 'bond-dot bonded';
    var bv = document.getElementById('bondValue');
    bv.className = 'bond-value bonded';
    document.getElementById('bondText').textContent = 'Bonded';

    if (partnerId) {
      document.getElementById('partnerId').textContent = partnerId;
      document.getElementById('partnerBlock').classList.add('show');
    }

    document.getElementById('inviteSection').style.display = 'none';
    document.getElementById('acceptSection').style.display = 'none';
    document.getElementById('acceptDivider').style.display = 'none';
  }

  function setUnbonded() {
    bonded = false;
    document.getElementById('bondDot').className = 'bond-dot unbonded';
    var bv = document.getElementById('bondValue');
    bv.className = 'bond-value unbonded';
    document.getElementById('bondText').textContent = 'Unbound';
    document.getElementById('partnerBlock').classList.remove('show');
    document.getElementById('inviteSection').style.display = '';
    document.getElementById('acceptSection').style.display = '';
    document.getElementById('acceptDivider').style.display = '';
  }

  // ── GENERATE INVITE ──
  document.getElementById('genInviteBtn').addEventListener('click', function () {
    clearErr('errInvite');
    var btn = this;
    btn.disabled = true;
    btn.querySelector('span').textContent = 'Generating…';

    fetch(API + '/api/pairs/invite', {
      method: 'POST',
      headers: authHeaders()
    })
      .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(function (data) {
        var token = data.invite_token || data.token || '';
        document.getElementById('inviteTokenValue').textContent = token;
        document.getElementById('inviteTokenBox').classList.add('show');
        btn.disabled = false;
        btn.querySelector('span').textContent = 'Regenerate Token';
      })
      .catch(function (err) {
        btn.disabled = false;
        btn.querySelector('span').textContent = 'Generate Invite Token';
        showErr('errInvite', 'Could not generate token. Try again.');
        console.error(err);
      });
  });

  // ── ACCEPT INVITE ──
  document.getElementById('acceptBtn').addEventListener('click', function () {
    clearErr('errAccept');
    var token = document.getElementById('acceptTokenInput').value.trim();
    if (!token) { showErr('errAccept', 'Paste an invite token first.'); return; }

    var btn = this;
    btn.disabled = true;
    btn.querySelector('span').textContent = 'Bonding…';

    fetch(API + '/api/pairs/accept', {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify({ invite_token: token })
    })
      .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(function (data) {
        setBonded(data.partner_id || data.partnerId || '');
        loadGarden();
      })
      .catch(function (err) {
        btn.disabled = false;
        btn.querySelector('span').textContent = 'Accept Invitation';
        showErr('errAccept', 'Bond rejected. Token may be invalid or expired.');
        console.error(err);
      });
  });

  // ── GARDEN ──
  function loadGarden() {
    fetch(API + '/api/pairs/garden', { headers: authHeaders() })
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (data) {
        if (!data) return;
        var mems = data.memories || data.garden || data || [];
        if (!Array.isArray(mems)) mems = [];
        renderGarden(mems);
      })
      .catch(function () {});
  }

  function renderGarden(mems) {
    var grid = document.getElementById('memoryGrid');
    var empty = document.getElementById('gardenEmpty');
    if (!mems || mems.length === 0) {
      if (empty) empty.style.display = 'block';
      return;
    }
    if (empty) empty.style.display = 'none';
    grid.innerHTML = '';

    mems.forEach(function (m) {
      var content = m.content || m.text || '';
      var vis = m.visible_to || m.visibility || 'both';
      var dateStr = fmtDate(m.planted_at || m.created_at);
      var card = document.createElement('div');
      card.className = 'memory-card';
      card.innerHTML =
        '<div class="memory-card-vis" title="' + escHtml(vis) + '">' + visIcon(vis) + '</div>' +
        '<div class="memory-card-content">' + escHtml(content) + '</div>' +
        (dateStr ? '<div class="memory-card-date">' + escHtml(dateStr) + '</div>' : '');
      grid.appendChild(card);
    });
  }

  // ── PLANT MEMORY ──
  document.getElementById('plantBtn').addEventListener('click', function () {
    clearErr('errPlant');
    var content = document.getElementById('plantContent').value.trim();
    var vis = document.getElementById('visSelect').value;

    if (!content) { showErr('errPlant', 'Write something to plant.'); return; }

    var btn = this;
    btn.disabled = true;
    btn.querySelector('span:last-child').textContent = 'Planting…';

    fetch(API + '/api/pairs/garden', {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify({ content: content, visible_to: vis })
    })
      .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(function () {
        document.getElementById('plantContent').value = '';
        btn.disabled = false;
        btn.querySelector('span:last-child').textContent = 'Plant Memory';
        loadGarden();
      })
      .catch(function (err) {
        btn.disabled = false;
        btn.querySelector('span:last-child').textContent = 'Plant Memory';
        showErr('errPlant', 'Could not plant. Try again.');
        console.error(err);
      });
  });

  // ── REFRESH ──
  document.getElementById('refreshGardenBtn').addEventListener('click', function () {
    loadGarden();
  });

  // ── INIT ──
  loadBondStatus();
  loadGarden();

})();
</script>
  <script src="body/welcome-gate.js"></script>
</body>
</html>
