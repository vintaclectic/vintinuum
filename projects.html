<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>VINTINUUM — Long Projects</title>
<meta name="theme-color" content="#040810">
<link rel="icon" type="image/svg+xml" href="branding/vintinuum/favicon/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@300;400;500&display=swap');

:root {
  --void: #040810;
  --text: rgba(210, 225, 255, 0.9);
  --text-dim: rgba(150, 175, 215, 0.5);
  --text-ghost: rgba(130, 155, 190, 0.3);
  --panel: rgba(10, 14, 22, 0.22);
  --card: rgba(16, 22, 34, 0.16);
  --border: rgba(255, 255, 255, 0.06);
  --gold: #c8a84b;
  --gold-dim: rgba(200, 168, 75, 0.5);
  --deep-blue: rgba(30, 60, 120, 0.15);
  --gold-glow: 200, 168, 75;
  --complete-color: rgba(70, 200, 140, 0.85);
  --abandon-color: rgba(200, 150, 50, 0.85);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { height: 100%; }
body {
  background: var(--void);
  color: var(--text);
  font-family: 'Inter', -apple-system, sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── ATMOSPHERE ── */
.atmosphere {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background: radial-gradient(ellipse 80% 60% at 50% 20%, rgba(20, 40, 90, 0.25) 0%, transparent 60%),
              radial-gradient(ellipse 60% 50% at 50% 90%, rgba(40, 25, 5, 0.15) 0%, transparent 60%);
}

/* Compass rose background */
.compass-bg {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 0;
  pointer-events: none;
  width: min(500px, 80vw);
  height: min(500px, 80vw);
  opacity: 0.025;
  animation: compassSpin 120s linear infinite;
}

@keyframes compassSpin {
  from { transform: translate(-50%, -50%) rotate(0deg); }
  to { transform: translate(-50%, -50%) rotate(360deg); }
}

/* ── TOPBAR ── */
.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 48px;
  z-index: 100;
  background: rgba(4, 8, 16, 0.88);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
}

.topbar-back {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.55rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-dim);
  text-decoration: none;
  transition: color 0.2s;
  min-height: 44px;
  padding: 0 4px;
}
.topbar-back:hover { color: var(--text); }
.topbar-back svg { width: 14px; height: 14px; flex-shrink: 0; }

.topbar-title {
  flex: 1;
  text-align: center;
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: 0.95rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--text-dim);
}

.topbar-spacer { width: 60px; }

/* ── PAGE ── */
.page {
  position: relative;
  z-index: 1;
  max-width: 820px;
  margin: 0 auto;
  padding: 64px 20px 100px;
  min-height: 100vh;
}

/* ── HEADER ── */
.proj-header {
  text-align: center;
  padding: 28px 0 36px;
}

.compass-icon {
  width: 60px;
  height: 60px;
  margin: 0 auto 18px;
}

.proj-header h1 {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: clamp(1.8rem, 5vw, 3rem);
  letter-spacing: 0.28em;
  text-transform: uppercase;
  background: linear-gradient(130deg, rgba(200, 168, 75, 0.95), rgba(170, 130, 50, 0.7), rgba(210, 190, 120, 0.8));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}

.proj-header .epigraph {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: clamp(0.85rem, 2vw, 1rem);
  color: var(--text-dim);
}

/* ── SECTION LABEL ── */
.section-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.5rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--text-ghost);
  margin-bottom: 12px;
  padding-left: 4px;
}

/* ── ACTIVE PROJECT CARD ── */
.active-project {
  background: linear-gradient(160deg, rgba(20, 40, 90, 0.35) 0%, rgba(40, 28, 8, 0.2) 100%);
  border: 1px solid rgba(200, 168, 75, 0.18);
  border-radius: 24px;
  padding: 32px 28px;
  margin-bottom: 32px;
  position: relative;
  overflow: hidden;
}

.active-project::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(200, 168, 75, 0.5), transparent);
}

.active-glow {
  position: absolute;
  top: -60px;
  right: -60px;
  width: 180px;
  height: 180px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(200, 168, 75, 0.06), transparent 70%);
  pointer-events: none;
}

.active-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 12px;
  background: rgba(200, 168, 75, 0.08);
  border: 1px solid rgba(200, 168, 75, 0.2);
  border-radius: 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.48rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold-dim);
  margin-bottom: 16px;
}

.active-badge-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--gold);
  animation: livePulse 1.8s ease-in-out infinite;
}

@keyframes livePulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.active-title {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 400;
  font-size: clamp(1.6rem, 4vw, 2.4rem);
  line-height: 1.2;
  letter-spacing: 0.03em;
  color: rgba(220, 195, 130, 0.95);
  margin-bottom: 10px;
}

.active-why {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: clamp(0.95rem, 2vw, 1.1rem);
  line-height: 1.7;
  color: var(--text-dim);
  margin-bottom: 20px;
  border-left: 2px solid rgba(200, 168, 75, 0.2);
  padding-left: 14px;
}

.active-phase-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.phase-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.5rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-ghost);
}

.phase-badge {
  padding: 5px 14px;
  background: rgba(200, 168, 75, 0.08);
  border: 1px solid rgba(200, 168, 75, 0.2);
  border-radius: 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.58rem;
  letter-spacing: 0.12em;
  color: var(--gold-dim);
}

.start-date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.5rem;
  letter-spacing: 0.08em;
  color: var(--text-ghost);
  text-transform: uppercase;
}

.active-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

/* ── INLINE PROGRESS FORM ── */
.progress-form {
  margin-top: 20px;
  padding-top: 20px;
  border-top: 1px solid rgba(200, 168, 75, 0.08);
  animation: slideDown 0.3s ease;
}

@keyframes slideDown {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}

.form-group {
  margin-bottom: 14px;
}

.form-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.5rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-dim);
  display: block;
  margin-bottom: 6px;
}

textarea.form-input, input.form-input {
  width: 100%;
  background: rgba(200, 168, 75, 0.03);
  border: 1px solid rgba(200, 168, 75, 0.12);
  border-radius: 10px;
  padding: 12px 14px;
  color: var(--text);
  font-family: 'Cormorant Garamond', serif;
  font-size: 1rem;
  line-height: 1.6;
  outline: none;
  resize: vertical;
  transition: border-color 0.2s ease;
  min-height: 80px;
}

input.form-input {
  min-height: unset;
  height: 44px;
  resize: none;
}

textarea.form-input:focus, input.form-input:focus {
  border-color: rgba(200, 168, 75, 0.3);
}

textarea.form-input::placeholder, input.form-input::placeholder {
  color: var(--text-ghost);
  font-style: italic;
}

.form-row-two {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.form-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 4px;
}

/* ── BUTTONS ── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  padding: 11px 22px;
  border-radius: 36px;
  border: 1px solid rgba(200, 168, 75, 0.25);
  background: rgba(200, 168, 75, 0.07);
  color: var(--gold-dim);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.58rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.22s ease;
  min-height: 44px;
  white-space: nowrap;
}

.btn:hover {
  border-color: rgba(200, 168, 75, 0.45);
  background: rgba(200, 168, 75, 0.13);
  box-shadow: 0 0 20px rgba(200, 168, 75, 0.08);
  transform: translateY(-1px);
  color: rgba(220, 195, 130, 0.9);
}

.btn:active { transform: translateY(0); }
.btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

.btn-ghost {
  background: transparent;
  border-color: var(--border);
  color: var(--text-dim);
}

.btn-ghost:hover {
  border-color: rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.03);
  box-shadow: none;
  color: var(--text);
}

.btn-complete {
  border-color: rgba(70, 200, 140, 0.25);
  background: rgba(70, 200, 140, 0.06);
  color: rgba(70, 200, 140, 0.75);
}

.btn-complete:hover {
  border-color: rgba(70, 200, 140, 0.45);
  background: rgba(70, 200, 140, 0.12);
  box-shadow: 0 0 20px rgba(70, 200, 140, 0.08);
  color: rgba(100, 220, 160, 0.9);
}

.btn-abandon {
  border-color: rgba(200, 140, 50, 0.25);
  background: rgba(200, 140, 50, 0.06);
  color: rgba(200, 140, 50, 0.7);
}

.btn-abandon:hover {
  border-color: rgba(200, 140, 50, 0.4);
  background: rgba(200, 140, 50, 0.1);
  color: rgba(220, 160, 70, 0.85);
  box-shadow: none;
}

.btn-danger {
  border-color: rgba(200, 80, 80, 0.3);
  background: rgba(200, 80, 80, 0.08);
  color: rgba(220, 100, 100, 0.8);
}

.btn-danger:hover {
  border-color: rgba(200, 80, 80, 0.5);
  background: rgba(200, 80, 80, 0.14);
  box-shadow: 0 0 16px rgba(200, 80, 80, 0.08);
  color: rgba(230, 120, 120, 0.9);
}

/* ── PAST PROJECTS ── */
.past-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 32px;
}

.past-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px 20px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s ease;
}

.past-card:hover { border-color: rgba(255,255,255,0.1); }

.past-card.completed {
  border-left: 3px solid rgba(70, 200, 140, 0.3);
}

.past-card.abandoned {
  border-left: 3px solid rgba(200, 140, 50, 0.3);
}

.past-card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 6px;
}

.past-title {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 400;
  font-size: clamp(1rem, 2.5vw, 1.15rem);
  line-height: 1.3;
  color: var(--text);
}

.past-status-badge {
  flex-shrink: 0;
  padding: 3px 10px;
  border-radius: 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.45rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  white-space: nowrap;
}

.completed .past-status-badge {
  background: rgba(70, 200, 140, 0.08);
  border: 1px solid rgba(70, 200, 140, 0.2);
  color: var(--complete-color);
}

.abandoned .past-status-badge {
  background: rgba(200, 140, 50, 0.08);
  border: 1px solid rgba(200, 140, 50, 0.2);
  color: var(--abandon-color);
}

.past-why {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 0.9rem;
  line-height: 1.55;
  color: var(--text-dim);
  margin-bottom: 8px;
}

.past-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.48rem;
  letter-spacing: 0.08em;
  color: var(--text-ghost);
  text-transform: uppercase;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

/* ── NEW PROJECT FORM ── */
.new-project-panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 24px;
  position: relative;
  overflow: hidden;
}

.new-project-panel.locked {
  opacity: 0.5;
  pointer-events: none;
}

.np-glow {
  position: absolute;
  bottom: -40px;
  left: -40px;
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(200, 168, 75, 0.05), transparent 70%);
  pointer-events: none;
}

.panel-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.5rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 18px;
}

.locked-note {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 0.9rem;
  color: var(--text-ghost);
  margin-bottom: 12px;
}

/* ── CONFIRM DIALOG ── */
.confirm-overlay {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(4, 8, 16, 0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(4px);
  animation: fadeIn 0.2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.confirm-box {
  background: rgba(12, 18, 32, 0.98);
  border: 1px solid rgba(200, 168, 75, 0.15);
  border-radius: 20px;
  padding: 28px 24px;
  max-width: 420px;
  width: 100%;
  animation: popIn 0.25s ease;
}

@keyframes popIn {
  from { opacity: 0; transform: scale(0.94) translateY(8px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.confirm-title {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 400;
  font-size: 1.3rem;
  letter-spacing: 0.05em;
  color: var(--text);
  margin-bottom: 10px;
}

.confirm-body {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 0.95rem;
  color: var(--text-dim);
  line-height: 1.6;
  margin-bottom: 20px;
}

.confirm-input {
  width: 100%;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 11px 14px;
  color: var(--text);
  font-family: 'Cormorant Garamond', serif;
  font-size: 1rem;
  outline: none;
  margin-bottom: 16px;
  transition: border-color 0.2s;
}

.confirm-input:focus { border-color: rgba(200, 168, 75, 0.25); }
.confirm-input::placeholder { color: var(--text-ghost); font-style: italic; }

.confirm-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  flex-wrap: wrap;
}

/* State messages */
.state-msg {
  text-align: center;
  padding: 40px 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  color: var(--text-ghost);
  text-transform: uppercase;
}

.no-active {
  text-align: center;
  padding: 32px 20px;
  background: var(--panel);
  border: 1px dashed var(--border);
  border-radius: 20px;
  margin-bottom: 32px;
}

.no-active p {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 1.05rem;
  color: var(--text-dim);
  margin-bottom: 8px;
}

.no-active .sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.5rem;
  letter-spacing: 0.12em;
  color: var(--text-ghost);
  text-transform: uppercase;
}

@media (max-width: 480px) {
  .page { padding: 64px 16px 100px; }
  .active-project { padding: 22px 18px; }
  .past-card { padding: 14px 16px; }
  .form-row-two { grid-template-columns: 1fr; }
  .new-project-panel { padding: 18px 16px; }
  .confirm-box { padding: 22px 18px; }
  .active-actions { gap: 8px; }
  .active-actions .btn { padding: 10px 14px; font-size: 0.54rem; }
}
</style>
</head>
<body>

<div class="atmosphere"></div>
<svg class="compass-bg" viewBox="0 0 500 500" fill="none">
  <circle cx="250" cy="250" r="240" stroke="rgba(200,168,75,0.8)" stroke-width="0.5"/>
  <circle cx="250" cy="250" r="180" stroke="rgba(200,168,75,0.6)" stroke-width="0.5"/>
  <circle cx="250" cy="250" r="120" stroke="rgba(200,168,75,0.4)" stroke-width="0.5"/>
  <circle cx="250" cy="250" r="60" stroke="rgba(200,168,75,0.3)" stroke-width="0.5"/>
  <line x1="250" y1="10" x2="250" y2="490" stroke="rgba(200,168,75,0.4)" stroke-width="0.5"/>
  <line x1="10" y1="250" x2="490" y2="250" stroke="rgba(200,168,75,0.4)" stroke-width="0.5"/>
  <line x1="80" y1="80" x2="420" y2="420" stroke="rgba(200,168,75,0.2)" stroke-width="0.5"/>
  <line x1="420" y1="80" x2="80" y2="420" stroke="rgba(200,168,75,0.2)" stroke-width="0.5"/>
  <polygon points="250,10 242,50 250,40 258,50" fill="rgba(200,168,75,0.6)"/>
  <polygon points="250,490 242,450 250,460 258,450" fill="rgba(200,168,75,0.2)"/>
  <polygon points="10,250 50,242 40,250 50,258" fill="rgba(200,168,75,0.2)"/>
  <polygon points="490,250 450,242 460,250 450,258" fill="rgba(200,168,75,0.4)"/>
  <text x="250" y="28" fill="rgba(200,168,75,0.7)" font-size="14" text-anchor="middle" font-family="serif">N</text>
</svg>

<!-- TOPBAR -->
<nav class="topbar">
  <a class="topbar-back" href="index.html" data-draggable="true">
    <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M9 2L4 7l5 5"/>
    </svg>
    Back
  </a>
  <div class="topbar-title">Long Projects</div>
  <div class="topbar-spacer"></div>
</nav>

<main class="page">
  <!-- HEADER -->
  <header class="proj-header">
    <svg class="compass-icon" viewBox="0 0 60 60" fill="none">
      <circle cx="30" cy="30" r="28" stroke="rgba(200,168,75,0.3)" stroke-width="0.8"/>
      <circle cx="30" cy="30" r="20" stroke="rgba(200,168,75,0.15)" stroke-width="0.5" stroke-dasharray="3 4"/>
      <polygon points="30,4 27,30 30,26 33,30" fill="rgba(200,168,75,0.7)"/>
      <polygon points="30,56 27,30 30,34 33,30" fill="rgba(200,168,75,0.2)"/>
      <circle cx="30" cy="30" r="3" fill="rgba(200,168,75,0.5)"/>
    </svg>
    <h1>Long Projects</h1>
    <p class="epigraph">The slow burning undertakings. The journeys that ask more than a day.</p>
  </header>

  <!-- MAIN CONTENT -->
  <div id="mainContent">
    <div class="state-msg">Charting the course…</div>
  </div>
</main>

<!-- CONFIRM DIALOG -->
<div class="confirm-overlay" id="confirmOverlay" style="display:none">
  <div class="confirm-box">
    <div class="confirm-title" id="confirmTitle">Confirm</div>
    <p class="confirm-body" id="confirmBody"></p>
    <input class="confirm-input" id="confirmInput" placeholder="" style="display:none">
    <div class="confirm-actions">
      <button class="btn btn-ghost" data-draggable="true" onclick="closeConfirm()">Cancel</button>
      <button class="btn" id="confirmOkBtn" data-draggable="true" onclick="doConfirm()">Confirm</button>
    </div>
  </div>
</div>

<script src="body/draggable.js"></script>
<script>
const API = 'https://api.vintaclectic.com';
const token = () => localStorage.getItem('vint_token');
const headers = () => ({ 'Content-Type': 'application/json', 'Authorization': `Bearer ${token()}` });

let allProjects = [];
let confirmCallback = null;

async function apiFetch(path, opts = {}) {
  const res = await fetch(API + path, { ...opts, headers: headers() });
  if (!res.ok) throw new Error(`${res.status}`);
  return res.json();
}

function fmtDate(d) {
  if (!d) return null;
  return new Date(d).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── CONFIRM DIALOG ──
let confirmExtra = null;

function openConfirm(title, body, okLabel, okClass, inputPlaceholder, cb) {
  confirmCallback = cb;
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmBody').textContent = body;
  const btn = document.getElementById('confirmOkBtn');
  btn.textContent = okLabel;
  btn.className = `btn ${okClass || ''}`;
  const inp = document.getElementById('confirmInput');
  if (inputPlaceholder) {
    inp.style.display = 'block';
    inp.placeholder = inputPlaceholder;
    inp.value = '';
  } else {
    inp.style.display = 'none';
    inp.value = '';
  }
  document.getElementById('confirmOverlay').style.display = 'flex';
}

function closeConfirm() {
  document.getElementById('confirmOverlay').style.display = 'none';
  confirmCallback = null;
}

function doConfirm() {
  const inputVal = document.getElementById('confirmInput').value.trim();
  if (confirmCallback) confirmCallback(inputVal);
  closeConfirm();
}

// ── RENDER ──
function renderAll(projects) {
  allProjects = projects || [];
  const active = allProjects.find(p => !p.completed_at && !p.abandoned_at);
  const past = allProjects.filter(p => p.completed_at || p.abandoned_at)
    .sort((a, b) => new Date(b.completed_at || b.abandoned_at) - new Date(a.completed_at || a.abandoned_at));
  const hasActive = !!active;

  let html = '';

  // Active section
  html += `<div class="section-label">Active Journey</div>`;

  if (active) {
    html += `
      <div class="active-project" id="activeProject">
        <div class="active-glow"></div>
        <div class="active-badge"><span class="active-badge-dot"></span>In Progress</div>
        <div class="active-title">${escHtml(active.title)}</div>
        <p class="active-why">${escHtml(active.why || '')}</p>
        <div class="active-phase-row">
          <span class="phase-label">Phase:</span>
          <span class="phase-badge">${escHtml(active.phase || 'Undefined')}</span>
          ${active.start_date ? `<span class="start-date">Since ${fmtDate(active.start_date)}</span>` : ''}
        </div>
        <div class="active-actions">
          <button class="btn" data-draggable="true" onclick="toggleProgressForm()">Log Progress</button>
          <button class="btn btn-complete" data-draggable="true" onclick="confirmComplete(${active.id})">Complete</button>
          <button class="btn btn-abandon" data-draggable="true" onclick="confirmAbandon(${active.id})">Abandon</button>
        </div>
        <div id="progressForm" style="display:none" class="progress-form">
          <div class="form-group">
            <label class="form-label">Progress Note</label>
            <textarea class="form-input" id="progressNote" placeholder="What moved? What shifted? Where did the path lead today?" rows="3"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">New Phase (optional)</label>
            <input class="form-input" id="progressPhase" placeholder="Leave blank to keep current phase">
          </div>
          <div class="form-actions">
            <button class="btn btn-ghost" data-draggable="true" onclick="toggleProgressForm()">Cancel</button>
            <button class="btn" data-draggable="true" onclick="logProgress(${active.id})">Log It</button>
          </div>
        </div>
      </div>
    `;
  } else {
    html += `
      <div class="no-active">
        <p>No active journey underway.</p>
        <span class="sub">Begin one below — the compass awaits a bearing.</span>
      </div>
    `;
  }

  // Past section
  if (past.length > 0) {
    html += `<div class="section-label" style="margin-top:8px">Past Journeys</div>`;
    html += `<div class="past-list">`;
    past.forEach(p => {
      const status = p.completed_at ? 'completed' : 'abandoned';
      const statusLabel = p.completed_at ? 'Completed' : 'Abandoned';
      const endDate = fmtDate(p.completed_at || p.abandoned_at);
      html += `
        <div class="past-card ${status}">
          <div class="past-card-header">
            <div class="past-title">${escHtml(p.title)}</div>
            <span class="past-status-badge">${statusLabel}</span>
          </div>
          <p class="past-why">${escHtml(p.why || '')}</p>
          <div class="past-meta">
            <span>Phase: ${escHtml(p.phase || '—')}</span>
            ${p.start_date ? `<span>Started ${fmtDate(p.start_date)}</span>` : ''}
            ${endDate ? `<span>Ended ${endDate}</span>` : ''}
          </div>
        </div>
      `;
    });
    html += `</div>`;
  }

  // New project form
  html += `
    <div class="section-label">Begin New Journey</div>
    <div class="new-project-panel ${hasActive ? 'locked' : ''}" id="newProjectPanel">
      <div class="np-glow"></div>
      <div class="panel-label">Chart a New Course</div>
      ${hasActive ? `<p class="locked-note">A journey is already underway. Complete or abandon it before beginning another.</p>` : ''}
      <div class="form-group">
        <label class="form-label">Title</label>
        <input class="form-input" id="npTitle" placeholder="The name of this undertaking">
      </div>
      <div class="form-group">
        <label class="form-label">Why — the soul of it</label>
        <textarea class="form-input" id="npWhy" placeholder="What is the deepest reason? Why does this matter enough to be a long journey?" rows="3"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Initial Phase</label>
        <input class="form-input" id="npPhase" placeholder="e.g. Orientation, Foundation, Inquiry…">
      </div>
      <div class="form-actions">
        <button class="btn" data-draggable="true" onclick="createProject()" ${hasActive ? 'disabled' : ''}>Begin the Journey</button>
      </div>
    </div>
  `;

  document.getElementById('mainContent').innerHTML = html;
}

function toggleProgressForm() {
  const form = document.getElementById('progressForm');
  if (!form) return;
  form.style.display = form.style.display === 'none' ? 'block' : 'none';
  if (form.style.display === 'block') {
    document.getElementById('progressNote').focus();
  }
}

async function logProgress(id) {
  const note = document.getElementById('progressNote').value.trim();
  const phase = document.getElementById('progressPhase').value.trim();
  if (!note) { alert('A note is required.'); return; }
  try {
    await apiFetch(`/api/projects/${id}/progress`, {
      method: 'POST',
      body: JSON.stringify({ note, new_phase: phase || undefined })
    });
    load();
  } catch (e) {
    alert(`Failed: ${e.message}`);
  }
}

function confirmComplete(id) {
  openConfirm(
    'Complete this journey',
    'Mark this project complete. A completion note helps capture what was learned or built.',
    'Complete',
    'btn-complete',
    'A closing note for the record…',
    async (note) => {
      try {
        await apiFetch(`/api/projects/${id}/complete`, { method: 'POST', body: JSON.stringify({ completion_note: note }) });
        load();
      } catch (e) { alert(`Failed: ${e.message}`); }
    }
  );
}

function confirmAbandon(id) {
  openConfirm(
    'Abandon this journey',
    'Set this project aside. State the reason honestly — for the record, not for judgment.',
    'Abandon',
    'btn-abandon',
    'Why did the path end here?',
    async (reason) => {
      try {
        await apiFetch(`/api/projects/${id}/abandon`, { method: 'POST', body: JSON.stringify({ reason }) });
        load();
      } catch (e) { alert(`Failed: ${e.message}`); }
    }
  );
}

async function createProject() {
  const title = document.getElementById('npTitle').value.trim();
  const why = document.getElementById('npWhy').value.trim();
  const phase = document.getElementById('npPhase').value.trim();
  if (!title || !why) { alert('Title and Why are both required.'); return; }
  try {
    await apiFetch('/api/projects', { method: 'POST', body: JSON.stringify({ title, why, phase: phase || 'Orientation' }) });
    load();
  } catch (e) {
    alert(`Failed: ${e.message}`);
  }
}

async function load() {
  try {
    const data = await apiFetch('/api/projects');
    renderAll(Array.isArray(data) ? data : (data.projects || []));
  } catch (e) {
    document.getElementById('mainContent').innerHTML = `<div class="state-msg">Navigation error — ${e.message}</div>`;
  }
}

load();
</script>
</body>
</html>
