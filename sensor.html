<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#020408">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>VINTINUUM SENSOR NODE</title>
<link rel="icon" type="image/svg+xml" href="branding/vintinuum/favicon/favicon.svg">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:#020408;color:rgba(218,228,255,0.9);font-family:'SF Mono',SFMono-Regular,Consolas,'Liberation Mono',Menlo,monospace;-webkit-font-smoothing:antialiased;touch-action:none;}

/* breathing background */
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 40%,rgba(79,195,247,0.04),transparent 70%);animation:bgPulse 8s ease-in-out infinite;pointer-events:none;z-index:0;}
@keyframes bgPulse{0%,100%{opacity:0.5;}50%{opacity:1;}}

.container{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:24px 20px;gap:20px;}

/* header */
.sensor-title{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:rgba(79,195,247,0.5);text-align:center;}
.sensor-sub{font-size:7px;letter-spacing:2.5px;color:rgba(255,255,255,0.15);margin-top:4px;text-align:center;}

/* orb */
.orb-wrap{position:relative;width:180px;height:180px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.orb{width:120px;height:120px;border-radius:50%;background:radial-gradient(circle at 40% 35%,rgba(79,195,247,0.25),rgba(79,195,247,0.08) 50%,rgba(206,147,216,0.04) 80%,transparent);border:1px solid rgba(79,195,247,0.12);transition:all 0.6s cubic-bezier(0.4,0,0.2,1);box-shadow:0 0 40px rgba(79,195,247,0.06),inset 0 0 30px rgba(79,195,247,0.03);}
.orb.transmitting{border-color:rgba(79,195,247,0.3);box-shadow:0 0 60px rgba(79,195,247,0.15),0 0 120px rgba(79,195,247,0.05),inset 0 0 40px rgba(79,195,247,0.08);animation:orbPulse 2s ease-in-out infinite;}
.orb.offline{border-color:rgba(255,100,100,0.2);box-shadow:0 0 30px rgba(255,100,100,0.06);}
.orb.buffered{border-color:rgba(255,213,79,0.25);box-shadow:0 0 40px rgba(255,213,79,0.08);animation:orbPulse 4s ease-in-out infinite;}
@keyframes orbPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.04);}}

/* orb ring */
.orb-ring{position:absolute;inset:-10px;border-radius:50%;border:1px solid rgba(79,195,247,0.06);animation:ringRotate 20s linear infinite;}
.orb-ring::after{content:'';position:absolute;top:-2px;left:50%;width:4px;height:4px;border-radius:50%;background:rgba(79,195,247,0.4);transform:translateX(-50%);}
@keyframes ringRotate{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

/* status */
.status{font-size:10px;letter-spacing:3px;text-align:center;transition:all 0.4s;}
.status.live{color:rgba(79,195,247,0.7);}
.status.dead{color:rgba(255,100,100,0.6);}
.status.buff{color:rgba(255,213,79,0.6);}
.status.init{color:rgba(255,255,255,0.2);}

/* readings */
.readings{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;width:100%;max-width:280px;}
.reading{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.03);}
.reading-label{font-size:8px;letter-spacing:1.5px;color:rgba(255,255,255,0.2);text-transform:uppercase;}
.reading-value{font-size:9px;color:rgba(79,195,247,0.6);font-variant-numeric:tabular-nums;}

/* delta log */
.delta-log{width:100%;max-width:280px;max-height:80px;overflow-y:auto;scrollbar-width:none;}
.delta-log::-webkit-scrollbar{display:none;}
.delta-entry{font-size:7px;letter-spacing:0.5px;color:rgba(255,255,255,0.15);padding:2px 0;border-bottom:1px solid rgba(255,255,255,0.02);}
.delta-entry .up{color:rgba(102,187,106,0.6);}
.delta-entry .down{color:rgba(239,83,80,0.5);}

/* connect section */
.connect{position:absolute;bottom:max(20px,env(safe-area-inset-bottom,20px));left:20px;right:20px;text-align:center;}
.connect-url{font-size:7px;color:rgba(255,255,255,0.1);letter-spacing:1px;word-break:break-all;}
.connect-hint{font-size:7px;color:rgba(255,255,255,0.08);margin-top:4px;}

/* permission banner */
.perm-banner{position:fixed;top:0;left:0;right:0;padding:14px 20px;background:rgba(255,213,79,0.08);border-bottom:1px solid rgba(255,213,79,0.15);text-align:center;z-index:100;display:none;}
.perm-banner.show{display:block;}
.perm-banner p{font-size:9px;color:rgba(255,213,79,0.7);letter-spacing:1px;margin-bottom:10px;}
.perm-btn{padding:10px 24px;background:rgba(79,195,247,0.12);border:1px solid rgba(79,195,247,0.3);border-radius:12px;color:rgba(79,195,247,0.9);font-size:10px;letter-spacing:2px;font-family:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent;min-height:44px;}
.perm-btn:active{background:rgba(79,195,247,0.2);}
</style>
</head>
<body>

<div class="perm-banner" id="permBanner">
  <p>SENSOR NODE REQUIRES MOTION + ORIENTATION ACCESS</p>
  <button class="perm-btn" id="permBtn">GRANT SENSOR ACCESS</button>
</div>

<div class="container">
  <div>
    <div class="sensor-title">VINTINUUM SENSOR NODE</div>
    <div class="sensor-sub">NERVOUS SYSTEM INPUT</div>
  </div>

  <div class="orb-wrap">
    <div class="orb-ring"></div>
    <div class="orb" id="orb"></div>
  </div>

  <div class="status init" id="status">INITIALIZING</div>

  <div class="readings" id="readings">
    <div class="reading"><span class="reading-label">Battery</span><span class="reading-value" id="rBattery">--</span></div>
    <div class="reading"><span class="reading-label">Charging</span><span class="reading-value" id="rCharging">--</span></div>
    <div class="reading"><span class="reading-label">Motion</span><span class="reading-value" id="rMotion">--</span></div>
    <div class="reading"><span class="reading-label">Light</span><span class="reading-value" id="rLight">--</span></div>
    <div class="reading"><span class="reading-label">Time</span><span class="reading-value" id="rTime">--</span></div>
    <div class="reading"><span class="reading-label">Online</span><span class="reading-value" id="rOnline">--</span></div>
  </div>

  <div class="delta-log" id="deltaLog"></div>

  <div class="connect">
    <div class="connect-url" id="connectUrl"></div>
    <div class="connect-hint">Open on phone to feed VINTINUUM's nervous system</div>
  </div>
</div>

<script>
'use strict';
(function() {
  // ── Config ──
  const API_BASES = [
    'https://api.vintaclectic.com',
    'http://localhost:8767'
  ];
  let apiBase = localStorage.getItem('vint_sensor_api') || API_BASES[0];
  const token = localStorage.getItem('vint_token') || localStorage.getItem('vint_access_token');

  // ── DOM refs ──
  const orb = document.getElementById('orb');
  const statusEl = document.getElementById('status');
  const permBanner = document.getElementById('permBanner');
  const permBtn = document.getElementById('permBtn');
  const deltaLog = document.getElementById('deltaLog');
  const $ = id => document.getElementById(id);

  // ── State ──
  let sensorData = {
    battery: { level: null, charging: null },
    motion: { acceleration: { x: 0, y: 0, z: 0 }, rotation: { alpha: 0, beta: 0, gamma: 0 } },
    ambientLight: null,
    timeLocal: null,
    online: navigator.onLine
  };
  let sendBuffer = [];
  let lastSendTime = 0;
  let transmitCount = 0;
  let permissionsGranted = false;

  // ── Show URL ──
  $('connectUrl').textContent = location.href;

  // ── Battery API ──
  async function initBattery() {
    try {
      if ('getBattery' in navigator) {
        const batt = await navigator.getBattery();
        const update = () => {
          sensorData.battery.level = batt.level;
          sensorData.battery.charging = batt.charging;
          $('rBattery').textContent = Math.round(batt.level * 100) + '%';
          $('rCharging').textContent = batt.charging ? 'YES' : 'NO';
        };
        batt.addEventListener('levelchange', update);
        batt.addEventListener('chargingchange', update);
        update();
      }
    } catch(_) {}
  }

  // ── Device Motion ──
  let motionMag = 0;
  function onMotion(e) {
    const a = e.acceleration || e.accelerationIncludingGravity || {};
    sensorData.motion.acceleration = { x: a.x || 0, y: a.y || 0, z: a.z || 0 };
    motionMag = Math.sqrt((a.x||0)**2 + (a.y||0)**2 + (a.z||0)**2);
    $('rMotion').textContent = motionMag.toFixed(1) + ' m/s\u00B2';
  }

  // ── Device Orientation ──
  function onOrientation(e) {
    sensorData.motion.rotation = {
      alpha: Math.round(e.alpha || 0),
      beta: Math.round(e.beta || 0),
      gamma: Math.round(e.gamma || 0)
    };
  }

  // ── Ambient Light ──
  function onAmbientLight(e) {
    sensorData.ambientLight = e.illuminance;
    $('rLight').textContent = Math.round(e.illuminance) + ' lux';
  }

  // ── Permission Flow (iOS 13+ requires user gesture) ──
  async function requestPermissions() {
    let needsGesture = false;

    if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
      needsGesture = true;
    }

    if (needsGesture) {
      permBanner.classList.add('show');
      permBtn.addEventListener('click', async () => {
        try {
          const motionPerm = await DeviceMotionEvent.requestPermission();
          const orientPerm = await DeviceOrientationEvent.requestPermission();
          if (motionPerm === 'granted') window.addEventListener('devicemotion', onMotion);
          if (orientPerm === 'granted') window.addEventListener('deviceorientation', onOrientation);
          permissionsGranted = true;
        } catch(_) {}
        permBanner.classList.remove('show');
        startSensorLoop();
      }, { once: true });
    } else {
      window.addEventListener('devicemotion', onMotion);
      window.addEventListener('deviceorientation', onOrientation);
      permissionsGranted = true;
      startSensorLoop();
    }

    // Ambient light — not widely supported but try
    if ('AmbientLightSensor' in window) {
      try {
        const als = new AmbientLightSensor();
        als.addEventListener('reading', () => {
          sensorData.ambientLight = als.illuminance;
          $('rLight').textContent = Math.round(als.illuminance) + ' lux';
        });
        als.start();
      } catch(_) {}
    } else if ('ondevicelight' in window) {
      window.addEventListener('devicelight', onAmbientLight);
    }
  }

  // ── Online/Offline ──
  window.addEventListener('online', () => { sensorData.online = true; $('rOnline').textContent = 'YES'; flushBuffer(); });
  window.addEventListener('offline', () => { sensorData.online = false; $('rOnline').textContent = 'NO'; });
  $('rOnline').textContent = navigator.onLine ? 'YES' : 'NO';

  // ── Time ──
  function updateTime() {
    const now = new Date();
    const hh = String(now.getHours()).padStart(2, '0');
    const mm = String(now.getMinutes()).padStart(2, '0');
    sensorData.timeLocal = hh + ':' + mm;
    $('rTime').textContent = sensorData.timeLocal;
  }
  setInterval(updateTime, 30000);
  updateTime();

  // ── Build Payload ──
  function buildPayload() {
    updateTime();
    return {
      battery: { ...sensorData.battery },
      motion: {
        acceleration: { ...sensorData.motion.acceleration },
        rotation: { ...sensorData.motion.rotation }
      },
      ambientLight: sensorData.ambientLight,
      timeLocal: sensorData.timeLocal,
      online: sensorData.online
    };
  }

  // ── Transmit ──
  async function transmit(payload) {
    const headers = { 'Content-Type': 'application/json' };
    if (token) headers['Authorization'] = 'Bearer ' + token;
    headers['ngrok-skip-browser-warning'] = '1';

    try {
      const resp = await fetch(apiBase + '/api/body/sensor', {
        method: 'POST',
        headers,
        body: JSON.stringify(payload),
        signal: AbortSignal.timeout(8000)
      });

      if (resp.ok) {
        const data = await resp.json();
        transmitCount++;
        setStatus('transmitting');
        showDeltas(data.applied || {});
        return true;
      }

      // Try fallback API
      if (apiBase === API_BASES[0] && API_BASES[1]) {
        apiBase = API_BASES[1];
        localStorage.setItem('vint_sensor_api', apiBase);
        return transmit(payload);
      }

      setStatus('offline');
      return false;
    } catch(_) {
      setStatus('offline');
      return false;
    }
  }

  // ── Buffer for offline ──
  function bufferPayload(payload) {
    sendBuffer.push(payload);
    if (sendBuffer.length > 30) sendBuffer.shift(); // keep last 30
    setStatus('buffered');
  }

  async function flushBuffer() {
    while (sendBuffer.length > 0) {
      const p = sendBuffer[0];
      const ok = await transmit(p);
      if (ok) sendBuffer.shift();
      else break;
    }
  }

  // ── Status Display ──
  function setStatus(state) {
    orb.className = 'orb ' + (state === 'transmitting' ? 'transmitting' : state === 'offline' ? 'offline' : state === 'buffered' ? 'buffered' : '');
    if (state === 'transmitting') {
      statusEl.textContent = 'TRANSMITTING';
      statusEl.className = 'status live';
    } else if (state === 'buffered') {
      statusEl.textContent = 'BUFFERED \u2014 WILL SYNC';
      statusEl.className = 'status buff';
    } else if (state === 'offline') {
      statusEl.textContent = 'OFFLINE';
      statusEl.className = 'status dead';
    } else {
      statusEl.textContent = 'INITIALIZING';
      statusEl.className = 'status init';
    }
  }

  // ── Show Deltas ──
  function showDeltas(deltas) {
    const keys = Object.keys(deltas);
    if (keys.length === 0) return;
    const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const parts = keys.map(k => {
      const v = deltas[k];
      const cls = v > 0 ? 'up' : 'down';
      const sign = v > 0 ? '+' : '';
      return `<span class="${cls}">${k} ${sign}${v}</span>`;
    });
    const entry = document.createElement('div');
    entry.className = 'delta-entry';
    entry.innerHTML = time + ' \u2014 ' + parts.join(' \u00B7 ');
    deltaLog.prepend(entry);
    // Keep max 20 entries
    while (deltaLog.children.length > 20) deltaLog.lastChild.remove();
  }

  // ── Sensor Loop ──
  function startSensorLoop() {
    setInterval(async () => {
      const now = Date.now();
      if (now - lastSendTime < 9000) return; // rate limit client-side
      lastSendTime = now;

      const payload = buildPayload();

      if (!navigator.onLine) {
        bufferPayload(payload);
        return;
      }

      // Flush any buffered first
      if (sendBuffer.length > 0) {
        await flushBuffer();
      }

      const ok = await transmit(payload);
      if (!ok) bufferPayload(payload);
    }, 10000);
  }

  // ── Auto-detect API ──
  async function detectApi() {
    for (const base of API_BASES) {
      try {
        const h = { 'ngrok-skip-browser-warning': '1' };
        if (token) h['Authorization'] = 'Bearer ' + token;
        const r = await fetch(base + '/api/body-state', { headers: h, signal: AbortSignal.timeout(4000) });
        if (r.ok) {
          apiBase = base;
          localStorage.setItem('vint_sensor_api', apiBase);
          return;
        }
      } catch(_) {}
    }
  }

  // ── Init ──
  async function init() {
    await detectApi();
    await initBattery();
    await requestPermissions();
    // If permissions didn't require gesture, loop already started
    // Otherwise it starts after button tap
  }

  init();
})();
</script>
</body>
</html>
