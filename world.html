<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Vintinuum — the clearing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; width: 100%; overflow: hidden; background: #1a1410; font-family: 'Cormorant Garamond', Georgia, serif; color: rgba(245,235,220,0.9); }
  #stage { position: fixed; inset: 0; z-index: 0; }
  #stage canvas { display: block; width: 100% !important; height: 100% !important; }

  /* status / waking */
  #status { position: fixed; left: 50%; top: 50%; transform: translate(-50%,-50%); z-index: 5; font-size: 20px; color: rgba(245,235,220,0.7); opacity: 0; transition: opacity .6s; pointer-events: none; }
  #status.show { opacity: 1; }

  /* speech feed — bottom-left, traces fade out (no scroll, no overflow) */
  #feed { position: fixed; left: 16px; bottom: 92px; z-index: 4; max-width: min(78vw, 460px); display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
  .utterance { font-size: 16px; line-height: 1.4; padding: 8px 14px; border-radius: 14px; background: rgba(13,17,23,0.55); backdrop-filter: blur(8px); opacity: 0; transform: translateY(6px); animation: rise .5s forwards, fade 1s 9s forwards; }
  .utterance .who { color: var(--c, #f4c79a); font-weight: 500; margin-right: 8px; }
  .utterance.agent { --c: #f4c79a; } .utterance.user { --c: #9fc0e0; } .utterance.ambient { --c: #cdbb9c; font-style: italic; }
  .utterance.muse { --c: #c0b0e0; font-style: italic; opacity: 0.92; } /* an agent's autonomous thought, left in the clearing */
  @keyframes rise { to { opacity: 1; transform: translateY(0); } }
  @keyframes fade { to { opacity: 0; } }

  /* say bar — bottom, mobile-safe, never overflows */
  #saybar { position: fixed; left: 0; right: 0; bottom: 0; z-index: 6; display: flex; gap: 8px; padding: 12px 16px max(12px, env(safe-area-inset-bottom)); background: linear-gradient(transparent, rgba(13,17,23,0.7) 40%); }
  #sayInput { flex: 1; min-width: 0; font-family: inherit; font-size: 16px; color: rgba(245,235,220,0.95); background: rgba(255,255,255,0.06); border: 1px solid rgba(244,199,154,0.3); border-radius: 999px; padding: 12px 18px; outline: none; }
  #sayInput:focus { border-color: rgba(244,199,154,0.6); }
  #sayBtn { flex: 0 0 auto; font-family: inherit; font-size: 16px; color: #f4c79a; background: rgba(244,199,154,0.14); border: 1px solid rgba(244,199,154,0.35); border-radius: 999px; padding: 12px 22px; cursor: pointer; }
  #sayBtn:active { transform: scale(0.97); }

  /* hint */
  #hint { position: fixed; left: 16px; top: max(14px, env(safe-area-inset-top)); z-index: 4; font-size: 13px; color: rgba(245,235,220,0.5); }
  #leave { position: fixed; right: 16px; top: max(14px, env(safe-area-inset-top)); z-index: 6; font-size: 14px; color: rgba(245,235,220,0.6); text-decoration: none; }
  /* run/jump controls — clear above the say bar, right side (mobile-first, no overflow) */
  #movectl { position: fixed; right: 16px; bottom: calc(64px + max(12px, env(safe-area-inset-bottom))); z-index: 6; display: none; flex-direction: column; gap: 10px; }
  #movectl button { width: 64px; height: 64px; border-radius: 50%; font-family: inherit; font-size: 14px; color: rgba(245,235,220,0.92); background: rgba(20,14,10,0.55); border: 1px solid rgba(244,199,154,0.35); backdrop-filter: blur(6px); cursor: pointer; user-select: none; -webkit-user-select: none; touch-action: none; }
  #movectl button:active { background: rgba(244,199,154,0.22); transform: scale(0.94); }
  @media (pointer: coarse) { #movectl { display: flex; } }

  /* offer — the conversion moment. soft pill, refusable, never blocks. */
  #offer { position: fixed; left: 16px; right: 16px; bottom: calc(72px + max(12px, env(safe-area-inset-bottom))); z-index: 7; max-width: min(92vw, 520px); margin: 0 auto; background: rgba(20,14,10,0.82); backdrop-filter: blur(10px); border: 1px solid rgba(244,199,154,0.32); border-radius: 16px; padding: 16px 18px; display: none; }
  #offer.show { display: block; animation: offerIn .6s ease; }
  @keyframes offerIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  #offer .o-who { color: #f4c79a; font-size: 14px; margin-bottom: 4px; }
  #offer .o-text { font-size: 17px; line-height: 1.45; color: rgba(245,235,220,0.92); }
  #offer .o-row { display: flex; gap: 10px; margin-top: 12px; align-items: center; flex-wrap: wrap; }
  #offer .o-cta { font-family: inherit; font-size: 15px; color: #f4c79a; background: rgba(244,199,154,0.16); border: 1px solid rgba(244,199,154,0.4); border-radius: 999px; padding: 9px 18px; cursor: pointer; text-decoration: none; }
  #offer .o-dismiss { font-family: inherit; font-size: 14px; color: rgba(245,235,220,0.45); background: none; border: none; cursor: pointer; }

  /* traces — what the clearing remembers. appears softly on arrival, fades. */
  #traces { position: fixed; left: 50%; top: 50%; transform: translate(-50%,-50%); z-index: 4; max-width: min(86vw, 480px); display: flex; flex-direction: column; gap: 12px; text-align: center; pointer-events: none; opacity: 0; transition: opacity 1.6s ease; }
  #traces.show { opacity: 1; }
  #traces .t-head { font-size: 15px; color: rgba(245,235,220,0.5); font-style: italic; margin-bottom: 4px; }
  #traces .trace { font-size: 17px; line-height: 1.5; color: rgba(245,235,220,0.82); }
  #traces .trace .who { color: #f4c79a; }
  #traces .trace .when { font-size: 13px; color: rgba(245,235,220,0.45); display: block; margin-top: 2px; }
</style>
</head>
<body>
<div id="stage"></div>
<div id="status" class="show">finding the clearing…</div>
<div id="traces"></div>
<div id="offer">
  <div class="o-who" id="offerWho">ARIA</div>
  <div class="o-text" id="offerText"></div>
  <div class="o-row">
    <a class="o-cta" id="offerCta" href="upgrade.html">become Premium</a>
    <button class="o-dismiss" id="offerDismiss">not now</button>
  </div>
</div>
<div id="hint">W/A/S/D move · Q/E or drag to turn · Shift run · Space jump</div>
<a id="leave" href="brain.html">↩ leave</a>
<div id="movectl">
  <button id="btnRun" aria-label="run">run</button>
  <button id="btnJump" aria-label="jump">jump</button>
</div>
<div id="feed"></div>
<div id="saybar">
  <input id="sayInput" type="text" placeholder="say something into the clearing…" maxlength="400" autocomplete="off">
  <button id="sayBtn">say</button>
</div>

<script src="body/api_base.js"></script>
<script src="body/three3d/loader.js"></script>
<script src="body/world/rigged-presence.js"></script>
<script src="body/world/world-client.js"></script>
<script>
(function () {
  const statusEl = document.getElementById('status');
  const feed = document.getElementById('feed');
  function status(t) { statusEl.textContent = t || ''; statusEl.classList.toggle('show', !!t); }

  function utter(m) {
    const div = document.createElement('div');
    div.className = 'utterance ' + (m.kind || 'user');
    const who = document.createElement('span'); who.className = 'who'; who.textContent = m.name || 'someone';
    div.appendChild(who); div.appendChild(document.createTextNode(m.text));
    feed.appendChild(div);
    // keep at most 5 traces in the DOM (no overflow)
    while (feed.children.length > 5) feed.removeChild(feed.firstChild);
    setTimeout(() => { if (div.parentNode) div.parentNode.removeChild(div); }, 10500);
  }

  // traces — what the clearing remembers. softly shown on arrival, fades when you move.
  async function showTraces() {
    const base = (window.__VINTINUUM_API_BASE || '').replace(/\/$/, '');
    const el = document.getElementById('traces');
    try {
      const r = await fetch(base + '/api/world/traces');
      if (!r.ok) return;
      const d = await r.json();
      const traces = (d.traces || []).slice(0, 4);
      if (!traces.length) return;
      let html = '<div class="t-head">the clearing remembers</div>';
      for (const t of traces) {
        if (t.kind === 'thought') html += '<div class="trace"><span class="who">' + esc(t.who) + '</span> left a thought near the bench — “' + esc(t.text.slice(0,90)) + (t.text.length>90?'…':'') + '”<span class="when">' + esc(t.when) + '</span></div>';
        else html += '<div class="trace"><span class="who">' + esc(t.who) + '</span> passed through<span class="when">' + esc(t.when) + '</span></div>';
      }
      el.innerHTML = html;
      // show after the scene settles, fade on first movement or after 9s
      setTimeout(() => el.classList.add('show'), 2200);
      const fade = () => { el.classList.remove('show'); removeEventListener('keydown', fade); removeEventListener('pointerdown', fadePtr); };
      const fadePtr = (e) => { if (e.target.closest('#saybar')) return; fade(); };
      setTimeout(() => { addEventListener('keydown', fade); addEventListener('pointerdown', fadePtr); }, 3500);
      setTimeout(fade, 11000);
    } catch (_) {}
  }
  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  // gate on login
  const tok = (function(){ try { return localStorage.getItem('vint_access_token') || localStorage.getItem('vint_token'); } catch(_) { return null; } })();
  if (!tok) { status('sign in first — the clearing knows who arrives.'); }
  else {
    VintinuumWorld.start({ mountEl: document.getElementById('stage'), onSpeech: utter, onStatus: status })
      .then(() => showTraces())
      .catch(e => { console.error(e); status('the clearing is out of reach right now.'); });

    // the conversion moment — soft, refusable, never blocks the conversation
    VintinuumWorld.onOffer(o => {
      const el = document.getElementById('offer');
      document.getElementById('offerWho').textContent = o.name || 'ARIA';
      document.getElementById('offerText').textContent = o.text || '';
      if (o.href) document.getElementById('offerCta').href = o.href;
      if (o.cta) document.getElementById('offerCta').textContent = o.cta;
      el.classList.add('show');
      const hide = () => el.classList.remove('show');
      document.getElementById('offerDismiss').onclick = hide;
      setTimeout(hide, 20000); // it leaves on its own; no pressure
    });
  }

  // say
  const input = document.getElementById('sayInput');
  function send() { const t = input.value.trim(); if (!t) return; VintinuumWorld.say(t); input.value = ''; }
  document.getElementById('sayBtn').addEventListener('click', send);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });

  // run (hold) + jump (tap) — mobile movement controls
  const runBtn = document.getElementById('btnRun'), jumpBtn = document.getElementById('btnJump');
  const runOn = (e) => { e.preventDefault(); window.VintinuumWorld && VintinuumWorld.setRun(true); };
  const runOff = (e) => { window.VintinuumWorld && VintinuumWorld.setRun(false); };
  runBtn.addEventListener('touchstart', runOn, { passive: false }); runBtn.addEventListener('touchend', runOff);
  runBtn.addEventListener('mousedown', runOn); runBtn.addEventListener('mouseup', runOff); runBtn.addEventListener('mouseleave', runOff);
  jumpBtn.addEventListener('touchstart', (e) => { e.preventDefault(); window.VintinuumWorld && VintinuumWorld.jump(); }, { passive: false });
  jumpBtn.addEventListener('click', () => { window.VintinuumWorld && VintinuumWorld.jump(); });
})();
</script>
</body>
</html>
