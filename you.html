<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>YOU · Vintinuum</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #05070d;
    --panel: rgba(8,12,20,0.55);
    --border: rgba(124,207,255,0.18);
    --text: #dae4ff;
    --dim: rgba(180,200,230,0.65);
    --accent: #7ccfff;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Space Mono', monospace; min-height: 100%; }
  body { padding: max(20px, env(safe-area-inset-top, 20px)) 16px calc(80px + env(safe-area-inset-bottom, 0px)); }
  .page { max-width: 720px; margin: 0 auto; }
  h1 { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 2.4rem; font-weight: 400; letter-spacing: 0.02em; margin: 32px 0 8px; color: var(--accent); }
  .sub { color: var(--dim); font-size: 0.7rem; letter-spacing: 0.22em; text-transform: uppercase; margin-bottom: 28px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 18px 18px 16px; margin: 14px 0; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
  .card h3 { margin: 0 0 8px; font-size: 0.65rem; letter-spacing: 0.24em; text-transform: uppercase; color: var(--accent); font-weight: 700; }
  .row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .row:last-child { border-bottom: none; }
  .row .k { color: var(--dim); font-size: 0.78rem; }
  .row .v { color: var(--text); font-size: 0.78rem; font-weight: 700; }
  .pill { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 0.6rem; letter-spacing: 0.18em; text-transform: uppercase; border: 1px solid var(--border); color: var(--dim); }
  .pill.live { color: #7cffb4; border-color: rgba(124,255,180,0.35); }
  .pill.dim  { color: rgba(180,180,200,0.5); }
  .empty { color: var(--dim); font-style: italic; font-family: 'Cormorant Garamond', serif; padding: 14px 4px; }
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 9px 16px; border-radius: 12px; border: 1px solid var(--border); background: rgba(124,207,255,0.06); color: var(--text); cursor: pointer; font-family: inherit; font-size: 0.65rem; letter-spacing: 0.18em; text-transform: uppercase; }
  .btn:hover { background: rgba(124,207,255,0.12); }
  .btn[disabled] { opacity: 0.4; cursor: not-allowed; }
  footer { margin-top: 28px; padding: 14px 0 24px; color: rgba(180,200,230,0.32); font-size: 0.65rem; font-style: italic; font-family: 'Cormorant Garamond', serif; text-align: center; }
</style>
<script src="body/api_base.js?v=v20260505-onedoor"></script>
<script src="body/shell.js?v=v20260505-learnnav"></script>
<script src="body/identity.js?v=v20260505-onedoor"></script>
<script src="body/bond_door.js?v=v20260506-welcome"></script>
<script src="body/topbar.js?v=v20260505-onedoor" defer></script>
<script src="body/mobile_nav.js?v=v20260505-onedoor" defer></script>
</head>
<body>
<div class="page">
  <div class="sub">Movement VI · landing</div>
  <h1>You.</h1>

  <div class="card" id="identityCard">
    <h3>Identity</h3>
    <div id="identityBody">
      <div class="empty">loading…</div>
    </div>
  </div>

  <div class="card">
    <h3>Connectors</h3>
    <div id="connectorsBody">
      <div class="row"><span class="k">telegram</span><span class="pill dim" id="cTg">offline</span></div>
      <div class="row"><span class="k">discord</span><span class="pill dim" id="cDc">offline</span></div>
      <div class="row"><span class="k">kick</span><span class="pill dim" id="cKk">offline</span></div>
      <div class="row"><span class="k">pulse</span><span class="pill dim" id="cPu">offline</span></div>
    </div>
  </div>

  <div class="card">
    <h3>Devices</h3>
    <div id="devicesBody">
      <div class="empty">loading…</div>
    </div>
    <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn" id="btnPair">+ Pair phone</button>
      <button class="btn" id="btnRefreshDevices">refresh</button>
    </div>
  </div>

  <!-- Pairing modal -->
  <div id="pairModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);z-index:500;align-items:center;justify-content:center;padding:20px;">
    <div style="background:#0a0e18;border:1px solid var(--border);border-radius:18px;padding:24px;max-width:380px;width:100%;text-align:center;">
      <h3 style="margin:0 0 12px;font-size:0.65rem;letter-spacing:0.24em;text-transform:uppercase;color:var(--accent);">Pair a phone</h3>
      <div id="pairCode" style="font-family:'Space Mono',monospace;font-size:2rem;letter-spacing:0.4em;margin:18px 0;color:var(--text);">—</div>
      <div id="pairCanvas" style="display:flex;justify-content:center;margin:12px 0;"></div>
      <div style="color:var(--dim);font-size:0.7rem;line-height:1.55;font-family:'Cormorant Garamond',serif;font-style:italic;">
        Open the Vintinuum app on your phone, scan this code (or type it). The code expires in 5 minutes.
      </div>
      <div style="margin-top:16px;">
        <button class="btn" id="btnClosePair">Close</button>
      </div>
    </div>
  </div>

  <footer>The body breathes.</footer>
</div>

<script>
(function () {
  function setPill(id, alive, label) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = label || (alive ? 'live' : 'offline');
    el.className = 'pill ' + (alive ? 'live' : 'dim');
  }

  function refreshIdentity() {
    const auth = (window.Shell && Shell.get('auth')) || { signedIn: false };
    const body = document.getElementById('identityBody');
    if (!body) return;
    if (!auth.signedIn || !auth.user) {
      body.innerHTML = `
        <div class="empty">Not signed in. Use the topbar pill to sign in or create an account.</div>
      `;
      return;
    }
    const u = auth.user;
    const tier = (u.tier || 'free').toUpperCase();
    body.innerHTML = `
      <div class="row"><span class="k">name</span><span class="v">${u.name || u.display_name || u.email || '—'}</span></div>
      <div class="row"><span class="k">email</span><span class="v">${u.email || '—'}</span></div>
      <div class="row"><span class="k">tier</span><span class="v">${tier}</span></div>
      <div class="row"><span class="k">device</span><span class="v" style="font-size:0.65rem;">${(Shell.deviceId || '').slice(0,16)}…</span></div>
    `;
  }

  function refreshConnectors() {
    const c = (window.Shell && Shell.get('connectors')) || {};
    setPill('cTg', !!c.telegram?.alive);
    setPill('cDc', !!c.discord?.alive);
    setPill('cKk', !!c.kick?.alive, c.kick?.alive ? 'live' : (c.kick?.send ? 'send-ready' : 'offline'));
    setPill('cPu', !!c.pulse?.alive);
  }

  function fmtTime(ts) {
    if (!ts) return '—';
    const d = new Date(ts * 1000);
    const now = Date.now() / 1000;
    const ago = now - ts;
    if (ago < 60) return 'just now';
    if (ago < 3600) return Math.floor(ago/60) + 'm ago';
    if (ago < 86400) return Math.floor(ago/3600) + 'h ago';
    return Math.floor(ago/86400) + 'd ago';
  }

  async function refreshDevices() {
    const body = document.getElementById('devicesBody');
    if (!body) return;
    const auth = (window.Shell && Shell.get('auth')) || { signedIn: false };
    if (!auth.signedIn) {
      body.innerHTML = '<div class="empty">Sign in to see your bonded devices.</div>';
      return;
    }
    try {
      const res = await window.apiFetch('/api/v2/device/list', { method: 'GET' });
      if (!res.ok) throw new Error('list failed: ' + res.status);
      const data = await res.json();
      const devices = data.devices || [];
      const current = data.currentDevice || '';
      if (!devices.length) {
        body.innerHTML = '<div class="empty">No devices bonded yet. Pair your phone with the button below.</div>';
        return;
      }
      body.innerHTML = devices.map(d => {
        const isThis = d.device_id === current;
        const platform = d.platform || (d.user_agent || '').includes('Mobile') ? 'mobile' : 'web';
        return `
          <div class="row">
            <span class="k">
              ${platform.toUpperCase()}${isThis ? ' <span class="pill live" style="margin-left:6px;">this</span>' : ''}
              <span style="display:block;color:var(--dim);font-size:0.65rem;margin-top:2px;">last seen ${fmtTime(d.last_seen)}</span>
            </span>
            <span class="v">
              ${isThis ? '' : `<button class="btn" data-revoke="${d.id}" style="padding:5px 10px;font-size:0.55rem;">revoke</button>`}
            </span>
          </div>
        `;
      }).join('');
      body.querySelectorAll('button[data-revoke]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.getAttribute('data-revoke');
          if (!confirm('Revoke this device? It will be signed out.')) return;
          await window.apiFetch('/api/v2/device/' + id, { method: 'DELETE' });
          refreshDevices();
        });
      });
    } catch (e) {
      body.innerHTML = '<div class="empty">Could not load devices: ' + e.message + '</div>';
    }
  }

  async function openPair() {
    const auth = (window.Shell && Shell.get('auth')) || { signedIn: false };
    if (!auth.signedIn) { alert('Sign in first to pair a device.'); return; }
    const modal = document.getElementById('pairModal');
    const codeEl = document.getElementById('pairCode');
    const canvas = document.getElementById('pairCanvas');
    codeEl.textContent = '…';
    canvas.innerHTML = '';
    modal.style.display = 'flex';
    try {
      const res = await window.apiFetch('/api/v2/device/pair-issue', { method: 'POST' });
      const data = await res.json();
      codeEl.textContent = data.code;
      // Simple QR via google chart endpoint (no JS lib pull needed for v1).
      const url = encodeURIComponent(data.pairUrl || data.code);
      canvas.innerHTML = `<img alt="pair QR" width="180" height="180"
        style="border-radius:12px;background:#fff;padding:8px;"
        src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${url}" />`;
    } catch (e) {
      codeEl.textContent = 'error';
      canvas.innerHTML = '<div class="empty">' + e.message + '</div>';
    }
  }

  function boot() {
    if (!window.Shell) { setTimeout(boot, 80); return; }
    refreshIdentity();
    refreshConnectors();
    refreshDevices();
    Shell.subscribe('auth', () => { refreshIdentity(); refreshDevices(); });
    Shell.subscribe('connectors', refreshConnectors);
    document.getElementById('btnPair').addEventListener('click', openPair);
    document.getElementById('btnRefreshDevices').addEventListener('click', refreshDevices);
    document.getElementById('btnClosePair').addEventListener('click', () => {
      document.getElementById('pairModal').style.display = 'none';
    });
  }
  boot();
})();
</script>
</body>
</html>
